<script>
/* ── Nassa Auth Guard ── */
(async()=>{
  try{
    const r=await fetch('/api/auth',{credentials:'include'});
    if(!r.ok) throw new Error('unauth');
    const d=await r.json();
    if(!d.ok) throw new Error('unauth');
    // Store user for the app to use
    window.__nassaUser=d;
  }catch(e){
    // Not logged in — redirect to NassaContent login
    window.location.replace('/app?redirect='+encodeURIComponent(window.location.pathname));
  }
})();
</script>

<script>

});

  return Math.round((b - a) / (1000 * 60 * 60 * 24));

  if (!d) return null;
  return d.toLocaleDateString("it-IT", {
    day: "numeric",
    month: "short"
  });
}
function isToday(d) {
  return d && d.toDateString() === TODAY.toDateString();
}
function isPast(d) {
  return d && d < TODAY && !isToday(d);
