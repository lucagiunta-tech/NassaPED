function tvBuildCard(t){
  const cl=getClient(t.client);
  const {bg,txt,border}=clientStyles(cl);
  const isExp=t.id===_tvExpandedId;
  const totalSub=(t.subtasks||[]).length;
  const doneSub=(t.subtasks||[]).filter(s=>s.stato==='done').length;
  const prog=totalSub>0?Math.round(doneSub/totalSub*100):0;
  const prioC=PRIO_CFG[t.priority]||PRIO_CFG.media;
  let scadStyle='color:var(--text-3)';
  if(t.scadenza){const days=Math.round((new Date(t.scadenza)-new Date())/864e5);if(days<0)scadStyle='color:#dc2626;font-weight:600;';else if(days<3)scadStyle='color:#d97706;font-weight:600;';}

  const card=document.createElement('div');
  card.className='tv-card'+(isExp?' tv-card-expanded':'');
  card.dataset.id=t.id;
  card.style.borderLeftColor=border;

  if(!isExp){
    card.innerHTML=`
      <div class="tv-card-top">
        <button class="tv-inline-check${t.stato==='done'?' done':''}" onclick="tvToggleDone(event,'${t.id}')" title="Completa"></button>
        <span class="tv-card-title${t.stato==='done'?' done':''}">${esc(t.title||'Nuova task…')}</span>
        <button class="tv-card-del" onclick="tvDeleteTask(event,'${t.id}')" title="Elimina">✕</button>
      </div>
      <div class="tv-card-chips">
        <span class="tv-chip" style="background:${bg};color:${txt};"><span style="width:6px;height:6px;border-radius:50%;background:${cl.color};display:inline-block;flex-shrink:0;"></span>${esc(cl.label)}</span>
        ${t.priority?`<span class="tv-chip">${prioC.icon} ${prioC.label}</span>`:''}
        ${t.scadenza?`<span class="tv-chip" style="${scadStyle}">⏱ ${t.scadenza}</span>`:''}
        ${t.assegnatario?`<span class="tv-chip">👤 ${esc(t.assegnatario)}</span>`:''}
        ${totalSub?`<span class="tv-chip" style="margin-left:auto;">${doneSub}/${totalSub}</span>`:''}
      </div>
      ${totalSub?`<div class="tv-progress"><div class="tv-progress-bar" style="width:${prog}%"></div></div>`:''}
    `;
    card.onclick=e=>{if(e.target.closest('.tv-inline-check')||e.target.closest('.tv-card-del'))return;tvExpand(t.id);};
  } else {
    card.innerHTML=`
      <div class="tv-card-top">
        <button class="tv-inline-check${t.stato==='done'?' done':''}" onclick="tvToggleDone(event,'${t.id}')"></button>
        <input class="tv-title-inp" value="${esc(t.title||'')}" placeholder="Nome task…"
          oninput="tasks_v2['${t.id}'].title=this.value;tvSaveLazy();"
          onkeydown="if(event.key==='Escape')tvCollapse();" autocomplete="off"/>
        <button class="tv-collapse-btn" onclick="tvCollapse()">✕</button>
      </div>
      <div class="tv-fields">
        <div class="tv-field-item">
          <label class="tv-field-lbl">Cliente</label>
          <select class="tv-field-sel" onchange="tasks_v2['${t.id}'].client=this.value;tvSaveLazy();tvRender();">
            ${clients.map(c=>`<option value="${c.id}"${c.id===t.client?' selected':''}>${esc(c.label)}</option>`).join('')}
          </select>
        </div>
        <div class="tv-field-item">
          <label class="tv-field-lbl">Stato</label>
          <select class="tv-field-sel" onchange="tasks_v2['${t.id}'].stato=this.value;tvSaveLazy();tvRender();">
            ${Object.entries(STATO_CFG).map(([v,s])=>`<option value="${v}"${v===t.stato?' selected':''}>${s.label}</option>`).join('')}
          </select>
        </div>
        <div class="tv-field-item">
          <label class="tv-field-lbl">Priorità</label>
          <select class="tv-field-sel" onchange="tasks_v2['${t.id}'].priority=this.value;tvSaveLazy();tvRender();">
            ${Object.entries(PRIO_CFG).map(([v,p])=>`<option value="${v}"${v===t.priority?' selected':''}>${p.icon} ${p.label}</option>`).join('')}
          </select>
        </div>
        <div class="tv-field-item">
          <label class="tv-field-lbl">Scadenza</label>
          <input type="date" class="tv-field-sel" value="${t.scadenza||''}"
            onchange="tasks_v2['${t.id}'].scadenza=this.value;tvSaveLazy();">
        </div>
        <div class="tv-field-item">
          <label class="tv-field-lbl">Assegnatario</label>
          <input type="text" class="tv-field-sel" value="${esc(t.assegnatario||'')}" placeholder="Nome…"
            oninput="tasks_v2['${t.id}'].assegnatario=this.value;tvSaveLazy();">
        </div>
      </div>
      <textarea class="tv-note-inp" placeholder="Note…"
        oninput="tasks_v2['${t.id}'].note=this.value;tvSaveLazy();">${esc(t.note||'')}</textarea>
      <div class="tv-subtasks-wrap">
        <div class="tv-sub-label">Subtask</div>
        <div id="tv-subs-${t.id}"></div>
        <button class="tv-add-inline" onclick="tvAddSubtask('${t.id}')">+ Subtask</button>
      </div>
    `;
    requestAnimationFrame(()=>{tvRenderSubtasks(t.id);card.querySelector('.tv-title-inp')?.select();});
  }
  return card;
}

function tvRenderSubtasks(taskId){
  const t=tasks_v2[taskId];if(!t)return;
  const wrap=document.getElementById('tv-subs-'+taskId);if(!wrap)return;
  wrap.innerHTML='';
  (t.subtasks||[]).forEach((st,si)=>{
    const el=document.createElement('div');el.className='tv-subtask';
    el.innerHTML=`
      <button class="tv-sub-check${st.stato==='done'?' done':''}" onclick="tvToggleSubtask('${taskId}',${si})"></button>
      <div class="tv-sub-body">
        <input class="tv-sub-title${st.stato==='done'?' done':''}" value="${esc(st.title||'')}" placeholder="Subtask…"
          oninput="tasks_v2['${taskId}'].subtasks[${si}].title=this.value;tvSaveLazy();"
          onkeydown="if(event.key==='Enter'){event.preventDefault();tvAddSubtask('${taskId}',${si+1});}"/>
        <div class="tv-sub-meta">
          <input type="text" class="tv-sub-field" value="${esc(st.assegnatario||'')}" placeholder="👤 Assegnatario"
            oninput="tasks_v2['${taskId}'].subtasks[${si}].assegnatario=this.value;tvSaveLazy();">
          <input type="date" class="tv-sub-field" value="${st.scadenza||''}"
            onchange="tasks_v2['${taskId}'].subtasks[${si}].scadenza=this.value;tvSaveLazy();">
        </div>
        <div id="tv-steps-${taskId}-${si}"></div>
        <button class="tv-add-step" onclick="tvAddStep('${taskId}',${si})">+ Step</button>
      </div>
      <button class="tv-sub-del" onclick="tvDelSubtask('${taskId}',${si})">✕</button>
    `;
    wrap.appendChild(el);
    tvRenderSteps(taskId,si);
  });
}

function tvRenderSteps(taskId,si){
  const st=tasks_v2[taskId]?.subtasks?.[si];if(!st)return;
  const wrap=document.getElementById(`tv-steps-${taskId}-${si}`);if(!wrap)return;
  wrap.innerHTML='';
  (st.steps||[]).forEach((step,pi)=>{
    const el=document.createElement('div');el.className='tv-step';
    el.innerHTML=`
      <button class="tv-step-check${step.done?' done':''}" onclick="tvToggleStep('${taskId}',${si},${pi})"></button>
      <span class="tv-step-title${step.done?' done':''}" contenteditable="true"
        oninput="tasks_v2['${taskId}'].subtasks[${si}].steps[${pi}].title=this.textContent;tvSaveLazy();"
        onkeydown="if(event.key==='Enter'){event.preventDefault();tvAddStep('${taskId}',${si},${pi+1});}"
        >${esc(step.title||'')}</span>
      <button class="tv-step-del" onclick="tvDelStep('${taskId}',${si},${pi})">✕</button>
    `;
    wrap.appendChild(el);
  });
}

function tvAddSubtask(taskId,insertAt){
  const t=tasks_v2[taskId];if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  const ns={id:tvUID(),title:'',stato:'todo',assegnatario:'',scadenza:'',steps:[]};
  if(insertAt!==undefined)t.subtasks.splice(insertAt,0,ns);else t.subtasks.push(ns);
  tvSaveLazy();tvRenderSubtasks(taskId);
  const idx=insertAt!==undefined?insertAt:t.subtasks.length-1;
  setTimeout(()=>{document.querySelectorAll('#tv-subs-'+taskId+' .tv-sub-title')[idx]?.focus();},30);
}
function tvToggleSubtask(taskId,si){const st=tasks_v2[taskId]?.subtasks?.[si];if(!st)return;st.stato=st.stato==='done'?'todo':'done';tvSaveLazy();tvRenderSubtasks(taskId);tvRender();}
function tvDelSubtask(taskId,si){const t=tasks_v2[taskId];if(!t?.subtasks)return;t.subtasks.splice(si,1);tvSaveLazy();tvRenderSubtasks(taskId);tvRender();}
function tvAddStep(taskId,si,insertAt){
  const st=tasks_v2[taskId]?.subtasks?.[si];if(!st)return;
  if(!st.steps)st.steps=[];
  const ns={id:tvUID(),title:'',done:false};
  if(insertAt!==undefined)st.steps.splice(insertAt,0,ns);else st.steps.push(ns);
  tvSaveLazy();tvRenderSteps(taskId,si);
  const idx=insertAt!==undefined?insertAt:st.steps.length-1;
  setTimeout(()=>{document.querySelectorAll(`#tv-steps-${taskId}-${si} .tv-step-title`)[idx]?.focus();},30);
}
function tvToggleStep(taskId,si,pi){const step=tasks_v2[taskId]?.subtasks?.[si]?.steps?.[pi];if(!step)return;step.done=!step.done;tvSaveLazy();tvRenderSteps(taskId,si);tvRender();}
function tvDelStep(taskId,si,pi){const st=tasks_v2[taskId]?.subtasks?.[si];if(!st?.steps)return;st.steps.splice(pi,1);tvSaveLazy();tvRenderSteps(taskId,si);}

function tvExpand(id){_tvExpandedId=id;tvRender();}
function tvCollapse(){_tvExpandedId=null;tvRender();}
function tvToggleDone(e,id){e.stopPropagation();const t=tasks_v2[id];if(!t)return;t.stato=t.stato==='done'?'todo':'done';tvPersist();tvRender();}

function tvNewTask(){
  const id=tvUID();
  tasks_v2[id]={id,title:'',client:clients[0]?.id||'',priority:'media',stato:'todo',scadenza:'',assegnatario:'',note:'',subtasks:[]};
  tvPersist();_tvExpandedId=id;tvRender();
}
function tvDeleteTask(e,id){
  e.stopPropagation();
  const snap={...tasks_v2[id],subtasks:[...(tasks_v2[id]?.subtasks||[])]};
  delete tasks_v2[id];
  if(_tvExpandedId===id)_tvExpandedId=null;
  tvPersist();tvRender();
  showToast('"'+(snap.title||'Task')+'" eliminata',true);
  undoStack={type:'tvDelete',snap};
}

function tvRenderKanban(){
  const filtered=tvGetFiltered();
  ['todo','inprogress','done'].forEach(stato=>{
    const body=document.getElementById('kb-body-'+stato);
    const count=document.getElementById('kb-count-'+stato);
    if(!body)return;
    body.innerHTML='';
    const col=filtered.filter(t=>(t.stato||'todo')===stato)
      .sort((a,b)=>{const po={alta:0,media:1,bassa:2};return(po[a.priority]??1)-(po[b.priority]??1);});
    count.textContent=col.length;
    col.forEach(t=>body.appendChild(tvBuildCard(t)));
    const addBtn=document.createElement('button');
    addBtn.className='tv-col-add';addBtn.textContent='+ Task';
    addBtn.onclick=()=>{const id=tvUID();tasks_v2[id]={id,title:'',client:clients[0]?.id||'',priority:'media',stato,scadenza:'',assegnatario:'',note:'',subtasks:[]};tvPersist();_tvExpandedId=id;tvRender();};
    body.appendChild(addBtn);
  });
}

function tvRenderList(){
  const el=document.getElementById('tv-list');if(!el)return;
  el.innerHTML='';
  const filtered=tvGetFiltered();
  if(!filtered.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text-3);font-size:var(--fs-xs);">Nessuna task.<br><br><button class="tv-col-add" onclick="tvNewTask()" style="display:inline-block;width:auto;padding:6px 14px;">+ Nuova task</button></div>';return;}
  const byClient={};
  filtered.forEach(t=>{if(!byClient[t.client])byClient[t.client]=[];byClient[t.client].push(t);});
  clients.filter(cl=>byClient[cl.id]).forEach(cl=>{
    const g=document.createElement('div');g.className='tv-list-group';
    const gh=document.createElement('div');gh.className='tv-list-group-title';
    gh.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${cl.color};display:inline-block;"></span>${esc(cl.label)}<span style="font-weight:400;opacity:.5;margin-left:4px;">(${byClient[cl.id].length})</span>`;
    g.appendChild(gh);
    byClient[cl.id].sort((a,b)=>{const po={alta:0,media:1,bassa:2};return(po[a.priority]??1)-(po[b.priority]??1);}).forEach(t=>g.appendChild(tvBuildCard(t)));
    el.appendChild(g);
  });
}

const _origExecUndo2=execUndo;
execUndo=function(){
  if(undoStack?.type==='tvDelete'){clearTimeout(toastTimer);document.getElementById('toast').classList.remove('show');tasks_v2[undoStack.snap.id]=undoStack.snap;tvPersist();tvRender();showToast('Task ripristinata');undoStack=null;return;}
  _origExecUndo2();
};

function jvRenderSidebar(){
  const list = document.getElementById('jv-job-list');
  if(!list) return;
  list.innerHTML = '';

  // Raggruppa per cliente
  const byClient = {};
  Object.values(jobs_v1).forEach(j => {
    if(!byClient[j.client]) byClient[j.client] = [];
    byClient[j.client].push(j);
  });

  // Clienti con job
  const clientsWithJobs = JV_CLIENTI.filter(c => byClient[c.slug]?.length);

  if(!clientsWithJobs.length){
    list.innerHTML = '<div style="padding:20px 14px;font-size:var(--fs-xs);color:var(--text-3);">Nessun job.<br>Clicca "+ Nuovo" per creare.</div>';
    return;
  }

  clientsWithJobs.forEach(cl => {
    const group = document.createElement('div');
    group.className = 'jv-client-group';
    const head = document.createElement('div');
    head.className = 'jv-client-head';
    head.innerHTML = `<span class="jv-client-dot" style="background:${cl.c}"></span>${esc(cl.n)}`;
    group.appendChild(head);
    (byClient[cl.slug]||[]).forEach(j => {
      const stCfg = JV_STATI_JOB[j.stato] || JV_STATI_JOB.active;
      const item = document.createElement('div');
      item.className = 'jv-job-item' + (j.id === _jvCurrentId ? ' active' : '');
      item.innerHTML = `
        <span class="jv-job-num">#${j.num||'—'}</span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(j.title||'Job senza titolo')}</span>
        <span class="jv-job-stato ${stCfg.cls}">${stCfg.l}</span>
      `;
      item.onclick = () => jvOpenJob(j.id);
      group.appendChild(item);
    });
    list.appendChild(group);
  });
}

/* ── Dettaglio job ────────────────────────────────────── */
function jvRenderDetail(){
  const j = jobs_v1[_jvCurrentId];
  if(!j) return;
  const det = document.getElementById('jv-detail');
  det.innerHTML = '';

  const cl = jvGetClient(j.client);

  // KPI
  const totalOreStimate = (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.oreStimate||0),0);
  const totalOreUsate = (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.oreUsate||0),0);
  const totalBudget = j.budget || (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.budget||0),0);
  const totItems = (j.phases||[]).reduce((s,p)=>s+(p.items||[]).length,0);
  const doneItems = (j.phases||[]).flatMap(p=>p.items||[]).filter(it=>it.stato==='done').length;
  const pct = totItems > 0 ? Math.round(doneItems/totItems*100) : 0;
  const oreBarW = totalOreStimate > 0 ? Math.min(100, Math.round(totalOreUsate/totalOreStimate*100)) : 0;

  // Header
  const hd = document.createElement('div');
  hd.className = 'jv-job-header';
  hd.innerHTML = `
    <div class="jv-job-title-row">
      <span style="font-size:20px;">${j.emoji||'📋'}</span>
      <input class="jv-job-title-inp" value="${esc(j.title||'')}" placeholder="Titolo job…"
        oninput="jobs_v1['${j.id}'].title=this.value;jvPersist();jvRenderSidebar();">
      <select style="font-size:var(--fs-xs);border:.5px solid var(--border);border-radius:var(--rs);padding:3px 6px;background:var(--bg);color:var(--text);font-family:var(--font);"
        onchange="jobs_v1['${j.id}'].stato=this.value;jvPersist();jvRenderSidebar();jvRenderDetail();">
        ${Object.entries(JV_STATI_JOB).map(([v,s])=>`<option value="${v}"${v===j.stato?' selected':''}>${s.l}</option>`).join('')}
      </select>
      <button style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-3);font-size:var(--fs-xs);padding:4px 8px;border-radius:var(--rs);border:.5px solid var(--border);"
        onclick="jvAddPhase('${j.id}')">+ Fase</button>
      <button style="background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:4px 6px;"
        onclick="if(confirm('Eliminare questo job?')){delete jobs_v1['${j.id}'];jvPersist();_jvCurrentId=null;document.getElementById('jv-empty').style.display='';document.getElementById('jv-detail').style.display='none';jvRenderSidebar();}">✕</button>
    </div>
    <div class="jv-kpi-row">
      <div class="jv-kpi">
        <span class="jv-kpi-label">Cliente</span>
        <span class="jv-kpi-value" style="font-size:var(--fs-sm);display:flex;align-items:center;gap:5px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${cl.c};display:inline-block;"></span>
          ${esc(cl.n)}
        </span>
      </div>
      <div class="jv-kpi">
        <span class="jv-kpi-label">Budget</span>
        <span class="jv-kpi-value">€ ${(totalBudget||0).toLocaleString('it-IT')}</span>
      </div>
      <div class="jv-kpi">
        <span class="jv-kpi-label">Ore</span>
        <span class="jv-kpi-value" style="font-size:var(--fs-sm);">${totalOreUsate}h / ${totalOreStimate}h
          <div class="jv-ore-bar"><div class="jv-ore-bar-fill" style="width:${oreBarW}%"></div></div>
        </span>
      </div>
      <div class="jv-kpi">
        <span class="jv-kpi-label">Avanzamento</span>
        <span class="jv-kpi-value">${pct}% <span style="font-size:var(--fs-xs);color:var(--text-3);font-weight:400;">(${doneItems}/${totItems} item)</span></span>
      </div>
      ${j.dataStart?`<div class="jv-kpi"><span class="jv-kpi-label">Inizio</span><span class="jv-kpi-value" style="font-size:var(--fs-sm);">${j.dataStart}</span></div>`:''}
      ${j.dataEnd?`<div class="jv-kpi"><span class="jv-kpi-label">Fine</span><span class="jv-kpi-value" style="font-size:var(--fs-sm);">${j.dataEnd}</span></div>`:''}
    </div>
  `;
  det.appendChild(hd);

  // Fasi
  const phasesWrap = document.createElement('div');
  phasesWrap.className = 'jv-phases';

  (j.phases||[]).forEach((phase, pi) => {
    const collapsed = _jvCollapsed[pi];
    const phaseOreStim = (phase.items||[]).reduce((s,it)=>s+(it.oreStimate||0),0);
    const phaseOreUs = (phase.items||[]).reduce((s,it)=>s+(it.oreUsate||0),0);
    const phaseBudget = (phase.items||[]).reduce((s,it)=>s+(it.budget||0),0);
    const phaseDone = (phase.items||[]).filter(it=>it.stato==='done').length;

    const phaseEl = document.createElement('div');
    phaseEl.className = 'jv-phase';

    // Phase header
    const phHead = document.createElement('div');
    phHead.className = 'jv-phase-head';
    phHead.innerHTML = `
      <span class="jv-phase-emoji">${phase.emoji||'📁'}</span>
      <input class="jv-phase-title-inp" value="${esc(phase.title||'')}" placeholder="Nome fase…"
        onclick="event.stopPropagation();"
        oninput="jobs_v1['${j.id}'].phases[${pi}].title=this.value;jvPersist();">
      <span class="jv-phase-meta">
        ${phaseOreUs}h/${phaseOreStim}h
        <span style="color:var(--text-3);">·</span>
        €${phaseBudget.toLocaleString('it-IT')}
        <span style="color:var(--text-3);">·</span>
        ${phaseDone}/${(phase.items||[]).length}
      </span>
      <button class="jv-phase-del" onclick="event.stopPropagation();if(confirm('Eliminare la fase?')){jobs_v1['${j.id}'].phases.splice(${pi},1);jvPersist();jvRenderDetail();}">✕</button>
      <span style="color:var(--text-3);font-size:10px;margin-left:4px;">${collapsed?'▶':'▼'}</span>
    `;
    phHead.onclick = () => { _jvCollapsed[pi] = !collapsed; jvRenderDetail(); };
    phaseEl.appendChild(phHead);

    if(!collapsed){
      // Items table
      const table = document.createElement('table');
      table.className = 'jv-items-table';
      table.innerHTML = `<thead><tr>
        <th style="width:32px;"></th>
        <th>Item</th>
        <th style="width:90px;">Stato</th>
        <th style="width:100px;">Team</th>
        <th style="width:70px;">Ore stim.</th>
        <th style="width:70px;">Ore usate</th>
        <th style="width:70px;">Budget €</th>
        <th style="width:90px;">Inizio</th>
        <th style="width:90px;">Fine</th>
        <th style="width:32px;"></th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      (phase.items||[]).forEach((item, ii) => {
        const tr = document.createElement('tr');
        tr.className = 'jv-item-row';
        tr.draggable = true;
        tr.dataset.jobId = j.id;
        tr.dataset.phaseIdx = pi;
        tr.dataset.itemIdx = ii;

        // Avatars team
        const teamHTML = (item.team||[]).slice(0,3).map(mid => {
          const m = jvGetMember(mid);
          return `<span class="jv-avatar" title="${esc(m.n)}" style="background:${m.c};">${m.n[0].toUpperCase()}</span>`;
        }).join('') + (item.team?.length > 3 ? `<span class="jv-avatar" style="background:var(--border);color:var(--text-3);">+${item.team.length-3}</span>` : '');

        tr.innerHTML = `
          <td><span class="jv-item-drag" title="Trascina nel calendario">⠿</span></td>
          <td><span class="jv-item-title">${esc(item.title||'—')}</span></td>
          <td><span class="jv-stato-pill ${item.stato||'todo'}">${JV_STATI_ITEM[item.stato||'todo']?.l||'—'}</span></td>
          <td><div class="jv-team-avatars">${teamHTML}</div></td>
          <td style="text-align:right;">${item.oreStimate||0}h</td>
          <td style="text-align:right;color:var(--text-3);">${item.oreUsate||0}h</td>
          <td style="text-align:right;">€${(item.budget||0).toLocaleString('it-IT')}</td>
          <td style="color:var(--text-3);">${item.dataStart||'—'}</td>
          <td style="color:var(--text-3);">${item.dataEnd||'—'}</td>
          <td><button onclick="event.stopPropagation();jvOpenItemModal('${j.id}',${pi},${ii})" style="background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:2px 5px;border-radius:var(--rs);">✏️</button></td>
        `;

        // Click → apri modal item
        tr.onclick = e => { if(!e.target.closest('button'))jvOpenItemModal(j.id, pi, ii); };

        // Drag → trascina nel calendario
        tr.addEventListener('dragstart', e => {
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setData('nassa-job-item', JSON.stringify({
            jobId: j.id, phaseIdx: pi, itemIdx: ii,
            text: (phase.title ? phase.title+' — ' : '') + (item.title||'Item'),
            client: j.client, color: cl.c,
          }));
        });

        tbody.appendChild(tr);
      });

      // Add item row
      const addTr = document.createElement('tr');
      addTr.className = 'jv-add-item-row';
      addTr.innerHTML = `<td colspan="10"><input class="jv-add-item-inp" placeholder="+ Aggiungi item…"
        onkeydown="if(event.key==='Enter'&&this.value.trim()){jvAddItem('${j.id}',${pi},this.value.trim());this.value='';}"
        onclick="event.stopPropagation();"></td>`;
      tbody.appendChild(addTr);

      table.appendChild(tbody);
      phaseEl.appendChild(table);
    }

    phasesWrap.appendChild(phaseEl);
  });

  // Bottone aggiungi fase in fondo
  const addPhaseBtn = document.createElement('button');
  addPhaseBtn.className = 'tv-col-add';
  addPhaseBtn.style.cssText = 'margin-top:8px;';
  addPhaseBtn.textContent = '+ Nuova fase';
  addPhaseBtn.onclick = () => jvAddPhase(j.id);
  phasesWrap.appendChild(addPhaseBtn);

  det.appendChild(phasesWrap);
}

/* ── Azioni job ───────────────────────────────────────── */
function jvNewJob(){
  _jvModalType = 'job';
  _jvModalData = {id:jvUID(),title:'',client:'kosmetikal',stato:'active',emoji:'🚀',budget:0,num:Object.keys(jobs_v1).length+1,phases:[],dataStart:'',dataEnd:''};
  document.getElementById('jm-title').textContent = 'Nuovo Job';
  jvRenderModal();
  document.getElementById('job-modal').style.display = 'flex';
}
function jvAddPhase(jobId){
  const j = jobs_v1[jobId];
  if(!j) return;
  if(!j.phases) j.phases = [];
  j.phases.push({id:jvUID(),title:'Nuova fase',emoji:JV_EMOJIS[j.phases.length%JV_EMOJIS.length],items:[]});
  jvPersist();jvRenderDetail();
}
function jvAddItem(jobId, phaseIdx, title){
  const j = jobs_v1[jobId];
  if(!j?.phases?.[phaseIdx]) return;
  j.phases[phaseIdx].items.push({
    id:jvUID(),title,stato:'todo',team:[],
    oreStimate:0,oreUsate:0,budget:0,
    tariffaOraria:0,dataStart:'',dataEnd:'',note:''
  });
  jvPersist();jvRenderDetail();
}

        </div>

function jvToggleTeamMember(mid){
  const d = _jvModalData;
  if(!d.team) d.team = [];
  const idx = d.team.indexOf(mid);
  if(idx>=0) d.team.splice(idx,1); else d.team.push(mid);
  const m = jvGetMember(mid);
  const sel = d.team.includes(mid);
  const btn = document.getElementById('jm-tm-'+mid);
  if(btn){
    btn.style.borderColor = sel ? m.c : 'var(--border)';
    btn.style.background = sel ? m.c+'22' : 'var(--bg)';
    btn.style.color = sel ? m.c : 'var(--text-3)';
  }
}

function jvOpenItemModal(jobId, phaseIdx, itemIdx){
  _jvModalType = 'item';
  _jvModalPhaseIdx = phaseIdx;
  _jvModalItemIdx = itemIdx;
  const j = jobs_v1[jobId];
  _jvCurrentId = jobId;
  _jvModalData = {...(j?.phases?.[phaseIdx]?.items?.[itemIdx]||{})};
  if(!_jvModalData.team) _jvModalData.team = [];
  document.getElementById('jm-title').textContent = 'Modifica Item';
  jvRenderModal();
  document.getElementById('job-modal').style.display = 'flex';
}

function jvSaveModal(){
  if(_jvModalType === 'job'){
    const d = _jvModalData;
    d.title = document.getElementById('jm-f-title')?.value.trim() || '';
    d.client = document.getElementById('jm-f-client')?.value || 'kosmetikal';
    d.stato = document.getElementById('jm-f-stato')?.value || 'active';
    d.budget = parseFloat(document.getElementById('jm-f-budget')?.value)||0;
    d.num = parseInt(document.getElementById('jm-f-num')?.value)||Object.keys(jobs_v1).length+1;
    d.emoji = document.getElementById('jm-f-emoji')?.value || '📋';
    d.dataStart = document.getElementById('jm-f-start')?.value || '';
    d.dataEnd = document.getElementById('jm-f-end')?.value || '';
    if(!d.phases) d.phases = [];
    jobs_v1[d.id] = d;
    jvPersist();
    jvCloseModal();
    jvOpenJob(d.id);
    jvRenderSidebar();
    showToast('"'+esc(d.title||'Job')+'" creato');
  }

  if(_jvModalType === 'item'){
    const j = jobs_v1[_jvCurrentId];
    if(!j?.phases?.[_jvModalPhaseIdx]) return;
    const item = j.phases[_jvModalPhaseIdx].items[_jvModalItemIdx];
    if(!item) return;
    item.title = document.getElementById('jm-f-title')?.value.trim() || item.title;
    item.stato = document.getElementById('jm-f-stato')?.value || 'todo';
    item.tariffaOraria = parseFloat(document.getElementById('jm-f-tariffa')?.value)||0;
    item.oreStimate = parseFloat(document.getElementById('jm-f-ore-stim')?.value)||0;
    item.oreUsate = parseFloat(document.getElementById('jm-f-ore-used')?.value)||0;
    item.budget = parseFloat(document.getElementById('jm-f-budget')?.value)||0;
    item.dataStart = document.getElementById('jm-f-start')?.value || '';
    item.dataEnd = document.getElementById('jm-f-end')?.value || '';
    item.note = document.getElementById('jm-f-note')?.value || '';
    item.team = _jvModalData.team || [];
    jvPersist();jvCloseModal();jvRenderDetail();
    showToast('Item aggiornato');
  }
}

function jvCloseModal(){
  document.getElementById('job-modal').style.display = 'none';
  _jvModalData = null; _jvModalType = null;
}

/* ── Drop da Jobs → Calendario ─────────────────────────── */
function jvSetupCalendarDrop(){
  // Estendi setupDropZone per accettare anche nassa-job-item
  const origSetupDZ = setupDropZone;
  setupDropZone = function(cell, ds, hour){
    origSetupDZ(cell, ds, hour);
    cell.addEventListener('drop', e => {
      const raw = e.dataTransfer.getData('nassa-job-item');
      if(!raw) return;
      e.preventDefault(); e.stopPropagation();
      const ji = JSON.parse(raw);
      const j = jobs_v1[ji.jobId];
      if(!j) return;
      const cl = jvGetClient(j.client);
      // Crea task nel calendario
      const newTask = {
        id: uid(), text: ji.text,
        time: hour||null, client: ji.client,
        done: false,
        // metadata job
        jobId: ji.jobId, phaseIdx: ji.phaseIdx, itemIdx: ji.itemIdx,
      };
      if(!tasks[ds]) tasks[ds] = [];
      tasks[ds].push(newTask);
      scheduleSave(); rebuild();
      showToast('Item aggiunto al calendario');
    });
  };
}

jvSetupCalendarDrop();
