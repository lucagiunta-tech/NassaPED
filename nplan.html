function Avatar({ name, size = 22, color = "#F5C842" }) {
  const initials = name ? name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase() : "?";
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%", background: color,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: size * 0.42, fontWeight: 600, color: "#1a1a1a", flexShrink: 0
    }}>
      {initials}
    </div>
  );
}

function StatusPill({ stato, statiConfig }) {
  const cfg = statiConfig.find(s => s.id === stato);
  if (!cfg) return null;
  return (
    <span style={{
      fontSize: 11, fontWeight: 500, color: cfg.color,
      padding: "2px 8px", borderRadius: 4, background: cfg.bg
    }}>
      {cfg.icon ? `${cfg.icon} ` : ""}{cfg.lbl}
    </span>
  );
}

function PriorityIcon({ priorita }) {
  const cfg = PRIORITA.find(p => p.id === priorita);
  if (!cfg || cfg.id === "normal") return <span style={{ color: DS.text3, fontSize: 11 }}>○ Normal</span>;
  const color = cfg.id === "highest" ? M : "#E65100";
  return <span style={{ color, fontSize: 11, fontWeight: 500 }}>{cfg.icon} {cfg.lbl}</span>;
}

function DeadlineLabel({ date }) {
  if (!date) return <span style={{ color: DS.text3, fontSize: 11 }}>—</span>;
  const urgent = daysBetween(TODAY, date) <= 2;
  return <span style={{ color: urgent ? M : DS.text2, fontWeight: urgent ? 500 : 400, fontSize: 11 }}>{fmtDate(date)}</span>;
}

function Breadcrumb({ items, onNavigate }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: DS.text3, marginBottom: 10 }}>
      {items.map((it, i) => (
        <span key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {i > 0 && <span style={{ opacity: 0.5 }}>›</span>}
          <span
            onClick={() => onNavigate && onNavigate(i)}
            style={{
              cursor: onNavigate ? "pointer" : "default",
              color: i === items.length - 1 ? DS.text : DS.text3,
              fontWeight: i === items.length - 1 ? 500 : 400,
            }}>
            {it}
          </span>
        </span>
      ))}
    </div>
  );
}

function IconBtn({ children, onClick, active, title }) {
  return (
    <button onClick={onClick} title={title} style={{
      width: 26, height: 26, borderRadius: 6, border: "none", cursor: "pointer",
      background: active ? DS.greenLt : "transparent",
      color: active ? DS.greenDk : DS.text3,
      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13,
    }}>
      {children}
    </button>
  );
}

// VISTA: KANBAN BOARD
// ═══════════════════════════════════════════════════════════════════════════
function KanbanBoard({ contenuti, onUpdateStato, onSelectCard, onAddContent }) {
  const [dragId, setDragId] = useState(null);

  const cols = PED_STATI.map(s => ({
    ...s,
    items: contenuti.filter(c => c.stato === s.id),
  }));

  const handleDrop = (statoId) => {
    if (dragId) {
      onUpdateStato(dragId, statoId);
      setDragId(null);
    }
  };

  return (
    <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8 }}>
      {cols.map(col => (
        <div key={col.id}
          onDragOver={e => e.preventDefault()}
          onDrop={() => handleDrop(col.id)}
          style={{ minWidth: 200, flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, padding: "0 2px" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: col.color }} />
            <span style={{ fontSize: 12, fontWeight: 500, color: DS.text }}>{col.lbl}</span>
            <span style={{ fontSize: 11, color: DS.text3, marginLeft: "auto" }}>{col.items.length}</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, minHeight: 60 }}>
            {col.items.map(c => {
              const urgente = c.stato === "in_attesa" && c.scadenza && daysBetween(TODAY, c.scadenza) <= 1;
              const pillar = PILLARS.find(p => p.id === c.pilastro);
              return (
                <div key={c.id}
                  draggable
                  onDragStart={() => setDragId(c.id)}
                  onClick={() => onSelectCard(c)}
                  style={{
                    background: DS.surface,
                    border: `0.5px solid ${urgente ? M : DS.border}`,
                    borderLeft: `3px solid ${pillar?.color || DS.border}`,
                    borderRadius: 8, padding: 10, cursor: "grab",
                    opacity: col.id === "pubblicato" ? 0.65 : 1,
                  }}>
                  <p style={{
                    margin: "0 0 6px", fontSize: 12, color: DS.text, lineHeight: 1.4,
                    textDecoration: col.id === "pubblicato" ? "line-through" : "none",
                  }}>
                    {c.titolo}
                  </p>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 10, color: DS.text3 }}>{c.tipo}</span>
                    <Avatar name={c.manager} size={18} />
                  </div>

// ─── MyWork Week ─────────────────────────────────────────────────────────────
function MyWorkWeek({ tasks, onOpenTask, onUpdateTask, onDeleteTask, projects }) {
  const inbox = tasks.filter(t => !t.schedule);
  const today = tasks.filter(t => t.schedule && isToday(t.schedule));
  const tomorrow = tasks.filter(t => t.schedule && daysBetween(TODAY, t.schedule) === 1);

  const groupByAge = (items) => {
    const groups = {};
    const ORDER = ["Yesterday", "4 days ago", "11 days ago", "21 days ago", "Recenti"];
    items.forEach(t => {
      const days = t.deadline ? daysBetween(t.deadline, TODAY) : 0;
      let key = "Recenti";
      if (days >= 21) key = "21 days ago";
      else if (days >= 11) key = "11 days ago";
      else if (days >= 4) key = "4 days ago";
      else if (days >= 1) key = "Yesterday";
      if (!groups[key]) groups[key] = [];
      groups[key].push(t);
    });
    // Restituisce in ordine
    const result = {};
    ORDER.forEach(k => { if (groups[k]) result[k] = groups[k]; });
    return result;
  };

  const inboxGroups = groupByAge(inbox);

  const CardProps = (t) => ({
    t, onOpenTask, onUpdateTask, onDeleteTask, projects,
  });

  // Colonne giorni futuri (offset 2 e 4 da TODAY)
  const futureDays = [2, 4].map(offset => {
    const d = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() + offset);
    const dayTasks = tasks.filter(t => t.schedule && daysBetween(TODAY, t.schedule) === offset);
    return { d, offset, tasks: dayTasks };
  });

  const ColHeader = ({ lbl, sub }) => (
    <div style={{ marginBottom: 10 }}>
      <p style={{ fontSize: DS.fsBase, fontWeight: 600, color: DS.text, margin: 0 }}>{lbl}</p>
      {sub && <p style={{ fontSize: DS.fsXs, fontWeight: 600, color: DS.text3, textTransform: "uppercase", letterSpacing: "0.04em", margin: "4px 0 0" }}>{sub}</p>}
    </div>
  );

  const EmptyCol = () => (
    <p style={{ fontSize: DS.fsSm, color: DS.text3, margin: "8px 0 0" }}>No work planned for this date</p>
  );

  return (
    <div style={{ display: "flex", gap: 14, overflowX: "auto", paddingBottom: 12, alignItems: "flex-start" }}>

      {/* Colonna Inbox */}
      <div style={{ minWidth: 250, flexShrink: 0 }}>
        <ColHeader lbl="Inbox" />
        {Object.keys(inboxGroups).length === 0 && <EmptyCol />}
        {Object.entries(inboxGroups).map(([label, items]) => (
          <div key={label} style={{ marginBottom: 14 }}>
            <p style={{ fontSize: DS.fsXs, fontWeight: 600, color: DS.text3, textTransform: "uppercase", letterSpacing: "0.04em", margin: "0 0 6px" }}>{label}</p>
            {items.map(t => <TaskCardWeek key={t.id} {...CardProps(t)} />)}
          </div>
        ))}
      </div>

      {/* Separatore verticale */}
      <div style={{ width: "0.5px", background: DS.border, alignSelf: "stretch", flexShrink: 0, margin: "28px 0 0" }} />

      {/* Colonna Today */}
      <div style={{ minWidth: 250, flexShrink: 0 }}>
        <ColHeader lbl="Today" sub="Task Deadlines" />
        {today.length === 0 && <EmptyCol />}
        {today.map(t => <TaskCardWeek key={t.id} {...CardProps(t)} />)}
      </div>

      {/* Separatore verticale */}
      <div style={{ width: "0.5px", background: DS.border, alignSelf: "stretch", flexShrink: 0, margin: "28px 0 0" }} />

      {/* Colonna Tomorrow */}
      <div style={{ minWidth: 250, flexShrink: 0 }}>
        <ColHeader lbl="Tomorrow" sub="Meetings" />
        {tomorrow.length === 0 && <EmptyCol />}
        {tomorrow.map(t => <TaskCardWeek key={t.id} {...CardProps(t)} />)}
      </div>

      {/* Colonne giorni futuri */}
      {futureDays.map(({ d, offset, tasks: dayTasks }) => (
        <div key={offset} style={{ minWidth: 200, flexShrink: 0 }}>
          <div style={{ marginBottom: 10 }}>
            <p style={{ fontSize: DS.fsXs, fontWeight: 600, color: DS.text3, margin: 0 }}>{offset}</p>
            <p style={{ fontSize: DS.fsBase, fontWeight: 600, color: DS.text, margin: "2px 0 0" }}>
              {d.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "short" })}
            </p>
          </div>
          {dayTasks.length === 0 ? <EmptyCol /> : dayTasks.map(t => <TaskCardWeek key={t.id} {...CardProps(t)} />)}
        </div>
      ))}
    </div>
  );
}

function MyWorkDay({ tasks, onOpenTask }) {
  const groups = {};
  tasks.forEach(t => {
    const days = t.deadline ? daysBetween(t.deadline, TODAY) : 999;
    let key = "Senza scadenza";
    if (days === 0) key = "Today";
    else if (days >= 1 && days < 4) key = "Yesterday";
    else if (days >= 4 && days < 11) key = "4 days ago";
    else if (days >= 11 && days < 21) key = "11 days ago";
    else if (days >= 21) key = "21 days ago";
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  const order = ["Today", "Yesterday", "4 days ago", "11 days ago", "21 days ago", "Senza scadenza"];

  return (
    <div>
      {order.filter(k => groups[k]?.length).map(label => (
        <div key={label} style={{ marginBottom: 18 }}>
          <p style={{ fontSize: 11, fontWeight: 500, color: DS.text3, textTransform: "uppercase", letterSpacing: "0.04em", margin: "0 0 8px" }}>{label}</p>
          {groups[label].map(t => (
            <div key={t.id} onClick={() => onOpenTask && onOpenTask(t)} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
              borderBottom: `0.5px solid ${DS.border}`, cursor: onOpenTask ? "pointer" : "default",
            }}>
              <span style={{ flex: 1, fontSize: 13, color: DS.text }}>{t.titolo}</span>

              {t.assegnato && <Avatar name={t.assegnato} size={20} />}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function ProgressRing({ pct, size = 64, color = G, bg = DS.bg }) {
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={8} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 0.5s" }} />
    </svg>
  );
}

          <div style={{ padding: "8px 20px", borderBottom: `0.5px solid ${DS.border}`, display: "flex", alignItems: "center", gap: 6, fontSize: DS.fsSm }}>

            {step === "project_list" && <span style={{ color: DS.blueDk, cursor: "pointer" }}>Projects</span>}
            {step === "task_list" && (
              <>
                <span onClick={() => { setStep("project_list"); setSearch(""); }} style={{ color: DS.blueDk, cursor: "pointer" }}>Projects</span>

              </>
            )}
          </div>
        )}
        {/* Contenuto lista */}
        <div style={{ flex: 1, overflowY: "auto" }}>
          {step === "root" && (
            <>
              <Row icon="💼" label="Projects" onClick={() => { setStep("project_list"); setSearch(""); }} />
              <Row icon="💼" label="Project Management (PMO)" onClick={() => { setStep("project_list"); setSearch(""); }} />
            </>
          )}
          {step === "project_list" && (
            search
              ? allTasksFiltered.map(t => (
                  <Row key={t.id} icon="📋" label={t.titolo} onClick={() => onSelect(t)} chevron={false} />
                ))
              : filteredProjects.map(p => (
                  <Row key={p.id} icon="≡" label={p.nome}
                    onClick={() => { setSelProject(p); setStep("task_list"); setSearch(""); }} />
                ))
          )}
          {step === "task_list" && (
            filteredTasks.length > 0
              ? filteredTasks.map(t => (
                  <Row key={t.id} icon="📋" label={t.titolo} onClick={() => onSelect(t)} chevron={false} />
                ))
              : <p style={{ textAlign: "center", color: DS.text3, padding: "2rem", fontSize: DS.fsSm }}>Nessun task in questo progetto</p>
          )}
        </div>
      </div>
    </div>
  );
}

// VISTA: EVENTS SUMMARY — 3 colonne temporali fisse
// ═══════════════════════════════════════════════════════════════════════════
function EventsSummary({ tasks }) {
  const lastWeek = tasks.filter(t => t.deadline && daysBetween(t.deadline, TODAY) >= 1 && daysBetween(t.deadline, TODAY) <= 7);
  const thisWeek = tasks.filter(t => t.deadline && daysBetween(TODAY, t.deadline) >= 0 && daysBetween(TODAY, t.deadline) <= 7);
  const nextWeek = tasks.filter(t => t.deadline && daysBetween(TODAY, t.deadline) > 7 && daysBetween(TODAY, t.deadline) <= 14);

  const EventCard = ({ t }) => (
    <div style={{ padding: "10px 4px", borderBottom: `0.5px solid ${DS.border}`, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
      <div>
        <p style={{ fontSize: 12, color: DS.text, margin: "0 0 3px" }}>{t.titolo}</p>
        <p style={{ fontSize: 10, color: DS.text3, margin: 0 }}>
          {fmtDate(t.deadline)} {t.cartella && `· ${PROGETTI.flatMap(p => p.cartelle).find(c => c.id === t.cartella)?.nome}`}
        </p>
      </div>
      {t.assegnato && <Avatar name={t.assegnato} size={20} />}
    </div>
  );

  const Col = ({ title, items }) => (
    <div style={{ flex: 1 }}>
      <p style={{ fontSize: 13, fontWeight: 500, color: DS.text, textAlign: "center", margin: "0 0 12px" }}>{title}</p>
      {items.length > 0 ? items.map(t => <EventCard key={t.id} t={t} />) : (
        <p style={{ textAlign: "center", fontSize: 11, color: DS.text3, marginTop: 20 }}>No events</p>
      )}
    </div>
  );

  return (
    <div style={{ display: "flex", gap: 24 }}>
      <Col title="Last week" items={lastWeek} />
      <Col title="This week" items={thisWeek} />
      <Col title="Next week" items={nextWeek} />
    </div>
  );
}

// VISTA: LISTA TASK GENERICI raggruppata per progetto/cartella — TUTTO EDITABILE

function EditableTitle({ value, onChange, style }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef(null);
  useEffect(() => { if (editing) ref.current?.focus(); }, [editing]);
  if (editing) {
    return (
      <input ref={ref} value={val} onChange={e => setVal(e.target.value)}
        onBlur={() => { setEditing(false); if (val.trim()) onChange(val.trim()); else setVal(value); }}
        onKeyDown={e => { if (e.key === "Enter") e.target.blur(); if (e.key === "Escape") { setVal(value); setEditing(false); } }}
        style={{ ...style, border: `1px solid ${DS.border}`, borderRadius: 4, padding: "2px 5px", outline: "none", background: DS.bg, width: "100%" }} />
    );
  }
  return (
    <span onClick={(e) => { e.stopPropagation(); setEditing(true); }} style={{ ...style, cursor: "text" }} title="Clicca per modificare">
      {value}
    </span>
  );
}

function TaskListView({ tasks, selectedProject, onUpdateTask, onAddTask, onDeleteTask, onOpenTask }) {
  const visibleTasks = selectedProject ? tasks.filter(t => t.progetto === selectedProject) : tasks;

  const cartelle = selectedProject
    ? PROGETTI.find(p => p.id === selectedProject)?.cartelle || []
    : [];

  const grouped = cartelle.length > 0
    ? cartelle.map(c => ({ id: c.id, nome: c.nome, items: visibleTasks.filter(t => t.cartella === c.id) }))
        .filter(g => g.items.length > 0)
    : [{ id: "all", nome: null, items: visibleTasks }];

  const handleAdd = (cartellaId) => {
    onAddTask({
      id: uid(), titolo: "Nuovo task", progetto: selectedProject, cartella: cartellaId,
      stato: "not_started", assegnato: "Luca Giunta", priorita: "normal",
      schedule: null, start: null, durata: null, deadline: null,
    });
  };

  return (
    <div>
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 140px 100px 100px 110px 90px 90px 90px 24px",
        fontSize: 10, fontWeight: 500, color: DS.text3, textTransform: "uppercase",
        letterSpacing: "0.04em", padding: "0 4px 8px", borderBottom: `0.5px solid ${DS.border}`,
      }}>
        <span>Title</span><span>Action Required</span><span>Schedule</span><span>Priority</span>
        <span>Status</span><span>Start</span><span>Duration</span><span>Deadline</span><span></span>
      </div>

      {grouped.map(g => (
        <div key={g.id} style={{ marginTop: g.nome ? 14 : 0 }}>
          {g.nome && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 4px 6px" }}>
              <span style={{ fontSize: 12 }}>📁</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: DS.text }}>{g.nome}</span>
            </div>
          )}
          {g.items.map(t => {
            const statoCfg = TASK_STATI.find(s => s.id === t.stato);
            return (
              <div key={t.id} onClick={() => onOpenTask && onOpenTask(t)} style={{
                display: "grid", gridTemplateColumns: "1fr 140px 100px 100px 110px 90px 90px 90px 24px",
                alignItems: "center", padding: "9px 4px", borderRadius: 6,
                background: statoCfg ? statoCfg.bg + "55" : "transparent",
                cursor: onOpenTask ? "pointer" : "default",
              }}>
                <span style={{ fontSize: 12, color: DS.text, display: "flex", alignItems: "center", gap: 6, minWidth: 0 }}>
                  {t.subtaskN > 0 && <span style={{ fontSize: 10, color: DS.text3, flexShrink: 0 }}>⊞ {t.subtaskN} {t.subtaskDone}</span>}
                  <EditableTitle value={t.titolo} onChange={v => onUpdateTask(t.id, { titolo: v })} style={{ fontSize: 12, color: DS.text }} />
                  {t.urgentissimo && <span style={{ color: M, flexShrink: 0 }}>⌃⌃</span>}
                </span>
                <span>{t.assegnato && <span style={{ display: "flex", alignItems: "center", gap: 5 }}><Avatar name={t.assegnato} size={18} /><span style={{ fontSize: 11, color: DS.text2 }}>{t.assegnato}</span></span>}</span>
                <DeadlineLabel date={t.schedule} />
                <PriorityDropdown priorita={t.priorita} onChange={p => onUpdateTask(t.id, { priorita: p })} />
                <StatusDropdown stato={t.stato} statiConfig={TASK_STATI} onChange={s => onUpdateTask(t.id, { stato: s })} />
                <span style={{ fontSize: 11, color: DS.text2 }}>{t.start ? fmtDate(t.start) : "—"}</span>
                <span style={{ fontSize: 11, color: DS.text2 }}>{t.durata || "—"}</span>
                <DeadlineLabel date={t.deadline} />
                <button onClick={(e) => { e.stopPropagation(); onDeleteTask(t.id); }} title="Elimina" style={{
                  background: "transparent", border: "none", cursor: "pointer", color: DS.text3, fontSize: 13,
                }}>✕</button>
              </div>
            );
          })}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 4px 0", fontSize: 10, color: DS.text3 }}>
            <button onClick={() => handleAdd(g.id !== "all" ? g.id : null)} style={{
              background: "transparent", border: "none", cursor: "pointer", color: B, fontSize: 11, fontWeight: 500, padding: 0,
            }}>+ New task</button>
            <span>Sum: {g.items.length} {g.items.some(t => t.labCost) && `· Sum: $${g.items.reduce((a,t) => a + (t.labCost||0), 0).toFixed(2)}`}</span>
          </div>
        </div>
      ))}
      {grouped.length === 0 && (
        <div style={{ padding: "2rem 4px" }}>
          <button onClick={() => handleAdd(null)} style={{
            background: "transparent", border: "none", cursor: "pointer", color: B, fontSize: 12, fontWeight: 500,
          }}>+ New task</button>
        </div>
      )}
    </div>
  );
}

function ExpandableDescription({ text, onChange }) {
  const [expanded, setExpanded] = useState(false);
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(text || "");
  const ref = useRef(null);
  useEffect(() => { if (editing) ref.current?.focus(); }, [editing]);

  if (editing) {
    return (
      <textarea ref={ref} value={val} onChange={e => setVal(e.target.value)}
        onBlur={() => { setEditing(false); onChange(val); }}
        rows={5}
        style={{
          width: "100%", fontSize: DS.fsBase, lineHeight: DS.lhRelaxed, color: DS.text,
          fontFamily: DS.font, border: `1px solid ${DS.border}`, borderRadius: DS.r,
          padding: DS.sp3, outline: "none", resize: "vertical",
        }} />
    );
  }

  const lines = (text || "").split("\n");
  const isLong = lines.length > 4;
  const visible = expanded || !isLong ? lines : lines.slice(0, 4);

  return (
    <div onClick={() => !text && setEditing(true)} style={{ cursor: text ? "default" : "text" }}>
      {text ? (
        <>
          {visible.map((l, i) => (
            <p key={i} onClick={() => setEditing(true)} style={{
              margin: "0 0 4px", fontSize: DS.fsBase, lineHeight: DS.lhRelaxed, color: DS.text,
              cursor: "text",
              opacity: !expanded && isLong && i === visible.length - 1 ? 0.5 : 1,
            }}>{l || "\u00A0"}</p>
          ))}
          {isLong && (
            <button onClick={() => setExpanded(e => !e)} style={{
              background: "transparent", border: "none", cursor: "pointer", padding: 0,
              color: DS.blueDk, fontSize: DS.fsSm, fontWeight: 500, marginTop: 4,
            }}>{expanded ? "Show less ↑" : "Show more ↓"}</button>
          )}
        </>
      ) : (
        <p style={{ margin: 0, fontSize: DS.fsBase, color: DS.text3 }}>+ Aggiungi descrizione...</p>
      )}
    </div>
  );
}

function GenericPopup({ items, onSelect, onClose, width = 200, position = {} }) {
  return (
    <div style={{ position: "absolute", zIndex: 600, ...position }} onClick={e => e.stopPropagation()}>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: -1 }} />

      }}>
        {items.map((it, i) => it.sep ? (
          <div key={i} style={{ height: DS.bw, background: DS.border, margin: `${DS.sp1}px 0` }} />
        ) : (
          <div key={i} onClick={() => { if (!it.disabled) { it.onClick?.(); onSelect?.(it.id); onClose(); } }}
            style={{
              display: "flex", alignItems: "center", justifyContent: "space-between", gap: DS.sp3,
              padding: `${DS.sp2}px ${DS.sp3}px`, fontSize: DS.fsBase, cursor: it.disabled ? "default" : "pointer",
              color: it.danger ? DS.redDk : it.disabled ? DS.text3 : DS.text, opacity: it.disabled ? 0.45 : 1,
            }}
            onMouseEnter={e => !it.disabled && (e.currentTarget.style.background = "#f5f5f5")}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <span style={{ display: "flex", alignItems: "center", gap: DS.sp2 }}>
              {it.icon && <span style={{ fontSize: 14, color: DS.text3, width: 16 }}>{it.icon}</span>}
              {it.lbl}
              {it.checked && <span style={{ fontSize: 11, color: DS.greenDk }}>✓</span>}
            </span>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
              {it.pro && <span style={{ fontSize: 8, fontWeight: 700, background: "#37474F", color: "#fff", padding: "1px 5px", borderRadius: 3 }}>PRO</span>}
              {it.arrow && <span style={{ fontSize: 11, color: DS.text3 }}>›</span>}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TaskFullView({ item, kind, breadcrumb, statiConfig, onClose, onUpdate, onLogTime, logged }) {
  const [subView, setSubView] = useState("main");
  const [openMenu, setOpenMenu] = useState(null);
  const [layout, setLayout] = useState("default");
  const [sections, setSections] = useState({ crm: false, timereports: true, expenses: true, dependencies: false });
  const [notifSetting, setNotifSetting] = useState("default");
  const [tags, setTags] = useState([{ id: "t1", lbl: "Da Fare KK", checked: false }]);
  const [allFieldsOpen, setAllFieldsOpen] = useState(false);

  // ─── SUBTASK state ─────────────────────────────────────────────────────────
  const [subtasks, setSubtasks] = useState(() =>
    (item.subtasks || []).length > 0
      ? item.subtasks
      : item.subtaskN > 0
        ? Array.from({ length: item.subtaskN }, (_, i) => ({
            id: uid(), titolo: `Subtask ${i + 1}`, done: i < (item.subtaskDone || 0),
          }))
        : []
  );
  const [addingSubtask, setAddingSubtask] = useState(false);
  const [newSubtaskTitle, setNewSubtaskTitle] = useState("");
  const subtaskInputRef = useRef(null);
  useEffect(() => { if (addingSubtask) subtaskInputRef.current?.focus(); }, [addingSubtask]);

  const addSubtask = () => {
    if (!newSubtaskTitle.trim()) { setAddingSubtask(false); return; }
    const updated = [...subtasks, { id: uid(), titolo: newSubtaskTitle.trim(), done: false }];
    setSubtasks(updated);
    onUpdate(item.id, { subtasks: updated, subtaskN: updated.length, subtaskDone: updated.filter(s => s.done).length });
    setNewSubtaskTitle("");
  };

  const toggleSubtask = (sid) => {
    const updated = subtasks.map(s => s.id === sid ? { ...s, done: !s.done } : s);
    setSubtasks(updated);
    onUpdate(item.id, { subtasks: updated, subtaskN: updated.length, subtaskDone: updated.filter(s => s.done).length });
  };

  const deleteSubtask = (sid) => {
    const updated = subtasks.filter(s => s.id !== sid);
    setSubtasks(updated);
    onUpdate(item.id, { subtasks: updated, subtaskN: updated.length, subtaskDone: updated.filter(s => s.done).length });
  };

  const renameSubtask = (sid, titolo) => {
    const updated = subtasks.map(s => s.id === sid ? { ...s, titolo } : s);
    setSubtasks(updated);
    onUpdate(item.id, { subtasks: updated });
  };

  if (!item) return null;

  const isPed = kind === "ped";
  const messages = item.messages || [];
  const doneCount = subtasks.filter(s => s.done).length;

  const addMessage = (text) => {
    onUpdate(item.id, { messages: [...messages, { author: "Luca Giunta", text, ago: "ora" }] });
  };

  const toggle = (m) => setOpenMenu(prev => prev === m ? null : m);
  const close = () => setOpenMenu(null);

  const handleMoreAction = (id) => {
    if (id === "delete") { onClose(); return; }
  };

  // ─── Sezione subtask (colonna sinistra) ───────────────────────────────────
  const SubtaskSection = () => (
    <div style={{ marginTop: DS.sp5, marginBottom: DS.sp5 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: DS.sp3 }}>
        <span style={{ fontSize: DS.fsSm, fontWeight: 600, color: DS.text }}>Subtask</span>
        {subtasks.length > 0 && (
          <span style={{
            fontSize: DS.fsXs, padding: "1px 7px", borderRadius: DS.rPill,
            background: doneCount === subtasks.length ? DS.greenLt : DS.bg,
            color: doneCount === subtasks.length ? DS.greenDk : DS.text3,
            fontWeight: 500,
          }}>{doneCount}/{subtasks.length}</span>
        )}
      </div>

      {/* Progress bar se ci sono subtask */}
      {subtasks.length > 0 && (
        <div style={{ height: 3, background: DS.border, borderRadius: 2, marginBottom: DS.sp3, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: 2,
            width: `${subtasks.length > 0 ? (doneCount / subtasks.length) * 100 : 0}%`,
            background: doneCount === subtasks.length ? G : DS.blueDk,
            transition: "width 0.3s ease",
          }} />
        </div>
      )}

      {/* Lista subtask */}
      {subtasks.map(s => (
        <div key={s.id} style={{
          display: "flex", alignItems: "center", gap: DS.sp2,
          padding: `${DS.sp2}px 0`, borderBottom: `0.5px solid ${DS.borderLt}`,
          group: "subtask",
        }}
          onMouseEnter={e => e.currentTarget.querySelector(".st-del")?.style && (e.currentTarget.querySelector(".st-del").style.opacity = "1")}
          onMouseLeave={e => e.currentTarget.querySelector(".st-del")?.style && (e.currentTarget.querySelector(".st-del").style.opacity = "0")}>
          {/* Checkbox */}
          <div onClick={() => toggleSubtask(s.id)} style={{
            width: 16, height: 16, borderRadius: 3, flexShrink: 0, cursor: "pointer",
            border: `1.5px solid ${s.done ? DS.greenDk : DS.border}`,
            background: s.done ? DS.greenDk : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.15s",
          }}>
            {s.done && <span style={{ color: "#fff", fontSize: 10, lineHeight: 1 }}>✓</span>}
          </div>
          {/* Titolo editabile */}
          <EditableTitle
            value={s.titolo}
            onChange={v => renameSubtask(s.id, v)}
            style={{
              flex: 1, fontSize: DS.fsSm, color: s.done ? DS.text3 : DS.text,
              textDecoration: s.done ? "line-through" : "none",
            }}
          />
          {/* Delete (visibile on hover via CSS workaround con opacity) */}
          <button className="st-del" onClick={() => deleteSubtask(s.id)} style={{
            background: "transparent", border: "none", cursor: "pointer",
            color: DS.text3, fontSize: 12, padding: "0 2px", opacity: 0,
            transition: "opacity 0.1s", flexShrink: 0,
          }}>✕</button>
        </div>
      ))}

      {/* Input nuovo subtask */}
      {addingSubtask ? (
        <div style={{ display: "flex", alignItems: "center", gap: DS.sp2, padding: `${DS.sp2}px 0`, marginTop: 4 }}>
          <div style={{ width: 16, height: 16, borderRadius: 3, border: `1.5px solid ${DS.border}`, flexShrink: 0 }} />
          <input
            ref={subtaskInputRef}
            value={newSubtaskTitle}
            onChange={e => setNewSubtaskTitle(e.target.value)}
            onKeyDown={e => {
              if (e.key === "Enter") { addSubtask(); }
              if (e.key === "Escape") { setAddingSubtask(false); setNewSubtaskTitle(""); }
            }}
            onBlur={() => { addSubtask(); setAddingSubtask(false); }}
            placeholder="Nome subtask..."
            style={{
              flex: 1, border: "none", borderBottom: `1px solid ${DS.blueDk}`,
              outline: "none", fontSize: DS.fsSm, color: DS.text,
              background: "transparent", padding: "2px 0",
            }}
          />
        </div>
      ) : (
        <button onClick={() => setAddingSubtask(true)} style={{
          display: "flex", alignItems: "center", gap: 6, marginTop: DS.sp2,
          background: "transparent", border: "none", cursor: "pointer",
          color: DS.blueDk, fontSize: DS.fsSm, fontWeight: 500, padding: "4px 0",
        }}>
          <span style={{ fontSize: 15, fontWeight: 300 }}>+</span> Add subtask
        </button>
      )}
    </div>
  );

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 500, background: "#fff",
      display: "flex", flexDirection: "column",
    }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: `${DS.sp3}px ${DS.sp5}px`, borderBottom: `0.5px solid ${DS.border}`,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: DS.sp2 }}>
          <span style={{
            fontSize: DS.fsSm, fontWeight: 500, color: DS.text3, padding: `2px ${DS.sp2}px`,
            border: `${DS.bw} solid ${DS.border}`, borderRadius: DS.rs,
          }}>#{item.numId || "—"}</span>
          <Breadcrumb items={breadcrumb} />
          <span style={{ marginLeft: DS.sp2, color: DS.text3, fontSize: 13, cursor: "pointer" }} title="Esporta">↘</span>
          <div style={{ position: "relative" }}>
            <span onClick={(e) => { e.stopPropagation(); toggle("tag"); }} style={{ color: tags.some(t=>t.checked) ? DS.blueDk : DS.text3, fontSize: 13, cursor: "pointer" }} title="Tag">🏷</span>
            {openMenu === "tag" && (
              <TagPopup onClose={close} tags={tags}
                onToggleTag={id => setTags(prev => prev.map(t => t.id === id ? { ...t, checked: !t.checked } : t))}
                onAddTag={lbl => setTags(prev => [...prev, { id: uid(), lbl, checked: true }])} />
            )}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: DS.sp3 }}>
          <div style={{ position: "relative" }}>
            <button onClick={(e) => { e.stopPropagation(); toggle("notif"); }} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 15, color: notifSetting !== "default" ? DS.blueDk : DS.text3 }} title="Notifiche">🔔</button>
            {openMenu === "notif" && <NotificationsPopup onClose={close} current={notifSetting} onSelect={setNotifSetting} />}
          </div>
          <div style={{ position: "relative" }}>
            <button onClick={(e) => { e.stopPropagation(); toggle("pin"); }} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 15, color: DS.text3 }} title="Fissa">📌</button>
            {openMenu === "pin" && <PinPopup onClose={close} onPin={() => {}} />}
          </div>
          <IconBtn title="Apri esterno">↗</IconBtn>
          <button onClick={onClose} style={{
            width: 28, height: 28, borderRadius: "50%", border: "none", cursor: "pointer",
            background: "transparent", color: DS.text3, fontSize: 18, display: "flex",
            alignItems: "center", justifyContent: "center",
          }}>✕</button>
        </div>
      </div>

      {/* Body 2 colonne */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* Colonna sinistra */}
        <div style={{ flex: 1, overflowY: "auto", padding: `${DS.sp6}px ${DS.sp8}px`, maxWidth: 760 }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: DS.sp3, marginBottom: DS.sp5 }}>
            <span style={{ fontSize: 22, marginTop: 2 }}>{isPed ? "🎬" : "📋"}</span>
            <EditableTitle value={item.titolo} onChange={v => onUpdate(item.id, { titolo: v })}
              style={{ fontSize: 24, fontWeight: 700, color: DS.text, lineHeight: DS.lhTight, letterSpacing: DS.lsTight, flex: 1 }} />
          </div>

          {/* Toolbar rapida — 5 menu funzionanti */}
          <div style={{ display: "flex", gap: DS.sp2, marginBottom: DS.sp6, position: "relative" }}>
            <div style={{ position: "relative" }}>
              <button onClick={(e) => { e.stopPropagation(); toggle("add"); }} style={{
                padding: `${DS.sp1}px ${DS.sp3}px`, borderRadius: DS.rs, border: `${DS.bw} solid ${DS.border}`,
                background: openMenu === "add" ? DS.bg : "transparent", color: DS.text2, fontSize: DS.fsSm, cursor: "pointer",
              }}>+ Add</button>
              {openMenu === "add" && (
                <div style={{ position: "absolute", top: 36, left: 0 }}>
                  <AddMenu onClose={close} onAction={(action) => {
                    if (action === "subtask") { close(); setAddingSubtask(true); }
                  }} />
                </div>
              )}
            </div>

            <div style={{ position: "relative" }}>
              <button onClick={(e) => { e.stopPropagation(); toggle("view"); }} title="Vista" style={{
                padding: `${DS.sp1}px ${DS.sp3}px`, borderRadius: DS.rs, border: `${DS.bw} solid ${DS.border}`,
                background: openMenu === "view" ? DS.bg : "transparent", color: DS.text2, fontSize: DS.fsSm, cursor: "pointer",
              }}>⧉</button>
              {openMenu === "view" && <div style={{ position: "absolute", top: 36, left: 0 }}><ViewSwitcherMenu current={subView} onSelect={setSubView} onClose={close} /></div>}
            </div>

            <div style={{ position: "relative" }}>
              <button onClick={(e) => { e.stopPropagation(); toggle("automation"); }} title="Automazione" style={{
                padding: `${DS.sp1}px ${DS.sp3}px`, borderRadius: DS.rs, border: `${DS.bw} solid ${DS.border}`,
                background: openMenu === "automation" ? DS.bg : "transparent", color: DS.text2, fontSize: DS.fsSm, cursor: "pointer",
              }}>⚡</button>
              {openMenu === "automation" && <div style={{ position: "absolute", top: 36, left: 0 }}>
                <AutomationMenu onClose={close} onAction={() => {}} />
              </div>}
            </div>

            <div style={{ position: "relative" }}>
              <button onClick={(e) => { e.stopPropagation(); toggle("settings"); }} title="Impostazioni vista" style={{
                padding: `${DS.sp1}px ${DS.sp3}px`, borderRadius: DS.rs, border: `${DS.bw} solid ${DS.border}`,
                background: openMenu === "settings" ? DS.bg : "transparent", color: DS.text2, fontSize: DS.fsSm, cursor: "pointer",
              }}>⚙</button>
              {openMenu === "settings" && (
                <SettingsPanel onClose={close} layout={layout} onSetLayout={setLayout}
                  sections={sections} onToggleSection={id => setSections(prev => ({ ...prev, [id]: !prev[id] }))} />

            </div>

            <div style={{ position: "relative" }}>
              <button onClick={(e) => { e.stopPropagation(); toggle("more"); }} title="Altro" style={{
                padding: `${DS.sp1}px ${DS.sp3}px`, borderRadius: DS.rs, border: `${DS.bw} solid ${DS.border}`,
                background: openMenu === "more" ? DS.bg : "transparent", color: DS.text2, fontSize: DS.fsSm, cursor: "pointer",
              }}>···</button>
              {openMenu === "more" && <div style={{ position: "absolute", top: 36, left: 0 }}>

          </div>

          <ExpandableDescription text={item.descrizione} onChange={v => onUpdate(item.id, { descrizione: v })} />

          {/* ─── Sezione Subtask ─────────────────────────────────────────── */}
          {!isPed && <SubtaskSection />}

          <MessagesThread
            messages={messages}
            onAddMessage={addMessage}
            createdBy={item.assegnato || item.manager || "Luca Giunta"}
            createdAgo="4 days"
          />
        </div>

        {/* Colonna destra — campi strutturati */}
        <div style={{ width: 340, flexShrink: 0, borderLeft: `0.5px solid ${DS.border}`, overflowY: "auto", padding: `${DS.sp5}px ${DS.sp5}px` }}>
          {subView === "main" ? (
            <>
              {/* Status big button */}
              <FieldRow icon="📊" label="Status">
                <StatusBigButton stato={item.stato} statiConfig={statiConfig} onChange={s => onUpdate(item.id, { stato: s })} />
              </FieldRow>

              {/* Action required — avatar + nome + data schedule su due righe */}
              <FieldRow icon="👤" label={isPed ? "Manager" : "Action required"}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <Avatar name={item.assegnato || item.manager} size={20} />
                  <div>
                    <p style={{ margin: 0, fontSize: DS.fsSm, fontWeight: 500, color: DS.text }}>
                      {item.assegnato || item.manager || "—"}
                    </p>
                    {!isPed && item.schedule && (
                      <p style={{ margin: 0, fontSize: DS.fsXs, color: DS.text3 }}>
                        {fmtDate(item.schedule)}
                      </p>
                    )}
                  </div>
                </div>
              </FieldRow>

              {/* Assigned to */}
              <FieldRow icon="👤" label="Assigned to">
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <Avatar name={item.assegnato || item.manager} size={20} />
                  <span style={{ fontSize: DS.fsSm, color: DS.text }}>{item.assegnato || item.manager || "—"}</span>
                </div>
              </FieldRow>

              {/* Deadline */}
              <FieldRow icon="📆" label="Deadline">
                <span style={{ fontSize: DS.fsSm, color: DS.text }}>{fmtDate(item.deadline || item.scadenza) || "—"}</span>
              </FieldRow>

              {/* Start/End */}
              {item.start && (
                <FieldRow icon="🗓" label="Start/End">
                  <span style={{ fontSize: DS.fsSm, color: DS.text }}>
                    {fmtDate(item.start)} — {fmtDate(item.deadline) || "—"}
                  </span>
                </FieldRow>
              )}

              {/* All fields — row con icone espandibile */}
              <div style={{ padding: `${DS.sp2}px 0`, borderBottom: `0.5px solid ${DS.borderLt}` }}>
                <div style={{ display: "grid", gridTemplateColumns: "20px 110px 1fr", alignItems: "center", gap: DS.sp2 }}>
                  <span style={{ fontSize: 14, color: DS.text3 }}>⊞</span>
                  <span style={{ fontSize: DS.fsSm, color: DS.text3 }}>All fields</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    {["🚩","🔗","%"].map(ic => (
                      <span key={ic} style={{ fontSize: 13, color: DS.text3, cursor: "pointer", padding: 2, borderRadius: 3 }}
                        onMouseEnter={e => e.currentTarget.style.background = DS.bg}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>{ic}</span>
                    ))}
                    <button onClick={() => setAllFieldsOpen(o => !o)} style={{
                      background: "transparent", border: "none", cursor: "pointer",
                      color: DS.text3, fontSize: 12, padding: "0 2px",
                    }}>{allFieldsOpen ? "▲" : "▼"}</button>
                  </div>
                </div>
              </div>

              {/* Campi PED specifici */}
              {isPed && <>
                <FieldRow icon="🎨" label="Pilastro">
                  <span style={{ fontSize: DS.fsSm, color: DS.text }}>{PILLARS.find(p => p.id === item.pilastro)?.lbl || "—"}</span>
                </FieldRow>
                <FieldRow icon="📐" label="Formato">
                  <span style={{ fontSize: DS.fsSm, color: DS.text }}>{item.formato || "—"}</span>
                </FieldRow>
              </>}

              {/* Custom fields */}
              <p style={{ fontSize: DS.fsXs, fontWeight: 700, color: DS.text, textTransform: "uppercase",
                letterSpacing: DS.lsWide, margin: `${DS.sp6}px 0 ${DS.sp2}px`, paddingTop: DS.sp4,
                borderTop: `0.5px solid ${DS.border}` }}>Custom fields</p>
              <FieldRow icon="🏷" label="Rif. Ordine">
                <input defaultValue={item.customRef || item.oggetto || ""} placeholder="—"
                  onBlur={e => onUpdate(item.id, { customRef: e.target.value })}
                  style={{ border: "none", background: "transparent", fontSize: DS.fsSm, color: DS.text, outline: "none", width: "100%" }} />
              </FieldRow>
              <button style={{
                background: "transparent", border: "none", cursor: "pointer",
                color: DS.text3, fontSize: DS.fsXs, padding: "4px 0", display: "flex", alignItems: "center", gap: 4,
              }}>↑ Hide empty fields</button>

              {/* Time Reports */}
              {sections.timereports && <>
                <p style={{ fontSize: DS.fsXs, fontWeight: 700, color: DS.text, textTransform: "uppercase",
                  letterSpacing: DS.lsWide, margin: `${DS.sp6}px 0 ${DS.sp2}px`, paddingTop: DS.sp4,
                  borderTop: `0.5px solid ${DS.border}` }}>Time Reports</p>
                <button onClick={() => setSubView("timereports")} style={{
                  background: "transparent", border: "none", cursor: "pointer", color: DS.blueDk,
                  fontSize: DS.fsSm, padding: 0, display: "flex", alignItems: "center", gap: 6,
                }}>
                  {logged[item.id] > 0 ? `${logged[item.id]}h registrate` : "Nessun report"} →
                </button>
              </>}

              {/* Expenses */}
              {sections.expenses && <>
                <p style={{ fontSize: DS.fsXs, fontWeight: 700, color: DS.text, textTransform: "uppercase",
                  letterSpacing: DS.lsWide, margin: `${DS.sp6}px 0 ${DS.sp2}px`, paddingTop: DS.sp4,
                  borderTop: `0.5px solid ${DS.border}` }}>Expenses</p>
                <p style={{ fontSize: DS.fsSm, color: DS.text3, margin: 0 }}>Nessuna spesa registrata</p>
              </>}

              {/* ─── Users section (in fondo alla colonna destra) ──────── */}
              <div style={{ marginTop: DS.sp6, paddingTop: DS.sp4, borderTop: `0.5px solid ${DS.border}` }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: DS.sp3 }}>
                  <span style={{ fontSize: DS.fsSm, fontWeight: 700, color: DS.text }}>Users</span>
                  <span style={{ fontSize: 11, color: DS.text3, cursor: "pointer" }}>›</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: DS.sp2 }}>
                  <Avatar name={item.assegnato || item.manager || "Luca Giunta"} size={28} />
                  {item.assegnato && item.manager && item.assegnato !== item.manager && (
                    <Avatar name={item.manager} size={28} />
                  )}
                  <button style={{
                    width: 28, height: 28, borderRadius: "50%", border: `1.5px dashed ${DS.border}`,
                    background: "transparent", cursor: "pointer", color: DS.text3, fontSize: 16,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>+</button>
                </div>
              </div>
            </>
          ) : subView === "timereports" ? (
            <TimeReportsSection taskId={item.id} logged={logged} onLog={onLogTime} onBack={() => setSubView("main")} />
          ) : subView === "statistics" ? (
            <div>
              <button onClick={() => setSubView("main")} style={{ background: "transparent", border: "none", cursor: "pointer", color: DS.blueDk, fontSize: DS.fsBase, fontWeight: 600, padding: 0, marginBottom: DS.sp5 }}>← Statistics</button>
              <p style={{ fontSize: DS.fsBase, color: DS.text3, textAlign: "center", padding: `${DS.sp8}px 0` }}>Nessuna statistica disponibile per questo task</p>
            </div>
          ) : subView === "history" ? (
            <div>
              <button onClick={() => setSubView("main")} style={{ background: "transparent", border: "none", cursor: "pointer", color: DS.blueDk, fontSize: DS.fsBase, fontWeight: 600, padding: 0, marginBottom: DS.sp5 }}>← History / Audit</button>
              <div style={{ display: "flex", gap: DS.sp2, padding: `${DS.sp2}px 0`, borderBottom: `${DS.bw} solid ${DS.border}`, fontSize: DS.fsSm, color: DS.text2 }}>
                <Avatar name="Luca Giunta" size={20} />
                <span><strong style={{ color: DS.text }}>Luca Giunta</strong> ha creato il task — 4 giorni fa</span>
              </div>
              <div style={{ padding: `${DS.sp2}px 0`, fontSize: DS.fsSm, color: DS.text2 }}>
                Stato impostato a <strong style={{ color: DS.text }}>{statiConfig.find(s => s.id === item.stato)?.lbl}</strong>
              </div>
            </div>
          ) : subView === "expenses" ? (
            <div>
              <button onClick={() => setSubView("main")} style={{ background: "transparent", border: "none", cursor: "pointer", color: DS.blueDk, fontSize: DS.fsBase, fontWeight: 600, padding: 0, marginBottom: DS.sp5 }}>← Expenses</button>
              <p style={{ fontSize: DS.fsBase, color: DS.text3, textAlign: "center", padding: `${DS.sp8}px 0` }}>Nessuna spesa registrata</p>
            </div>
          ) : null}
        </div>
      </div>
    </div>
  );
}

// ─── Helpers serializzazione Date ←→ JSON ───────────────────────────────────
// Le Date nei task vanno serializzate come ISO string e riconvertite al load.
const DATE_FIELDS_TASK = ["schedule", "start", "deadline"];
const DATE_FIELDS_CONT = ["data", "scadenza"];

function serializeTasks(tasks) {
  return JSON.stringify(tasks.map(t => {
    const out = { ...t };
    DATE_FIELDS_TASK.forEach(f => { if (t[f] instanceof Date) out[f] = t[f].toISOString(); });
    return out;
  }));
}

function deserializeTasks(json) {
  const arr = JSON.parse(json);
  return arr.map(t => {
    const out = { ...t };
    DATE_FIELDS_TASK.forEach(f => { if (typeof t[f] === "string") out[f] = new Date(t[f]); });
    return out;
  });
}

function serializeContenuti(contenuti) {
  return JSON.stringify(contenuti.map(c => {
    const out = { ...c };
    DATE_FIELDS_CONT.forEach(f => { if (c[f] instanceof Date) out[f] = c[f].toISOString(); });
    return out;
  }));
}

function deserializeContenuti(json) {
  const arr = JSON.parse(json);
  return arr.map(c => {
    const out = { ...c };
    DATE_FIELDS_CONT.forEach(f => { if (typeof c[f] === "string") out[f] = new Date(c[f]); });
    return out;
  });
}

// ─── Storage indicator (angolo in basso a destra) ───────────────────────────
function StorageIndicator({ status }) {
  // status: "idle" | "saving" | "saved" | "error"
  if (status === "idle") return null;
  const cfg = {
    saving: { bg: DS.amberLt, color: DS.amberDk, icon: "💾", lbl: "Salvataggio..." },
    saved:  { bg: DS.greenLt, color: DS.greenDk,  icon: "✓",  lbl: "Salvato"       },
    error:  { bg: DS.redLt,   color: DS.redDk,    icon: "⚠",  lbl: "Errore storage" },
  }[status] || null;
  if (!cfg) return null;
  return (
    <div style={{
      position: "fixed", bottom: 16, right: 16, zIndex: 999,
      display: "flex", alignItems: "center", gap: 6,
      padding: "6px 12px", borderRadius: DS.rPill,

      fontSize: DS.fsXs, fontWeight: 500,
      boxShadow: "0 2px 8px rgba(0,0,0,0.12)",
      transition: "opacity 0.3s",
    }}>

    </div>
  );
}

function NassaPlan() {
  const [mainTab, setMainTab] = useState("mywork");
  const [subView, setSubView] = useState("week");
  const [selectedProject, setSelectedProject] = useState(null);
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [projects, setProjects] = useState(PROGETTI);
  const [openNewMenu, setOpenNewMenu] = useState(false);
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [contenuti, setContenuti] = useState(INIT_CONTENUTI);
  const [selectedTask, setSelectedTask] = useState(null);
  const [logged, setLogged] = useState({});

  // ─── Storage state ─────────────────────────────────────────────────────────
  const [storageReady, setStorageReady] = useState(false);
  const [storageStatus, setStorageStatus] = useState("idle"); // idle|saving|saved|error
  const saveTimerRef = useRef(null);
  const isFirstLoad = useRef(true);

  // Indica visivamente "saved" per 2s poi torna a idle
  const showSaved = () => {
    setStorageStatus("saved");
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => setStorageStatus("idle"), 2000);
  };

  // ─── LOAD da Supabase via /api/planning ─────────────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const res = await fetch('/api/planning', { credentials: 'include' });
        if (res.ok) {
          const { data } = await res.json();
          if (data) {
            if (data.tasks) setTasks(deserializeTasks(data.tasks));
            if (data.contenuti) setContenuti(deserializeContenuti(data.contenuti));
            if (data.projects) setProjects(data.projects);
            if (data.logged) setLogged(data.logged);
          }
        }
      } catch (e) {
        console.warn('NassaPlan: load error', e);
      } finally {
        setStorageReady(true);
        setTimeout(() => { isFirstLoad.current = false; }, 100);
      }
    })();
  }, []);

  // ─── SAVE reattivo via /api/planning (debounce 600ms) ──────────────────────
  useEffect(() => {
    if (!storageReady || isFirstLoad.current) return;
    setStorageStatus('saving');
    const timer = setTimeout(async () => {
      try {
        await fetch('/api/planning', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            tasks: serializeTasks(tasks),
            contenuti: serializeContenuti(contenuti),
            projects,
            logged,
          }),
        });
        showSaved();
      } catch (e) {
        console.warn('NassaPlan: save error', e);
        setStorageStatus('error');
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => setStorageStatus('idle'), 3000);
      }
    }, 600);
    return () => clearTimeout(timer);
  }, [tasks, contenuti, projects, logged, storageReady]);

  const logTime = (id, hours) => {
    setLogged(prev => ({ ...prev, [id]: (prev[id] || 0) + hours }));

  const openTaskFull = (item, kind) => setSelectedTask({ item, kind });

      <div style={{ width: DS.sidebarExpanded, flexShrink: 0, background: "#15151a", display: "flex", flexDirection: "column", padding: `${DS.sp3}px ${DS.sp2}px` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 8px 12px" }}>
          <div style={{ width: 24, height: 24, borderRadius: 6, background: G, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#003300", fontSize: 11, fontWeight: 700 }}>N</span>
          </div>
          <span style={{ color: "#fff", fontSize: 13, fontWeight: 500 }}>Nassa Plan</span>
        </div>
        <a href="/" style={{
          display: "flex", alignItems: "center", gap: 5,
          fontSize: 11, color: "rgba(255,255,255,0.4)", textDecoration: "none",
          padding: "4px 12px 12px", transition: "color 0.15s",
        }}
          onMouseEnter={e => e.currentTarget.style.color = "rgba(255,255,255,0.8)"}
          onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.4)"}>
          ‹ Hub
        </a>

        <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", padding: "8px 12px 4px", textTransform: "uppercase", letterSpacing: "0.05em" }}>Home</p>
        <NavItem id="mywork" lbl="My Work" icon="★" />
        <NavItem id="mytasks" lbl="My Tasks" icon="☰" />
        <NavItem id="timetracking" lbl="Time Tracking" icon="◷" />
        <NavItem id="events" lbl="Events Summary" icon="▦" />
        <NavItem id="board" lbl="PED — Board" icon="▤" />

        <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", padding: "16px 12px 4px", textTransform: "uppercase", letterSpacing: "0.05em" }}>Projects</p>
        <div style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>
          {projects.map(p => (
            <button key={p.id} onClick={() => { setMainTab("projects"); setSelectedProject(p.id); }} style={{
              width: "100%", textAlign: "left", padding: "7px 12px", border: "none", cursor: "pointer",
              fontSize: 13, background: (mainTab === "projects" && selectedProject === p.id) ? "rgba(255,255,255,0.1)" : "transparent",
              color: (mainTab === "projects" && selectedProject === p.id) ? "#fff" : "rgba(255,255,255,0.65)",
              display: "flex", alignItems: "center", gap: 8, borderRadius: 6,
            }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: p.color, flexShrink: 0 }} />
              <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</span>
            </button>
          ))}
        </div>

        <div style={{ paddingTop: 8, position: "relative" }}>
          <button onClick={(e) => { e.stopPropagation(); setOpenNewMenu(o => !o); }} style={{
            width: "100%", textAlign: "left", padding: "7px 12px", border: "none", cursor: "pointer",
            fontSize: 13, background: "transparent", color: "rgba(255,255,255,0.65)",
            display: "flex", alignItems: "center", gap: 8, borderRadius: 6,
          }}
            onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <span style={{ width: 8, textAlign: "center" }}>+</span> New
          </button>
          {openNewMenu && (
            <NewMenuSidebar
              onClose={() => setOpenNewMenu(false)}
              onCreateProject={() => {
                const nome = "Nuovo progetto";
                const nuovo = { id: uid(), nome, color: DS.blueDk, cartelle: [] };
                setProjects(prev => [...prev, nuovo]);
                setMainTab("projects");
                setSelectedProject(nuovo.id);
              }}
              onCreateFolder={() => {}}
            />
          )}
        </div>

        <div style={{ paddingTop: 6 }}>
          <button onClick={() => addTask({
            id: uid(), titolo: "Nuovo task", progetto: null, cartella: null,
            stato: "not_started", assegnato: "Luca Giunta", priorita: "normal",
            schedule: TODAY, start: null, durata: null, deadline: null,
          })} style={{
            width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.2)",
            background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: 12, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          }}>
            + Nuovo task
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>

        {/* TOPBAR */}
        <div style={{ padding: "1rem 1.5rem 0", borderBottom: `0.5px solid ${DS.border}`, background: DS.surface }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <Breadcrumb items={breadcrumbItems} onNavigate={(i) => { if (i === 0) { setMainTab("mywork"); setSelectedProject(null); } }} />
            <button onClick={() => setShowQuickAdd(true)} title="Quick add" style={{
              width: 30, height: 30, borderRadius: "50%", border: "none", cursor: "pointer",
              background: DS.blueDk, color: "#fff", fontSize: 17, fontWeight: 400,
              display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 8,
            }}>+</button>
          </div>

          {mainTab === "mywork" && (
            <div style={{ display: "flex", gap: 18, marginBottom: 0 }}>
              {[["week","Week"],["day","Day"],["week2","Week 2"],["project","Project"]].map(([id,lbl]) => (
                <button key={id} onClick={() => setSubView(id)} style={{
                  padding: "8px 2px", border: "none", background: "transparent", cursor: "pointer",
                  fontSize: 13, fontWeight: subView === id ? 500 : 400,
                  color: subView === id ? DS.text : DS.text3,
                  borderBottom: subView === id ? `2px solid ${DS.green}` : "2px solid transparent",
                }}>{lbl}</button>
              ))}
            </div>
          )}
        </div>

        {showQuickAdd && (
          <QuickAddPanel onClose={() => setShowQuickAdd(false)} onCreateTask={addTask} projects={projects} />
        )}

        {/* CONTENT */}
        <div style={{ flex: 1, overflow: "auto", padding: "1.25rem 1.5rem", display: "flex", gap: 16 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            {mainTab === "mywork" && subView === "week" && <MyWorkWeek tasks={tasks} onOpenTask={t => openTaskFull(t, "task")} onUpdateTask={updateTask} onDeleteTask={deleteTask} projects={projects} />}
            {mainTab === "mywork" && subView === "day" && <MyWorkDay tasks={tasks} onOpenTask={t => openTaskFull(t, "task")} />}
            {mainTab === "mywork" && subView === "week2" && <MyWorkWeek tasks={tasks} onOpenTask={t => openTaskFull(t, "task")} onUpdateTask={updateTask} onDeleteTask={deleteTask} projects={projects} />}
            {mainTab === "mywork" && subView === "project" && <MyWorkProject tasks={tasks} />}

            {mainTab === "mytasks" && <MyTasks tasks={tasks} onUpdateTask={updateTask} onOpenTask={t => openTaskFull(t, "task")} />}
            {mainTab === "timetracking" && <TimeTracking tasks={tasks} projects={projects} logged={logged} onLogTime={logTime} onAddTask={addTask} />}
            {mainTab === "events" && <EventsSummary tasks={tasks} />}
            {mainTab === "board" && <KanbanBoard contenuti={contenuti} onUpdateStato={updateContenutoStato} onSelectCard={c => openTaskFull(c, "ped")} onAddContent={addContenuto} />}
            {mainTab === "projects" && <TaskListView tasks={tasks} selectedProject={selectedProject} onUpdateTask={updateTask} onAddTask={addTask} onDeleteTask={deleteTask} onOpenTask={t => openTaskFull(t, "task")} />}
          </div>
        </div>
      </div>

      {selectedTask && (
        <TaskFullView
          item={selectedTask.item}
          kind={selectedTask.kind}
          breadcrumb={
            selectedTask.kind === "ped"
              ? [selectedTask.item.cliente, "Piano Editoriale", selectedTask.item.tipo]
              : [
                  PROGETTI.find(p => p.id === selectedTask.item.progetto)?.nome || "Nassa Plan",
                  selectedTask.item.cartella ? PROGETTI.flatMap(p => p.cartelle).find(c => c.id === selectedTask.item.cartella)?.nome : null,
                ].filter(Boolean)
          }
          statiConfig={selectedTask.kind === "ped" ? PED_STATI : TASK_STATI}
          onClose={closeTaskFull}
          onUpdate={selectedTask.kind === "ped" ? updateContenuto : updateTask}
          onLogTime={logTime}
          logged={logged}
        />
      )}

      {/* Storage indicator — angolo in basso a destra */}
      <StorageIndicator status={storageStatus} />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(NassaPlan));
</script>
</body>
</html>
