<script>
/* ══ TUTTO IL JS ORIGINALE — invariato ══ */
const SK='nassaped_tweek_v8';
const DAYS=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const DAYS_SHORT=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const DAYS_FULL=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MONTHS=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const MONTHS_FULL=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const HOURS=['7:00','8:00','9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'];
const TODAY=new Date();
const DEFAULT_CLIENTS=[{id:'ramaddini',label:'Ramaddini',color:'#1D9E75'},{id:'kosmetikal',label:'Kosmetikal',color:'#D4537E'},{id:'g2g',label:'G2G',color:'#378ADD'},{id:'nassa',label:'Nassa',color:'#7F77DD'},{id:'generale',label:'Generale',color:'#888780'}];

let TEAM = [
  {id:'luca',     label:'Luca',     initials:'LG', color:'#F5C842', textColor:'#111'},
  {id:'alberto',  label:'Alberto',  initials:'AA', color:'#3B5BDB', textColor:'#fff'},
  {id:'giacomo',  label:'Giacomo',  initials:'GC', color:'#0F6E56', textColor:'#fff'},
  {id:'paolone',  label:'Paolone',  initials:'PF', color:'#7C3AED', textColor:'#fff'},
  {id:'akash',    label:'Akash',    initials:'AK', color:'#C2185B', textColor:'#fff'},
  {id:'paoletto', label:'Paoletto', initials:'PC', color:'#E65100', textColor:'#fff'},
];

// Sync with canonical /api/team
(async () => {
  try {
    const r = await fetch('/api/team', { credentials: 'include' });
    if (!r.ok) return;
    const { team } = await r.json();
    TEAM = team.filter(m => m.active).map(m => ({
      id:        m.id,
      label:     m.label,
      initials:  m.initials,
      color:     m.bg,
      textColor: m.color,
    }));
  } catch(e) { console.warn('[team] tweek fallback', e.message); }
})();
let selAssignee=''; // selected assignee in modal

let view='week',weekOffset=0,monthOffset=0,selCl='';
let _mDate=null,_mHour=null,_mSec=null;
let toastTimer=null,saveTimer=null,undoStack=null,dragState=null,activeEditor=null,openDetailDate=null;

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
function darken(h,f){const{r,g,b}=hexToRgb(h);return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}
function lighten(h,f){const{r,g,b}=hexToRgb(h);return`rgb(${Math.round(r+(255-r)*f)},${Math.round(g+(255-g)*f)},${Math.round(b+(255-b)*f)})`;}
function clientStyles(cl){
  const dark=document.documentElement.dataset.theme==='dark';
  if(dark) return{bg:`rgba(${hexToRgb(cl.color).r},${hexToRgb(cl.color).g},${hexToRgb(cl.color).b},.15)`,txt:lighten(cl.color,.4),border:cl.color};
  return{bg:lighten(cl.color,.82),txt:darken(cl.color,.55),border:cl.color};
}
function getMonday(d){const x=new Date(d);const day=x.getDay();x.setDate(x.getDate()-(day===0?6:day-1));return x;}
function iso(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function uid(){return'id'+Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function seedTasks(ids){
  const day=n=>{const x=new Date(TODAY);x.setDate(TODAY.getDate()+n);return iso(x);};
  const pick=i=>ids[i%ids.length];
  const entries=[
    {date:day(-6),text:'Review mese precedente',time:'10:00',client:pick(4),done:true},
    {date:day(-5),text:'Storyboard campagna',time:'14:00',client:pick(0),done:true},
    {date:day(-5),text:'UGC selezione batch',time:'15:00',client:pick(1),done:true},
    {date:day(-3),text:'Export PDF report',time:'11:00',client:pick(0),done:true},
    {date:day(-3),text:'Revisione caption',time:'12:00',client:pick(2),done:true},
    {date:day(-2),text:'Check analytics',time:'9:00',client:pick(3),done:true},
    {date:day(0),text:'Pianificazione settimana',time:'9:00',client:pick(4),done:false},
    {date:day(0),text:'Story reel ingredienti',time:'11:00',client:pick(0),done:false},
    {date:day(1),text:'Approvazione palette colori',time:'11:00',client:pick(1),done:false,tipo:'milestone'},
    {date:day(1),text:'Review feed',time:'10:00',client:pick(2),done:false},
    {date:day(2),text:'Brief contenuti Q3',time:'9:00',client:pick(3),done:false,tipo:'deadline'},
    {date:day(3),text:'Calendario editoriale luglio',time:'10:00',client:pick(4),done:false},
    {date:day(3),text:'Shooting prodotti',time:'9:00',client:pick(0),done:false,tipo:'shooting'},
    {date:day(4),text:'Revisione bozze',time:'14:00',client:pick(2),done:false},
    {date:day(7),text:'Lancio campagna estate',time:'10:00',client:pick(1),done:false,tipo:'milestone'},
    {date:day(7),text:'Consegna report mensile',time:'18:00',client:pick(4),done:false,tipo:'deadline'},
    {date:day(8),text:'Shooting lifestyle',time:'9:00',client:pick(0),done:false,tipo:'shooting'},
    {date:day(9),text:'Review contenuti',time:'11:00',client:pick(2),done:false},
    {date:day(10),text:'Brief agosto',time:'10:00',client:pick(3),done:false},
    {date:day(14),text:'Kick-off Q3',time:'9:00',client:pick(4),done:false,tipo:'milestone'},
    {date:day(15),text:'Shooting autunnale',time:'8:00',client:pick(0),done:false,tipo:'shooting'},
    {date:day(17),text:'Scadenza contratto',time:'18:00',client:pick(2),done:false,tipo:'deadline'},
  ];
  const t={};entries.forEach(x=>{const id=uid();if(!t[x.date])t[x.date]=[];t[x.date].push({id,...x});});return t;
}
function seedBottom(){return{backlog:[{id:'b1',text:'Integrare Google Calendar',client:'nassa',done:false},{id:'b2',text:'PWA manifest',client:'nassa',done:false}],todo:[{id:'t1',text:'Fix contrasto testi',client:'generale',done:false},{id:'t2',text:'Date picker feed',client:'nassa',done:false}],cream:[{id:'c1',text:'Ispirazione palette estate',client:'kosmetikal',done:false}]};}
function loadData(){try{const raw=localStorage.getItem(SK);if(raw){const p=JSON.parse(raw);return{tasks:p.tasks||{},bottom:p.bottom||seedBottom(),clients:p.clients||JSON.parse(JSON.stringify(DEFAULT_CLIENTS))};}}catch(e){}const cl=JSON.parse(JSON.stringify(DEFAULT_CLIENTS));return{tasks:seedTasks(cl.map(c=>c.id)),bottom:seedBottom(),clients:cl};}
function persist(){try{localStorage.setItem(SK,JSON.stringify({tasks,bottom,clients}));flashSave();}catch(e){}}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(persist,400);}
function flashSave(){const el=document.getElementById('save-ind');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);}
let{tasks,bottom,clients}=loadData();
selCl=clients[0]?.id||'';
function getClient(id){return clients.find(c=>c.id===id)||{id,label:id,color:'#888780'};}

/* Dark mode toggle */
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.dataset.theme==='dark';
  html.dataset.theme=isDark?'light':'dark';
  document.getElementById('theme-toggle').textContent=isDark?'🌙':'☀️';
  localStorage.setItem('tweek_theme',isDark?'light':'dark');
  rebuild();
}
(function initTheme(){
  const saved=localStorage.getItem('tweek_theme')||'light';
  document.documentElement.dataset.theme=saved;
  document.getElementById('theme-toggle').textContent=saved==='dark'?'☀️':'🌙';
})();

function exportPDF(){
  const ws=getWeekStart();const we=new Date(ws);we.setDate(ws.getDate()+6);
  const m1=ws.getMonth(),m2=we.getMonth();
  const period=m1===m2?`${ws.getDate()}–${we.getDate()} ${MONTHS_FULL[m1]} ${ws.getFullYear()}`:`${ws.getDate()} ${MONTHS_FULL[m1]} – ${we.getDate()} ${MONTHS_FULL[m2]} ${ws.getFullYear()}`;
  const now=new Date();const gen=`Generato il ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  const wt=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);wt.push({date:iso(d),day:d,tasks:tasks[iso(d)]||[]});}
  const total=wt.reduce((s,d)=>s+d.tasks.length,0);
  const done=wt.reduce((s,d)=>s+d.tasks.filter(t=>t.done).length,0);
  const byClient={};
  wt.forEach(({tasks:dt})=>dt.forEach(t=>{if(!byClient[t.client])byClient[t.client]=[];byClient[t.client].push(t);}));
  let byDayHtml='';
  wt.forEach(({date,day,tasks:dt})=>{if(!dt.length)return;const sorted=[...dt].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));byDayHtml+=`<div class="pf-day-row"><div class="pf-day-label">${DAYS_FULL[day.getDay()]}<br><span style="font-weight:400;color:#aaa">${day.getDate()} ${MONTHS[day.getMonth()]}</span></div><div class="pf-day-tasks">${sorted.map(t=>{const cl=getClient(t.client);const{bg,txt,border}=clientStyles(cl);return`<div class="pf-task-row${t.done?' pf-task-done':''}" style="background:${bg};border-left-color:${border};color:${txt}"><div class="pf-check${t.done?' done':''}"></div><span class="pf-task-text">${t.text}</span><span class="pf-task-meta">${t.time?t.time+' · ':''}${cl.label}</span></div>`;}).join('')}</div></div>`;});
  let byClientHtml='';
  clients.forEach(cl=>{const ct=byClient[cl.id];if(!ct||!ct.length)return;const{bg,txt,border}=clientStyles(cl);const sorted=[...ct].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));byClientHtml+=`<div class="pf-client-block"><div class="pf-client-name"><span class="pf-client-dot" style="background:${cl.color}"></span>${cl.label} <span style="font-weight:400;color:#888;font-size:8.5pt">${ct.length} task · ${ct.filter(t=>t.done).length} completati</span></div>${sorted.map(t=>`<div class="pf-task-row${t.done?' pf-task-done':''}" style="background:${bg};border-left-color:${border};color:${txt}"><div class="pf-check${t.done?' done':''}"></div><span class="pf-task-text">${t.text}</span><span class="pf-task-meta">${t.time||'—'}</span></div>`).join('')}</div>`;});
  document.getElementById('print-frame').innerHTML=`<div class="pf-page"><div class="pf-header"><div class="pf-logo">Nassa<span>PED</span></div><div class="pf-period"><strong>${period}</strong><br>${gen}</div></div><div class="pf-stat-row"><div class="pf-stat"><div class="pf-stat-num">${total}</div><div class="pf-stat-lbl">task totali</div></div><div class="pf-stat"><div class="pf-stat-num">${done}</div><div class="pf-stat-lbl">completati</div></div><div class="pf-stat"><div class="pf-stat-num">${total-done}</div><div class="pf-stat-lbl">da fare</div></div><div class="pf-stat"><div class="pf-stat-num">${clients.filter(cl=>byClient[cl.id]?.length).length}</div><div class="pf-stat-lbl">clienti</div></div></div><div class="pf-section-title">Vista per giorno</div>${byDayHtml||'<p style="color:#aaa">Nessun task</p>'}<div class="pf-footer">NassaPED Tweek · ${period} · ${gen}</div></div><div class="pf-page"><div class="pf-header"><div class="pf-logo">Nassa<span>PED</span></div><div class="pf-period"><strong>Vista per cliente</strong><br>${period}</div></div><div class="pf-section-title">Task per cliente</div>${byClientHtml||'<p style="color:#aaa">Nessun task</p>'}<div class="pf-footer">NassaPED Tweek · ${period} · ${gen}</div></div>`;
  setTimeout(()=>window.print(),100);
}

function showToast(msg,wu=false){document.getElementById('toast-msg').textContent=msg;document.getElementById('toast-undo-btn').style.display=wu?'inline':'none';const t=document.getElementById('toast');t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.classList.remove('show');undoStack=null;},3500);}
function execUndo(){if(!undoStack)return;clearTimeout(toastTimer);document.getElementById('toast').classList.remove('show');const u=undoStack;undoStack=null;if(u.type==='move'){const arr=tasks[u.toDate]||[];const idx=arr.findIndex(t=>t.id===u.task.id);if(idx>=0)arr.splice(idx,1);if(!tasks[u.fromDate])tasks[u.fromDate]=[];tasks[u.fromDate].splice(u.fromIdx,0,{...u.task,time:u.fromTime});scheduleSave();rebuild();showToast('Spostamento annullato');}else if(u.type==='delete'){if(u.section==='cal'){if(!tasks[u.date])tasks[u.date]=[];tasks[u.date].splice(u.idx,0,u.task);}else{if(!bottom[u.section])bottom[u.section]=[];bottom[u.section].splice(u.idx,0,u.task);}scheduleSave();rebuild();showToast('Ripristinato');}}
function renderLegend(){const el=document.getElementById('cl-legend');if(el)el.innerHTML=clients.map(cl=>`<span class="cl-dot"><span class="cl-dot-circle" style="background:${cl.color}"></span>${esc(cl.label)}</span>`).join('');}
function renderClientsPanel(){const list=document.getElementById('cp-list');list.innerHTML='';clients.forEach((cl,idx)=>{const tc=Object.values(tasks).flat().filter(t=>t.client===cl.id).length;const row=document.createElement('div');row.className='cp-row';row.innerHTML=`<div class="cp-color" style="background:${cl.color}"><input type="color" value="${cl.color}"/></div><input class="cp-name-input" type="text" value="${esc(cl.label)}" style="border-color:${cl.color}22"/><span class="cp-count">${tc} task</span><button class="cp-del" ${clients.length<=1?'disabled':''}>✕</button>`;row.querySelector('input[type=color]').addEventListener('input',e=>{clients[idx].color=e.target.value;row.querySelector('.cp-color').style.background=e.target.value;scheduleSave();renderLegend();rebuild();});row.querySelector('.cp-name-input').addEventListener('input',e=>{clients[idx].label=e.target.value;scheduleSave();renderLegend();});row.querySelector('.cp-name-input').addEventListener('blur',()=>rebuild());row.querySelector('.cp-del').addEventListener('click',()=>{if(clients.length<=1)return;const fb=clients.find(c=>c.id!==cl.id);Object.values(tasks).flat().forEach(t=>{if(t.client===cl.id)t.client=fb.id;});Object.values(bottom).flat().forEach(t=>{if(t.client===cl.id)t.client=fb.id;});clients.splice(idx,1);scheduleSave();renderClientsPanel();renderLegend();rebuild();showToast(`"${cl.label}" rimosso`);});list.appendChild(row);});const aw=document.getElementById('cp-add-color-wrap'),ac=document.getElementById('cp-new-color');aw.style.background=ac.value;ac.addEventListener('input',()=>{aw.style.background=ac.value;});}
function addClient(){const ne=document.getElementById('cp-new-name');const name=ne.value.trim();if(!name){ne.focus();return;}clients.push({id:'cl_'+uid(),label:name,color:document.getElementById('cp-new-color').value});ne.value='';scheduleSave();renderClientsPanel();renderLegend();renderModalClientGrid();showToast(`"${name}" aggiunto`);}
function toggleClientsPanel(){const p=document.getElementById('clients-panel');const b=document.getElementById('clients-toggle-btn');const o=p.classList.toggle('open');b.classList.toggle('active',o);if(o)renderClientsPanel();}
function setView(v){
  view=v;
  document.getElementById('vt-week').classList.toggle('active',v==='week');
  document.getElementById('vt-month').classList.toggle('active',v==='month');
  document.getElementById('vt-tasks').classList.toggle('active',v==='tasks');
  document.getElementById('vt-anno').classList.toggle('active',v==='anno');
  document.getElementById('week-view').style.display=v==='week'?'flex':'none';
  document.getElementById('month-view').style.display=v==='month'?'block':'none';
  document.getElementById('task-view').style.display=v==='tasks'?'flex':'none';
  document.getElementById('anno-view').style.display=v==='anno'?'flex':'none';
  document.getElementById('bottom-sections').style.display=v==='anno'||v==='tasks'||v==='timeline'||v==='planning'?'none':'flex';
  const hints={week:'Trascina per spostare · Doppio click per modificare',month:'Clicca un giorno per i task · Doppio click per la settimana',tasks:'Clicca una card per aprire i dettagli · + Nuova task dalla toolbar',anno:'Clicca un mese per andare alla settimana',stream:'Clienti e job — il centro della pianificazione'};
  document.getElementById('hint-text').textContent=hints[v]||'';
  document.getElementById('period-label').textContent=v==='tasks'?'Gestione Task':v==='anno'?'Vista Annuale':v==='timeline'?'Timeline':v==='planning'?'Planning Settimanale':'';
  if(v==='week'){weekOffset=0;renderWeek();}
  else if(v==='month') renderMonth();
  else if(v==='tasks'){tvPopulateClientFilter();tvRender();}
  else if(v==='anno') renderAnno();

  document.getElementById('vt-timeline').classList.toggle('active',v==='timeline');
  document.getElementById('timeline-view').style.display=v==='timeline'?'flex':'none';
  if(v==='timeline'){tlRender();}
  // Planning view
  const planningBtn = document.getElementById('vt-planning');
  if(planningBtn) planningBtn.classList.toggle('active',v==='planning');
  const planningView = document.getElementById('planning-view');
  if(planningView) planningView.style.display=v==='planning'?'flex':'none';
  if(v==='planning'){
    // Mount React component (idempotent — createRoot guards re-mount)
    if(typeof mountPlanning === 'function') mountPlanning();
  }
}
function shiftPeriod(d){if(view==='week'){weekOffset+=d;renderWeek();}else if(view==='anno'){_annoYear+=d;renderAnno();}else{monthOffset+=d;renderMonth();}}
function goToday(){weekOffset=0;monthOffset=0;_annoYear=new Date().getFullYear();if(view==='week')renderWeek();else if(view==='anno')renderAnno();else renderMonth();}
function rebuild(){if(view==='week')renderWeek();else if(view==='anno')renderAnno();else renderMonth();}

var _annoYear = new Date().getFullYear();
// ── Stream client sync — stub (full NPlan in /nplan) ──
var _streamClients = [];
var _streamLoaded  = false;
async function _tlFetchClients(){
  if(_streamLoaded) return;
  try {
    const r = await fetch('/api/project?user=nassa_studio',
      {credentials:'include'});
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    const raw = d?.data || d;
    const loaded = (raw?.clients||[]).map(c=>({
      slug: c.id||c.name?.toLowerCase().replace(/\s+/g,'_'),
      n: c.name||'', c: c.color||'#888'
    })).filter(c=>c.n);
    if(loaded.length) _streamClients = loaded;
  } catch(e) {}
  _streamLoaded = true;
}

// ── TIMELINE VIEW (Do. App pattern) ─────────────────────────────────────────
const TL_DAY_W = 52;   // px per giorno
const TL_ROW_H = 52;   // px per riga cliente
const TL_DAYS  = 90;   // giorni mostrati

function tlGetDays(){
  const days=[];
  const start=new Date(TODAY);
  start.setDate(start.getDate()-14); // 2 settimane fa
  for(let i=0;i<TL_DAYS;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    days.push(d);
  }
  return days;
}

function tlRender(){
  // Se stream non ancora caricato, attendi e riprova
  if(!_streamLoaded){
    _tlFetchClients().then(()=>tlRender()).catch(()=>{});
  }
  // P07-sync: usa clienti reali da stream se disponibili, altrimenti DEFAULT_CLIENTS
  const tlClients = (_streamClients && _streamClients.length > 0)
    ? _streamClients.map(c => ({
        id:    c.slug,
        label: c.n,
        color: c.c || '#888780',
        pkg:   c.pkg || '',
      }))
    : clients.map(c => ({ id: c.id, label: c.label, color: c.color, pkg: '' }));

  const days=tlGetDays();
  const hdr=document.getElementById('tl-day-header');
  const clientsCol=document.getElementById('tl-clients-col');
  const grid=document.getElementById('tl-grid');
  hdr.innerHTML='';clientsCol.innerHTML='';grid.innerHTML='';

  // Set grid width
  const totalW=days.length*TL_DAY_W;
  const rightCol=document.getElementById('tl-right-col');
  if(rightCol) rightCol.style.width=totalW+'px';
  grid.style.width=totalW+'px';
  hdr.style.width=totalW+'px';
  grid.style.position='relative';
  grid.style.minHeight=(tlClients.length*TL_ROW_H+40)+'px';

  // ── Day header ──
  let lastMonth='';
  days.forEach((d,i)=>{
    const isToday=iso(d)===iso(TODAY);
    const isFirst=d.getDate()===1||i===0;
    const mn=MONTHS[d.getMonth()];
    // Month label injected as absolute inside the day cell column
    if(isFirst||lastMonth!==mn){
      lastMonth=mn;
      // month label is added inside the cell below
    }
    const cell=document.createElement('div');
    cell.style.cssText=`
      display:inline-flex;flex-direction:column;align-items:center;justify-content:flex-end;
      width:${TL_DAY_W}px;flex-shrink:0;padding:20px 0 6px;gap:2px;
      border-left:0.5px solid ${isFirst?'var(--border-2,var(--border))':'transparent'};
      position:relative;
    `;
    // Month floating label on first day of month
    if(isFirst||i===0){
      const ml=document.createElement('div');
      ml.style.cssText=`position:absolute;top:4px;left:4px;
        font-size:11px;font-weight:700;color:var(--text-3);
        text-transform:lowercase;letter-spacing:.04em;white-space:nowrap;`;
      ml.textContent=MONTHS[d.getMonth()];
      cell.appendChild(ml);
    }
    const num=document.createElement('div');
    num.style.cssText=`
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:${isToday?800:400};
      background:${isToday?'var(--text-1)':'transparent'};
      color:${isToday?'var(--bg)':'var(--text-2)'};
    `;
    num.textContent=d.getDate();
    const dow=document.createElement('div');
    dow.style.cssText=`font-size:9px;color:var(--text-3);text-transform:uppercase;`;
    dow.textContent=['dom','lun','mar','mer','gio','ven','sab'][d.getDay()];
    cell.appendChild(dow);cell.appendChild(num);
    hdr.appendChild(cell);
  });

  // ── Grid lines (vertical day separators) ──
  days.forEach((d,i)=>{
    if(i===0) return;
    const line=document.createElement('div');
    line.style.cssText=`position:absolute;top:0;left:${i*TL_DAY_W}px;
      width:0.5px;bottom:0;background:var(--border);z-index:0;
      ${d.getDay()===1?'background:var(--border-2);':''}`;
    grid.appendChild(line);
  });

  // Today marker
  const todayIdx=days.findIndex(d=>iso(d)===iso(TODAY));
  if(todayIdx>=0){
    const tm=document.createElement('div');
    tm.style.cssText=`position:absolute;top:0;left:${todayIdx*TL_DAY_W+TL_DAY_W/2}px;
      width:1.5px;bottom:0;background:var(--green);z-index:2;`;
    grid.appendChild(tm);
  }

  // ── Client rows ──
  const dayMap={}; days.forEach((d,i)=>dayMap[iso(d)]=i);

  tlClients.forEach((cl,ri)=>{
    const cs=clientStyles(cl);
    // Client label
    const lbl=document.createElement('div');
    lbl.style.cssText=`
      height:${TL_ROW_H}px;display:flex;align-items:center;
      padding:0 14px;gap:8px;
      border-bottom:0.5px solid var(--border);
    `;
    const dot=document.createElement('div');
    dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${cl.color};flex-shrink:0;`;
    const lname=document.createElement('div');
    lname.style.cssText=`font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
    lname.textContent=cl.label;
    lbl.appendChild(dot);lbl.appendChild(lname);
    clientsCol.appendChild(lbl);

    // Row bg stripe
    const stripe=document.createElement('div');
    stripe.style.cssText=`position:absolute;top:${ri*TL_ROW_H}px;left:0;right:0;
      height:${TL_ROW_H}px;border-bottom:0.5px solid var(--border);z-index:0;`;
    grid.appendChild(stripe);

    // Tasks for this client
    const clTasks=[];
    Object.entries(tasks).forEach(([date,tlist])=>{
      if(!dayMap.hasOwnProperty(date)) return;
      (tlist||[]).forEach(t=>{
        if(t.client===cl.id) clTasks.push({...t, date});
      });
    });

    // Sort by date — milestones first (no lanes), then tasks with lane management
    clTasks.sort((a,b)=>a.date.localeCompare(b.date));

    // ── Milestones e eventi speciali — dot verticale a tutta riga ──
    clTasks.filter(t=>t.tipo==='milestone'||t.tipo==='shooting').forEach(t=>{
      const di=dayMap[t.date];
      if(di===undefined) return;
      const tipo=t.tipo||'task';
      const isShooting=tipo==='shooting';

      // Linea verticale a tutta altezza riga
      const line=document.createElement('div');
      line.style.cssText=`position:absolute;
        left:${di*TL_DAY_W+TL_DAY_W/2}px;
        top:${ri*TL_ROW_H+4}px;
        width:1.5px;height:${TL_ROW_H-8}px;
        background:${isShooting?cs.border:cs.txt};
        opacity:${t.done?.4:.8};
        z-index:2;`;
      grid.appendChild(line);

      // Diamante ◆ in cima alla linea
      const diamond=document.createElement('div');
      diamond.title=t.text+(t.done?' ✓':'');
      diamond.style.cssText=`position:absolute;
        left:${di*TL_DAY_W+TL_DAY_W/2-7}px;
        top:${ri*TL_ROW_H+2}px;
        width:14px;height:14px;
        background:${t.done?cs.bg+'99':isShooting?cs.bg:cs.txt};
        border:1.5px solid ${cs.border};
        transform:rotate(45deg);
        z-index:3;cursor:pointer;
        opacity:${t.done?.5:1};
        transition:transform .15s,opacity .15s;`;
      diamond.addEventListener('mouseenter',()=>diamond.style.transform='rotate(45deg) scale(1.2)');
      diamond.addEventListener('mouseleave',()=>diamond.style.transform='rotate(45deg)');
      diamond.addEventListener('click',()=>{
        const dt=tasks[t.date];
        if(dt){const tk=dt.find(x=>x.id===t.id);if(tk){tk.done=!tk.done;scheduleSave();tlRender();}}
      });
      grid.appendChild(diamond);

      // Label sotto il diamante
      const lbl=document.createElement('div');
      lbl.style.cssText=`position:absolute;
        left:${di*TL_DAY_W+TL_DAY_W/2}px;
        top:${ri*TL_ROW_H+18}px;
        transform:translateX(-50%);
        font-size:9px;font-weight:700;
        color:${cs.txt};white-space:nowrap;
        max-width:${TL_DAY_W*2}px;overflow:hidden;text-overflow:ellipsis;
        opacity:${t.done?.4:.75};
        pointer-events:none;z-index:2;
        text-decoration:${t.done?'line-through':'none'};`;
      lbl.textContent=(isShooting?'○ ':'◆ ')+t.text;
      grid.appendChild(lbl);
    });

    // ── Deadline — pill con bordo rosso tratteggiato + flag ──
    clTasks.filter(t=>t.tipo==='deadline').forEach(t=>{
      const di=dayMap[t.date];
      if(di===undefined) return;
      const pill=document.createElement('div');
      pill.title='⚑ Deadline: '+t.text+(t.done?' ✓':'');
      pill.style.cssText=`position:absolute;
        left:${di*TL_DAY_W+1}px;
        top:${ri*TL_ROW_H+TL_ROW_H-24}px;
        width:${TL_DAY_W-2}px;height:20px;
        border-radius:4px;
        background:${t.done?'transparent':'#fcebeb'};
        border:1.5px dashed ${t.done?'#ccc':'#E24B4A'};
        z-index:2;display:flex;align-items:center;
        padding:0 5px;gap:3px;cursor:pointer;
        opacity:${t.done?.5:1};
        transition:opacity .15s,transform .1s;`;
      pill.addEventListener('mouseenter',()=>pill.style.transform='scaleY(1.04)');
      pill.addEventListener('mouseleave',()=>pill.style.transform='');
      pill.addEventListener('click',()=>{
        const dt=tasks[t.date];
        if(dt){const tk=dt.find(x=>x.id===t.id);if(tk){tk.done=!tk.done;scheduleSave();tlRender();}}
      });
      const flag=document.createElement('span');
      flag.textContent='⚑';
      flag.style.cssText=`font-size:9px;color:${t.done?'#ccc':'#E24B4A'};flex-shrink:0;`;
      const txt=document.createElement('div');
      txt.style.cssText=`font-size:9px;font-weight:600;color:${t.done?'#ccc':'#A32D2D'};
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        text-decoration:${t.done?'line-through':'none'};`;
      txt.textContent=t.text;
      pill.appendChild(flag);pill.appendChild(txt);
      grid.appendChild(pill);
    });

    // ── Task operativi (tipo===task o undefined) — pill colorata con lane ──
    const lanes=[];
    clTasks.filter(t=>!t.tipo||t.tipo==='task').forEach(t=>{
      const di=dayMap[t.date];
      if(di===undefined) return;
      let lane=lanes.findIndex(endDay=>endDay<di);
      if(lane<0){lane=lanes.length;lanes.push(0);}
      lanes[lane]=di+1;

      const LANE_H=20, LANE_PAD=4;
      const top=ri*TL_ROW_H+LANE_PAD+lane*(LANE_H+2);
      const pill=document.createElement('div');
      pill.title=t.text+(t.done?' ✓':'');
      pill.style.cssText=`
        position:absolute;
        left:${di*TL_DAY_W+3}px;
        top:${top}px;
        width:${TL_DAY_W-6}px;
        height:${LANE_H}px;
        border-radius:6px;
        background:${t.done?cs.bg+'99':cs.bg};
        border:1px solid ${cs.border};
        z-index:1;
        display:flex;align-items:center;
        padding:0 6px;
        gap:4px;
        cursor:pointer;
        overflow:hidden;
        opacity:${t.done?.7:1};
        transition:opacity .15s,transform .1s;
      `;
      if(t.done) pill.style.textDecoration='line-through';
      pill.addEventListener('mouseenter',()=>pill.style.transform='scaleY(1.04)');
      pill.addEventListener('mouseleave',()=>pill.style.transform='');
      pill.addEventListener('click',()=>{
        const dt=tasks[t.date];
        if(dt){const tk=dt.find(x=>x.id===t.id);if(tk){tk.done=!tk.done;scheduleSave();tlRender();}}
      });
      const dot2=document.createElement('div');
      dot2.style.cssText=`width:5px;height:5px;border-radius:50%;background:${cs.txt};flex-shrink:0;opacity:.7;`;
      const txt=document.createElement('div');
      txt.style.cssText=`font-size:10px;font-weight:600;color:${cs.txt};
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
      txt.textContent=t.text;
      pill.appendChild(dot2);pill.appendChild(txt);
      grid.appendChild(pill);
    });
  });

  // ── New task CTA ──
  const cta=document.createElement('button');
  cta.style.cssText=`
    position:fixed;bottom:24px;right:24px;
    background:var(--text-1);color:var(--bg);
    border:none;border-radius:14px;
    padding:12px 20px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:8px;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
    z-index:100;
    display:${document.getElementById('timeline-view').style.display==='flex'?'flex':'none'};
  `;
  cta.id='tl-new-task-btn';
  cta.innerHTML='<span style="font-size:18px;line-height:1">+</span> Nuovo task';
  cta.addEventListener('click',tlOpenModal);

  // Remove old btn if exists
  const old=document.getElementById('tl-new-task-btn');
  if(old) old.remove();
  document.body.appendChild(cta);

  // ── Legend ──
  let legend=document.getElementById('tl-legend');
  if(!legend){
    legend=document.createElement('div');
    legend.id='tl-legend';
    legend.style.cssText=`
      position:sticky;bottom:0;left:0;right:0;
      background:var(--bg);border-top:0.5px solid var(--border);
      padding:6px 16px;display:flex;align-items:center;gap:16px;
      font-size:10px;color:var(--text-3);flex-shrink:0;z-index:5;
    `;
    legend.innerHTML=`
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--bg-1);border:1px solid var(--text-3)"></span>
        Task operativo
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:10px;height:10px;transform:rotate(45deg);background:var(--text-2);border:1px solid var(--text-3)"></span>
        Milestone
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:10px;height:10px;transform:rotate(45deg);background:transparent;border:1px solid var(--text-3)"></span>
        Shooting / evento
      </span>
      <span style="display:flex;align-items:center;gap:5px">
        <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:transparent;border:1.5px dashed #E24B4A"></span>
        Deadline
      </span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <span style="opacity:.5">click = toggle done</span>
        <button onclick="tlResetData()" style="font-size:10px;padding:2px 8px;border-radius:4px;
          border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text-3)">
          ↺ Reset demo
        </button>
      </span>
    `;
    document.getElementById('timeline-view').appendChild(legend);
  }

  // Scroll to today
  const tlBody=document.getElementById('tl-body');
  if(todayIdx>=0){
    setTimeout(()=>{
      tlBody.scrollLeft=Math.max(0,(todayIdx-3)*TL_DAY_W);
      // Sync corner + clients col heights
      const hdrEl=document.getElementById('tl-day-header');
      const corner=document.getElementById('tl-corner');
      if(hdrEl&&corner) corner.style.height=hdrEl.offsetHeight+'px';
      // Set clients col height to match grid
      const gEl=document.getElementById('tl-grid');
      const cCol=document.getElementById('tl-clients-col');
      if(gEl&&cCol) cCol.style.minHeight=gEl.offsetHeight+'px';
    },50);
  }
}

function tlResetData(){
  // Reseed con i clienti attualmente caricati (stream o DEFAULT)
  const activeCl = (_streamClients && _streamClients.length > 0)
    ? _streamClients.map(c => c.slug)
    : clients.map(c => c.id);
  tasks=seedTasks(activeCl);
  scheduleSave();
  tlRender();
  showToast('Dati demo aggiornati · ' + activeCl.length + ' clienti');
}

function tlOpenModal(){
  const today=iso(TODAY);
  document.getElementById('tl-task-name').value='';
  document.getElementById('tl-task-date-start').value=today;
  document.getElementById('tl-task-date-end').value=today;
  // Populate client select
  const sel=document.getElementById('tl-task-client');
  sel.innerHTML=clients.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  document.getElementById('tl-modal-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('tl-task-name').focus(),50);
}

function tlCloseModal(){
  document.getElementById('tl-modal-overlay').style.display='none';
}

function tlSaveTask(){
  const name=document.getElementById('tl-task-name').value.trim();
  if(!name) return;
  const date=document.getElementById('tl-task-date-start').value||iso(TODAY);
  const client=document.getElementById('tl-task-client').value;
  if(!tasks[date]) tasks[date]=[];
  tasks[date].push({id:uid(),text:name,time:'',client,done:false});
  scheduleSave();
  tlCloseModal();
  tlRender();
  showToast('Task aggiunto');
}

function renderAnno(){
  const grid=document.getElementById('anno-grid');
  grid.innerHTML='';
  let nav=document.getElementById('anno-year-nav');
  if(!nav){
    nav=document.createElement('div');nav.id='anno-year-nav';nav.className='anno-year-nav';
    nav.innerHTML=`<button class="btn" onclick="_annoYear--;renderAnno()">‹</button><span id="anno-year-label" style="font-size:18px;font-weight:700;color:var(--text);"></span><button class="btn" onclick="_annoYear++;renderAnno()">›</button>`;
    const leg=document.createElement('div');leg.className='anno-legend';
    leg.innerHTML=`<div class="anno-legend-dot" style="background:var(--green-lt);border:.5px solid var(--green-dk);"></div><span>Task</span><div class="anno-legend-dot" style="background:#dbeafe;border:.5px solid #93c5fd;margin-left:8px;"></div><span>Post feed</span>`;
    const av=document.getElementById('anno-view');av.prepend(leg);av.prepend(nav);
  }
  document.getElementById('anno-year-label').textContent=_annoYear;
  const taskDates=new Set(Object.keys(tasks).filter(k=>tasks[k]?.length));
  const feedDates=new Set(_feedData.map(f=>f.date));
  const todayStr=iso(TODAY);
  const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const WD=['L','M','M','G','V','S','D'];
  for(let m=0;m<12;m++){
    const card=document.createElement('div');card.className='anno-month';
    const title=document.createElement('div');title.className='anno-month-title';title.textContent=MONTHS_IT[m];card.appendChild(title);
    const wdRow=document.createElement('div');wdRow.className='anno-wd-row';
    WD.forEach(d=>{const s=document.createElement('div');s.className='anno-wd';s.textContent=d;wdRow.appendChild(s);});
    card.appendChild(wdRow);
    const daysWrap=document.createElement('div');daysWrap.className='anno-days';
    const firstDay=new Date(_annoYear,m,1);
    let off=firstDay.getDay()===0?6:firstDay.getDay()-1;
    for(let i=0;i<off;i++){const e=document.createElement('div');e.style.cssText='aspect-ratio:1;';daysWrap.appendChild(e);}
    const dim=new Date(_annoYear,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const ds=`${_annoYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasTk=taskDates.has(ds),hasFd=feedDates.has(ds);
      const el=document.createElement('div');
      el.className='anno-day'+(hasTk&&hasFd?' has-both':hasTk?' has-task':hasFd?' has-feed':'')+(ds===todayStr?' today-dot':'');
      const num=document.createElement('span');num.className='anno-day-num';num.textContent=d;el.appendChild(num);
      el.addEventListener('click',()=>{const mon=getMonday(new Date(_annoYear,m,d));weekOffset=Math.round((mon-getMonday(TODAY))/604800000);setView('week');});
      daysWrap.appendChild(el);
    }
    card.appendChild(daysWrap);
    card.addEventListener('click',e=>{if(e.target.closest('.anno-day'))return;const mon=getMonday(new Date(_annoYear,m,1));weekOffset=Math.round((mon-getMonday(TODAY))/604800000);setView('week');});
    grid.appendChild(card);
  }
}

const STREAM_API  = '/api/project';
const STREAM_KEY  = ''; // auth via HttpOnly cookie — no client-side key needed
const STREAM_USER = 'nassa_studio';

var _feedLoaded=false,_feedData=[],_showFeed=false;
const _MESI={gennaio:1,febbraio:2,marzo:3,aprile:4,maggio:5,giugno:6,luglio:7,agosto:8,settembre:9,ottobre:10,novembre:11,dicembre:12};
function _isoFromItalian(str){
  if(!str)return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(str))return str;
  const low=str.toLowerCase();
  const m1=low.match(/^(?:\w+\s+)?(\d{1,2})\s+(\w+)\s+(\d{4})$/);
  if(m1){const mo=_MESI[m1[2]];if(mo)return `${m1[3]}-${String(mo).padStart(2,'0')}-${String(parseInt(m1[1])).padStart(2,'0')}`;}
  const m2=low.match(/^(?:\w+\s+)?(\d{1,2})\s+(\w+)$/);
  if(m2){const mo=_MESI[m2[2]];if(mo){const y=new Date().getFullYear();return `${y}-${String(mo).padStart(2,'0')}-${String(parseInt(m2[1])).padStart(2,'0')}`;}}
  return null;
}
function _feedTypeStyle(type){
  if(type==='video')return{bg:'#fee2e2',tc:'#991b1b',label:'Reel'};
  if(type==='carousel')return{bg:'#fef3c7',tc:'#92400e',label:'Caros.'};
  return{bg:'#dbeafe',tc:'#1e40af',label:'Foto'};
}
async function loadFeedData(){
  if(_feedLoaded)return;
  try{
    const res=await fetch(`${STREAM_API}?user=${STREAM_USER}`,{headers:{'x-nassa-key':STREAM_KEY},credentials:'include'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const raw=data?.data||data;
    const cls=raw?.clients||[];
    const feedsObj=raw?.feeds||{};
    _feedData=[];
    cls.forEach(cl=>{
      (cl.accounts||[]).forEach(acc=>{
        Object.keys(feedsObj).forEach(key=>{
          if(!key.startsWith(acc.id+'|||'))return;
          (feedsObj[key]||[]).forEach(item=>{
            if(!item.date||item.type==='pending')return;
            const ds=_isoFromItalian(item.date);
            if(!ds)return;
            _feedData.push({date:ds,client:cl.name,clientColor:cl.color||'#888',type:item.type||'image',copy:item.copy||''});
          });
        });
      });
    });
    _feedLoaded=true;
  }catch(e){_feedLoaded=true;console.warn('[Feed]',e.message);}
}
function _buildFeedChip(f){
  const{bg,tc,label}=_feedTypeStyle(f.type);
  const clBg=lighten(f.clientColor,.82);
  const clTc=darken(f.clientColor,.55);
  const chip=document.createElement('div');
  chip.className='feed-chip';
  chip.style.cssText=`background:${clBg};color:${clTc};`;
  chip.title=f.client+(f.copy?' — '+f.copy.slice(0,80):'');
  chip.innerHTML=`<span class="feed-chip-type" style="background:${bg};color:${tc};">${label}</span><span class="feed-chip-text">${f.copy?f.copy.slice(0,28):f.client}</span>`;
  return chip;
}
function renderFeedChipsForDay(col,ds){
  if(!_showFeed)return;
  const items=_feedData.filter(f=>f.date===ds);
  if(!items.length)return;
  const wrap=document.createElement('div');wrap.className='feed-chip-wrap';
  items.forEach(f=>wrap.appendChild(_buildFeedChip(f)));
  col.insertBefore(wrap,col.firstChild);
}
function toggleFeedLayer(){
  _showFeed=!_showFeed;
  document.getElementById('feed-toggle-btn').classList.toggle('active',_showFeed);
  rebuild();
}
async function initFeedLayer(){
  await loadFeedData();
  document.getElementById('feed-toggle-btn').classList.toggle('active',_showFeed);
  if(_feedData.length)rebuild();
}

  onhold:    { l:'On Hold',   cls:'onhold'    },
};
const STREAM_EMOJIS = ['🚀','📋','🎯','⚡','🔥','💡','✨','📌','🎨','📊','🏆','💼'];

/* ── Storage ─────────────────────────────────────────── */

function streamUID(){return'str_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

/* ── Carica clienti da NassaPED ──────────────────────── */
function streamSetTab(tab){
  _streamTab = tab;
  document.getElementById('st-clients').classList.toggle('active', tab==='clients');
  document.getElementById('st-jobs').classList.toggle('active', tab==='jobs');
  document.getElementById('stream-clients-view').style.display = tab==='clients' ? 'block' : 'none';
  document.getElementById('stream-jobs-view').style.display = tab==='jobs' ? 'block' : 'none';
  document.getElementById('stream-new-btn').textContent = tab==='jobs' ? '+ Nuovo Job' : '+ Nuovo Cliente';
  document.getElementById('stream-new-btn').onclick = tab==='jobs' ? streamNewJob : streamNewClient;
  streamRenderKpi();
  streamRender();
}

function streamRender(){
  if(_streamTab==='clients') streamRenderClients();
  else streamRenderJobs();
}

/* ── KPI topbar ─────────────────────────────────────── */
function streamRenderKpi(){
  const el = document.getElementById('stream-kpi-bar');
  if(!el) return;
  const jobs = Object.values(stream_v1);
  const totBudget = jobs.reduce((s,j)=>s+streamJobBudget(j),0);
  const totUsed   = jobs.reduce((s,j)=>s+streamJobUsed(j),0);
  const totProfit = totBudget - totUsed;
  const inPlay    = jobs.filter(j=>j.stato==='inplay').length;
  el.innerHTML = `
    <span><strong>${jobs.length}</strong> job</span>
    <span><strong>${inPlay}</strong> attivi</span>
    <span>Budget <strong>€${totBudget.toLocaleString('it-IT')}</strong></span>
    <span class="${totProfit>=0?'stream-profit pos':'stream-profit neg'}">Profitto <strong>€${totProfit.toLocaleString('it-IT')}</strong></span>
  `;
}

/* ── Calcoli job ─────────────────────────────────────── */
function streamJobBudget(j){
  return j.budget || (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.budget||0),0);
}
function streamJobUsed(j){
  return (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.oreUsate||0)*(it.tariffaOraria||0),0);
}
function streamJobOreStim(j){
  return (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.oreStimate||0),0);
}
function streamJobOreUsed(j){
  return (j.phases||[]).flatMap(p=>p.items||[]).reduce((s,it)=>s+(it.oreUsate||0),0);
}
function streamClientColor(slug){
  return _streamClients.find(c=>c.slug===slug)?.c || clients.find(c=>c.id===slug)?.color || '#888';
}
function streamClientName(slug){
  return _streamClients.find(c=>c.slug===slug)?.n || clients.find(c=>c.id===slug)?.label || slug;
}

/* ── Vista CLIENTI ───────────────────────────────────── */
function streamRenderClients(){
  const el = document.getElementById('stream-clients-view');
  const q  = document.getElementById('stream-search')?.value.toLowerCase() || '';
  const filtered = _streamClients.filter(c => !q || c.n.toLowerCase().includes(q));

  const table = document.createElement('table');
  table.className = 'stream-table';
  table.innerHTML = `<thead><tr>
    <th style="width:14px;"></th>
    <th>Cliente</th>
    <th class="right">Job</th>
    <th class="right">Budget totale</th>
    <th class="right">Usato</th>
    <th class="right">Profitto</th>
    <th>Pacchetto</th>
    <th>Stato</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');

  if(!filtered.length){
    tbody.innerHTML = '<tr><td colspan="8" style="padding:32px;text-align:center;color:var(--text-3);">Nessun cliente trovato.</td></tr>';
  }

  filtered.forEach(cl => {
    const clJobs = Object.values(stream_v1).filter(j=>j.client===cl.slug);
    const totBudget = clJobs.reduce((s,j)=>s+streamJobBudget(j),0);
    const totUsed   = clJobs.reduce((s,j)=>s+streamJobUsed(j),0);
    const profit    = totBudget - totUsed;

    const tr = document.createElement('tr');
    tr.className = 'stream-client-row';
    tr.innerHTML = `
      <td><span class="stream-client-dot" style="background:${cl.c};"></span></td>
      <td>
        <div class="stream-client-name">${esc(cl.n)}</div>
        ${cl.stato?`<div class="stream-client-sub">${esc(cl.stato)}</div>`:''}
      </td>
      <td style="text-align:right;color:var(--text-3);">${clJobs.length||'—'}</td>
      <td style="text-align:right;">${totBudget?'€'+totBudget.toLocaleString('it-IT'):'—'}</td>
      <td style="text-align:right;color:var(--text-3);">${totUsed?'€'+totUsed.toLocaleString('it-IT'):'—'}</td>
      <td style="text-align:right;" class="${profit>0?'stream-profit pos':profit<0?'stream-profit neg':''}">${totBudget?'€'+profit.toLocaleString('it-IT'):'—'}</td>
      <td style="color:var(--text-3);">${esc(cl.pkg||'—')}</td>
      <td><span class="stream-status ${cl.stato==='Attivo'?'inplay':cl.stato==='Inattivo'?'archived':''}">${esc(cl.stato||'—')}</span></td>
    `;
    tr.onclick = () => { streamSetTab('jobs'); setTimeout(()=>{ document.getElementById('stream-search').value=cl.n; streamRender(); },50); };
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  el.innerHTML = '';
  el.appendChild(table);
}

/* ── Vista JOBS ──────────────────────────────────────── */
function streamRenderJobs(){
  const el = document.getElementById('stream-jobs-view');
  const q  = document.getElementById('stream-search')?.value.toLowerCase() || '';
  const allJobs = Object.values(stream_v1).filter(j =>
    !q || j.title?.toLowerCase().includes(q) || streamClientName(j.client).toLowerCase().includes(q)
  );

  if(!allJobs.length){
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3);"><div style="font-size:32px;margin-bottom:10px;">📋</div>Nessun job. Clicca "+ Nuovo Job".</div>';
    return;
  }

  // Raggruppa per cliente
  const byClient = {};
  allJobs.forEach(j => { if(!byClient[j.client])byClient[j.client]=[]; byClient[j.client].push(j); });

  el.innerHTML = '';

  // Header tabella (sticky)
  const headerDiv = document.createElement('div');
  headerDiv.style.cssText = 'position:sticky;top:0;z-index:3;background:var(--bg);';
  headerDiv.innerHTML = `<table class="stream-table" style="width:100%;"><thead><tr>
    <th style="width:14px;"></th>
    <th>Nome Job</th>
    <th class="right">Budget / Usato</th>
    <th style="width:140px;">Ore</th>
    <th class="right">Profitto</th>
    <th style="width:100px;">Scadenza</th>
    <th style="width:100px;">Stato</th>
  </tr></thead></table>`;
  el.appendChild(headerDiv);

  // Clienti con i loro job
  const sortedClients = Object.keys(byClient).sort((a,b)=>streamClientName(a).localeCompare(streamClientName(b)));
  sortedClients.forEach(slug => {
    const clJobs = byClient[slug];
    const clColor = streamClientColor(slug);
    const clName  = streamClientName(slug);
    const collapsed = _streamGroupCollapsed[slug];
    const clBudget = clJobs.reduce((s,j)=>s+streamJobBudget(j),0);
    const clProfit = clBudget - clJobs.reduce((s,j)=>s+streamJobUsed(j),0);

    const group = document.createElement('div');
    group.className = 'stream-group';

    // Group header
    const head = document.createElement('div');
    head.className = 'stream-group-head';
    head.innerHTML = `
      <span style="font-size:12px;color:var(--text-3);margin-right:2px;">${collapsed?'▶':'▼'}</span>
      <span class="stream-client-dot" style="background:${clColor};"></span>
      <span class="stream-group-name">${esc(clName)}</span>
      <span class="stream-group-meta">(${clJobs.length} job)</span>
      <div style="flex:1;"></div>
      <span style="font-size:var(--fs-xs);color:var(--text-3);">€${clBudget.toLocaleString('it-IT')}</span>
      <span class="stream-group-meta">·</span>
      <span class="stream-group-meta ${clProfit>=0?'stream-profit pos':'stream-profit neg'}">€${clProfit.toLocaleString('it-IT')}</span>
    `;
    head.onclick = () => { _streamGroupCollapsed[slug]=!collapsed; streamRenderJobs(); };
    group.appendChild(head);

    if(!collapsed){
      const table = document.createElement('table');
      table.className = 'stream-table';
      const tbody = document.createElement('tbody');

      clJobs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).forEach(j => {
        const budget   = streamJobBudget(j);
        const used     = streamJobUsed(j);
        const profit   = budget - used;
        const oreStim  = streamJobOreStim(j);
        const oreUsed  = streamJobOreUsed(j);
        const pct      = oreStim>0 ? Math.min(100,Math.round(oreUsed/oreStim*100)) : 0;
        const barColor = pct>90?'#dc2626':pct>70?'#d97706':'var(--green)';
        const stCfg    = STREAM_STATI[j.stato]||STREAM_STATI.inplay;

        // Scadenza relativa
        let scadStr = '—';
        if(j.dataEnd){
          const days=Math.round((new Date(j.dataEnd)-new Date())/864e5);
          const abs=Math.abs(days);
          if(days<0) scadStr=`<span style="color:#dc2626;">${abs}gg fa</span>`;
          else if(days<7) scadStr=`<span style="color:#d97706;">tra ${days}gg</span>`;
          else scadStr=`<span style="color:var(--text-3);">${j.dataEnd}</span>`;
        }

        const isActive = j.stato === 'inplay';
        const tr = document.createElement('tr');
        tr.className = 'stream-job-row' + (isActive ? ' stream-job-active' : '');
        if(isActive) {
          // Card nera (fitness app pattern) per job in corso
          tr.style.cssText = 'background:#111;color:#fff;border-radius:8px;';
        }

        // Dot progress bar con badge N/Tot (fitness app pattern)
        const dotBar = `<div style="display:flex;align-items:center;gap:8px;min-width:140px;">
          <span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;
            background:${pct>=100?'#00cc00'+'33':pct>0?'#d97706'+'33':'rgba(255,255,255,.08)'};
            color:${pct>=100?'#00cc00':pct>0?'#d97706':isActive?'rgba(255,255,255,.4)':'var(--text-3)'};
            border:0.5px solid ${pct>=100?'#00cc00'+'66':pct>0?'#d97706'+'55':'rgba(255,255,255,.15)'};
            white-space:nowrap;">${oreUsed}h/${oreStim}h</span>
          <div style="flex:1;height:3px;background:${isActive?'rgba(255,255,255,.12)':'var(--border-lt)'};
            border-radius:99px;position:relative;overflow:visible;">
            <div style="position:absolute;top:0;left:0;height:100%;width:${pct}%;border-radius:99px;
              background:${barColor};transition:width .25s;"></div>
            ${pct>0&&pct<100?`<div style="position:absolute;top:50%;left:${pct}%;
              transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;
              background:${barColor};border:1.5px solid ${isActive?'#111':'var(--surface)'};"></div>`:''}
          </div>
        </div>`;

        // Pill orario scadenza (fitness app pill pattern)
        const pillScad = j.dataEnd ? `<span style="display:inline-flex;align-items:center;gap:4px;
          padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;
          background:${isActive?'rgba(255,255,255,.12)':'var(--surface-lt)'};
          color:${isActive?'#fff':'var(--text-2)'};">${scadStr}</span>` : scadStr;

        tr.innerHTML = `
          <td style="padding-left:24px;">
            <span style="font-size:10px;font-weight:600;color:${isActive?'rgba(255,255,255,.4)':'var(--text-3)'};">#${j.num||'—'}</span>
          </td>
          <td>
            <div style="display:flex;flex-direction:column;gap:2px;">
              <span style="font-weight:700;font-size:13px;color:${isActive?'#fff':'var(--text-primary)'};">
                ${esc(j.emoji||'')} ${esc(j.title||'Job senza titolo')}</span>
              ${isActive?`<span style="font-size:10px;color:rgba(255,255,255,.45);">${streamClientName(j.client)||''}</span>`:''}
            </div>
          </td>
          <td style="text-align:right;">
            <span style="font-weight:700;color:${isActive?'#fff':'var(--text-primary)'};">€${budget.toLocaleString('it-IT')}</span>
            <span style="color:${isActive?'rgba(255,255,255,.4)':'var(--text-3)'};font-size:10px;"> / €${used.toLocaleString('it-IT')}</span>
          </td>
          <td>${dotBar}</td>
          <td style="text-align:right;" class="${profit>0?'stream-profit pos':profit<0?'stream-profit neg':''}">
            <span style="color:${isActive?profit>0?'#4ade80':profit<0?'#f87171':'rgba(255,255,255,.5)':''}"}>€${profit.toLocaleString('it-IT')}</span>
          </td>
          <td>${pillScad}</td>
          <td>
            ${isActive
              ? `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;
                  font-size:11px;font-weight:700;background:rgba(255,255,255,.12);color:#fff;">
                  <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;"></span>
                  In corso</span>`
              : `<span class="stream-status ${stCfg.cls}">${stCfg.l}</span>`
            }
          </td>
        `;
        tr.onclick = () => streamOpenPanel(j.id);
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      group.appendChild(table);
    }
    el.appendChild(group);
  });
}

/* ── Nuovo Job ───────────────────────────────────────── */
function streamNewJob(){
  const id = streamUID();
  const num = Object.keys(stream_v1).length + 1;
  const defaultClient = _streamClients[0]?.slug || clients[0]?.id || '';
  stream_v1[id] = {
    id, num, title:'', client: defaultClient,
    stato:'inplay', emoji:'🚀', budget:0,
    dataStart:'', dataEnd:'',
    phases:[], createdAt: Date.now()
  };
  streamPersist();
  streamOpenPanel(id);
  streamRender();
}

function streamNewClient(){
  showToast('I clienti vengono da NassaPED — aggiungili lì', 'info');
}

function streamDeleteJob(id){
  if(!id||!stream_v1[id])return;
  const snap={...stream_v1[id]};
  delete stream_v1[id];
  streamPersist();streamClosePanel();streamRender();streamRenderKpi();
  showToast('"'+(snap.title||'Job')+'" eliminato',true);
  undoStack={type:'streamDel',snap};
}

/* ── Panel job ───────────────────────────────────────── */
function streamOpenPanel(id){
  _streamCurrentJobId = id;
  // Apre la vista dettaglio job (pagina completa dentro stream-view)
  document.getElementById('stream-clients-view').style.display='none';
  document.getElementById('stream-jobs-view').style.display='none';
  document.getElementById('stream-job-detail').style.display='flex';
  document.getElementById('stream-new-btn').style.display='none';
  document.getElementById('stream-search').style.display='none';
  // Reset tab
  sjdSetTab('plan');
  sjdRender(id);
}
function streamCloseDetail(){
  document.getElementById('stream-job-detail').style.display='none';
  document.getElementById('stream-new-btn').style.display='';
  document.getElementById('stream-search').style.display='';
  streamSetTab(_streamTab);
}
function streamClosePanel(){
  // Legacy — usa streamCloseDetail
  streamCloseDetail();
}
function streamPanelSetStato(v){
  const j=stream_v1[_streamCurrentJobId];if(!j)return;
  j.stato=v;streamPersist();streamRenderKpi();
  // Aggiorna la riga nella lista senza full re-render
  streamRenderJobs();
}

function streamRenderPanel(id){
  const j=stream_v1[id];if(!j)return;
  // Aggiorna header
  document.getElementById('stream-panel-title').textContent=(j.emoji||'📋')+' '+(j.title||'Nuovo Job');
  const stSel=document.getElementById('stream-panel-stato');
  if(stSel)stSel.value=j.stato||'inplay';

  const body=document.getElementById('stream-panel-body');
  body.innerHTML='';

  /* ── Sezione info ── */
  const info=document.createElement('div');
  info.style.cssText='padding:14px 20px;border-bottom:.5px solid var(--border);background:var(--bg);';

  // Titolo editabile
  const inpTit=document.createElement('input');
  inpTit.style.cssText='width:100%;border:none;outline:none;background:transparent;font-size:20px;font-weight:800;font-family:var(--font);color:var(--text);letter-spacing:-.02em;margin-bottom:10px;display:block;';
  inpTit.value=j.title||'';inpTit.placeholder='Titolo job…';
  inpTit.oninput=e=>{j.title=e.target.value;streamPersist();document.getElementById('stream-panel-title').textContent=(j.emoji||'📋')+' '+j.title;};
  info.appendChild(inpTit);

  // Fields grid
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;';

  const fld=(label,inp)=>{
    const d=document.createElement('div');
    const l=document.createElement('label');l.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:block;margin-bottom:4px;';l.textContent=label;
    d.appendChild(l);d.appendChild(inp);grid.appendChild(d);
  };

  // Cliente
  const selCl=document.createElement('select');selCl.className='sp-inp';
  _streamClients.forEach(c=>{const o=document.createElement('option');o.value=c.slug;o.textContent=c.n;if(c.slug===j.client)o.selected=true;selCl.appendChild(o);});
  // fallback: clienti Tweek
  if(!_streamClients.length){clients.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.label;if(c.id===j.client)o.selected=true;selCl.appendChild(o);});}
  selCl.onchange=e=>{j.client=e.target.value;streamPersist();streamRenderJobs();};
  fld('Cliente',selCl);

  // N° Job
  const inpNum=document.createElement('input');inpNum.type='number';inpNum.className='sp-inp';inpNum.value=j.num||'';inpNum.placeholder='N°';
  inpNum.onchange=e=>{j.num=parseInt(e.target.value)||0;streamPersist();};
  fld('N° Job',inpNum);

  // Budget
  const inpBudget=document.createElement('input');inpBudget.type='number';inpBudget.className='sp-inp';inpBudget.value=j.budget||0;inpBudget.min='0';
  inpBudget.onchange=e=>{j.budget=parseFloat(e.target.value)||0;streamPersist();streamRenderKpi();};
  fld('Budget €',inpBudget);

  // Date
  const inpStart=document.createElement('input');inpStart.type='date';inpStart.className='sp-inp';inpStart.value=j.dataStart||'';
  inpStart.onchange=e=>{j.dataStart=e.target.value;streamPersist();};
  fld('Data inizio',inpStart);

  const inpEnd=document.createElement('input');inpEnd.type='date';inpEnd.className='sp-inp';inpEnd.value=j.dataEnd||'';
  inpEnd.onchange=e=>{j.dataEnd=e.target.value;streamPersist();streamRenderJobs();};
  fld('Data fine',inpEnd);

  // Emoji
  const inpEmoji=document.createElement('input');inpEmoji.className='sp-inp';inpEmoji.value=j.emoji||'📋';inpEmoji.style.fontSize='18px';inpEmoji.style.textAlign='center';
  inpEmoji.oninput=e=>{j.emoji=e.target.value;streamPersist();document.getElementById('stream-panel-title').textContent=j.emoji+' '+(j.title||'');};
  fld('Emoji',inpEmoji);

  info.appendChild(grid);body.appendChild(info);

  /* ── Fasi & Item ── */
  const phWrap=document.createElement('div');phWrap.style.padding='14px 20px 20px';

  // Header fasi
  const phHd=document.createElement('div');phHd.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;';
  const phLbl=document.createElement('span');phLbl.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);';phLbl.textContent='Fasi & Item';
  const addPhBtn=document.createElement('button');addPhBtn.style.cssText='background:none;border:none;cursor:pointer;color:var(--green-dk);font-size:var(--fs-xs);font-weight:700;font-family:var(--font);';addPhBtn.textContent='+ Fase';
  addPhBtn.onclick=()=>{if(!j.phases)j.phases=[];j.phases.push({id:streamUID(),title:'',emoji:'📁',items:[]});streamPersist();streamRenderPanel(id);};
  phHd.appendChild(phLbl);phHd.appendChild(addPhBtn);phWrap.appendChild(phHd);

  (j.phases||[]).forEach((phase,pi)=>{
    // KPI fase
    const phOreStim=(phase.items||[]).reduce((s,it)=>s+(it.oreStimate||0),0);
    const phBudget=(phase.items||[]).reduce((s,it)=>s+(it.budget||0),0);
    const phDone=(phase.items||[]).filter(it=>it.stato==='done').length;

    const phEl=document.createElement('div');phEl.className='sp-phase';phEl.style.marginBottom='10px';

    // Phase header
    const phHead=document.createElement('div');phHead.className='sp-phase-head';
    const phEmoji=document.createElement('input');phEmoji.style.cssText='width:26px;border:none;background:transparent;font-size:14px;text-align:center;outline:none;';phEmoji.value=phase.emoji||'📁';
    phEmoji.oninput=e=>{phase.emoji=e.target.value;streamPersist();};
    const phTit=document.createElement('input');phTit.className='sp-phase-title';phTit.value=phase.title||'';phTit.placeholder='Nome fase…';
    phTit.oninput=e=>{phase.title=e.target.value;streamPersist();};
    const phMeta=document.createElement('span');phMeta.style.cssText='font-size:10px;color:var(--text-3);margin-left:auto;display:flex;gap:8px;align-items:center;';
    phMeta.innerHTML=`<span>${phDone}/${(phase.items||[]).length}</span><span>€${phBudget.toLocaleString('it-IT')}</span><span>${phOreStim}h</span>`;
    const phDel=document.createElement('button');phDel.style.cssText='background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:2px 4px;';phDel.textContent='✕';
    phDel.onclick=()=>{if(confirm('Eliminare la fase e tutti i suoi item?')){j.phases.splice(pi,1);streamPersist();streamRenderPanel(id);}};
    phHead.appendChild(phEmoji);phHead.appendChild(phTit);phHead.appendChild(phMeta);phHead.appendChild(phDel);phEl.appendChild(phHead);

    // Items
    (phase.items||[]).forEach((item,ii)=>{
      const itEl=document.createElement('div');itEl.className='sp-item';
      // Check
      const chk=document.createElement('button');
      chk.style.cssText=`width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid ${item.stato==='done'?'var(--green)':'var(--border)'};background:${item.stato==='done'?'var(--green)':'none'};transition:all var(--t);`;
      if(item.stato==='done'){chk.innerHTML='<svg viewBox="0 0 12 12" width="8" height="8" fill="none"><polyline points="2,6 5,9 10,3" stroke="#0a1a00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
      chk.onclick=()=>{item.stato=item.stato==='done'?'todo':'done';streamPersist();streamRenderPanel(id);streamRenderJobs();};
      // Titolo
      const tit=document.createElement('input');tit.className='sp-item-title';tit.value=item.title||'';tit.placeholder='Nome item…';
      tit.style.textDecoration=item.stato==='done'?'line-through':'none';tit.style.opacity=item.stato==='done'?'.5':'1';
      tit.oninput=e=>{item.title=e.target.value;streamPersist();};
      // Ore
      const ore=document.createElement('input');ore.type='number';ore.className='sp-item-ore';ore.value=item.oreStimate||0;ore.title='Ore stimate';ore.min=0;ore.placeholder='0h';
      ore.onchange=e=>{item.oreStimate=parseFloat(e.target.value)||0;streamPersist();streamRenderJobs();};
      // Budget
      const bud=document.createElement('input');bud.type='number';bud.className='sp-item-budget';bud.value=item.budget||0;bud.title='Budget €';bud.min=0;bud.placeholder='€0';
      bud.onchange=e=>{item.budget=parseFloat(e.target.value)||0;streamPersist();streamRenderJobs();streamRenderKpi();};
      // Del
      const del=document.createElement('button');del.style.cssText='background:none;border:none;cursor:pointer;color:var(--text-3);font-size:10px;opacity:0;transition:opacity .1s;padding:2px 4px;';del.textContent='✕';
      itEl.addEventListener('mouseenter',()=>del.style.opacity='1');itEl.addEventListener('mouseleave',()=>del.style.opacity='0');
      del.onclick=()=>{phase.items.splice(ii,1);streamPersist();streamRenderPanel(id);streamRenderJobs();};
      itEl.appendChild(chk);itEl.appendChild(tit);itEl.appendChild(ore);itEl.appendChild(bud);itEl.appendChild(del);phEl.appendChild(itEl);
    });

    // Add item
    const addInp=document.createElement('input');addInp.className='sp-add-inp';addInp.placeholder='+ Aggiungi item… (premi Invio)';
    addInp.onkeydown=e=>{
      if(e.key==='Enter'&&addInp.value.trim()){
        if(!phase.items)phase.items=[];
        phase.items.push({id:streamUID(),title:addInp.value.trim(),stato:'todo',oreStimate:0,oreUsate:0,budget:0,tariffaOraria:0});
        addInp.value='';streamPersist();streamRenderPanel(id);streamRenderJobs();
      }
    };
    phEl.appendChild(addInp);phWrap.appendChild(phEl);
  });

  body.appendChild(phWrap);

  // ── Undo delete ──
  // Undo stream delete
  const origUndo=execUndo;
  if(!window._streamUndoPatched){
    window._streamUndoPatched=true;
    const _orig=execUndo;
    execUndo=function(){
      if(undoStack?.type==='streamDel'){clearTimeout(toastTimer);document.getElementById('toast').classList.remove('show');stream_v1[undoStack.snap.id]=undoStack.snap;streamPersist();streamRender();streamRenderKpi();showToast('Job ripristinato');undoStack=null;return;}
      _orig();
    };
  }
}

function sjdSetTab(tab){
  _sjdTab = tab;
  document.getElementById('sjd-tab-plan').classList.toggle('active', tab==='plan');
  document.getElementById('sjd-tab-kanban').classList.toggle('active', tab==='kanban');
  document.getElementById('sjd-tab-info').classList.toggle('active', tab==='info');
  document.getElementById('sjd-plan').style.display = tab==='plan' ? 'block' : 'none';
  var kb = document.getElementById('sjd-kanban');
  if(kb){ kb.style.display = tab==='kanban' ? 'flex' : 'none'; if(tab==='kanban') kb.style.flexDirection='row'; }
  document.getElementById('sjd-info').style.display = tab==='info' ? 'flex' : 'none';

  if(addPh) addPh.style.display = tab==='plan' ? '' : 'none';

function sjdRender(id){

  const dSt=document.createElement('div');const lSt=document.createElement('label');lSt.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:block;margin-bottom:5px;';lSt.textContent='Stato';dSt.appendChild(lSt);dSt.appendChild(stSel);el.appendChild(dSt);

function sjdBuildItemRow(tbody, jobId, pi, ii, item, phase){
  var isExp = (_sjdExpandedItem === (jobId+'-'+pi+'-'+ii));
  var done = item.stato==='done';
  var usedCost = (item.oreUsate||0)*(item.tariffaOraria||0);
  var stMap = {done:'done',inprogress:'inprogress',todo:'todo'};
  var lbMap = {done:'Fatto',inprogress:'In corso',todo:'Da fare'};
  var stCls = stMap[item.stato||'todo'];
  var stLbl = lbMap[item.stato||'todo'];

  var tr=document.createElement('tr');
  tr.className='sjd-item-tr'+(isExp?' sjd-item-expanded':'');

  // 1. Expand
  var t1=document.createElement('td');
  var eb=document.createElement('button');eb.className='sjd-expand-btn';eb.textContent=isExp?'v':'>';
  (function(jId,pIdx,iIdx,exp){eb.onclick=function(e){e.stopPropagation();_sjdExpandedItem=exp?null:(jId+'-'+pIdx+'-'+iIdx);sjdRenderPlan(jId);};})(jobId,pi,ii,isExp);
  t1.appendChild(eb);tr.appendChild(t1);

  // 2. Nome
  var t2=document.createElement('td');
  var nr=document.createElement('div');nr.style.cssText='display:flex;align-items:center;gap:7px;';
  var chk=document.createElement('button');chk.className='sjd-item-check'+(done?' done':'');
  chk.textContent=done?'*':'';
  (function(jId,pIdx,iIdx){chk.onclick=function(e){e.stopPropagation();sjdToggleItemDone(jId,pIdx,iIdx);};})(jobId,pi,ii);
  var inp=document.createElement('input');inp.className='sjd-item-inp'+(done?' done':'');
  inp.value=item.title||'';inp.placeholder='Nome item...';
  inp.onclick=function(e){e.stopPropagation();};
  inp.oninput=function(e){item.title=e.target.value;streamPersist();};
  nr.appendChild(chk);nr.appendChild(inp);t2.appendChild(nr);tr.appendChild(t2);

  // 3. Date
  var t3=document.createElement('td');
  var dp=document.createElement('span');
  var hasDates=item.dataStart||item.dataEnd;
  dp.className='sjd-date-pill'+(hasDates?'':' sjd-date-empty');
  dp.textContent=hasDates?''+String.fromCodePoint(0x1F4C5)+' '+(item.dataStart||'?')+' - '+(item.dataEnd||'?'):'Set dates';
  (function(jId,pIdx,iIdx){dp.onclick=function(e){e.stopPropagation();_sjdExpandedItem=(jId+'-'+pIdx+'-'+iIdx);sjdRenderPlan(jId);};})(jobId,pi,ii);
  t3.appendChild(dp);tr.appendChild(t3);

  // 4. Team
  var t4=document.createElement('td');
  var td=document.createElement('div');td.className='sjd-team-mini';
  if(!(item.team||[]).length){
    var da=document.createElement('span');da.style.cssText='font-size:10px;color:var(--text-3);cursor:pointer;';da.textContent='+ assegna';
    (function(jId,pIdx,iIdx){da.onclick=function(e){e.stopPropagation();_sjdExpandedItem=(jId+'-'+pIdx+'-'+iIdx);sjdRenderPlan(jId);};})(jobId,pi,ii);
    td.appendChild(da);

/* ══ JOB KANBAN ══ */
function sjdRenderKanban(id){
  var j = stream_v1[id];
  var el = document.getElementById('sjd-kanban');
  if(!j || !el) return;

  // Raccogli tutti gli item da tutte le fasi
  var allItems = [];
  (j.phases||[]).forEach(function(phase, pi){
    (phase.items||[]).forEach(function(item, ii){
      allItems.push({item:item, phase:phase, pi:pi, ii:ii});
    });
  });

  el.innerHTML = '';
  el.style.cssText = 'display:flex;flex:1;overflow:hidden;';

  var COLS = [
    {key:'todo',       label:'Da fare',   count:0},
    {key:'inprogress', label:'In corso',  count:0},
    {key:'done',       label:'Fatto',     count:0},
  ];

  COLS.forEach(function(col){
    var items = allItems.filter(function(x){ return (x.item.stato||'todo') === col.key; });

    var colEl = document.createElement('div');
    colEl.className = 'sjd-kb-col';
    colEl.dataset.stato = col.key;

    // Header colonna
    var head = document.createElement('div');
    head.className = 'sjd-kb-col-head';
    head.innerHTML = '<span class="sjd-kb-col-title">'+col.label+'</span>'
      +'<span class="sjd-kb-col-count">'+items.length+'</span>';
    colEl.appendChild(head);

    // Body
    var body = document.createElement('div');
    body.className = 'sjd-kb-col-body';
    body.dataset.stato = col.key;

    // Drag-over handlers
    body.addEventListener('dragover', function(e){
      e.preventDefault();
      body.classList.add('sjd-kb-drop-over');
    });
    body.addEventListener('dragleave', function(e){
      if(!body.contains(e.relatedTarget)) body.classList.remove('sjd-kb-drop-over');
    });
    body.addEventListener('drop', function(e){
      e.preventDefault();
      body.classList.remove('sjd-kb-drop-over');
      var raw = e.dataTransfer.getData('sjd-item');
      if(!raw) return;
      var d = JSON.parse(raw);
      var targetItem = stream_v1[id].phases[d.pi].items[d.ii];
      if(!targetItem) return;
      var newStato = col.key;
      if(targetItem.stato === newStato) return;
      targetItem.stato = newStato;
      streamPersist();
      sjdRenderKanban(id);
      sjdRenderKpi(id);
      streamRenderJobs();
    });

    items.forEach(function(x){
      body.appendChild(sjdBuildKanbanCard(x.item, x.phase, x.pi, x.ii, id));
    });

    // Add card button
    var addBtn = document.createElement('button');
    addBtn.className = 'sjd-kb-add-btn';
    addBtn.textContent = '+ Item';
    addBtn.onclick = function(){
      var title = prompt('Nome item:');
      if(!title) return;
      // Aggiunge alla prima fase o crea una fase se non esiste
      var j2 = stream_v1[id];
      if(!(j2.phases||[]).length){
        j2.phases = [{id:streamUID(),title:'Fase 1',emoji:'📋',items:[]}];
      }
      j2.phases[0].items.push({
        id:streamUID(), title:title, stato:col.key,
        team:[], teamOre:{}, oreStimate:0, oreUsate:0,
        budget:0, tariffaOraria:0, dataStart:'', dataEnd:'',
        note:'', checklist:[], links:[]
      });
      streamPersist();
      sjdRenderKanban(id);
      sjdRenderKpi(id);
    };
    body.appendChild(addBtn);

    colEl.appendChild(body);
    el.appendChild(colEl);
  });
}

function sjdBuildKanbanCard(item, phase, pi, ii, jobId){
  var card = document.createElement('div');
  card.className = 'sjd-kb-card';
  card.draggable = true;

  // Calcola info
  var clDone = (item.checklist||[]).filter(function(c){return c.done;}).length;
  var clTot  = (item.checklist||[]).length;
  var clPct  = clTot>0 ? Math.round(clDone/clTot*100) : 0;
  var teamAv = (item.team||[]).slice(0,3).map(function(mid){
    var m = JV_MEMBERS.find(function(x){return x.id===mid;})||{n:mid,c:'#888'};
    return '<span class="sjd-av-mini" title="'+esc(m.n)+'" style="background:'+m.c+';width:18px;height:18px;font-size:7px;">'+m.n[0].toUpperCase()+'</span>';
  }).join('');

  var stMap = {todo:'sjd-item-status todo',inprogress:'sjd-item-status inprogress',done:'sjd-item-status done'};
  var lbMap = {todo:'Da fare',inprogress:'In corso',done:'Fatto'};

  card.innerHTML = ''
    +'<div class="sjd-kb-card-title">'+esc(item.title||'Item senza titolo')+'</div>'
    +'<div class="sjd-kb-card-meta">'
    +  '<span style="font-size:10px;color:var(--text-3);">'+esc(phase.phase||phase.title||'')+'</span>'
    +  '<div style="flex:1;"></div>'
    +  (teamAv ? '<div class="sjd-team-mini">'+teamAv+'</div>' : '')
    +'</div>'
    +(clTot>0 ? '<div class="sjd-kb-progress"><div class="sjd-kb-progress-bar" style="width:'+clPct+'%"></div></div>'
              + '<div style="font-size:9px;color:var(--text-3);text-align:right;margin-top:2px;">'+clDone+'/'+clTot+'</div>' : '')
    +(item.note ? '<div style="font-size:10px;color:var(--text-3);margin-top:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">'+esc(item.note)+'</div>' : '');

  // Drag
  card.addEventListener('dragstart', function(e){
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('sjd-item', JSON.stringify({pi:pi, ii:ii}));
    setTimeout(function(){ card.style.opacity='0.4'; }, 0);
  });
  card.addEventListener('dragend', function(){
    card.style.opacity='';
  });

  // Click → vai a Job Plan sull'item
  card.onclick = function(){
    sjdSetTab('plan');
    _sjdExpandedItem = jobId+'-'+pi+'-'+ii;
    sjdRenderPlan(jobId);
    // Scroll verso l'item espanso
