/* ══════════════════════════════════════════════════════════
   TASK MANAGER — Tab Task in Tweek
   Storage: nassaped_tweek_v8 (aggiunge tasks_v2)
   Struttura: Task → Subtask → Step (3 livelli)
══════════════════════════════════════════════════════════ */

let tasks_v2 = {};        // { [id]: TaskObject }
let _tvLayout = 'kanban'; // 'kanban' | 'list'
let _tvCurrentId = null;  // id task aperta nel pannello

const TV_STATI = { todo:'todo', inprogress:'inprogress', done:'done' };
const TV_PRIORITY = { alta:'alta', media:'media', bassa:'bassa' };

// ── Load/Save ────────────────────────────────────────────
function tvLoad(){
  try {
    const raw = localStorage.getItem(SK);
    if(raw){ const p = JSON.parse(raw); tasks_v2 = p.tasks_v2 || {}; }
  } catch(e){}
}
function tvPersist(){
  try {
    const raw = localStorage.getItem(SK);
    const p = raw ? JSON.parse(raw) : {};
    p.tasks_v2 = tasks_v2;
    localStorage.setItem(SK, JSON.stringify(p));
    flashSave();
  } catch(e){}
}
function tvUID(){ return 'tv_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

// setView è ora unificata nella funzione principale

// ── Filtri ────────────────────────────────────────────────
function tvPopulateClientFilter(){
  const sel = document.getElementById('tf-client');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Tutti i clienti</option>';
  clients.forEach(cl => {
    const o = document.createElement('option');
    o.value = cl.id; o.textContent = cl.label;
    if(cl.id === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function tvGetFiltered(){
  const fcl = document.getElementById('tf-client')?.value || '';
  const fst = document.getElementById('tf-stato')?.value || '';
  const fpr = document.getElementById('tf-priority')?.value || '';
  return Object.values(tasks_v2).filter(t =>
    (!fcl || t.client === fcl) &&
    (!fst || t.stato === fst) &&
    (!fpr || t.priority === fpr)
  );
}

function tvSetLayout(l){
  _tvLayout = l;
  document.getElementById('tog-kanban').classList.toggle('active', l==='kanban');
  document.getElementById('tog-list').classList.toggle('active', l==='list');
  document.getElementById('tv-kanban').style.display = l==='kanban' ? 'flex' : 'none';
  document.getElementById('tv-list').style.display = l==='list' ? 'block' : 'none';
  tvRender();
}

// ── Render ────────────────────────────────────────────────
function tvRender(){
  if(_tvLayout === 'kanban') tvRenderKanban();
  else tvRenderList();
}

function tvCardHTML(t){
  const cl = getClient(t.client);
  const {bg, txt, border} = clientStyles(cl);
  const totalSub = (t.subtasks||[]).length;
  const doneSub = (t.subtasks||[]).filter(s => s.stato==='done').length;
  const progress = totalSub > 0 ? Math.round(doneSub/totalSub*100) : (t.stato==='done'?100:0);
  const today = iso(TODAY);
  let scadClass = '';
  if(t.scadenza){
    const days = Math.round((new Date(t.scadenza)-new Date())/(864e5));
    scadClass = days < 0 ? 'expired' : days < 3 ? 'soon' : '';
  }
  const card = document.createElement('div');
  card.className = 'tv-card';
  card.style.borderLeftColor = border;
  card.innerHTML = `
    <div class="tv-card-title">${esc(t.title||'Senza titolo')}</div>
    <div class="tv-card-meta">
      <span class="tv-client-dot" style="background:${cl.color}"></span>
      <span style="font-size:10px;color:var(--text-3);">${esc(cl.label)}</span>
      ${t.priority ? `<span class="tv-priority ${t.priority}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>` : ''}
      ${t.scadenza ? `<span class="tv-scadenza ${scadClass}">⏱ ${t.scadenza}</span>` : ''}
      ${t.assegnatario ? `<span class="tv-assegnatario">👤 ${esc(t.assegnatario)}</span>` : ''}
      ${totalSub ? `<span class="tv-subtask-count" style="margin-left:auto;">${doneSub}/${totalSub} subtask</span>` : ''}
    </div>
    ${totalSub ? `<div class="tv-card-progress"><div class="tv-card-progress-bar" style="width:${progress}%"></div></div>` : ''}
  `;
  card.onclick = () => tvOpenPanel(t.id);
  return card;
}

function tvRenderKanban(){
  ['todo','inprogress','done'].forEach(stato => {
    const body = document.getElementById('kb-body-'+stato);
    const count = document.getElementById('kb-count-'+stato);
    if(!body) return;
    body.innerHTML = '';
    const filtered = tvGetFiltered().filter(t => (t.stato||'todo') === stato);
    count.textContent = filtered.length;
    if(!filtered.length){
      const em = document.createElement('div');
      em.style.cssText = 'padding:20px;text-align:center;color:var(--text-3);font-size:var(--fs-xs);';
      em.textContent = 'Nessuna task';
      body.appendChild(em);
    }
    filtered.sort((a,b) => {
      const po = {alta:0,media:1,bassa:2};
      return (po[a.priority]??1) - (po[b.priority]??1);
    }).forEach(t => body.appendChild(tvCardHTML(t)));
  });
}

function tvRenderList(){
  const el = document.getElementById('tv-list');
  if(!el) return;
  el.innerHTML = '';
  const filtered = tvGetFiltered();
  if(!filtered.length){
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3);">Nessuna task. <button class="btn btn-primary" onclick="tvNewTask()" style="font-size:var(--fs-xs);padding:4px 10px;margin-left:8px;">+ Nuova</button></div>';
    return;
  }
  // Raggruppa per cliente
  const byClient = {};
  filtered.forEach(t => {
    if(!byClient[t.client]) byClient[t.client] = [];
    byClient[t.client].push(t);
  });
  clients.filter(cl => byClient[cl.id]).forEach(cl => {
    const {border} = clientStyles(cl);
    const group = document.createElement('div');
    group.className = 'tv-list-group';
    const gh = document.createElement('div');
    gh.className = 'tv-list-group-title';
    gh.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${cl.color};display:inline-block;"></span>${esc(cl.label)} <span style="font-weight:400;opacity:.6;">(${byClient[cl.id].length})</span>`;
    group.appendChild(gh);
    byClient[cl.id].sort((a,b)=>{const po={alta:0,media:1,bassa:2};return(po[a.priority]??1)-(po[b.priority]??1);}).forEach(t => {
      const row = document.createElement('div');
      row.className = 'tv-list-row';
      row.style.borderLeftColor = border;
      const done = t.stato === 'done';
      row.innerHTML = `
        <button class="tv-list-check${done?' done':''}" onclick="event.stopPropagation();tvToggleDone('${t.id}')"></button>
        <span class="tv-list-title${done?' done':''}">${esc(t.title||'Senza titolo')}</span>
        ${t.priority?`<span class="tv-priority ${t.priority}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>`:''}
        ${t.scadenza?`<span class="tv-scadenza" style="font-size:10px;color:var(--text-3);">⏱ ${t.scadenza}</span>`:''}
        ${t.assegnatario?`<span style="font-size:10px;color:var(--text-3);">👤 ${esc(t.assegnatario)}</span>`:''}
      `;
      row.onclick = () => tvOpenPanel(t.id);
      group.appendChild(row);
    });
    el.appendChild(group);
  });
}

// ── Nuova task ────────────────────────────────────────────
function tvNewTask(){
  const id = tvUID();
  tasks_v2[id] = {
    id, title:'', client: clients[0]?.id||'',
    priority:'media', stato:'todo',
    scadenza:'', assegnatario:'', note:'',
    subtasks: []
  };
  tvPersist();
  tvRender();
  tvOpenPanel(id);
}

// ── Toggle done rapido ────────────────────────────────────
function tvToggleDone(id){
  const t = tasks_v2[id];
  if(!t) return;
  t.stato = t.stato === 'done' ? 'todo' : 'done';
  tvPersist();
  tvRender();
  if(_tvCurrentId === id) tvRenderPanel(id);
}

// ── Elimina task ──────────────────────────────────────────
function tvDeleteTask(id){
  if(!tasks_v2[id]) return;
  const snap = {...tasks_v2[id]};
  delete tasks_v2[id];
  tvPersist();
  tvClosePanel();
  tvRender();
  showToast('"'+esc(snap.title||'Task')+'" eliminata', true);
  undoStack = { type:'tvDelete', snap };
}

// ── Panel ─────────────────────────────────────────────────
function tvOpenPanel(id){
  _tvCurrentId = id;
  document.getElementById('task-panel').style.display = 'flex';
  document.getElementById('task-panel-overlay').style.display = 'block';
  tvRenderPanel(id);
}
function tvClosePanel(){
  _tvCurrentId = null;
  document.getElementById('task-panel').style.display = 'none';
  document.getElementById('task-panel-overlay').style.display = 'none';
}

function tvRenderPanel(id){
  const t = tasks_v2[id];
  if(!t) return;
  document.getElementById('tp-title').textContent = t.title || 'Nuova task';
  const body = document.getElementById('tp-body');
  body.innerHTML = '';

  const mk = (tag,cls,style) => { const el=document.createElement(tag); if(cls)el.className=cls; if(style)el.style.cssText=style; return el; };
  const section = (label) => {
    const s=mk('div','tp-section'); const l=mk('span','tp-label'); l.textContent=label; s.appendChild(l); body.appendChild(s); return s;
  };

  // Titolo
  const sTit = section('Titolo');
  const inpTit = mk('input','tp-input'); inpTit.type='text'; inpTit.value=t.title||''; inpTit.placeholder='Nome task…';
  inpTit.oninput = e => { t.title=e.target.value; document.getElementById('tp-title').textContent=t.title||'Nuova task'; tvSaveLazy(); };
  sTit.appendChild(inpTit);

  // Riga: Cliente + Stato
  const rowCS = mk('div','tp-row'); body.appendChild(rowCS);
  const sClient = mk('div','tp-section'); const lClient=mk('span','tp-label');lClient.textContent='Cliente';sClient.appendChild(lClient);
  const selClient=mk('select','tp-select');
  clients.forEach(cl=>{const o=document.createElement('option');o.value=cl.id;o.textContent=cl.label;if(cl.id===t.client)o.selected=true;selClient.appendChild(o);});
  selClient.onchange=e=>{t.client=e.target.value;tvSaveLazy();tvRender();};
  sClient.appendChild(selClient);rowCS.appendChild(sClient);
  const sStato=mk('div','tp-section');const lStato=mk('span','tp-label');lStato.textContent='Stato';sStato.appendChild(lStato);
  const selStato=mk('select','tp-select');
  [{v:'todo',l:'Da fare'},{v:'inprogress',l:'In corso'},{v:'done',l:'Completato'}].forEach(({v,l})=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(v===t.stato)o.selected=true;selStato.appendChild(o);});
  selStato.onchange=e=>{t.stato=e.target.value;tvSaveLazy();tvRender();};
  sStato.appendChild(selStato);rowCS.appendChild(sStato);

  // Riga: Priorità + Scadenza
  const rowPA = mk('div','tp-row'); body.appendChild(rowPA);
  const sPrio=mk('div','tp-section');const lPrio=mk('span','tp-label');lPrio.textContent='Priorità';sPrio.appendChild(lPrio);
  const selPrio=mk('select','tp-select');
  [{v:'alta',l:'🔴 Alta'},{v:'media',l:'🟡 Media'},{v:'bassa',l:'🟢 Bassa'}].forEach(({v,l})=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(v===t.priority)o.selected=true;selPrio.appendChild(o);});
  selPrio.onchange=e=>{t.priority=e.target.value;tvSaveLazy();tvRender();};
  sPrio.appendChild(selPrio);rowPA.appendChild(sPrio);
  const sScad=mk('div','tp-section');const lScad=mk('span','tp-label');lScad.textContent='Scadenza';sScad.appendChild(lScad);
  const inpScad=mk('input','tp-input');inpScad.type='date';inpScad.value=t.scadenza||'';
  inpScad.onchange=e=>{t.scadenza=e.target.value;tvSaveLazy();tvRender();};
  sScad.appendChild(inpScad);rowPA.appendChild(sScad);

  // Assegnatario
  const sAss=section('Assegnatario');
  const inpAss=mk('input','tp-input');inpAss.type='text';inpAss.value=t.assegnatario||'';inpAss.placeholder='Nome…';
  inpAss.oninput=e=>{t.assegnatario=e.target.value;tvSaveLazy();};
  sAss.appendChild(inpAss);

  // Note
  const sNote=section('Note');
  const ta=mk('textarea','tp-textarea');ta.placeholder='Aggiungi note…';ta.value=t.note||'';
  ta.oninput=e=>{t.note=e.target.value;tvSaveLazy();};
  sNote.appendChild(ta);

  // Separator
  const sep=mk('div','',`border-top:.5px solid var(--border);margin:4px 0 16px;`);
  body.appendChild(sep);

  // SUBTASK
  const sSubLabel=mk('span','tp-label');sSubLabel.textContent='Subtask';sSubLabel.style.display='block';sSubLabel.style.marginBottom='8px';body.appendChild(sSubLabel);

  (t.subtasks||[]).forEach((st,si) => {
    const stWrap=mk('div','st-item');

    // Checkbox subtask
    const stCheck=mk('button','st-check'+(st.stato==='done'?' done':''));
    stCheck.onclick=()=>{st.stato=st.stato==='done'?'todo':'done';tvSaveLazy();tvRenderPanel(id);tvRender();};
    stWrap.appendChild(stCheck);

    const stBody=mk('div','st-body');
    // Titolo subtask editabile
    const stTit=mk('input','',`width:100%;border:none;background:transparent;font-size:var(--fs-sm);font-weight:500;color:var(--text);font-family:var(--font);padding:0;outline:none;${st.stato==='done'?'text-decoration:line-through;opacity:.5':''}`);
    stTit.value=st.title||'';stTit.placeholder='Titolo subtask…';
    stTit.oninput=e=>{st.title=e.target.value;tvSaveLazy();};
    stBody.appendChild(stTit);

    // Meta subtask
    const stMeta=mk('div','st-meta');
    // Assegnatario subtask
    const stAss=mk('input','',`font-size:10px;border:none;background:transparent;color:var(--text-3);font-family:var(--font);width:90px;padding:0;outline:none;`);
    stAss.value=st.assegnatario||'';stAss.placeholder='👤 Assegnatario';
    stAss.oninput=e=>{st.assegnatario=e.target.value;tvSaveLazy();};
    stMeta.appendChild(stAss);
    // Scadenza subtask
    const stScad=mk('input','',`font-size:10px;border:none;background:transparent;color:var(--text-3);font-family:var(--font);padding:0;outline:none;`);
    stScad.type='date';stScad.value=st.scadenza||'';
    stScad.onchange=e=>{st.scadenza=e.target.value;tvSaveLazy();};
    stMeta.appendChild(stScad);
    stBody.appendChild(stMeta);

    // STEPS
    const stepList=mk('div','step-list');
    (st.steps||[]).forEach((step,pi) => {
      const stepRow=mk('div','step-item');
      const stepChk=mk('button','step-check'+(step.done?' done':''));
      stepChk.onclick=()=>{step.done=!step.done;tvSaveLazy();tvRenderPanel(id);};
      const stepTit=mk('span','step-title'+(step.done?' done':''));stepTit.textContent=step.title||'';
      stepTit.contentEditable='true';stepTit.style.outline='none';
      stepTit.oninput=e=>{step.title=e.target.textContent;tvSaveLazy();};
      const stepDel=mk('button','step-del');stepDel.textContent='✕';
      stepDel.onclick=()=>{st.steps.splice(pi,1);tvSaveLazy();tvRenderPanel(id);};
      stepRow.appendChild(stepChk);stepRow.appendChild(stepTit);stepRow.appendChild(stepDel);
      stepList.appendChild(stepRow);
    });
    stBody.appendChild(stepList);

    // + Aggiungi step
    const addStep=mk('button','tv-add-btn');addStep.textContent='+ Step';addStep.style.fontSize='10px';addStep.style.padding='3px 8px';
    addStep.onclick=()=>{if(!st.steps)st.steps=[];st.steps.push({id:tvUID(),title:'',done:false});tvSaveLazy();tvRenderPanel(id);};
    stBody.appendChild(addStep);

    stWrap.appendChild(stBody);

    // Elimina subtask
    const stDel=mk('button','',`background:none;border:none;cursor:pointer;color:var(--text-3);font-size:12px;padding:2px 4px;flex-shrink:0;opacity:0;transition:opacity .1s;`);
    stDel.textContent='✕';
    stDel.onmouseenter=()=>stDel.style.opacity='1';stDel.onmouseleave=()=>stDel.style.opacity='0';
    stWrap.addEventListener('mouseenter',()=>stDel.style.opacity='1');
    stWrap.addEventListener('mouseleave',()=>stDel.style.opacity='0');
    stDel.onclick=()=>{t.subtasks.splice(si,1);tvSaveLazy();tvRenderPanel(id);tvRender();};
    stWrap.appendChild(stDel);

    body.appendChild(stWrap);
  });

  // + Aggiungi subtask
  const addSub=mk('button','tv-add-btn');addSub.textContent='+ Subtask';
  addSub.onclick=()=>{
    if(!t.subtasks)t.subtasks=[];
    t.subtasks.push({id:tvUID(),title:'',stato:'todo',assegnatario:'',scadenza:'',steps:[]});
    tvSaveLazy();tvRenderPanel(id);
  };
  body.appendChild(addSub);
}

let _tvSaveTimer=null;
function tvSaveLazy(){
  clearTimeout(_tvSaveTimer);
  _tvSaveTimer=setTimeout(()=>{tvPersist();tvRender();},600);
}

// ── Undo esteso per tvDelete ──────────────────────────────
const _origExecUndo = execUndo;
execUndo = function(){
  if(undoStack?.type === 'tvDelete'){
    clearTimeout(toastTimer);
    document.getElementById('toast').classList.remove('show');
    tasks_v2[undoStack.snap.id] = undoStack.snap;
    tvPersist(); tvRender();
    showToast('Task ripristinata');
    undoStack = null;
    return;
  }
  _origExecUndo();
};

// ── Init ──────────────────────────────────────────────────
tvLoad();

</script>
</body>
</html>
