<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<link rel="stylesheet" href="/nassa-tokens.css"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nassa Studio · NassaTime</title>
<style>
/* ══ NASSAPED DESIGN SYSTEM ══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Brand */

  /* Surface */

  /* Typography */

  /* Spacing */

  /* Radius */

  /* Shadows */

  /* Transitions */

  /* Layout */
}

/* Dark mode */
[data-theme="dark"]{
  --bg:#0f0f10;--surface:#1a1a1e;
  --border:#222228;--border-lt:#222228;
  --text:#f0f0f2;--text-2:#9ca3af;--text-3:#6b7280;
  --placeholder:#374151;
  --green-lt:#0d2b0c;--green-mid:#1a4d18;--green-text:#0a1a00;
  --amber:#3a3500;--amber-dk:#f0d060;--amber-lt:#2a2800;
  --blue:#0a1628;--blue-dk:#60a5fa;
  --red-lt:#450a0a;--red-dk:#fca5a5;
}

/* ══ BASE ══ */
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  font-size:var(--fs-base);
  line-height:var(--lh-base);
}

/* ══ TOPBAR — identica a NassaPED ══ */
.topbar{
  height:var(--topbar);
  background:var(--surface);
  border-bottom:var(--bw) solid var(--border);
  display:flex;align-items:center;
  gap:var(--sp-2);padding:0 var(--sp-4);
  position:sticky;top:0;z-index:200;
  flex-shrink:0;
}
.brand-mark{
  width:32px;height:32px;border-radius:var(--rs);
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:var(--fs-sm);font-weight:800;color:#111;
  letter-spacing:var(--ls-tight);flex-shrink:0;
}
.brand-name{
  font-size:var(--fs-sm);font-weight:700;
  color:var(--text);letter-spacing:var(--ls-tight);
  margin-right:var(--sp-3);
}
.brand-sub{
  font-size:var(--fs-xs);color:var(--text-3);
  font-weight:500;letter-spacing:var(--ls-wide);
  text-transform:uppercase;
  padding:2px 8px;border-radius:var(--r-pill);
  border:var(--bw) solid var(--border);
  background:var(--bg);
}

/* Nav buttons */
.nav-sep{width:var(--bw);height:20px;background:var(--border);flex-shrink:0;margin:0 var(--sp-2);}
.period-label{font-size:var(--fs-sm);font-weight:600;color:var(--text);min-width:160px;letter-spacing:var(--ls-tight);}
.topbar-spacer{flex:1;}
.save-ind{
  font-size:var(--fs-xs);color:var(--green-dk);
  display:flex;align-items:center;gap:4px;
  opacity:0;transition:opacity .3s;font-weight:600;
}
[data-theme="dark"] .save-ind{color:var(--green);}
.save-ind.show{opacity:1;}
.save-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-1);
  border:none;cursor:pointer;font-family:var(--font);
  transition:all var(--t-fast);border-radius:var(--rs);
  font-size:var(--fs-xs);font-weight:600;
  padding:4px 10px;
}
.btn-icon{width:32px;height:32px;padding:0;border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);}
.btn-icon:hover{background:var(--bg);color:var(--text);}
.btn-icon.active{background:var(--green-lt);color:var(--green-dk);border-color:var(--green-mid);}
[data-theme="dark"] .btn-icon.active{color:var(--green);}
.btn-ghost{background:transparent;border:var(--bw) solid var(--border);color:var(--text-2);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-primary{background:var(--green);color:var(--green-text);border:none;}
.btn-primary:hover{opacity:.9;}
.btn-danger:hover{background:var(--red-lt);color:var(--red-dk);}

/* View toggle */
.view-toggle{display:flex;border:var(--bw) solid var(--border);border-radius:var(--rs);overflow:hidden;}
.vt-btn{padding:4px 12px;font-size:var(--fs-xs);font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-family:var(--font);letter-spacing:var(--ls-normal);}
.vt-btn.active{background:var(--green);color:var(--green-text);}
.vt-btn:not(.active):hover{background:var(--bg);color:var(--text);}

/* Export */
.btn-export{
  background:var(--green-lt);color:var(--green-dk);
  border:var(--bw) solid var(--green-mid);
  font-weight:700;font-size:var(--fs-xs);
  padding:4px 12px;
}
.btn-export:hover{background:var(--green);color:var(--green-text);}
[data-theme="dark"] .btn-export{color:var(--green);background:var(--green-lt);}

/* Legend */
.cl-legend{display:flex;gap:var(--sp-2);flex-wrap:wrap;align-items:center;}
.cl-dot{display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);color:var(--text-3);}
.cl-dot-circle{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* ══ CLIENTS PANEL ══ */
.clients-panel{
  background:var(--surface);
  border-bottom:var(--bw) solid var(--border);
  display:none;padding:var(--sp-4);
}
.clients-panel.open{display:block;}
.cp-title{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:var(--ls-wide);color:var(--text-3);margin-bottom:var(--sp-3);}
.cp-list{display:flex;flex-direction:column;gap:var(--sp-2);margin-bottom:var(--sp-3);}
.cp-row{
  display:flex;align-items:center;gap:var(--sp-2);
  padding:8px 10px;border-radius:var(--r);
  border:var(--bw) solid var(--border);
  background:var(--bg);
}
.cp-color{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;}
.cp-color input[type=color]{position:absolute;inset:-3px;opacity:0;cursor:pointer;width:calc(100%+6px);height:calc(100%+6px);}
.cp-name-input{
  flex:1;font-size:var(--fs-sm);padding:4px 7px;
  border-radius:var(--rs);border:var(--bw) solid var(--border);
  background:var(--surface);color:var(--text);font-family:var(--font);
}
.cp-name-input:focus{outline:none;border-color:var(--green);}
.cp-count{font-size:var(--fs-xs);color:var(--text-3);min-width:50px;text-align:right;}
.cp-del{
  width:22px;height:22px;border-radius:var(--rs);
  border:none;background:none;cursor:pointer;
  color:var(--text-3);font-size:var(--fs-sm);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cp-del:hover{background:var(--red-lt);color:var(--red-dk);}
.cp-del:disabled{opacity:.3;cursor:not-allowed;}
.cp-add{display:flex;align-items:center;gap:var(--sp-2);}
.cp-add-input{
  flex:1;font-size:var(--fs-sm);padding:6px 10px;
  border-radius:var(--r);border:var(--bw) solid var(--border);
  background:var(--bg);color:var(--text);font-family:var(--font);
}
.cp-add-input:focus{outline:none;border-color:var(--green);}
.cp-add-color{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden;}
.cp-add-color input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100%+8px);height:calc(100%+8px);}
.cp-hint{font-size:var(--fs-xs);color:var(--text-3);margin-top:var(--sp-2);}

/* ══ HINT BAR ══ */
.hint-bar{
  font-size:var(--fs-xs);color:var(--text-3);
  padding:5px var(--sp-4);
  border-bottom:var(--bw) solid var(--border);
  display:flex;align-items:center;gap:var(--sp-2);
  background:var(--bg);letter-spacing:var(--ls-normal);
}

/* ══ WEEK VIEW ══ */
.cal-wrap{overflow-x:auto;flex:1;}
.cal{display:grid;min-width:520px;}
.cal-head{display:grid;grid-template-columns:52px repeat(7,minmax(0,1fr));border-bottom:var(--bw) solid var(--border);}
.ch-empty{padding:var(--sp-2);}
.ch-day{padding:10px var(--sp-2);text-align:center;border-left:var(--bw) solid var(--border);cursor:pointer;transition:background var(--t);}
.ch-day:hover{background:var(--bg);}
.ch-wd{font-size:var(--fs-xs);color:var(--text-3);text-transform:uppercase;letter-spacing:var(--ls-wide);display:block;font-weight:700;}
.ch-num{font-size:22px;font-weight:300;color:var(--text);display:block;line-height:1.2;margin-top:2px;letter-spacing:var(--ls-tight);}
.ch-day.today .ch-num{
  color:var(--green-text);background:var(--green);
  border-radius:50%;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  margin:2px auto 0;font-weight:800;font-size:16px;
}
.cal-body{display:grid;grid-template-columns:52px repeat(7,minmax(0,1fr));}
.time-col{display:flex;flex-direction:column;}
.time-slot{height:52px;padding:0 var(--sp-2);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:4px;}
.time-slot span{font-size:var(--fs-xs);color:var(--text-3);}
.day-col{border-left:var(--bw) solid var(--border);}
.hour-cell{
  height:52px;border-bottom:var(--bw) solid var(--border-lt);
  position:relative;cursor:pointer;
  transition:background var(--t-fast);
}
.hour-cell:hover{background:rgba(13,255,0,.03);}
[data-theme="dark"] .hour-cell:hover{background:rgba(13,255,0,.05);}
.hour-cell:hover .add-hint{opacity:1;}
.add-hint{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity var(--t-fast);pointer-events:none;
}
.add-hint span{font-size:var(--fs-xs);color:var(--green-dk);font-weight:600;letter-spacing:var(--ls-normal);}
[data-theme="dark"] .add-hint span{color:var(--green);}
.hour-cell.drop-over{
  background:var(--green-lt);
  outline:1.5px dashed var(--green);
  outline-offset:-2px;
}

/* ══ TASK ══ */
.task{
  border-radius:var(--rs);padding:5px 8px;
  margin:2px 3px;font-size:var(--fs-xs);
  border-left:2px solid transparent;
  position:relative;
  transition:opacity .2s,transform .2s,box-shadow var(--t-fast);
  line-height:1.3;
}
.task[draggable="true"]{cursor:grab;}
.task:hover{box-shadow:var(--shadow-md);z-index:2;}
.task.is-dragging{opacity:.25;transform:scale(.96);}
.task:hover .task-delete{opacity:1;}
.task:hover .task-edit-hint{opacity:1;}
.task.done .task-text{text-decoration:line-through;opacity:.5;}
.task-row{display:flex;align-items:flex-start;gap:4px;padding-right:16px;}
.check-btn{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid currentColor;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin-top:1px;background:none;padding:0;
  transition:all var(--t-fast);
}
.check-btn.checked{background:currentColor;}
.check-btn.checked::after{content:'';width:4px;height:2.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.task-text{font-size:var(--fs-xs);line-height:1.35;flex:1;color:inherit;font-weight:500;}
.task-meta{font-size:10px;opacity:.7;margin-top:1px;display:flex;align-items:center;gap:6px;}
.task-edit-hint{font-size:10px;opacity:0;transition:opacity var(--t-fast);color:inherit;margin-left:auto;}
.task-delete{
  position:absolute;top:3px;right:3px;
  width:14px;height:14px;border-radius:var(--r-xs);
  border:none;background:rgba(0,0,0,.1);color:inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity var(--t-fast);padding:0;font-size:10px;
}
.task-delete:hover{background:rgba(163,45,45,.2);color:#A32D2D;}
.task.editing{cursor:default;z-index:10;outline:2px solid var(--green);outline-offset:1px;}
.inline-editor{display:flex;flex-direction:column;gap:4px;padding:2px 0;}
.ie-text{
  width:100%;font-size:var(--fs-xs);padding:3px 5px;
  border-radius:var(--rs);border:1px solid var(--green);
  background:var(--surface);color:var(--text);
  resize:none;line-height:1.3;font-family:var(--font);
}
.ie-text:focus{outline:none;}
.ie-row{display:flex;gap:4px;align-items:center;}
.ie-time{
  width:58px;font-size:var(--fs-xs);padding:3px 5px;
  border-radius:var(--rs);border:var(--bw) solid var(--border);
  background:var(--surface);color:var(--text);font-family:var(--font);
}
.ie-time:focus{outline:none;border-color:var(--green);}
.ie-clients{display:flex;gap:3px;flex-wrap:wrap;flex:1;}
.ie-cl{width:11px;height:11px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform var(--t-fast);flex-shrink:0;}
.ie-cl:hover{transform:scale(1.2);}
.ie-cl.sel{border-color:#222;transform:scale(1.25);}
.ie-team{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.ie-av{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:transform var(--t-fast);flex-shrink:0;}
.ie-av:hover{transform:scale(1.15);}
.ie-av.sel{border-color:#111;transform:scale(1.2);box-shadow:0 0 0 2px #fff inset;}
.ie-av-none{background:var(--border);color:var(--text-3);font-size:10px;}
.task-assignee{position:absolute;bottom:4px;right:4px;width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.7);pointer-events:none;}
.feed-chip-wrap{padding:2px 4px 0;display:flex;flex-direction:column;gap:2px;}
.feed-chip{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:none;width:100%;text-align:left;line-height:1.3;}
.feed-chip:hover{filter:brightness(.94);}
.feed-chip-type{font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
.feed-chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
#feed-toggle-btn.active{background:var(--green-lt);border-color:var(--green-dk);color:var(--green-text);}

/* ══ ANNO VIEW ══ */
.anno-month{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:box-shadow var(--t-base);}
.anno-month:hover{box-shadow:var(--shadow-md);}
.anno-month-title{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);margin-bottom:8px;}
.anno-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.anno-day{width:100%;aspect-ratio:1;border-radius:2px;background:var(--bg);position:relative;font-size:0;}
.anno-day.has-task{background:var(--green-lt);}
.anno-day.has-feed{background:#dbeafe;}
.anno-day.has-both{background:linear-gradient(135deg,var(--green-lt) 50%,#dbeafe 50%);}
.anno-day.today-dot{outline:2px solid var(--green);outline-offset:1px;}
.anno-day-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--text-3);opacity:0;}
.anno-day:hover .anno-day-num{opacity:1;}
.anno-wd-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.anno-wd{font-size:7px;text-align:center;color:var(--text-3);font-weight:600;}
.anno-legend{display:flex;gap:12px;align-items:center;max-width:900px;margin:0 auto 16px;font-size:11px;color:var(--text-2);}
.anno-legend-dot{width:10px;height:10px;border-radius:2px;}
.anno-year-nav{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto 20px;}
.ie-actions{display:flex;gap:3px;justify-content:flex-end;margin-top:2px;}
.ie-save{font-size:var(--fs-xs);padding:2px 8px;border-radius:var(--rs);border:none;background:var(--green);color:var(--green-text);cursor:pointer;font-weight:700;font-family:var(--font);}
.ie-cancel{font-size:var(--fs-xs);padding:2px 8px;border-radius:var(--rs);border:var(--bw) solid var(--border);background:none;cursor:pointer;color:var(--text-3);font-family:var(--font);}

/* ══ MONTH VIEW ══ */
.month-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:var(--bw) solid var(--border);}
.mh-day{padding:6px 4px;text-align:center;font-size:var(--fs-xs);font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:var(--ls-wide);border-right:var(--bw) solid var(--border);}
.mh-day:last-child{border-right:none;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.m-cell{min-height:80px;border-right:var(--bw) solid var(--border);border-bottom:var(--bw) solid var(--border);padding:5px 6px;cursor:pointer;transition:background var(--t-fast);}
.m-cell:nth-child(7n){border-right:none;}
.m-cell:hover{background:var(--bg);}
.m-cell.other-month{opacity:.35;}
.m-cell.today-cell{background:var(--green-lt);}
[data-theme="dark"] .m-cell.today-cell{background:#0d2b0c;}
.m-cell-num{font-size:var(--fs-xs);font-weight:600;color:var(--text-2);display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;margin-bottom:3px;}
.m-cell.today-cell .m-cell-num{background:var(--green);color:var(--green-text);}
.m-dots{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px;}
.m-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.m-task-pill{
  font-size:10px;padding:1px 5px;border-radius:var(--r-xs);
  border-left:2px solid transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.4;margin-bottom:2px;font-weight:500;
}
.m-task-pill.done{opacity:.4;text-decoration:line-through;}
.m-more{font-size:10px;color:var(--text-3);margin-top:1px;}
.day-detail{border-top:var(--bw) solid var(--border);padding:var(--sp-3) var(--sp-4);background:var(--bg);display:none;}
.day-detail.open{display:block;}
.dd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3);}
.dd-title{font-size:var(--fs-sm);font-weight:700;color:var(--text);}
.dd-actions{display:flex;gap:6px;}
.dd-week-btn{font-size:var(--fs-xs);padding:3px 9px;border-radius:var(--rs);border:var(--bw) solid var(--border);background:none;cursor:pointer;color:var(--green-dk);font-weight:600;font-family:var(--font);}
[data-theme="dark"] .dd-week-btn{color:var(--green);}
.dd-close{width:20px;height:20px;border-radius:var(--rs);border:none;background:none;cursor:pointer;color:var(--text-3);font-size:var(--fs-sm);display:flex;align-items:center;justify-content:center;}
.dd-task{display:flex;align-items:flex-start;gap:var(--sp-2);padding:6px 8px;border-radius:var(--r);border-left:2px solid transparent;margin-bottom:4px;}
.dd-task.done .dd-task-text{text-decoration:line-through;opacity:.5;}
.dd-check{width:13px;height:13px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;padding:0;margin-top:1px;}
.dd-check.checked{background:currentColor;}
.dd-check.checked::after{content:'';width:4px;height:2.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.dd-task-text{font-size:var(--fs-xs);flex:1;line-height:1.4;font-weight:500;}
.dd-task-time{font-size:10px;opacity:.7;}
.dd-empty{font-size:var(--fs-xs);color:var(--text-3);padding:var(--sp-2) 0;}
.dd-add{
  font-size:var(--fs-xs);padding:5px 10px;border-radius:var(--rs);
  border:var(--bw) dashed var(--border);background:none;
  cursor:pointer;color:var(--green-dk);margin-top:4px;
  width:100%;text-align:left;font-weight:600;font-family:var(--font);
  transition:background var(--t-fast);
}
[data-theme="dark"] .dd-add{color:var(--green);}
.dd-add:hover{background:var(--green-lt);}

/* ══ BOTTOM SECTIONS ══ */
.bottom-sections{
  display:grid;grid-template-columns:repeat(3,1fr);
  border-top:var(--bw) solid var(--border);
}
.bs{padding:12px 14px;border-right:var(--bw) solid var(--border);}
.bs:last-child{border-right:none;}
.bs-title{
  font-size:var(--fs-xs);font-weight:700;
  text-transform:uppercase;letter-spacing:var(--ls-wide);
  color:var(--text-3);margin-bottom:var(--sp-2);
  padding-bottom:6px;border-bottom:var(--bw) solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.bs-add{
  width:18px;height:18px;border-radius:var(--r-xs);
  border:var(--bw) solid var(--border);background:none;
  cursor:pointer;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all var(--t-fast);
}
.bs-add:hover{background:var(--green-lt);color:var(--green-dk);}
[data-theme="dark"] .bs-add:hover{background:var(--green-lt);color:var(--green);}
.bs-task{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:var(--bw) solid var(--border-lt);position:relative;}
.bs-task:last-child{border-bottom:none;}
.bs-task:hover .bs-del{opacity:1;}
.bs-check{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;
  cursor:pointer;margin-top:1px;background:none;
  transition:all var(--t-fast);
}
.bs-check:hover{border-color:var(--green);}
.bs-check.checked{background:var(--green);border-color:var(--green);}
.bs-text{font-size:var(--fs-xs);color:var(--text);flex:1;padding-right:18px;cursor:pointer;font-weight:500;line-height:1.4;}
.bs-del{
  position:absolute;right:0;top:4px;width:15px;height:15px;
  border-radius:var(--r-xs);border:none;background:var(--bg);
  color:var(--text-3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity var(--t-fast);font-size:10px;
}
.bs-del:hover{background:var(--red-lt);color:var(--red-dk);}
.bs-task.editing-bottom .bs-text{display:none;}
.bs-inline{display:none;flex:1;}
.bs-task.editing-bottom .bs-inline{display:flex;align-items:center;gap:4px;}
.bs-inline input{
  flex:1;font-size:var(--fs-xs);padding:2px 6px;
  border-radius:var(--rs);border:1px solid var(--green);
  background:var(--surface);color:var(--text);font-family:var(--font);
}
.bs-inline input:focus{outline:none;}
.bs-inline button{
  font-size:var(--fs-xs);padding:2px 7px;border-radius:var(--rs);
  border:none;background:var(--green);color:var(--green-text);
  cursor:pointer;font-family:var(--font);font-weight:700;
}

/* ══ GHOST + TOAST + MODAL ══ */
.ghost{
  position:fixed;pointer-events:none;z-index:9999;
  border-radius:var(--rs);padding:4px 7px;font-size:var(--fs-xs);
  border-left:2px solid transparent;opacity:.85;
  transform:rotate(2deg) scale(1.03);
  max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:none;box-shadow:var(--shadow-lg);font-weight:500;
}
.toast-wrap{position:fixed;bottom:var(--sp-6);left:50%;transform:translateX(-50%);z-index:1000;pointer-events:none;}
.toast{
  background:var(--surface);color:var(--text);
  font-size:var(--fs-xs);font-weight:500;
  padding:8px 12px 8px 14px;border-radius:var(--r);
  border:var(--bw) solid var(--border);
  box-shadow:var(--shadow-lg);
  white-space:nowrap;display:flex;align-items:center;gap:10px;
  opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.toast-undo{
  background:none;border:none;color:var(--green-dk);
  font-size:var(--fs-xs);font-weight:700;cursor:pointer;
  padding:0;font-family:var(--font);
}
[data-theme="dark"] .toast-undo{color:var(--green);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);border-radius:var(--r);
  border:var(--bw) solid var(--border);
  padding:var(--sp-5);width:300px;
  box-shadow:var(--shadow-xl);
}
.modal-title{font-size:var(--fs-base);font-weight:700;color:var(--text);margin-bottom:var(--sp-3);letter-spacing:var(--ls-tight);}
.modal input[type=text]{
  width:100%;font-size:var(--fs-sm);padding:8px 10px;
  border-radius:var(--rs);border:var(--bw) solid var(--border);
  background:var(--bg);color:var(--text);margin-bottom:var(--sp-2);
  font-family:var(--font);
}
.modal input[type=text]:focus{outline:none;border-color:var(--green);}
.modal-label{font-size:var(--fs-xs);font-weight:600;color:var(--text-3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:var(--ls-wide);}
.client-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:var(--sp-3);}
.cg-opt{
  padding:5px 6px;border-radius:var(--rs);
  border:1.5px solid transparent;cursor:pointer;
  font-size:var(--fs-xs);font-weight:600;text-align:center;
  transition:all var(--t-fast);
}
.cg-opt.sel{border-color:rgba(0,0,0,.4);}
.modal-footer{display:flex;gap:6px;justify-content:flex-end;margin-top:var(--sp-2);}
.btn-cancel{padding:6px 14px;font-size:var(--fs-sm);border:var(--bw) solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--text-3);font-family:var(--font);}
.btn-save{padding:6px 14px;font-size:var(--fs-sm);border:none;border-radius:var(--rs);background:var(--green);color:var(--green-text);cursor:pointer;font-weight:700;font-family:var(--font);}

/* ══ LAYOUT ══ */
.app{
  display:flex;flex-direction:column;
  min-height:100vh;
  background:var(--surface);
}
#week-view{display:flex;flex-direction:column;flex:1;}
.cal-wrap{flex:1;}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-pill);}

/* ══ PRINT ══ */
#print-frame{display:none;}
@media print{
  body *{visibility:hidden}
  #print-frame,#print-frame *{visibility:visible}
  #print-frame{display:block;position:fixed;inset:0;background:#fff;font-family:var(--font);font-size:11pt;color:#111;padding:0}
  .pf-page{page-break-after:always;padding:18mm 16mm}
  .pf-page:last-child{page-break-after:avoid}
  .pf-header{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2pt solid #0dff00;padding-bottom:8pt;margin-bottom:16pt}
  .pf-logo{font-size:18pt;font-weight:800;color:#1c1c1e}
  .pf-logo span{color:#0dff00}
  .pf-period{font-size:10pt;color:#555;text-align:right}
  .pf-section-title{font-size:9pt;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin:16pt 0 8pt;border-bottom:.5pt solid #ddd;padding-bottom:4pt}
  .pf-stat-row{display:flex;gap:16pt;margin:12pt 0}
  .pf-stat{background:#f7f7f7;border-radius:4pt;padding:8pt 12pt;min-width:60pt;text-align:center}
  .pf-stat-num{font-size:18pt;font-weight:800;color:#1c1c1e}
  .pf-stat-lbl{font-size:8pt;color:#888;margin-top:2pt}
  .pf-day-row{display:grid;grid-template-columns:65pt 1fr;gap:8pt;padding:4pt 0;border-bottom:.3pt solid #eee}
  .pf-day-label{font-size:9pt;color:#888;font-weight:700;padding-top:3pt}
  .pf-day-tasks{display:flex;flex-direction:column;gap:3pt}
  .pf-client-block{margin-bottom:14pt}
  .pf-client-name{font-size:10pt;font-weight:700;margin-bottom:5pt;display:flex;align-items:center;gap:6pt}
  .pf-client-dot{width:8pt;height:8pt;border-radius:50%;display:inline-block;flex-shrink:0}
  .pf-task-row{display:flex;align-items:flex-start;gap:8pt;padding:4pt 6pt;border-radius:3pt;margin-bottom:3pt;border-left:2.5pt solid transparent}
  .pf-task-text{flex:1;font-size:10pt;line-height:1.3;font-weight:500}
  .pf-task-meta{font-size:8.5pt;color:#666;white-space:nowrap}
  .pf-task-done .pf-task-text{text-decoration:line-through;color:#999}
  .pf-check{width:9pt;height:9pt;border-radius:50%;border:1pt solid currentColor;flex-shrink:0;margin-top:2pt;display:flex;align-items:center;justify-content:center}
  .pf-check.done{background:currentColor}
  .pf-check.done::after{content:'';display:block;width:4pt;height:2.5pt;border-left:1pt solid #fff;border-bottom:1pt solid #fff;transform:rotate(-45deg) translateY(-1pt)}
  .pf-footer{text-align:center;font-size:8pt;color:#aaa;margin-top:16pt;border-top:.3pt solid #eee;padding-top:8pt}
}

/* ══ TASK VIEW ══ */
.tv-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-bottom:.5px solid var(--border);
  flex-wrap:wrap;flex-shrink:0;background:var(--surface);
}
.tv-filter{
  font-size:var(--fs-xs);font-weight:600;font-family:var(--font);
  padding:4px 8px;border-radius:var(--rs);
  border:.5px solid var(--border);background:var(--bg);
  color:var(--text);cursor:pointer;
}
.tv-filter:focus{outline:none;border-color:var(--green);}
.tv-toggle{display:flex;border:.5px solid var(--border);border-radius:var(--rs);overflow:hidden;}
.tv-tog-btn{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;font-size:var(--fs-xs);font-weight:600;
  border:none;background:transparent;cursor:pointer;
  color:var(--text-3);font-family:var(--font);
  transition:all var(--t);
}
.tv-tog-btn.active{background:var(--green);color:var(--green-text);}
.tv-tog-btn:not(.active):hover{background:var(--bg);color:var(--text);}

/* Kanban */
.kb-col{
  flex:1;display:flex;flex-direction:column;
  border-right:.5px solid var(--border);
  min-width:240px;
}
.kb-col:last-child{border-right:none;}
.kb-col-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-bottom:.5px solid var(--border);
  flex-shrink:0;
}
.kb-col-title{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);}
.kb-col-count{
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:var(--r-pill);
  background:var(--bg);color:var(--text-3);
}
.kb-col-body{flex:1;overflow-y:auto;padding:10px 10px 20px;}

/* Task card */
.tv-card{
  background:var(--surface);border:.5px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  margin-bottom:8px;cursor:pointer;
  transition:box-shadow var(--t),transform var(--t),border-color var(--t);
  border-left:3px solid transparent;
}
.tv-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--green);}
.tv-card-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3;}
.tv-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tv-priority{font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r-pill);}
.tv-priority.alta{background:#fee2e2;color:#991b1b;}
.tv-priority.media{background:#fef3c7;color:#92400e;}
.tv-priority.bassa{background:#dcfce7;color:#166534;}
[data-theme="dark"] .tv-priority.alta{background:#450a0a;color:#fca5a5;}
[data-theme="dark"] .tv-priority.media{background:#3a2800;color:#fcd34d;}
[data-theme="dark"] .tv-priority.bassa{background:#0d2b0c;color:#4ade80;}
.tv-scadenza{font-size:10px;color:var(--text-3);}
.tv-scadenza.expired{color:#dc2626;}
.tv-scadenza.soon{color:#d97706;}
.tv-assegnatario{font-size:10px;color:var(--text-3);}
.tv-client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tv-subtask-count{font-size:10px;color:var(--text-3);margin-left:auto;}
.tv-card-progress{
  margin-top:7px;height:3px;border-radius:var(--r-pill);
  background:var(--border);overflow:hidden;
}
.tv-card-progress-bar{height:100%;background:var(--green);border-radius:var(--r-pill);transition:width .3s;}

/* Lista view */
.tv-list-group{margin-bottom:20px;}
.tv-list-group-title{
  font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-3);
  padding:6px 0;border-bottom:.5px solid var(--border);
  margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.tv-list-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;transition:background var(--t);
  border-left:3px solid transparent;
}
.tv-list-row:hover{background:var(--bg);}
.tv-list-check{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;
  cursor:pointer;background:none;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);
}
.tv-list-check.done{background:var(--green);border-color:var(--green);}
.tv-list-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--green-text);border-bottom:1.5px solid var(--green-text);transform:rotate(-45deg) translateY(-1px);display:block;}
.tv-list-title{flex:1;font-size:var(--fs-sm);font-weight:500;color:var(--text);}
.tv-list-title.done{text-decoration:line-through;opacity:.5;}

/* Task panel */
.tp-head{
  display:flex;align-items:center;
  padding:12px 16px;border-bottom:.5px solid var(--border);
  flex-shrink:0;
}
.tp-title{font-size:var(--fs-base);font-weight:700;color:var(--text);letter-spacing:-.01em;}
.tp-body{flex:1;overflow-y:auto;padding:20px 20px 40px;}
.tp-section{margin-bottom:20px;}
.tp-label{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px;display:block;}
.tp-input,.tp-select,.tp-textarea{
  width:100%;font-size:var(--fs-sm);font-family:var(--font);
  padding:7px 10px;border-radius:var(--rs);
  border:.5px solid var(--border);background:var(--bg);color:var(--text);
}
.tp-input:focus,.tp-select:focus,.tp-textarea:focus{outline:none;border-color:var(--green);}
.tp-textarea{resize:vertical;min-height:64px;line-height:1.5;}
.tp-row{display:flex;gap:10px;}
.tp-row .tp-section{flex:1;}

/* Subtask */
.st-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 10px;border-radius:var(--rs);
  border:.5px solid var(--border);background:var(--bg);
  margin-bottom:6px;
}
.st-check{
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;
  cursor:pointer;background:none;margin-top:2px;
  transition:all var(--t);
}
.st-check.done{background:var(--green);border-color:var(--green);}
.st-body{flex:1;min-width:0;}
.st-title{font-size:var(--fs-sm);font-weight:500;color:var(--text);cursor:pointer;}
.st-title.done{text-decoration:line-through;opacity:.5;}
.st-meta{display:flex;gap:8px;margin-top:3px;font-size:10px;color:var(--text-3);}
.st-expand{width:16px;height:16px;border:none;background:none;cursor:pointer;color:var(--text-3);font-size:10px;padding:0;flex-shrink:0;margin-top:2px;}

/* Steps */
.step-list{margin-top:6px;padding-left:4px;}
.step-item{
  display:flex;align-items:center;gap:6px;
  padding:4px 0;border-bottom:.5px solid var(--border-lt);
}
.step-item:last-child{border-bottom:none;}
.step-check{
  width:12px;height:12px;border-radius:3px;
  border:1.5px solid var(--border);flex-shrink:0;
  cursor:pointer;background:none;transition:all var(--t);
}
.step-check.done{background:var(--green);border-color:var(--green);}
.step-title{flex:1;font-size:var(--fs-xs);color:var(--text-2);}
.step-title.done{text-decoration:line-through;opacity:.5;}
.step-del{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:0 3px;opacity:0;transition:opacity var(--t);}
.step-item:hover .step-del{opacity:1;}

/* Add buttons */
.tv-add-btn{
  width:100%;text-align:left;
  border:.5px dashed var(--border);background:none;
  border-radius:var(--rs);padding:6px 10px;
  font-size:var(--fs-xs);color:var(--text-3);
  cursor:pointer;font-family:var(--font);
  transition:all var(--t);margin-top:4px;
}
.tv-add-btn:hover{border-color:var(--green);color:var(--green-dk);}
[data-theme="dark"] .tv-add-btn:hover{color:var(--green);}

/* ══ CARD INLINE EXPANDED ══ */
.tv-card-expanded{
  background:var(--surface);
  box-shadow:var(--shadow-lg);
  border:.5px solid var(--border);
  border-radius:var(--r);
  z-index:10;position:relative;
}
.tv-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tv-inline-check{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;
  cursor:pointer;background:none;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);
}
.tv-inline-check:hover{border-color:var(--green);}
.tv-inline-check.done{background:var(--green);border-color:var(--green);}
.tv-inline-check.done::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--green-text);border-bottom:1.5px solid var(--green-text);transform:rotate(-45deg) translateY(-1px);display:block;}
.tv-card-title{flex:1;font-size:var(--fs-sm);font-weight:600;color:var(--text);line-height:1.3;}
.tv-card-title.done{text-decoration:line-through;opacity:.5;}
.tv-card-del{
  opacity:0;background:none;border:none;cursor:pointer;
  color:var(--text-3);font-size:11px;padding:2px 4px;
  border-radius:var(--r-xs);transition:all var(--t);flex-shrink:0;
}
.tv-card:hover .tv-card-del{opacity:1;}
.tv-card-del:hover{background:var(--red-lt);color:var(--red-dk);}
.tv-card-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.tv-chip{
  font-size:10px;font-weight:500;
  padding:2px 6px;border-radius:var(--r-pill);
  background:var(--bg);border:.5px solid var(--border);
  color:var(--text-2);display:inline-flex;align-items:center;gap:3px;
}
.tv-progress{height:2px;background:var(--border);border-radius:var(--r-pill);margin-top:6px;overflow:hidden;}
.tv-progress-bar{height:100%;background:var(--green);border-radius:var(--r-pill);transition:width .3s;}

/* Card espansa — campi inline */
.tv-title-inp{
  flex:1;border:none;outline:none;background:transparent;
  font-size:var(--fs-sm);font-weight:700;font-family:var(--font);
  color:var(--text);padding:0;
}
.tv-collapse-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-3);font-size:12px;padding:3px 5px;
  border-radius:var(--r-xs);flex-shrink:0;
  transition:all var(--t);
}
.tv-collapse-btn:hover{background:var(--bg);color:var(--text);}

.tv-fields{
  display:flex;flex-wrap:wrap;gap:6px;
  margin:8px 0;padding:8px;
  background:var(--bg);border-radius:var(--rs);
  border:.5px solid var(--border);
}
.tv-field-item{display:flex;flex-direction:column;gap:2px;min-width:0;}
.tv-field-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);}
.tv-field-sel{
  font-size:var(--fs-xs);font-family:var(--font);
  border:.5px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--text);
  padding:3px 6px;
}
.tv-field-sel:focus{outline:none;border-color:var(--green);}

.tv-note-inp{
  width:100%;font-size:var(--fs-xs);font-family:var(--font);
  border:.5px solid var(--border);border-radius:var(--rs);
  background:var(--bg);color:var(--text);
  padding:6px 8px;resize:none;min-height:48px;
  margin:4px 0;line-height:1.5;
}
.tv-note-inp:focus{outline:none;border-color:var(--green);}

.tv-subtasks-wrap{margin-top:8px;}
.tv-sub-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px;}
.tv-subtask{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:var(--rs);border:.5px solid var(--border);background:var(--bg);margin-bottom:4px;}
.tv-sub-check{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;background:none;margin-top:2px;transition:all var(--t);}
.tv-sub-check:hover{border-color:var(--green);}
.tv-sub-check.done{background:var(--green);border-color:var(--green);}
.tv-sub-body{flex:1;min-width:0;}
.tv-sub-title{width:100%;border:none;outline:none;background:transparent;font-size:var(--fs-xs);font-weight:500;font-family:var(--font);color:var(--text);padding:0;}
.tv-sub-title.done{text-decoration:line-through;opacity:.5;}
.tv-sub-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
.tv-sub-field{font-size:10px;font-family:var(--font);border:none;background:transparent;color:var(--text-3);padding:0;outline:none;border-bottom:.5px solid var(--border);}
.tv-sub-field:focus{border-color:var(--green);}
.tv-sub-del{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:10px;opacity:0;transition:opacity var(--t);flex-shrink:0;padding:2px;}
.tv-subtask:hover .tv-sub-del{opacity:1;}
.tv-sub-del:hover{color:var(--red-dk);}

/* Steps */
.tv-steps{margin:4px 0 2px 4px;}
.tv-step{display:flex;align-items:center;gap:5px;padding:2px 0;}
.tv-step-check{width:10px;height:10px;border-radius:2px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;background:none;transition:all var(--t);}
.tv-step-check.done{background:var(--green);border-color:var(--green);}
.tv-step-title{flex:1;font-size:10px;color:var(--text-2);outline:none;line-height:1.4;}
.tv-step-title.done{text-decoration:line-through;opacity:.5;}
.tv-step-del{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:9px;opacity:0;transition:opacity var(--t);}
.tv-step:hover .tv-step-del{opacity:1;}
.tv-add-step{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:10px;padding:2px 4px;font-family:var(--font);transition:color var(--t);}
.tv-add-step:hover{color:var(--green-dk);}
[data-theme="dark"] .tv-add-step:hover{color:var(--green);}
.tv-add-inline{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:var(--fs-xs);padding:4px 0;font-family:var(--font);transition:color var(--t);display:block;margin-top:4px;}
.tv-add-inline:hover{color:var(--green-dk);}
[data-theme="dark"] .tv-add-inline:hover{color:var(--green);}

/* Colonna add button */
.tv-col-add{
  width:100%;text-align:left;border:.5px dashed var(--border);
  background:none;border-radius:var(--rs);padding:7px 10px;
  font-size:var(--fs-xs);color:var(--text-3);cursor:pointer;
  font-family:var(--font);transition:all var(--t);margin-top:2px;
}
.tv-col-add:hover{border-color:var(--green);color:var(--green-dk);}
[data-theme="dark"] .tv-col-add:hover{color:var(--green);}

/* ══ JOBS VIEW ══ */
.jv-sidebar{
  width:260px;flex-shrink:0;
  border-right:.5px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}
.jv-sidebar-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:.5px solid var(--border);flex-shrink:0;
}
.jv-sidebar-title{font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:var(--ls-wide);color:var(--text-3);}
#jv-job-list{flex:1;overflow-y:auto;}

.jv-client-group{border-bottom:.5px solid var(--border);}
.jv-client-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;cursor:pointer;
  font-size:var(--fs-xs);font-weight:700;color:var(--text-2);
  transition:background var(--t);
}
.jv-client-head:hover{background:var(--surface);}
.jv-client-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.jv-job-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px 7px 28px;cursor:pointer;
  font-size:var(--fs-xs);color:var(--text-2);
  border-left:2px solid transparent;
  transition:all var(--t);
}
.jv-job-item:hover{background:var(--surface);color:var(--text);}
.jv-job-item.active{
  background:var(--surface);color:var(--text);font-weight:600;
  border-left-color:var(--green);
}
.jv-job-num{
  font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:var(--r-xs);
  background:var(--bg);color:var(--text-3);
  flex-shrink:0;
}
.jv-job-stato{
  font-size:9px;font-weight:700;padding:1px 5px;
  border-radius:var(--r-pill);flex-shrink:0;margin-left:auto;
}
.jv-job-stato.active{background:#dcfce7;color:#166534;}
.jv-job-stato.on_hold{background:#fef3c7;color:#92400e;}
.jv-job-stato.completed{background:#f3f4f6;color:#6b7280;}
[data-theme="dark"] .jv-job-stato.active{background:#0d2b0c;color:#4ade80;}

.jv-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.jv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;}

/* Job detail */
.jv-job-header{
  padding:16px 20px 12px;border-bottom:.5px solid var(--border);
  flex-shrink:0;background:var(--surface);
}
.jv-job-title-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.jv-job-title-inp{
  flex:1;border:none;outline:none;background:transparent;
  font-size:18px;font-weight:800;font-family:var(--font);
  color:var(--text);letter-spacing:var(--ls-tight);
}
.jv-kpi-row{display:flex;gap:16px;flex-wrap:wrap;}
.jv-kpi{display:flex;flex-direction:column;gap:2px;}
.jv-kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:var(--ls-wide);color:var(--text-3);}
.jv-kpi-value{font-size:var(--fs-base);font-weight:700;color:var(--text);}

/* Progress bar ore */
.jv-ore-bar{height:3px;background:var(--border);border-radius:var(--r-pill);overflow:hidden;margin-top:6px;max-width:300px;}
.jv-ore-bar-fill{height:100%;background:var(--green);border-radius:var(--r-pill);transition:width .3s;}

/* Fasi */
.jv-phases{flex:1;overflow-y:auto;padding:12px 20px 40px;}
.jv-phase{margin-bottom:12px;border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.jv-phase-head{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--bg);
  cursor:pointer;transition:background var(--t);
  border-bottom:.5px solid var(--border);
}
.jv-phase-head:hover{background:var(--border-lt);}
.jv-phase-emoji{font-size:16px;flex-shrink:0;}
.jv-phase-title-inp{
  flex:1;border:none;outline:none;background:transparent;
  font-size:var(--fs-sm);font-weight:700;font-family:var(--font);color:var(--text);
}
.jv-phase-meta{display:flex;align-items:center;gap:8px;font-size:var(--fs-xs);color:var(--text-3);flex-shrink:0;}
.jv-phase-del{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:12px;padding:2px 4px;opacity:0;transition:opacity var(--t);}
.jv-phase-head:hover .jv-phase-del{opacity:1;}

/* Item table */
.jv-items-table{width:100%;border-collapse:collapse;}
.jv-items-table th{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:var(--ls-wide);
  color:var(--text-3);padding:6px 10px;text-align:left;
  border-bottom:.5px solid var(--border);background:var(--bg);
}
.jv-items-table td{
  padding:8px 10px;border-bottom:.5px solid var(--border-lt);
  font-size:var(--fs-xs);color:var(--text-2);vertical-align:middle;
}
.jv-items-table tr:last-child td{border-bottom:none;}
.jv-item-row{cursor:pointer;transition:background var(--t);}
.jv-item-row:hover{background:var(--bg);}
.jv-item-row:hover .jv-item-drag{opacity:1;}
.jv-item-title{font-size:var(--fs-xs);font-weight:600;color:var(--text);}
.jv-stato-pill{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--r-pill);
}
.jv-stato-pill.todo{background:var(--bg);color:var(--text-3);border:.5px solid var(--border);}
.jv-stato-pill.inprogress{background:#dbeafe;color:#1e40af;}
.jv-stato-pill.done{background:#dcfce7;color:#166534;}
[data-theme="dark"] .jv-stato-pill.inprogress{background:#1e3a5f;color:#93c5fd;}
[data-theme="dark"] .jv-stato-pill.done{background:#0d2b0c;color:#4ade80;}

.jv-team-avatars{display:flex;gap:3px;flex-wrap:wrap;}
.jv-avatar{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;flex-shrink:0;
  cursor:default;
}
.jv-item-drag{
  cursor:grab;opacity:0;color:var(--text-3);
  font-size:12px;padding:2px 4px;
  transition:opacity var(--t);
}
.jv-item-drag:active{cursor:grabbing;}
.jv-add-item-row td{padding:6px 10px;}
.jv-add-item-inp{
  width:100%;border:none;outline:none;background:transparent;
  font-size:var(--fs-xs);font-family:var(--font);color:var(--text-3);
  font-style:italic;
}
.jv-add-item-inp:focus{color:var(--text);font-style:normal;}

/* ══ STREAM VIEW ══ */
.stream-nav{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-bottom:.5px solid var(--border);
  flex-shrink:0;background:var(--surface);flex-wrap:wrap;
}
.stream-nav-tabs{display:flex;gap:4px;}
.stream-tab{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:var(--r-pill);
  border:none;background:transparent;cursor:pointer;
  font-size:var(--fs-xs);font-weight:600;color:var(--text-3);
  font-family:var(--font);transition:all var(--t);
}
.stream-tab:hover{background:var(--bg);color:var(--text);}
.stream-tab.active{background:var(--green);color:var(--green-text);}
.stream-kpi-bar{display:flex;gap:16px;font-size:var(--fs-xs);color:var(--text-3);}
.stream-kpi-bar strong{color:var(--text);font-weight:700;}
.stream-search{
  font-size:var(--fs-xs);font-family:var(--font);
  border:.5px solid var(--border);border-radius:var(--rs);
  padding:5px 10px;background:var(--bg);color:var(--text);
  width:160px;
}
.stream-search:focus{outline:none;border-color:var(--green);}

/* Clienti table */
.stream-table{width:100%;border-collapse:collapse;}
.stream-table th{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-3);
  padding:8px 14px;text-align:left;
  border-bottom:.5px solid var(--border);
  background:var(--bg);position:sticky;top:0;z-index:2;
}
.stream-table th.right{text-align:right;}
.stream-table td{
  padding:10px 14px;border-bottom:.5px solid var(--border-lt);
  font-size:var(--fs-xs);color:var(--text);vertical-align:middle;
}
.stream-table tr:last-child td{border-bottom:none;}

/* Clienti row */
.stream-client-row{cursor:pointer;transition:background var(--t);}
.stream-client-row:hover{background:var(--bg);}
.stream-client-row td:first-child{padding-left:10px;}
.stream-client-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.stream-client-name{font-size:var(--fs-sm);font-weight:700;color:var(--text);}
.stream-client-sub{font-size:var(--fs-xs);color:var(--text-3);margin-top:1px;}

/* Jobs raggruppati per cliente */
.stream-group{margin-bottom:0;}
.stream-group-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:var(--bg);
  border-bottom:.5px solid var(--border);
  cursor:pointer;transition:background var(--t);
  position:sticky;top:0;z-index:2;
}
.stream-group-head:hover{background:var(--border-lt);}
.stream-group-name{font-size:var(--fs-xs);font-weight:700;color:var(--text);}
.stream-group-meta{font-size:10px;color:var(--text-3);margin-left:4px;}

/* Job row */
.stream-job-active td:first-child{border-radius:8px 0 0 8px;}
.stream-job-active td:last-child{border-radius:0 8px 8px 0;}
.stream-job-active{overflow:hidden;}
.stream-job-row{cursor:pointer;transition:background var(--t);}
.stream-job-row:hover{background:var(--bg);}
.stream-job-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);}
.stream-job-num{
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:var(--r-xs);
  background:var(--bg);border:.5px solid var(--border);
  color:var(--text-3);margin-right:6px;flex-shrink:0;
}

/* Barra ore */
.stream-ore-bar{
  width:120px;height:6px;
  background:var(--border);border-radius:var(--r-pill);
  overflow:hidden;display:inline-block;vertical-align:middle;
}
.stream-ore-fill{
  height:100%;border-radius:var(--r-pill);
  transition:width .3s;
}

/* Status pill */
.stream-status{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:var(--r-pill);
  white-space:nowrap;
}
.stream-status.inplay{background:#dcfce7;color:#166534;border:.5px solid #86efac;}
.stream-status.completed{background:#f3f4f6;color:#6b7280;border:.5px solid #e5e7eb;}
.stream-status.archived{background:#fef3c7;color:#92400e;border:.5px solid #fcd34d;}
.stream-status.onhold{background:#ede9fe;color:#5b21b6;border:.5px solid #a78bfa;}
[data-theme="dark"] .stream-status.inplay{background:#0d2b0c;color:#4ade80;border-color:#166534;}
[data-theme="dark"] .stream-status.completed{background:#1a1a1e;color:#6b7280;border-color:#374151;}

/* Profitto */
.stream-profit.pos{color:#16a34a;font-weight:700;}
.stream-profit.neg{color:#dc2626;font-weight:700;}
[data-theme="dark"] .stream-profit.pos{color:#4ade80;}

/* Panel job */
.sp-section{margin-bottom:20px;}
.sp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:block;margin-bottom:6px;}
.sp-inp{width:100%;font-size:var(--fs-sm);font-family:var(--font);border:.5px solid var(--border);border-radius:var(--rs);padding:7px 10px;background:var(--bg);color:var(--text);}
.sp-inp:focus{outline:none;border-color:var(--green);}
.sp-row{display:flex;gap:10px;}
.sp-row .sp-section{flex:1;}
.sp-phase{border:.5px solid var(--border);border-radius:var(--rs);margin-bottom:8px;overflow:hidden;}
.sp-phase-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-bottom:.5px solid var(--border);}
.sp-phase-title{flex:1;border:none;outline:none;background:transparent;font-size:var(--fs-sm);font-weight:700;font-family:var(--font);color:var(--text);}
.sp-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:.5px solid var(--border-lt);transition:background var(--t);}
.sp-item:last-child{border-bottom:none;}
.sp-item:hover{background:var(--bg);}
.sp-item-title{flex:1;border:none;outline:none;background:transparent;font-size:var(--fs-xs);font-family:var(--font);color:var(--text);}
.sp-item-ore{width:60px;border:none;outline:none;background:transparent;font-size:var(--fs-xs);font-family:var(--font);color:var(--text-3);text-align:right;}
.sp-item-ore:focus{color:var(--text);}
.sp-item-budget{width:70px;border:none;outline:none;background:transparent;font-size:var(--fs-xs);font-family:var(--font);color:var(--text-3);text-align:right;}
.sp-add-inp{width:100%;border:none;outline:none;background:transparent;font-size:var(--fs-xs);font-family:var(--font);color:var(--text-3);padding:6px 12px;font-style:italic;}
.sp-add-inp:focus{color:var(--text);font-style:normal;}

/* ══ STREAM JOB DETAIL — stile Streamtime ══ */
.sjd-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;background:var(--surface);
  border-bottom:.5px solid var(--border);flex-shrink:0;height:48px;
}
.sjd-back{
  display:flex;align-items:center;gap:4px;background:none;border:none;
  cursor:pointer;font-size:var(--fs-xs);font-weight:600;color:var(--text-3);
  font-family:var(--font);padding:4px 8px;border-radius:var(--rs);
  transition:all var(--t);flex-shrink:0;
}
.sjd-back:hover{background:var(--bg);color:var(--text);}
.sjd-sep{color:var(--border);font-size:var(--fs-sm);}
.sjd-job-name{
  font-size:var(--fs-sm);font-weight:800;color:var(--text);
  letter-spacing:var(--ls-tight);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;
}
.sjd-header-actions{display:flex;align-items:center;gap:8px;}
.sjd-team-strip{display:flex;gap:3px;align-items:center;}
.sjd-team-av{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;flex-shrink:0;
  border:2px solid var(--surface);margin-left:-6px;cursor:default;
}
.sjd-team-av:first-child{margin-left:0;}
.sjd-stato-sel{
  font-size:var(--fs-xs);font-weight:700;font-family:var(--font);
  border:.5px solid var(--border);border-radius:var(--r-pill);
  padding:4px 10px;background:var(--bg);color:var(--text);cursor:pointer;
}
.sjd-del-btn{
  font-size:var(--fs-xs);font-family:var(--font);
  border:.5px solid var(--border);border-radius:var(--rs);
  padding:4px 10px;background:none;color:var(--text-3);cursor:pointer;
  transition:all var(--t);
}
.sjd-del-btn:hover{background:var(--red-lt);color:var(--red-dk);}

/* KPI Cards — 3 affiancate */
.sjd-kpi-cards{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:0;border-bottom:.5px solid var(--border);flex-shrink:0;
}
.sjd-kpi-card{
  padding:14px 20px;border-right:.5px solid var(--border);
  background:var(--surface);
}
.sjd-kpi-card:last-child{border-right:none;}
.sjd-kpi-card-title{
  font-size:var(--fs-xs);font-weight:700;color:var(--text);
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:.5px solid var(--border);
}
.sjd-kpi-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sjd-kpi-lbl{font-size:var(--fs-xs);color:var(--text-3);}
.sjd-kpi-val{font-size:var(--fs-xs);font-weight:700;color:var(--text);}
.sjd-kpi-val.big{font-size:18px;font-weight:800;letter-spacing:-.02em;}
.sjd-kpi-val.pos{color:#16a34a;}
.sjd-kpi-val.neg{color:#dc2626;}
[data-theme="dark"] .sjd-kpi-val.pos{color:#4ade80;}
.sjd-kpi-bar{height:5px;background:var(--border);border-radius:var(--r-pill);overflow:hidden;margin-top:4px;}
.sjd-kpi-bar-fill{height:100%;border-radius:var(--r-pill);transition:width .3s;}

/* Plan header / tabs */
.sjd-plan-header{
  display:flex;align-items:center;padding:0 20px;
  border-bottom:.5px solid var(--border);background:var(--surface);flex-shrink:0;
}
.sjd-tab{
  padding:10px 14px;font-size:var(--fs-xs);font-weight:600;
  border:none;background:none;cursor:pointer;color:var(--text-3);
  font-family:var(--font);border-bottom:2px solid transparent;
  transition:all var(--t);margin-bottom:-1px;
}
.sjd-tab.active{color:var(--text);border-bottom-color:var(--green);}
.sjd-tab:not(.active):hover{color:var(--text);}
.sjd-add-phase-btn{
  display:flex;align-items:center;gap:4px;
  font-size:var(--fs-xs);font-weight:700;font-family:var(--font);
  border:none;background:none;cursor:pointer;
  color:var(--green-dk);padding:4px 8px;border-radius:var(--rs);
  transition:all var(--t);
}
[data-theme="dark"] .sjd-add-phase-btn{color:var(--green);}
.sjd-add-phase-btn:hover{background:var(--green-lt);}

/* Phase rows */
.sjd-phase{border-bottom:.5px solid var(--border);}
.sjd-phase-hd{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;background:var(--bg);cursor:pointer;
  position:sticky;top:0;z-index:2;border-bottom:.5px solid var(--border);
  transition:background var(--t);
}
.sjd-phase-hd:hover{background:var(--border-lt);}
.sjd-phase-chevron{font-size:10px;color:var(--text-3);flex-shrink:0;}
.sjd-phase-emoji{font-size:16px;flex-shrink:0;}
.sjd-phase-inp{
  flex:1;border:none;outline:none;background:transparent;
  font-size:var(--fs-sm);font-weight:700;font-family:var(--font);color:var(--text);
}
.sjd-phase-kpis{display:flex;align-items:center;gap:16px;flex-shrink:0;}
.sjd-phase-kpi-item{font-size:var(--fs-xs);color:var(--text-3);white-space:nowrap;}
.sjd-phase-kpi-item strong{color:var(--text);}
.sjd-phase-pct{
  font-size:10px;font-weight:800;padding:2px 7px;
  border-radius:var(--r-pill);background:var(--green-lt);color:var(--green-dk);
}
[data-theme="dark"] .sjd-phase-pct{background:var(--green-lt);color:var(--green);}
.sjd-phase-del{
  background:none;border:none;cursor:pointer;
  color:var(--text-3);font-size:11px;padding:3px 5px;
  opacity:0;transition:opacity var(--t);flex-shrink:0;
}
.sjd-phase-hd:hover .sjd-phase-del{opacity:1;}

/* Items table — colonne come Streamtime */

<script>
/* ── Nassa Auth Guard ── */
(async()=>{
  try{
    const r=await fetch('/api/auth',{credentials:'include'});
    if(!r.ok) throw new Error('unauth');
    const d=await r.json();
    if(!d.ok) throw new Error('unauth');
    window.__nassaUser=d;
  }catch(e){
    window.location.replace('/app?redirect='+encodeURIComponent(window.location.pathname));
  }
})();

/* ── Logout globale — disponibile in tutte le app ── */
async function nassaLogout(){
  try{ await fetch('/api/auth',{method:'DELETE',credentials:'include'}); }catch(_){}
  window.location.replace('/app');
}
</script>

</script>
