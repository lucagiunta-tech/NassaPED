name: Deploy to Vercel Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@37

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -E 'https://' | tail -1)
          echo "Deployed to: $DEPLOY_URL"
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: nassastudiografico
          VERCEL_PROJECT_ID: prj_hv1iEG5Zf8uza2v2u9b0eXbVTHWN

      - name: Assign alias
        run: vercel alias set ${{ steps.deploy.outputs.deploy_url }} nassa-ped-yp63.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope nassastudiografico || true
        env:
          VERCEL_ORG_ID: nassastudiografico
          VERCEL_PROJECT_ID: prj_hv1iEG5Zf8uza2v2u9b0eXbVTHWN
