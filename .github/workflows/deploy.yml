name: Deploy to Vercel Production
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@37

      - name: Deploy to Vercel Production
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --debug 2>&1 | tail -50
        env:
          VERCEL_ORG_ID: nassastudiografico
          VERCEL_PROJECT_ID: prj_hv1iEG5Zf8uza2v2u9b0eXbVTHWN
