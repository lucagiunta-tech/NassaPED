<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nassa Studio · NassaBrand</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#0dff00;--green-dk:#00cc00;--green-lt:#e6ffe4;--green-mid:#b3ffb0;--green-text:#111;
  --magenta:#C2185B;--magenta-lt:#FCE4EC;
  --text:#1c1c1e;--text-2:#6b6b6b;--text-3:#6b7280;
  --bg:#ffffff;--surface:#ffffff;--surface-lt:#f5f5f7;
  --border:#e5e7eb;--border-lt:#f0f0f2;
  --font:'Inter',sans-serif;
  --topbar:56px;--sidebar:56px;--sidebar-expanded:220px;
  --bw:.5px;--r:8px;--rs:4px;--r-xs:3px;--r-pill:99px;
  --fs-xs:11px;--fs-sm:13px;--fs-base:15px;--fs-md:18px;--fs-lg:28px;
  --ls-tight:-.02em;--ls-normal:0em;--ls-wide:.06em;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
  --t-fast:.1s ease;--t-base:.15s ease;--t-slow:.25s ease;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --warning-bg:#fef9ee;--warning-border:#fde68a;--warning-text:#92400e;
  --danger-bg:#fff5f5;--danger-border:#fca5a5;
  --success-bg:#f0fdf4;--success-border:#bbf7d0;--success-text:#166534;
}
[data-theme="dark"]{
  --bg:#0f0f11;--surface:#1a1a1e;--surface-lt:#222228;
  --border:#2a2a30;--border-lt:#222228;
  --text:#f0f0f2;--text-2:#9ca3af;--text-3:#6b7280;
  --green-lt:#0d2b0c;--green-mid:#1a4d18;--green-text:#0a1a00;
  --warning-bg:#1a1400;--warning-border:#3a2800;--warning-text:#fbbf24;
  --danger-bg:#1a0a0a;--danger-border:#5a1a1a;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;}
textarea,input{font-family:var(--font);}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.body{display:flex;flex:1;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.main-scroll{flex:1;overflow-y:auto;padding:24px;}

/* ── Topbar ── */
.topbar{height:var(--topbar);flex-shrink:0;background:var(--surface);border-bottom:var(--bw) solid var(--border);display:flex;align-items:stretch;z-index:200;}
.topbar-brand{width:var(--sidebar);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:var(--bw) solid var(--border);cursor:pointer;transition:background var(--t-fast);overflow:hidden;gap:10px;padding:0;}
.topbar-brand:hover{background:var(--surface-lt);}
.topbar-brand.expanded{width:var(--sidebar-expanded);justify-content:flex-start;padding:0 16px;}
.topbar-brand .brand-name{opacity:0;white-space:nowrap;transition:opacity var(--t-base);font-size:var(--fs-base);font-weight:700;}
.topbar-brand.expanded .brand-name{opacity:1;}
.brand-mark{width:30px;height:30px;background:var(--green);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--green-text);font-size:var(--fs-base);font-weight:700;flex-shrink:0;}
.brand-name{font-size:var(--fs-base);font-weight:700;color:var(--text);letter-spacing:var(--ls-tight);}
.topbar-nav{display:flex;align-items:stretch;flex:1;padding:0 8px;gap:2px;}
.nav-tab{display:flex;align-items:center;padding:0 18px;font-size:var(--fs-base);font-weight:400;color:var(--text-2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all var(--t-fast);white-space:nowrap;letter-spacing:var(--ls-tight);border:none;background:none;}
.nav-tab:hover{color:var(--text);background:var(--surface-lt);}
.nav-tab.active{color:var(--text);font-weight:700;border-bottom:2.5px solid var(--green);}
.topbar-right{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:var(--bw) solid var(--border);}
.topbar-btn{width:30px;height:30px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all var(--t-fast);}
.topbar-btn:hover{background:var(--surface-lt);color:var(--text);}
.topbar-client{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:var(--bw) solid var(--border);cursor:pointer;min-width:160px;max-width:220px;transition:background var(--t-fast);}
.topbar-client:hover{background:var(--surface-lt);}
.client-avatar{width:26px;height:26px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.client-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-sub{font-size:var(--fs-xs);color:var(--text-3);}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:var(--bw) solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;z-index:100;}
.sidebar.sb-expanded{width:var(--sidebar-expanded);}
.sb-main-nav{display:flex;flex-direction:column;height:100%;width:100%;}
.sb-nav-section{display:flex;flex-direction:column;padding:var(--sp-2) 0;}
.sb-nav-section:not(:last-child){border-bottom:var(--bw) solid var(--border-lt);}
.sb-group-lbl{font-size:var(--fs-xs);letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--text-3);padding:8px 14px 3px;font-weight:600;display:none;white-space:nowrap;overflow:hidden;opacity:.65;}
.sidebar.sb-expanded .sb-group-lbl{display:block;}
.sb-nav-item{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);margin:1px auto;flex-shrink:0;gap:0;border:none;background:none;}
.sidebar.sb-expanded .sb-nav-item{width:auto;height:auto;padding:10px 14px;margin:1px 6px;justify-content:flex-start;gap:12px;}
.sb-nav-item:hover{background:var(--green-lt);color:var(--text);}
.sb-nav-item.active{background:var(--green);color:var(--green-text);}
.sidebar.sb-expanded .sb-nav-item.active{background:var(--green-lt);color:var(--text);border:1px solid var(--green-mid);}
.sidebar.sb-expanded .sb-nav-item.active svg{color:var(--green-dk);}
.sidebar.sb-expanded .sb-nav-item.active .sb-nav-label{font-weight:700;}
.sb-nav-item svg{width:20px;height:20px;flex-shrink:0;}
.sb-nav-label{font-size:var(--fs-base);font-weight:400;white-space:nowrap;overflow:hidden;display:none;}
.sidebar.sb-expanded .sb-nav-label{display:block;}
.sb-nav-sep{height:.5px;background:var(--border-lt);margin:5px auto;width:28px;}
.sidebar.sb-expanded .sb-nav-sep{width:calc(100% - 24px);margin:5px 12px;}
.sb-spacer{flex:1;}
.sb-toggle-btn{display:flex;align-items:center;justify-content:center;width:38px;height:28px;margin:2px auto 4px;border-radius:var(--r);background:none;border:none;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);}
.sidebar.sb-expanded .sb-toggle-btn{width:calc(100% - 12px);margin:2px 6px 4px;justify-content:flex-end;padding-right:8px;}
.sb-toggle-btn:hover{background:var(--surface-lt);color:var(--text);}

/* ── Content area ── */
.content-header{padding:0 0 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.content-title{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1.1;}
.content-sub{font-size:var(--fs-sm);color:var(--text-3);margin-top:4px;}

/* ── Client list ── */
.client-list{display:flex;flex-direction:column;gap:8px;}
.client-row{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:12px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color var(--t-fast),box-shadow var(--t-fast);}
.client-row:hover{border-color:var(--green);box-shadow:var(--shadow-sm);}
.client-row-avatar{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.client-row-info{flex:1;min-width:0;}
.client-row-name{font-size:var(--fs-base);font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.client-row-meta{font-size:var(--fs-xs);color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:6px;}
.client-row-slug{font-family:monospace;font-size:11px;color:var(--text-3);}
.client-row-dot{color:var(--border);}
.client-row-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0;}
.badge-active{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);background:var(--green-lt);color:var(--green-dk);border:var(--bw) solid var(--green-mid);}

/* ── Buttons ── */
.btn{padding:6px 14px;border-radius:var(--r);font-size:var(--fs-sm);font-weight:500;cursor:pointer;border:var(--bw) solid var(--border);background:var(--surface);color:var(--text);transition:all var(--t-fast);display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--surface-lt);}
.btn-primary{background:var(--green);border-color:var(--green);color:var(--green-text);}
.btn-primary:hover{background:var(--green-dk);color:#fff;}
.btn-outline{background:transparent;color:var(--magenta);border-color:var(--magenta);}
.btn-outline:hover{background:var(--magenta-lt);}
.btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border);}
.btn-ghost:hover{background:var(--surface-lt);color:var(--text);}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:var(--bw) solid var(--border);margin-bottom:20px;}
.tab-btn{padding:10px 18px;border:none;cursor:pointer;font-size:var(--fs-sm);background:transparent;color:var(--text-2);font-weight:400;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all var(--t-fast);}
.tab-btn:hover{color:var(--text);background:var(--surface-lt);}
.tab-btn.active{color:var(--text);font-weight:600;border-bottom-color:var(--green);}
.tab-badge{margin-left:5px;font-size:10px;font-weight:600;background:var(--magenta-lt);color:var(--magenta);padding:1px 6px;border-radius:var(--r-pill);}

/* ── Cards ── */
.card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:20px;}
.section-title{font-size:var(--fs-xs);font-weight:600;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:var(--ls-wide);}

/* ── Stats strip ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface-lt);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;}
.stat-main{display:flex;flex-direction:column;}
.stat-val{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1;}
.stat-lbl{font-size:var(--fs-xs);color:var(--text-3);margin-top:4px;text-transform:uppercase;letter-spacing:var(--ls-wide);}
.stat-icon{width:32px;height:32px;border-radius:var(--rs);background:var(--green-lt);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.stat-icon.pending{background:var(--magenta-lt);}

/* ── Brand Assets ── */
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:24px;}
.swatch{border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);cursor:pointer;transition:transform var(--t-fast);}
.swatch:hover{transform:translateY(-2px);}
.swatch-color{height:56px;display:flex;align-items:center;justify-content:center;}
.swatch-info{padding:6px 9px;background:var(--surface);}
.swatch-name{font-size:11px;font-weight:500;color:var(--text);}
.swatch-hex{font-size:10px;color:var(--text-3);font-family:monospace;}
.swatch-role{font-size:9px;color:var(--text-3);}

/* ── Logo cards ── */
.logo-masonry{columns:3;column-gap:12px;margin-bottom:24px;}
.logo-card{break-inside:avoid;display:block;margin-bottom:12px;border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);background:var(--surface);transition:border-color var(--t-fast),box-shadow var(--t-fast);}
.logo-card:hover{border-color:var(--green);box-shadow:var(--shadow-sm);}
.logo-preview{width:100%;display:flex;align-items:center;justify-content:center;background:var(--surface-lt);padding:16px;}
.logo-preview img{width:100%;height:auto;display:block;object-fit:contain;}
.logo-info{padding:10px 12px;background:var(--surface);}
@media(max-width:600px){.logo-masonry{columns:2;}}
.logo-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;}
.logo-meta{font-size:10px;color:var(--text-3);margin-bottom:6px;}
.logo-add-wrap{break-inside:avoid;display:block;margin-bottom:12px;}
.logo-add{height:120px;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text-3);cursor:pointer;font-size:var(--fs-xs);transition:border-color var(--t-fast);}
.logo-add:hover{border-color:var(--green);color:var(--green-dk);}

/* ── Approvals ── */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 12px;border-radius:var(--r-pill);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-xs);cursor:pointer;font-weight:500;transition:all var(--t-fast);}
.filter-btn:hover{border-color:var(--text-3);color:var(--text);}
.filter-btn.active{background:var(--green-lt);border-color:var(--green-dk);color:var(--green-text);font-weight:700;}
.filter-count{font-size:10px;font-weight:600;padding:0 5px;border-radius:var(--r-pill);background:var(--surface-lt);color:var(--text-3);margin-left:4px;}
.approval-card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;border-left-width:3px;transition:box-shadow var(--t-fast);}
.approval-card:hover{box-shadow:var(--shadow-sm);}
.approval-stripe{display:none;}
.approval-body{flex:1;padding:14px 16px;}
.approval-status{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.approval-title{font-size:var(--fs-base);font-weight:600;color:var(--text);margin:6px 0 4px;line-height:1.3;}
.approval-note{font-size:var(--fs-sm);color:var(--text-2);margin-bottom:10px;line-height:1.5;}
.approval-preview{width:48px;height:48px;border-radius:var(--r);flex-shrink:0;}
.approval-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:10px;border-top:var(--bw) solid var(--border-lt);}
.approval-date{font-size:11px;color:var(--text-3);}
.pill{font-size:var(--fs-xs);font-weight:500;padding:2px 7px;border-radius:var(--rs);display:inline-flex;align-items:center;}
.btn-approve{padding:5px 14px;border-radius:var(--r);border:none;background:var(--green);color:var(--green-text);font-size:var(--fs-xs);font-weight:600;cursor:pointer;transition:background var(--t-fast);}
.btn-approve:hover{background:var(--green-dk);color:#fff;}
.btn-revision{padding:5px 14px;border-radius:var(--r);border:var(--bw) solid var(--magenta);background:transparent;color:var(--magenta);font-size:var(--fs-xs);font-weight:600;cursor:pointer;transition:background var(--t-fast);}
.btn-revision:hover{background:var(--magenta-lt);}

/* ── Moodboard masonry ── */
.moodboard-masonry{
  columns:3;column-gap:12px;
  width:100%;
}
.masonry-item{
  break-inside:avoid;
  display:block;
  margin-bottom:12px;
  border-radius:var(--r);overflow:hidden;
  border:var(--bw) solid var(--border);
  cursor:pointer;transition:border-color var(--t-fast);
  background:var(--surface);
}
.masonry-item:hover{border-color:var(--green);}
.masonry-item.selected{border-width:2px;}
.masonry-visual{width:100%;display:block;object-fit:cover;}
.masonry-body{padding:10px 12px;}
.masonry-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:3px;}
.masonry-note{font-size:var(--fs-xs);color:var(--text-2);line-height:1.5;}
.masonry-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);}
@media(max-width:700px){.moodboard-masonry{columns:2;}}
@media(max-width:440px){.moodboard-masonry{columns:1;}}

/* ── Portal header ── */
.portal-logo{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}

/* ── Semaforo Nassa ── */
.semaforo-wrap{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--magenta);}
.semaforo-title{font-size:var(--fs-sm);font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.semaforo-title svg{flex-shrink:0;}
.semaforo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.semaforo-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:4px 0;}
.semaforo-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--t-fast);}
.semaforo-check.checked{background:var(--green);border-color:var(--green-dk);}
.semaforo-check.checked svg{display:block;}
.semaforo-check svg{display:none;width:10px;height:10px;}
.semaforo-lbl{font-size:var(--fs-sm);color:var(--text-2);line-height:1.4;}
.semaforo-lbl.checked{color:var(--text-3);text-decoration:line-through;}
.semaforo-progress{height:4px;background:var(--border-lt);border-radius:99px;margin-bottom:12px;overflow:hidden;}
.semaforo-progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width var(--t-base);}
.semaforo-actions{display:flex;gap:8px;justify-content:flex-end;}
.semaforo-ok{background:var(--green-lt);border:var(--bw) solid var(--green-mid);color:var(--green-dk);font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.empty{text-align:center;padding:48px 24px;color:var(--text-3);}
.empty-icon{font-size:var(--fs-lg);margin-bottom:12px;}
.empty-title{font-size:var(--fs-md);font-weight:600;color:var(--text-2);margin-bottom:6px;}
.empty-sub{font-size:var(--fs-sm);}
.badge{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);}
.badge-pending{background:var(--magenta-lt);color:var(--magenta);}
.badge-approved{background:var(--green-lt);color:var(--green-dk);}
.badge-revision{background:#FFF3E0;color:#E65100;}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-sm);cursor:pointer;transition:all var(--t-fast);}
.back-btn:hover{background:var(--surface-lt);color:var(--text);}
.loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-3);font-size:var(--fs-sm);}
.link-box{padding:5px 12px;border-radius:var(--r);background:var(--surface-lt);border:var(--bw) solid var(--border);font-size:var(--fs-xs);color:var(--text-3);font-family:monospace;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-pill);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,useRef} = React;
const h = React.createElement;
const API_KEY = 'NASSA_SECRET_2026';

// ── Utils ──
function contrast(hex){
  if(!hex||hex.length<4) return '#fff';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.55?'#111':'#fff';
}

// ── Upload logo via Dropbox ──
async function uploadLogo(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('user', 'nassa_studio');
  const r = await fetch('/api/dropbox-upload',{
    method:'POST',
    headers:{'x-nassa-key':API_KEY},
    credentials:'include',
    body:fd
  });
  if(!r.ok) throw new Error('Upload fallito: '+r.status);
  const data = await r.json();
  return data.url || data.shared_link || '';
}

  const fileRef = useRef(null);
  const b = client.brand || {colors:[],fonts:[],logos:[],templates:[]};
  const pc = b.colors[0]?.hex || client.color || '#1A8C3F';

  const handleFile = async(e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    setUploading(true); setUploadErr('');
    try {
      const url = await uploadLogo(file);
      const ext = file.name.split('.').pop().toUpperCase();
      const rawName = file.name.replace(/\.[^.]+$/, '');
      const cleanName = rawName
        .replace(/\s*copia\s*\d+\s*$/i, '')
        .replace(/\s*copy\s*\d+\s*$/i, '')
        .replace(/_+/g, ' ')

        id:'logo_'+Date.now(),

        h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},
          form.tipo==='text'?'Testo (visibile nella card)':'Descrizione / nota'),
        h('textarea',{rows:form.tipo==='text'?4:2,value:form.note,onChange:e=>setForm(p=>({...p,note:e.target.value})),
                    placeholder:form.tipo==='text'?'Es. Copia alternativa per la campagna estiva':'Es. Terracotta + verde pistacchio per la stagione',
          style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
            borderRadius:'var(--r)',outline:'none',background:'var(--surface)',color:'var(--text)',
            resize:'vertical',fontFamily:'inherit',boxSizing:'border-box'}})
      ),
      // Tag + altezza
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
        h('div',null,
          h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},'Tag'),
          h('select',{value:form.tag,onChange:e=>setForm(p=>({...p,tag:e.target.value})),
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
              borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)'}},
            TAG_OPTS.map(t=>h('option',{key:t,value:t},t))
          )
        ),
        h('div',null,
          h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},
            'Altezza card (0.5–2)'),
          h('input',{type:'number',min:.5,max:2,step:.25,value:form.height,
            onChange:e=>setForm(p=>({...p,height:e.target.value})),
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
              borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)'}}),
          h('p',{style:{fontSize:10,color:'var(--text-3)',marginTop:2}},'1 = normale, 2 = doppia')
        )
      ),
      // Actions
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{onClick:()=>{setShowModal(false);setUploadErr('');},
          style:{padding:'7px 16px',borderRadius:'var(--r)',border:'var(--bw) solid var(--border)',
            background:'transparent',color:'var(--text-2)',fontSize:13,cursor:'pointer',fontWeight:500}},
          'Annulla'),
        h('button',{
          onClick:confirmAdd,
          disabled:uploading||(form.tipo==='image'&&!form.imageUrl)||(form.tipo==='text'&&!form.note.trim())||(form.tipo!=='text'&&!form.titolo.trim()&&!form.imageUrl),
          style:{padding:'7px 18px',borderRadius:'var(--r)',border:'none',background:'var(--green)',
            color:'var(--green-text)',fontSize:13,cursor:'pointer',fontWeight:700,
            opacity:uploading?0.5:1}},
          'Aggiungi')
      )
    )
  );

  // ── Render principale ──
  const addBtn = isAdmin && h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:16}},
    h('button',{className:'btn btn-primary',onClick:()=>setShowModal(true)},'+ Aggiungi elemento')
  );

  if(!items.length) return h('div',null,
    modal, addBtn,
    h('div',{className:'empty'},
      h('div',{className:'empty-icon'},'🎭'),
      h('div',{className:'empty-title'},'Moodboard vuota'),
      h('div',{className:'empty-sub'},'Clicca "+ Aggiungi elemento" per iniziare')
    )
  );

  return h('div',null,
    modal,
    !isAdmin&&h('div',{style:{padding:'10px 14px',borderRadius:'var(--r)',background:'#fffbeb',
      border:'0.5px solid #fde68a',fontSize:12,color:'#92400e',marginBottom:16}},
      '💡 Questa è la direzione creativa del tuo progetto. Clicca su un elemento per lasciare un commento.'
    ),
    addBtn,
    h('div',{className:'moodboard-masonry'},
      items.map(item=>{
        const tc=TAG_COLORS[item.tag]||'var(--text-3)';
        const isSel=sel===item.id;
        const h_px = item.tipo==='text' ? Math.round((item.height||1)*80+60)
                   : item.tipo==='color'? Math.round((item.height||1)*100+40)
                   : null;
        return h('div',{key:item.id,
          className:'masonry-item'+(isSel?' selected':''),
          style:{borderColor:isSel?tc:undefined},
          onClick:()=>setSel(isSel?null:item.id)
        },
          h('div',{style:{
            background:item.imageUrl?'var(--surface-lt)':item.color,
            height:h_px||undefined,
            display:'flex',alignItems:'center',justifyContent:'center',
            padding:item.imageUrl?0:16,overflow:'hidden'
          }},
            item.imageUrl && h('img',{src:item.imageUrl,alt:item.titolo,
              style:{width:'100%',height:'auto',display:'block',objectFit:'contain'}}),
            !item.imageUrl&&item.tipo==='text'&&h('p',{style:{margin:0,fontSize:13,
              color:contrast(item.color),lineHeight:1.6,textAlign:'center',fontStyle:'italic',whiteSpace:'pre-line'}},item.note),
            !item.imageUrl&&item.tipo==='color'&&h('div',{style:{fontSize:14,fontWeight:700,
              color:contrast(item.color),textAlign:'center'}},item.titolo)
          ),
          h('div',{className:'masonry-body'},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}},
              item.tipo!=='text'&&h('div',{className:'masonry-title'},item.titolo),
              h('span',{className:'masonry-tag',style:{background:tc+'20',color:tc,flexShrink:0}},item.tag)
            ),
            item.tipo!=='text'&&item.note&&h('div',{className:'masonry-note'},item.note),
            isSel&&!isAdmin&&h('div',{style:{marginTop:8}},
              h('textarea',{rows:2,placeholder:'Lascia un commento...',style:{
                width:'100%',padding:'6px 8px',fontSize:12,borderRadius:6,
                border:'0.5px solid var(--border)',background:'var(--surface)',
                color:'var(--text)',fontFamily:'inherit',resize:'vertical',boxSizing:'border-box'
              }}),
              h('button',{className:'btn btn-primary',style:{marginTop:4,fontSize:12,padding:'4px 12px'}},'Invia commento')
            ),
            isSel&&isAdmin&&h('div',{style:{marginTop:8,display:'flex',gap:6}},
              h('button',{className:'btn btn-ghost',style:{fontSize:11}},'✏ Modifica'),
              h('button',{className:'btn btn-outline',style:{fontSize:11},
                onClick:e=>{e.stopPropagation();onAddMoodItem&&onAddMoodItem(null,item.id);}},'✕ Rimuovi')
            )
          )
        );
      })
    )
  );
}
// ── Admin Portal View ── (tab controlled externally by sidebar)
function AdminPortaleView({client,onUpdateStatus,onAddLogo,onAddMoodItem,tab}){
  const pc=client.brand?.colors[0]?.hex||client.color||'#1A8C3F';
  const pending=(client.approvals||[]).filter(a=>a.stato==='pending').length;

  const copyLink=()=>{
    try{navigator.clipboard.writeText('https://nassa-ped-yp63.vercel.app/portal/'+client.slug);}catch(e){}
  };

  return h('div',null,
    // Stats
    h('div',{className:'stats-strip'},
      (()=>{
        const assetN=(client.brand?.logos?.length||0)+(client.brand?.templates?.length||0)+(client.brand?.colors?.length||0);
        return [
          {lbl:'Asset',            val:assetN,  icon:'🎨', cls:''},
          {lbl:'In approvazione',  val:pending,  icon:'⏳', cls:pending>0?' pending':''},
          {lbl:'Moodboard',        val:client.moodboard?.length||0, icon:'🎭', cls:''},
        ].map(s=>h('div',{key:s.lbl,className:'stat-card'},
          h('div',{className:'stat-main'},
            h('div',{className:'stat-val'},s.val+''),
            h('div',{className:'stat-lbl'},s.lbl)
          ),
          h('div',{className:'stat-icon'+s.cls},s.icon)
        ));
      })()
    ),
    // Link row
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:24}},
      h('div',{className:'link-box'},'nassa-ped-yp63.vercel.app/portal/'+client.slug),
      h('button',{className:'btn btn-ghost',style:{gap:4,fontSize:12},onClick:copyLink},ICONS.copy,' Copia'),
      h('button',{className:'btn btn-ghost',style:{gap:4,fontSize:12},onClick:()=>window.open('/portal/'+client.slug,'_blank')},ICONS.ext,' Apri')
    ),
    tab==='assets'&&h(BrandAssets,{client,isAdmin:true,onAddLogo}),
    tab==='approvals'&&h(Approvals,{client,isAdmin:true,onUpdateStatus}),
    tab==='moodboard'&&h(Moodboard,{client,isAdmin:true,onAddMoodItem})
  );
}

// ── Client Portal (public) ──
function PortaleCliente({client,onUpdateStatus}){
  const [tab,setTab]=useState('assets');
  const pc=client.brand?.colors[0]?.hex||client.color||'#1A8C3F';
  const pending=(client.approvals||[]).filter(a=>a.stato==='pending').length;
  const TABS=[{id:'assets',lbl:'Brand Assets'},{id:'approvals',lbl:'Contenuti',n:pending},{id:'moodboard',lbl:'Moodboard'}];

  return h('div',{style:{minHeight:'100vh',background:'var(--bg)'}},
    h('div',{className:'topbar'},
      h('a',{href:'/',style:{display:'flex',alignItems:'center',justifyContent:'center',width:'var(--sidebar)',borderRight:'var(--bw) solid var(--border)',textDecoration:'none',flexShrink:0}},
        h('div',{className:'brand-mark'},'N')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'0 20px',borderRight:'var(--bw) solid var(--border)',flex:1}},
        h('div',{className:'portal-logo',style:{background:pc,width:32,height:32,minWidth:32}},
          h('span',{style:{color:contrast(pc),fontSize:13,fontWeight:800}},client.name?.charAt(0)||'N')
        ),
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:700,color:'var(--text)',letterSpacing:'var(--ls-tight)'}},client.name),
          h('div',{style:{fontSize:11,color:'var(--text-3)'}},client.claim?'"'+client.claim+'"':'Portale cliente')
        ),
        client.manager&&h('div',{style:{marginLeft:'auto',textAlign:'right'}},
          h('div',{style:{fontSize:10,color:'var(--text-3)'}},'Manager'),
          h('div',{style:{fontSize:12,fontWeight:600,color:'var(--text)'}},client.manager)
        )
      ),
      h('div',{className:'topbar-right'},
        h('button',{className:'topbar-btn',onClick:toggleTheme},'🌙')
      )
    ),
    h('div',{style:{borderBottom:'var(--bw) solid var(--border)',background:'var(--surface)',padding:'0 20px',display:'flex',gap:2}},
      TABS.map(t=>h('button',{key:t.id,className:'tab-btn'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},
        t.lbl,t.n>0&&h('span',{className:'tab-badge'},t.n)
      ))
    ),
    h('div',{style:{maxWidth:860,margin:'0 auto',padding:24}},
      tab==='assets'&&h(BrandAssets,{client,isAdmin:false}),
      tab==='approvals'&&h(Approvals,{client,isAdmin:false,onUpdateStatus}),
      tab==='moodboard'&&h(Moodboard,{client,isAdmin:false})
    )
  );
}

// ── Sidebar component ──
function Sidebar({expanded,onToggle,currentTab,onTab}){
  const NAV_TOP=[{id:'list',label:'Tutti i clienti',icon:ICONS.grid}];
  const NAV_CLIENT=[
    {id:'assets',    label:'Brand Assets', icon:ICONS.palette},
    {id:'approvals', label:'Approvazioni', icon:ICONS.check},
    {id:'moodboard', label:'Moodboard',    icon:ICONS.board},
  ];
  const navItem=(n)=>h('div',{key:n.id,
    className:'sb-nav-item'+(currentTab===n.id?' active':''),
    onClick:()=>onTab(n.id),
    title:n.label
  },n.icon,h('span',{className:'sb-nav-label'},n.label));

  return h('div',{className:'sidebar'+(expanded?' sb-expanded':'')},
    h('div',{className:'sb-main-nav'},
      h('div',{className:'sb-nav-section'},
        NAV_TOP.map(navItem)
      ),
      h('div',{className:'sb-nav-sep'}),
      h('div',{className:'sb-nav-section'},
        h('div',{className:'sb-group-lbl'},'PORTALE CLIENTE'),
        NAV_CLIENT.map(navItem)
      ),
      h('div',{className:'sb-spacer'}),
      h('button',{className:'sb-toggle-btn',onClick:onToggle,title:expanded?'Chiudi menu':'Espandi menu'},
        expanded?ICONS.chevL:ICONS.chevR
      )
    )
  );
}

// ── Root App ──
function NassaBrand(){
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [selected,setSelected]=useState(null);
  const [view,setView]=useState('list');
  const [tab,setTab]=useState('assets');
  const [sidebarExp,setSidebarExp]=useState(false);

  const pub=isPortal();
  const slug=portalSlug();

  useEffect(()=>{
    if(pub){
      api('/api/brand?public=1&slug='+slug)
        .then(d=>{setSelected(d.client);setLoading(false);})
        .catch(()=>{setError('Cliente non trovato');setLoading(false);});
    } else {
      api('/api/brand')
        .then(d=>{setClients(d.clients||[]);setLoading(false);})
        .catch(()=>{setError('Errore caricamento');setLoading(false);});
    }
  },[]);

  const updateStatus=useCallback(async(clientId,aId,st)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const approvals=c.approvals.map(a=>a.id===aId?{...a,stato:st}:a);
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'approvals',data:approvals})}).catch(console.error);
      return {...c,approvals};
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,approvals:p.approvals.map(a=>a.id===aId?{...a,stato:st}:a)}));
  },[selected]);

  const updateBrand=useCallback((clientId,updater)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const updated={...c,brand:updater(c.brand||{colors:[],fonts:[],logos:[],templates:[]})};
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'brand',data:updated.brand})}).catch(console.error);
      return updated;
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,brand:updater(p.brand||{colors:[],fonts:[],logos:[],templates:[]})}));
  },[selected]);

  const addLogo=useCallback((clientId,logo)=>{
    updateBrand(clientId,b=>({...b,logos:[...(b.logos||[]),logo]}));
  },[updateBrand]);

  const addMoodItem=useCallback((item, removeId)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==selected?.id)return c;
      const moodboard = removeId
        ? (c.moodboard||[]).filter(m=>m.id!==removeId)
        : [...(c.moodboard||[]), item];
      const updated={...c,moodboard};
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId:c.id,field:'moodboard',data:moodboard})}).catch(console.error);
      return updated;
    }));
    if(selected){
      setSelected(p=>{
        const moodboard = removeId
          ? (p.moodboard||[]).filter(m=>m.id!==removeId)
          : [...(p.moodboard||[]), item];
        return {...p,moodboard};
      });
    }
  },[selected]);

  const selectClient=(c,v='assets')=>{setSelected(c);setView('portal');setTab(v);setSidebarExp(true);};

  if(loading)return h('div',{className:'app'},h('div',{className:'loading'},'Caricamento NassaBrand…'));
  if(error)return h('div',{className:'app'},h('div',{className:'loading'},error));
  if(pub&&selected)return h(PortaleCliente,{client:selected,onUpdateStatus:(aId,st)=>updateStatus(selected.id,aId,st)});

  const pending=c=>((c.approvals||[]).filter(a=>a.stato==='pending').length);

  return h('div',{className:'app'},
    // Topbar
    h('div',{className:'topbar'},
      h('div',{className:'topbar-brand'+(view==='portal'&&sidebarExp?' expanded':''),onClick:()=>{if(view==='portal')setSidebarExp(p=>!p);}},
        h('div',{className:'brand-mark'},'N'),
        h('span',{className:'brand-name'},'Nassa Studio')
      ),
      // Client in topbar when selected
      selected&&view==='portal'?
        h('div',{className:'topbar-client'},
          h('div',{className:'client-avatar',style:{background:selected.color||selected.brand?.colors[0]?.hex||'#1A8C3F'}},
            h('span',{style:{color:contrast(selected.brand?.colors[0]?.hex||selected.color||'#1A8C3F'),fontSize:12,fontWeight:800}},selected.name?.charAt(0)||'N')
          ),
          h('div',null,
            h('div',{className:'client-name'},selected.name),
            h('div',{className:'client-sub'},pending(selected)>0?pending(selected)+' in attesa':'Portale attivo')
          )
        )
      :h('div',{className:'topbar-nav'},
        h('div',{className:'nav-tab active'},'Portali clienti')
      ),
      h('div',{className:'topbar-right'},
        selected&&view==='portal'&&h('button',{className:'btn btn-outline',style:{fontSize:11,padding:'4px 10px'},onClick:()=>window.open('/portal/'+selected.slug,'_blank')},'↗ Vista cliente'),
        selected&&view==='portal'&&h('button',{className:'back-btn',onClick:()=>{setView('list');setSelected(null);setSidebarExp(false);}},ICONS.chevL,' Clienti'),
        h('button',{className:'topbar-btn',onClick:toggleTheme},'🌙')
      )
    ),
    // Body
    h('div',{className:'body'},
      // Sidebar — only when client selected
      view==='portal'&&h(Sidebar,{expanded:sidebarExp,onToggle:()=>setSidebarExp(p=>!p),currentTab:tab,onTab:v=>{if(v==='list'){setView('list');setSelected(null);setSidebarExp(false);}else setTab(v);}}),
      // Main
      h('div',{className:'main'},
        view==='list'&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:800,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},'Portali clienti'),
                h('div',{className:'content-sub'},clients.length+' clienti attivi')
              )
            ),
            h('div',{className:'client-list'},
              clients.length===0&&h('div',{className:'empty'},h('div',{className:'empty-icon'},'👥'),h('div',{className:'empty-title'},'Nessun cliente'),h('div',{className:'empty-sub'},'Aggiungili prima in NassaPED')),
              clients.map(c=>{
                const pc=c.brand?.colors[0]?.hex||c.color||'#1A8C3F';
                const p=pending(c);
                return h('div',{key:c.id,className:'client-row',onClick:()=>selectClient(c)},
                  h('div',{className:'client-row-avatar',style:{background:pc}},
                    h('span',{style:{color:contrast(pc),fontSize:15,fontWeight:800}},c.name?.charAt(0)||'N')
                  ),
                  h('div',{className:'client-row-info'},
                    h('div',{className:'client-row-name'},
                      c.name,
                      h('span',{className:'badge-active'},'Attivo')
                    ),
                    h('div',{className:'client-row-meta'},
                      h('span',{className:'client-row-slug'},c.slug),
                      p>0&&h('span',{className:'client-row-dot'},'·'),
                      p>0&&h('span',{style:{fontSize:11,color:'var(--magenta)',fontWeight:600}},p+' in attesa')
                    )
                  ),
                  h('div',{className:'client-row-actions'},
                    h('button',{className:'btn btn-ghost',style:{fontSize:12,padding:'5px 10px'},onClick:e=>{e.stopPropagation();window.open('/portal/'+c.slug,'_blank')}},'↗ Portale'),
                    h('button',{className:'btn btn-primary',style:{fontSize:12,padding:'5px 12px'},onClick:e=>{e.stopPropagation();selectClient(c);}},'Gestisci')
                  )
                );
              })
            )
          )
        ),
        view==='portal'&&selected&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:900,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},tab==='assets'?'Brand Assets':tab==='approvals'?'Approvazioni':'Moodboard'),
                h('div',{className:'content-sub'},selected.name+(tab==='approvals'&&pending(selected)>0?' · '+pending(selected)+' in attesa':''))
              )
            ),
            h(AdminPortaleView,{client:selected,tab,onUpdateStatus:(aId,st)=>updateStatus(selected.id,aId,st),onAddLogo:(logo)=>addLogo(selected.id,logo),onAddMoodItem:addMoodItem})
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(NassaBrand));
</script>
</body>
</html>
