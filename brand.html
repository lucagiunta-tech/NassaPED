<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nassa Studio · NassaBrand</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#0dff00;--green-dk:#00cc00;--green-lt:#e6ffe4;--green-mid:#b3ffb0;--green-text:#111;
  --magenta:#C2185B;--magenta-lt:#FCE4EC;
  --text:#1c1c1e;--text-2:#6b6b6b;--text-3:#6b7280;
  --bg:#f5f5f7;--surface:#fff;--border:#e5e7eb;--border-lt:#f0f0f2;
  --font:'Inter',sans-serif;
  --topbar:56px;--sidebar:56px;--sidebar-expanded:220px;
  --bw:.5px;
  --r:8px;--rs:4px;--r-xs:3px;--r-pill:99px;
  --fs-xs:11px;--fs-sm:13px;--fs-base:15px;--fs-md:18px;--fs-lg:28px;
  --ls-tight:-.02em;--ls-normal:0em;--ls-wide:.06em;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
  --t-fast:.1s ease;--t-base:.15s ease;--t-slow:.25s ease;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 10px 24px rgba(0,0,0,.1);
}
[data-theme="dark"]{
  --bg:#0f0f11;--surface:#1a1a1e;--border:#2a2a30;--border-lt:#222228;
  --text:#f0f0f2;--text-2:#9ca3af;--text-3:#6b7280;
  --green-lt:#0d2b0c;--green-mid:#1a4d18;--green-text:#0a1a00;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;}
button{font-family:var(--font);cursor:pointer;}
textarea,input{font-family:var(--font);}

/* ── App layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.body{display:flex;flex:1;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.main-scroll{flex:1;overflow-y:auto;padding:24px;}

/* ── Topbar ── */
.topbar{height:var(--topbar);flex-shrink:0;background:var(--surface);border-bottom:var(--bw) solid var(--border);display:flex;align-items:stretch;z-index:200;}
.topbar-brand{width:var(--sidebar);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:var(--bw) solid var(--border);cursor:pointer;transition:width .22s;overflow:hidden;gap:10px;padding:0;}
.topbar-brand.expanded{width:var(--sidebar-expanded);justify-content:flex-start;padding:0 16px;}
.topbar-brand .brand-name{opacity:0;white-space:nowrap;transition:opacity var(--t-base);font-size:var(--fs-base);font-weight:700;}
.topbar-brand.expanded .brand-name{opacity:1;}
.brand-mark{width:30px;height:30px;background:var(--green);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--green-text);font-size:var(--fs-base);font-weight:700;flex-shrink:0;}
.brand-name{font-size:var(--fs-base);font-weight:700;color:var(--text);letter-spacing:var(--ls-tight);}
.topbar-nav{display:flex;align-items:stretch;flex:1;padding:0 8px;gap:2px;}
.nav-tab{display:flex;align-items:center;padding:0 20px;font-size:var(--fs-base);font-weight:400;color:var(--text-2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all var(--t-fast);white-space:nowrap;letter-spacing:var(--ls-tight);border:none;background:none;}
.nav-tab:hover{color:var(--text);background:var(--bg);}
.nav-tab.active{color:var(--text);font-weight:700;border-bottom:2.5px solid var(--green);}
.topbar-right{display:flex;align-items:center;gap:8px;padding:0 16px;border-left:var(--bw) solid var(--border);}
.topbar-btn{width:32px;height:32px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all var(--t-fast);}
.topbar-btn:hover{background:var(--bg);color:var(--text);}

/* Client selector in topbar */
.topbar-client{display:flex;align-items:center;gap:8px;padding:0 16px;border-right:var(--bw) solid var(--border);cursor:pointer;min-width:180px;max-width:240px;transition:background var(--t-fast);}
.topbar-client:hover{background:var(--bg);}
.client-avatar{width:28px;height:28px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.client-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-sub{font-size:var(--fs-xs);color:var(--text-3);}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:var(--bw) solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;z-index:100;}
.sidebar.sb-expanded{width:var(--sidebar-expanded);}
.sb-main-nav{display:flex;flex-direction:column;height:100%;width:100%;}
.sb-nav-section{display:flex;flex-direction:column;padding:var(--sp-2) 0;}
.sb-nav-section:not(:last-child){border-bottom:var(--bw) solid var(--border-lt);}
.sb-group-lbl{font-size:var(--fs-xs);letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--text-3);padding:8px 12px 3px;font-weight:600;display:none;white-space:nowrap;overflow:hidden;}
.sidebar.sb-expanded .sb-group-lbl{display:block;}
.sb-nav-item{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);margin:1px auto;flex-shrink:0;gap:0;border:none;background:none;}
.sidebar.sb-expanded .sb-nav-item{width:auto;height:auto;padding:10px 14px;margin:1px 6px;justify-content:flex-start;gap:12px;}
.sb-nav-item:hover{background:var(--green-lt);color:var(--text);}
.sb-nav-item.active{background:var(--green);color:var(--green-text);}
.sidebar.sb-expanded .sb-nav-item.active{background:var(--green-lt);color:var(--text);}
.sidebar.sb-expanded .sb-nav-item.active .sb-nav-label{font-weight:700;color:var(--green-text);}
.sb-nav-item svg{width:20px;height:20px;flex-shrink:0;}
.sb-nav-label{font-size:var(--fs-base);font-weight:400;white-space:nowrap;overflow:hidden;display:none;}
.sidebar.sb-expanded .sb-nav-label{display:block;}
.sb-nav-sep{height:.5px;background:var(--border-lt);margin:5px auto;width:28px;}
.sidebar.sb-expanded .sb-nav-sep{width:calc(100% - 24px);margin:5px 12px;}
.sb-spacer{flex:1;}
.sb-toggle-btn{display:flex;align-items:center;justify-content:center;width:38px;height:28px;margin:2px auto 4px;border-radius:var(--r);background:none;border:none;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);}
.sidebar.sb-expanded .sb-toggle-btn{width:calc(100% - 12px);margin:2px 6px 4px;justify-content:flex-end;padding-right:8px;}
.sb-toggle-btn:hover{background:var(--bg);color:var(--text);}

/* ── Content area ── */
.content-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.content-title{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1.1;}
.content-sub{font-size:var(--fs-sm);color:var(--text-3);margin-top:4px;}

/* ── Client list ── */
.client-list{display:flex;flex-direction:column;gap:10px;}
.client-row{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color var(--t-fast),box-shadow var(--t-fast);}
.client-row:hover{border-color:var(--green);box-shadow:var(--shadow-sm);}
.client-row-avatar{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;}
.client-row-name{font-size:var(--fs-base);font-weight:600;color:var(--text);}
.client-row-slug{font-size:var(--fs-xs);color:var(--text-3);margin-top:2px;font-family:monospace;}
.client-row-actions{margin-left:auto;display:flex;gap:8px;flex-shrink:0;}

/* ── Buttons ── */
.btn{padding:6px 14px;border-radius:var(--r);font-size:var(--fs-sm);font-weight:500;cursor:pointer;border:none;transition:all var(--t-fast);display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--green);color:var(--green-text);}
.btn-primary:hover{background:var(--green-dk);color:#fff;}
.btn-outline{background:transparent;color:var(--magenta);border:var(--bw) solid var(--magenta);}
.btn-outline:hover{background:var(--magenta-lt);}
.btn-ghost{background:transparent;color:var(--text-2);border:var(--bw) solid var(--border);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}

/* ── Tabs ── */
.tab-bar{display:flex;gap:2px;border-bottom:var(--bw) solid var(--border);margin-bottom:20px;}
.tab-btn{padding:8px 16px;border:none;cursor:pointer;font-size:var(--fs-sm);background:transparent;color:var(--text-2);font-weight:400;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all var(--t-fast);}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--text);font-weight:600;border-bottom-color:var(--green);}
.tab-badge{margin-left:5px;font-size:10px;background:var(--magenta-lt);color:var(--magenta);padding:1px 6px;border-radius:var(--r-pill);}

/* ── Cards ── */
.card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:20px;}
.section-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:var(--ls-wide);}

/* ── Stats strip ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg);border-radius:var(--r);padding:14px 16px;}
.stat-val{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1;}
.stat-lbl{font-size:var(--fs-xs);color:var(--text-3);margin-top:4px;text-transform:uppercase;letter-spacing:var(--ls-wide);}

/* ── Brand Assets ── */
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:24px;}
.swatch{border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);cursor:pointer;transition:transform var(--t-fast);}
.swatch:hover{transform:translateY(-2px);}
.swatch-color{height:56px;display:flex;align-items:center;justify-content:center;}
.swatch-info{padding:6px 9px;background:var(--surface);}
.swatch-name{font-size:11px;font-weight:500;color:var(--text);}
.swatch-hex{font-size:10px;color:var(--text-3);font-family:monospace;}
.swatch-role{font-size:9px;color:var(--text-3);}

/* ── Logo cards ── */
.logo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:24px;}
.logo-card{border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);}
.logo-preview{height:70px;display:flex;align-items:center;justify-content:center;}
.logo-info{padding:9px 12px;background:var(--surface);}
.logo-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;}
.logo-meta{font-size:10px;color:var(--text-3);margin-bottom:6px;}
.logo-add{height:130px;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text-3);cursor:pointer;font-size:var(--fs-xs);transition:border-color var(--t-fast);}
.logo-add:hover{border-color:var(--green);color:var(--green-dk);}

/* ── Approvals ── */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:4px 12px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-xs);cursor:pointer;font-weight:500;transition:all var(--t-fast);}
.filter-btn.active{background:var(--green-lt);border-color:var(--green-dk);color:var(--green-text);font-weight:700;}
.approval-card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.approval-stripe{width:5px;flex-shrink:0;}
.approval-body{flex:1;padding:14px 18px;}
.approval-status{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.approval-title{font-size:var(--fs-base);font-weight:600;color:var(--text);margin:5px 0 4px;}
.approval-note{font-size:var(--fs-sm);color:var(--text-2);margin-bottom:10px;}
.approval-preview{width:44px;height:44px;border-radius:var(--r);flex-shrink:0;}
.pill{font-size:var(--fs-xs);font-weight:500;padding:2px 7px;border-radius:var(--rs);display:inline-flex;align-items:center;}

/* ── Moodboard ── */
.moodboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start;}
.mood-col{display:flex;flex-direction:column;gap:12px;}
.mood-item{border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);cursor:pointer;transition:border-color var(--t-fast);}
.mood-item:hover{border-color:var(--green);}
.mood-item.selected{border-width:2px;}
.mood-visual{display:flex;align-items:center;justify-content:center;padding:16px;}
.mood-info{padding:9px 12px;background:var(--surface);}
.mood-title{font-size:11px;font-weight:500;color:var(--text);}
.mood-note{font-size:10px;color:var(--text-3);line-height:1.4;margin-top:2px;}
.mood-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;}

/* ── Portal client view header ── */
.portal-header{background:var(--surface);border-bottom:var(--bw) solid var(--border);padding:0 24px;}
.portal-header-inner{max-width:860px;margin:0 auto;padding:20px 0;}
.portal-logo{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 24px;color:var(--text-3);}
.empty-icon{font-size:var(--fs-lg);margin-bottom:12px;}
.empty-title{font-size:var(--fs-md);font-weight:600;color:var(--text-2);margin-bottom:6px;}
.empty-sub{font-size:var(--fs-sm);}

/* ── Pill badge ── */
.badge{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);}
.badge-pending{background:var(--magenta-lt);color:var(--magenta);}
.badge-approved{background:var(--green-lt);color:var(--green-dk);}
.badge-revision{background:#FFF3E0;color:#E65100;}

/* ── Back button ── */
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-sm);cursor:pointer;transition:all var(--t-fast);}
.back-btn:hover{background:var(--bg);color:var(--text);}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-3);font-size:var(--fs-sm);}

/* ── Link box ── */
.link-box{padding:5px 12px;border-radius:var(--r);background:var(--bg);border:var(--bw) solid var(--border);font-size:var(--fs-xs);color:var(--text-3);font-family:monospace;}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-pill);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,useRef} = React;
const h = React.createElement;
const API_KEY = 'NASSA_SECRET_2026';

// ── Utils ──
function contrast(hex){
  if(!hex||hex.length<4) return '#fff';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.55?'#111':'#fff';
}
function isPortal(){ return location.pathname.startsWith('/portal/'); }
function portalSlug(){ return location.pathname.replace('/portal/','').split('/')[0]; }
function toggleTheme(){
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;
  localStorage.setItem('nb_theme',t);
}
(()=>{const t=localStorage.getItem('nb_theme')||'light';document.documentElement.dataset.theme=t;})();

// ── API ──
async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json','x-nassa-key':API_KEY,...(opts.headers||{})},credentials:'include'});
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

// ── STATUS ──
const STATUS={
  pending: {lbl:'In attesa', color:'#C2185B', bg:'#FCE4EC', icon:'⏳'},
  approved:{lbl:'Approvato', color:'#1A8C3F', bg:'#E8F5E9', icon:'✓'},
  revision:{lbl:'Revisione', color:'#E65100', bg:'#FFF3E0', icon:'↩'},
};
const TAG_COLORS={Mood:'#534AB7',Palette:'#C25B2A',Foto:'#0F6E56',Copy:'#C2185B',Tipo:'#185FA5',Strategy:'#6B1A2A',ToV:'#854F0B'};

// ── SVG Icons ──
function Icon({d,size=20,stroke='currentColor',sw=2}){
  return h('svg',{viewBox:'0 0 24 24',width:size,height:size,fill:'none',stroke,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'},
    h('path',{d})
  );
}
const ICONS = {
  grid:    h('svg',{viewBox:'0 0 24 24',width:20,height:20,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('rect',{x:3,y:3,width:7,height:7}),h('rect',{x:14,y:3,width:7,height:7}),h('rect',{x:14,y:14,width:7,height:7}),h('rect',{x:3,y:14,width:7,height:7})),
  palette: h('svg',{viewBox:'0 0 24 24',width:20,height:20,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('circle',{cx:12,cy:12,r:10}),h('circle',{cx:8,cy:9,r:1.5,fill:'currentColor'}),h('circle',{cx:15,cy:8,r:1.5,fill:'currentColor'}),h('circle',{cx:16,cy:14,r:1.5,fill:'currentColor'}),h('circle',{cx:10,cy:15,r:1.5,fill:'currentColor'})),
  check:   h('svg',{viewBox:'0 0 24 24',width:20,height:20,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('polyline',{points:'20 6 9 17 4 12'})),
  board:   h('svg',{viewBox:'0 0 24 24',width:20,height:20,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('rect',{x:3,y:3,width:18,height:18,rx:2}),h('line',{x1:9,y1:3,x2:9,y2:21}),h('line',{x1:15,y1:3,x2:15,y2:21})),
  chevL:   h('svg',{viewBox:'0 0 24 24',width:16,height:16,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('polyline',{points:'15 18 9 12 15 6'})),
  chevR:   h('svg',{viewBox:'0 0 24 24',width:16,height:16,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('polyline',{points:'9 18 15 12 9 6'})),
  moon:    h('svg',{viewBox:'0 0 24 24',width:16,height:16,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z'})),
  copy:    h('svg',{viewBox:'0 0 24 24',width:14,height:14,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('rect',{x:9,y:9,width:13,height:13,rx:2}),h('path',{d:'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'})),
  ext:     h('svg',{viewBox:'0 0 24 24',width:14,height:14,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6'}),h('polyline',{points:'15 3 21 3 21 9'}),h('line',{x1:10,y1:14,x2:21,y2:3})),
};

// ── Swatch ──
function Swatch({c}){
  const [cp,setCp]=useState(false);
  return h('div',{className:'swatch',onClick:()=>{try{navigator.clipboard?.writeText(c.hex);}catch(e){}setCp(true);setTimeout(()=>setCp(false),1400)}},
    h('div',{className:'swatch-color',style:{background:c.hex}},
      cp&&h('span',{style:{fontSize:10,fontWeight:600,color:contrast(c.hex)}},'Copiato!')
    ),
    h('div',{className:'swatch-info'},
      h('div',{className:'swatch-name'},c.name),

// ── Approvals ──
function Approvals({client,isAdmin,onUpdateStatus}){
  const [filter,setFilter]=useState('all');
  const approvals=client.approvals||[];
  const list=filter==='all'?approvals:approvals.filter(a=>a.stato===filter);
  const counts={pending:approvals.filter(a=>a.stato==='pending').length,approved:approvals.filter(a=>a.stato==='approved').length,revision:approvals.filter(a=>a.stato==='revision').length};

  return h('div',null,
    h('div',{className:'filter-row'},
      [['all','Tutti',approvals.length],['pending','In attesa',counts.pending],['approved','Approvati',counts.approved],['revision','Revisioni',counts.revision]].map(([id,lbl,n])=>
        h('button',{key:id,className:'filter-btn'+(filter===id?' active':''),onClick:()=>setFilter(id)},lbl,' ',n>0&&h('span',null,'('+n+')'))
      )
    ),
    list.length===0&&h('div',{className:'empty'},
      h('div',{className:'empty-icon'},'✓'),
      h('div',{className:'empty-title'},'Nessun contenuto'),
      h('div',{className:'empty-sub'},'Nessun contenuto in questa categoria')
    ),
    h('div',null,list.map(a=>{
      const st=STATUS[a.stato]||STATUS.pending;
      return h('div',{key:a.id,className:'approval-card'},
        h('div',{style:{display:'flex'}},
          h('div',{className:'approval-stripe',style:{background:st.color}}),
          h('div',{className:'approval-body'},
            h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:6}},
              h('div',null,
                h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:5}},
                  h('span',{className:'approval-status',style:{background:st.bg,color:st.color}},st.icon,' ',st.lbl),
                  h('span',{className:'pill',style:{background:'var(--bg)',color:'var(--text-3)',fontSize:11,padding:'2px 8px',borderRadius:4}},a.tipo),
                  a.formato&&h('span',{className:'pill',style:{background:'var(--bg)',color:'var(--text-3)',fontSize:11,padding:'2px 8px',borderRadius:4}},a.formato)
                ),
                h('div',{className:'approval-title'},a.titolo)
              ),
              a.preview&&h('div',{className:'approval-preview',style:{background:a.preview}})
            ),
            a.note&&h('div',{className:'approval-note'},a.note),
            h('div',{style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
              h('span',{style:{fontSize:11,color:'var(--text-3)'}},'📅 ',a.data),
              a.stato==='pending'&&!isAdmin&&h('div',{style:{marginLeft:'auto',display:'flex',gap:6}},
                h('button',{className:'btn btn-primary',onClick:()=>onUpdateStatus(a.id,'approved')},'✓ Approvo'),
                h('button',{className:'btn btn-outline',onClick:()=>onUpdateStatus(a.id,'revision')},'↩ Revisione')
              ),
              isAdmin&&a.stato==='revision'&&h('span',{style:{marginLeft:'auto',fontSize:12,color:'#E65100',fontWeight:500}},'⚠ Revisione richiesta'),
              a.stato==='approved'&&h('span',{style:{marginLeft:'auto',fontSize:12,color:'#1A8C3F',fontWeight:500}},'✓ Pronto per pubblicazione')
            )
          )
        )
      );
    }))
  );
}

// ── Moodboard ──
function Moodboard({client,isAdmin}){
  const [sel,setSel]=useState(null);
  const items=client.moodboard||[];
  const cols=[0,1,2].map(ci=>items.filter((_,i)=>i%3===ci));

  if(!items.length) return h('div',null,
    isAdmin&&h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:16}},
      h('button',{className:'btn btn-outline',onClick:()=>alert('Aggiungi elemento')},'+ Aggiungi elemento')
    ),
    h('div',{className:'empty'},h('div',{className:'empty-icon'},'🎭'),h('div',{className:'empty-title'},'Moodboard vuota'),h('div',{className:'empty-sub'},'Aggiungi il primo elemento'))
  );

  return h('div',null,
    !isAdmin&&h('div',{style:{padding:'10px 14px',borderRadius:'var(--r)',background:'#fffbeb',border:'0.5px solid #fde68a',fontSize:12,color:'#92400e',marginBottom:16}},
      '💡 Questa è la direzione creativa del tuo progetto. Clicca su un elemento per lasciare un commento.'
    ),
    isAdmin&&h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:16}},
      h('button',{className:'btn btn-outline',onClick:()=>alert('Aggiungi elemento')},'+ Aggiungi elemento')
    ),
    h('div',{className:'moodboard-grid'},
      cols.map((col,ci)=>h('div',{key:ci,className:'mood-col'},
        col.map(item=>{
          const tc=TAG_COLORS[item.tag]||'var(--text-3)';
          const isSel=sel===item.id;
          return h('div',{key:item.id,className:'mood-item'+(isSel?' selected':''),
            style:{borderColor:isSel?tc:'var(--border)'},
            onClick:()=>setSel(isSel?null:item.id)
          },
            h('div',{className:'mood-visual',style:{background:item.color,aspectRatio:'1/'+(item.height||1)}},
              item.tipo==='text'&&h('p',{style:{margin:0,fontSize:12,color:contrast(item.color),lineHeight:1.5,textAlign:'center',fontStyle:'italic',whiteSpace:'pre-line'}},item.note),
              item.tipo==='color'&&h('div',{style:{fontSize:13,fontWeight:600,color:contrast(item.color),textAlign:'center'}},item.titolo),
              item.tipo==='image'&&h('div',{style:{textAlign:'center',opacity:.65}},h('div',{style:{fontSize:24,marginBottom:4}},'🖼'),h('div',{style:{fontSize:10,color:contrast(item.color)}},'Immagine'))
            ),
            h('div',{className:'mood-info'},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}},
                h('div',{className:'mood-title'},item.titolo),
                h('span',{className:'mood-tag',style:{background:tc+'18',color:tc}},item.tag)
              ),
              item.tipo!=='text'&&h('div',{className:'mood-note'},item.note),
              isSel&&!isAdmin&&h('div',{style:{marginTop:8}},
                h('textarea',{rows:2,placeholder:'Lascia un commento...',style:{width:'100%',padding:'6px 8px',fontSize:11,borderRadius:6,border:'0.5px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontFamily:'inherit',resize:'vertical',boxSizing:'border-box'}}),
                h('button',{className:'btn btn-primary',style:{marginTop:4,fontSize:11,padding:'4px 12px'}},'Invia commento')
              ),
              isSel&&isAdmin&&h('div',{style:{marginTop:8,display:'flex',gap:6}},
                h('button',{className:'btn btn-ghost',style:{fontSize:11}},'✏ Modifica'),
                h('button',{className:'btn btn-outline',style:{fontSize:11}},'✕ Rimuovi')
              )
            )
          );
        })
      ))
    )
  );
}

    try{navigator.clipboard.writeText('https://nassa-ped-yp63.vercel.app/portal/'+client.slug);}catch(e){}

  return h('div',null,
    // Stats
    h('div',{className:'stats-strip'},

    h('div',{className:'tab-bar'},

// ── Sidebar component ──
function Sidebar({expanded,onToggle,currentTab,onTab}){
  const NAV=[
    {id:'list',  label:'Clienti',     icon:ICONS.grid,    group:null},
    {id:'assets',label:'Brand Assets',icon:ICONS.palette, group:'CLIENTE'},
    {id:'approvals',label:'Approvazioni',icon:ICONS.check,group:null},
    {id:'moodboard',label:'Moodboard',  icon:ICONS.board, group:null},
  ];
  return h('div',{className:'sidebar'+(expanded?' sb-expanded':'')},
    h('div',{className:'sb-main-nav'},
      h('div',{className:'sb-nav-section'},
        NAV.slice(0,1).map(n=>h('div',{key:n.id,className:'sb-nav-item'+(currentTab===n.id?' active':''),onClick:()=>onTab(n.id)},n.icon,h('span',{className:'sb-nav-label'},n.label)))
      ),
      h('div',{className:'sb-nav-sep'}),
      h('div',{className:'sb-nav-section'},
        h('div',{className:'sb-group-lbl'},'CLIENTE'),
        NAV.slice(1).map(n=>h('div',{key:n.id,className:'sb-nav-item'+(currentTab===n.id?' active':''),onClick:()=>onTab(n.id)},n.icon,h('span',{className:'sb-nav-label'},n.label)))
      ),
      h('div',{className:'sb-spacer'}),
      h('button',{className:'sb-toggle-btn',onClick:onToggle},expanded?ICONS.chevL:ICONS.chevR)
    )
  );
}

// ── Root App ──
function NassaBrand(){
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [selected,setSelected]=useState(null);
  const [view,setView]=useState('list');
  const [tab,setTab]=useState('assets');
  const [sidebarExp,setSidebarExp]=useState(false);

  const pub=isPortal();
  const slug=portalSlug();

  useEffect(()=>{
    if(pub){
      api('/api/brand?public=1&slug='+slug)
        .then(d=>{setSelected(d.client);setLoading(false);})
        .catch(()=>{setError('Cliente non trovato');setLoading(false);});
    } else {
      api('/api/brand')
        .then(d=>{setClients(d.clients||[]);setLoading(false);})
        .catch(()=>{setError('Errore caricamento');setLoading(false);});
    }
  },[]);

  const updateStatus=useCallback(async(clientId,aId,st)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const approvals=c.approvals.map(a=>a.id===aId?{...a,stato:st}:a);
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'approvals',data:approvals})}).catch(console.error);
      return {...c,approvals};
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,approvals:p.approvals.map(a=>a.id===aId?{...a,stato:st}:a)}));
  },[selected]);

  const selectClient=(c,v='assets')=>{setSelected(c);setView('portal');setTab(v);setSidebarExp(true);};

  if(loading)return h('div',{className:'app'},h('div',{className:'loading'},'Caricamento NassaBrand…'));
  if(error)return h('div',{className:'app'},h('div',{className:'loading'},error));
  if(pub&&selected)return h(PortaleCliente,{client:selected,onUpdateStatus:(aId,st)=>updateStatus(selected.id,aId,st)});

  const pending=c=>((c.approvals||[]).filter(a=>a.stato==='pending').length);

  return h('div',{className:'app'},
    // Topbar
    h('div',{className:'topbar'},
      h('div',{className:'topbar-brand'+(sidebarExp?' expanded':''),onClick:()=>setSidebarExp(p=>!p)},
        h('div',{className:'brand-mark'},'N'),
        h('span',{className:'brand-name'},'Nassa Studio')
      ),
      // Client in topbar when selected
      selected&&view==='portal'?
        h('div',{className:'topbar-client'},
          h('div',{className:'client-avatar',style:{background:selected.brand?.colors[0]?.hex||selected.color||'#1A8C3F'}},
            h('span',{style:{color:contrast(selected.brand?.colors[0]?.hex||selected.color||'#1A8C3F'),fontSize:12,fontWeight:800}},selected.name?.charAt(0)||'N')
          ),
          h('div',null,
            h('div',{className:'client-name'},selected.name),
            h('div',{className:'client-sub'},pending(selected)>0?pending(selected)+' in attesa':'Portale attivo')
          )
        )
      :h('div',{className:'topbar-nav'},
        h('div',{className:'nav-tab active'},'NassaBrand')
      ),
      h('div',{className:'topbar-right'},
        selected&&view==='portal'&&h('button',{className:'btn btn-outline',style:{fontSize:11},onClick:()=>window.open('/portal/'+selected.slug,'_blank')},'👤 Vista cliente'),
        selected&&view==='portal'&&h('button',{className:'back-btn',onClick:()=>{setView('list');setSelected(null);setSidebarExp(false);}},ICONS.chevL,' Tutti i clienti'),
        h('button',{className:'topbar-btn',onClick:toggleTheme},'🌙')
      )
    ),
    // Body
    h('div',{className:'body'},
      // Sidebar — only when client selected
      view==='portal'&&h(Sidebar,{expanded:sidebarExp,onToggle:()=>setSidebarExp(p=>!p),currentTab:tab,onTab:v=>{if(v==='list'){setView('list');setSelected(null);setSidebarExp(false);}else setTab(v);}}),
      // Main
      h('div',{className:'main'},
        view==='list'&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:800,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},'Portali clienti'),
                h('div',{className:'content-sub'},clients.length+' clienti attivi')
              )
            ),
            h('div',{className:'client-list'},
              clients.length===0&&h('div',{className:'empty'},h('div',{className:'empty-icon'},'👥'),h('div',{className:'empty-title'},'Nessun cliente'),h('div',{className:'empty-sub'},'Aggiungili prima in NassaPED')),
              clients.map(c=>{
                const pc=c.brand?.colors[0]?.hex||c.color||'#1A8C3F';
                const p=pending(c);
                return h('div',{key:c.id,className:'client-row',onClick:()=>selectClient(c)},
                  h('div',{className:'client-row-avatar',style:{background:pc}},
                    h('span',{style:{color:contrast(pc),fontSize:18,fontWeight:800}},c.name?.charAt(0)||'N')
                  ),
                  h('div',{style:{flex:1}},
                    h('div',{className:'client-row-name'},c.name),
                    h('div',{className:'client-row-slug'},'nassastudio.it/portal/'+c.slug),
                    p>0&&h('span',{className:'badge badge-pending',style:{marginTop:4,display:'inline-block'}},p+' in attesa')
                  ),
                  h('div',{className:'client-row-actions'},
                    h('button',{className:'btn btn-outline',onClick:e=>{e.stopPropagation();window.open('/portal/'+c.slug,'_blank')}},'👤 Simula'),
                    h('button',{className:'btn btn-primary',onClick:e=>{e.stopPropagation();selectClient(c);}},'Gestisci portale')
                  )
                );
              })
            )
          )
        ),
        view==='portal'&&selected&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:900,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},selected.name),
                h('div',{className:'content-sub'},tab==='assets'?'Brand Assets':tab==='approvals'?'Approvazioni':tab==='moodboard'?'Moodboard':'')
              )
            ),
            h(AdminPortaleView,{client:selected,onUpdateStatus:(aId,st)=>updateStatus(selected.id,aId,st)})
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(NassaBrand));
</script>
