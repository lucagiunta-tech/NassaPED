<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nassa Studio · NassaBrand</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#0dff00;--green-dk:#00cc00;--green-lt:#e6ffe4;--green-mid:#b3ffb0;--green-text:#111;
  --magenta:#C2185B;--magenta-lt:#FCE4EC;
  --text:#1c1c1e;--text-2:#6b6b6b;--text-3:#6b7280;
  --bg:#ffffff;--surface:#ffffff;--surface-lt:#f5f5f7;
  --border:#e5e7eb;--border-lt:#f0f0f2;
  --font:'Inter',sans-serif;
  --topbar:56px;--sidebar:56px;--sidebar-expanded:220px;
  --bw:.5px;--r:8px;--rs:4px;--r-xs:3px;--r-pill:99px;
  --fs-xs:11px;--fs-sm:13px;--fs-base:15px;--fs-md:18px;--fs-lg:28px;
  --ls-tight:-.02em;--ls-normal:0em;--ls-wide:.06em;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;
  --t-fast:.1s ease;--t-base:.15s ease;--t-slow:.25s ease;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --warning-bg:#fef9ee;--warning-border:#fde68a;--warning-text:#92400e;
  --danger-bg:#fff5f5;--danger-border:#fca5a5;
  --success-bg:#f0fdf4;--success-border:#bbf7d0;--success-text:#166534;
}
[data-theme="dark"]{
  --bg:#0f0f11;--surface:#1a1a1e;--surface-lt:#222228;
  --border:#2a2a30;--border-lt:#222228;
  --text:#f0f0f2;--text-2:#9ca3af;--text-3:#6b7280;
  --green-lt:#0d2b0c;--green-mid:#1a4d18;--green-text:#0a1a00;
  --warning-bg:#1a1400;--warning-border:#3a2800;--warning-text:#fbbf24;
  --danger-bg:#1a0a0a;--danger-border:#5a1a1a;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;}
textarea,input{font-family:var(--font);}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.body{display:flex;flex:1;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.main-scroll{flex:1;overflow-y:auto;padding:24px;}

/* ── Topbar ── */
.topbar{height:var(--topbar);flex-shrink:0;background:var(--surface);border-bottom:var(--bw) solid var(--border);display:flex;align-items:stretch;z-index:200;}
.topbar-brand{width:var(--sidebar);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:var(--bw) solid var(--border);cursor:pointer;transition:background var(--t-fast);overflow:hidden;gap:10px;padding:0;}
.topbar-brand:hover{background:var(--surface-lt);}
.topbar-brand.expanded{width:var(--sidebar-expanded);justify-content:flex-start;padding:0 16px;}
.topbar-brand .brand-name{opacity:0;white-space:nowrap;transition:opacity var(--t-base);font-size:var(--fs-base);font-weight:700;}
.topbar-brand.expanded .brand-name{opacity:1;}
.brand-mark{width:30px;height:30px;background:var(--green);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--green-text);font-size:var(--fs-base);font-weight:700;flex-shrink:0;}
.brand-name{font-size:var(--fs-base);font-weight:700;color:var(--text);letter-spacing:var(--ls-tight);}
.topbar-nav{display:flex;align-items:stretch;flex:1;padding:0 8px;gap:2px;}
.nav-tab{display:flex;align-items:center;padding:0 18px;font-size:var(--fs-base);font-weight:400;color:var(--text-2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all var(--t-fast);white-space:nowrap;letter-spacing:var(--ls-tight);border:none;background:none;}
.nav-tab:hover{color:var(--text);background:var(--surface-lt);}
.nav-tab.active{color:var(--text);font-weight:700;border-bottom:2.5px solid var(--green);}
.topbar-right{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:var(--bw) solid var(--border);}
.topbar-btn{width:30px;height:30px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all var(--t-fast);}
.topbar-btn:hover{background:var(--surface-lt);color:var(--text);}
.topbar-client{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:var(--bw) solid var(--border);cursor:pointer;min-width:160px;max-width:220px;transition:background var(--t-fast);}
.topbar-client:hover{background:var(--surface-lt);}
.client-avatar{width:26px;height:26px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.client-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-sub{font-size:var(--fs-xs);color:var(--text-3);}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:var(--bw) solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;z-index:100;}
.sidebar.sb-expanded{width:var(--sidebar-expanded);}
.sb-main-nav{display:flex;flex-direction:column;height:100%;width:100%;}
.sb-nav-section{display:flex;flex-direction:column;padding:var(--sp-2) 0;}
.sb-nav-section:not(:last-child){border-bottom:var(--bw) solid var(--border-lt);}
.sb-group-lbl{font-size:var(--fs-xs);letter-spacing:var(--ls-wide);text-transform:uppercase;color:var(--text-3);padding:8px 14px 3px;font-weight:600;display:none;white-space:nowrap;overflow:hidden;opacity:.65;}
.sidebar.sb-expanded .sb-group-lbl{display:block;}
.sb-nav-item{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);margin:1px auto;flex-shrink:0;gap:0;border:none;background:none;}
.sidebar.sb-expanded .sb-nav-item{width:auto;height:auto;padding:10px 14px;margin:1px 6px;justify-content:flex-start;gap:12px;}
.sb-nav-item:hover{background:var(--green-lt);color:var(--text);}
.sb-nav-item.active{background:var(--green);color:var(--green-text);}
.sidebar.sb-expanded .sb-nav-item.active{background:var(--green-lt);color:var(--text);border:1px solid var(--green-mid);}
.sidebar.sb-expanded .sb-nav-item.active svg{color:var(--green-dk);}
.sidebar.sb-expanded .sb-nav-item.active .sb-nav-label{font-weight:700;}
.sb-nav-item svg{width:20px;height:20px;flex-shrink:0;}
.sb-nav-label{font-size:var(--fs-base);font-weight:400;white-space:nowrap;overflow:hidden;display:none;}
.sidebar.sb-expanded .sb-nav-label{display:block;}
.sb-nav-sep{height:.5px;background:var(--border-lt);margin:5px auto;width:28px;}
.sidebar.sb-expanded .sb-nav-sep{width:calc(100% - 24px);margin:5px 12px;}
.sb-spacer{flex:1;}
.sb-toggle-btn{display:flex;align-items:center;justify-content:center;width:38px;height:28px;margin:2px auto 4px;border-radius:var(--r);background:none;border:none;cursor:pointer;color:var(--text-3);transition:all var(--t-fast);}
.sidebar.sb-expanded .sb-toggle-btn{width:calc(100% - 12px);margin:2px 6px 4px;justify-content:flex-end;padding-right:8px;}
.sb-toggle-btn:hover{background:var(--surface-lt);color:var(--text);}

/* ── Content area ── */
.content-header{padding:0 0 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.content-title{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1.1;}
.content-sub{font-size:var(--fs-sm);color:var(--text-3);margin-top:4px;}

/* ── Client list ── */
.client-list{display:flex;flex-direction:column;gap:8px;}
.client-row{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:12px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color var(--t-fast),box-shadow var(--t-fast);}
.client-row:hover{border-color:var(--green);box-shadow:var(--shadow-sm);}
.client-row-avatar{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.client-row-info{flex:1;min-width:0;}
.client-row-name{font-size:var(--fs-base);font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.client-row-meta{font-size:var(--fs-xs);color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:6px;}
.client-row-slug{font-family:monospace;font-size:11px;color:var(--text-3);}
.client-row-dot{color:var(--border);}
.client-row-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0;}
.badge-active{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);background:var(--green-lt);color:var(--green-dk);border:var(--bw) solid var(--green-mid);}

/* ── Buttons ── */
.btn{padding:6px 14px;border-radius:var(--r);font-size:var(--fs-sm);font-weight:500;cursor:pointer;border:var(--bw) solid var(--border);background:var(--surface);color:var(--text);transition:all var(--t-fast);display:inline-flex;align-items:center;gap:5px;}
.btn:hover{background:var(--surface-lt);}
.btn-primary{background:var(--green);border-color:var(--green);color:var(--green-text);}
.btn-primary:hover{background:var(--green-dk);color:#fff;}
.btn-outline{background:transparent;color:var(--magenta);border-color:var(--magenta);}
.btn-outline:hover{background:var(--magenta-lt);}
.btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border);}
.btn-ghost:hover{background:var(--surface-lt);color:var(--text);}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:var(--bw) solid var(--border);margin-bottom:20px;}
.tab-btn{padding:10px 18px;border:none;cursor:pointer;font-size:var(--fs-sm);background:transparent;color:var(--text-2);font-weight:400;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all var(--t-fast);}
.tab-btn:hover{color:var(--text);background:var(--surface-lt);}
.tab-btn.active{color:var(--text);font-weight:600;border-bottom-color:var(--green);}
.tab-badge{margin-left:5px;font-size:10px;font-weight:600;background:var(--magenta-lt);color:var(--magenta);padding:1px 6px;border-radius:var(--r-pill);}

/* ── Cards ── */
.card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:20px;}
.section-title{font-size:var(--fs-xs);font-weight:600;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:var(--ls-wide);}

/* ── Stats strip ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface-lt);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;}
.stat-main{display:flex;flex-direction:column;}
.stat-val{font-size:var(--fs-lg);font-weight:800;color:var(--text);letter-spacing:var(--ls-tight);line-height:1;}
.stat-lbl{font-size:var(--fs-xs);color:var(--text-3);margin-top:4px;text-transform:uppercase;letter-spacing:var(--ls-wide);}
.stat-icon{width:32px;height:32px;border-radius:var(--rs);background:var(--green-lt);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.stat-icon.pending{background:var(--magenta-lt);}

/* ── Brand Assets ── */
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:24px;}
.swatch{border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);cursor:pointer;transition:transform var(--t-fast);}
.swatch:hover{transform:translateY(-2px);}
.swatch-color{height:56px;display:flex;align-items:center;justify-content:center;}
.swatch-info{padding:6px 9px;background:var(--surface);}
.swatch-name{font-size:11px;font-weight:500;color:var(--text);}
.swatch-hex{font-size:10px;color:var(--text-3);font-family:monospace;}
.swatch-role{font-size:9px;color:var(--text-3);}

/* ── Logo cards ── */
.logo-masonry{columns:3;column-gap:12px;margin-bottom:24px;}
.logo-card{break-inside:avoid;display:block;margin-bottom:12px;border-radius:var(--r);overflow:hidden;border:var(--bw) solid var(--border);background:var(--surface);transition:border-color var(--t-fast),box-shadow var(--t-fast);}
.logo-card:hover{border-color:var(--green);box-shadow:var(--shadow-sm);}
.logo-preview{width:100%;display:flex;align-items:center;justify-content:center;background:var(--surface-lt);padding:16px;}
.logo-preview img{width:100%;height:auto;display:block;object-fit:contain;}
.logo-info{padding:10px 12px;background:var(--surface);}
@media(max-width:600px){.logo-masonry{columns:2;}}
.logo-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;}
.logo-meta{font-size:10px;color:var(--text-3);margin-bottom:6px;}
.logo-add-wrap{break-inside:avoid;display:block;margin-bottom:12px;}
.logo-add{height:120px;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text-3);cursor:pointer;font-size:var(--fs-xs);transition:border-color var(--t-fast);}
.logo-add:hover{border-color:var(--green);color:var(--green-dk);}

/* ── Approvals ── */
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 12px;border-radius:var(--r-pill);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-xs);cursor:pointer;font-weight:500;transition:all var(--t-fast);}
.filter-btn:hover{border-color:var(--text-3);color:var(--text);}
.filter-btn.active{background:var(--green-lt);border-color:var(--green-dk);color:var(--green-text);font-weight:700;}
.filter-count{font-size:10px;font-weight:600;padding:0 5px;border-radius:var(--r-pill);background:var(--surface-lt);color:var(--text-3);margin-left:4px;}
.approval-card{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;border-left-width:3px;transition:box-shadow var(--t-fast);}
.approval-card:hover{box-shadow:var(--shadow-sm);}
.approval-stripe{display:none;}
.approval-body{flex:1;padding:14px 16px;}
.approval-status{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.approval-title{font-size:var(--fs-base);font-weight:600;color:var(--text);margin:6px 0 4px;line-height:1.3;}
.approval-note{font-size:var(--fs-sm);color:var(--text-2);margin-bottom:10px;line-height:1.5;}
.approval-preview{width:48px;height:48px;border-radius:var(--r);flex-shrink:0;}
.approval-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:10px;border-top:var(--bw) solid var(--border-lt);}
.approval-date{font-size:11px;color:var(--text-3);}
.pill{font-size:var(--fs-xs);font-weight:500;padding:2px 7px;border-radius:var(--rs);display:inline-flex;align-items:center;}
.btn-approve{padding:5px 14px;border-radius:var(--r);border:none;background:var(--green);color:var(--green-text);font-size:var(--fs-xs);font-weight:600;cursor:pointer;transition:background var(--t-fast);}
.btn-approve:hover{background:var(--green-dk);color:#fff;}
.btn-revision{padding:5px 14px;border-radius:var(--r);border:var(--bw) solid var(--magenta);background:transparent;color:var(--magenta);font-size:var(--fs-xs);font-weight:600;cursor:pointer;transition:background var(--t-fast);}
.btn-revision:hover{background:var(--magenta-lt);}

/* ── Moodboard masonry ── */
.moodboard-masonry{
  columns:3;column-gap:12px;
  width:100%;
}
.masonry-item{
  break-inside:avoid;
  display:block;
  margin-bottom:12px;
  border-radius:var(--r);overflow:hidden;
  border:var(--bw) solid var(--border);
  cursor:pointer;transition:border-color var(--t-fast);
  background:var(--surface);
}
.masonry-item:hover{border-color:var(--green);}
.masonry-item.selected{border-width:2px;}
.masonry-visual{width:100%;display:block;object-fit:cover;}
.masonry-body{padding:10px 12px;}
.masonry-title{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:3px;}
.masonry-note{font-size:var(--fs-xs);color:var(--text-2);line-height:1.5;}
.masonry-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-pill);}
@media(max-width:700px){.moodboard-masonry{columns:2;}}
@media(max-width:440px){.moodboard-masonry{columns:1;}}

/* ── Portal header ── */
.portal-logo{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}

/* ── Semaforo Nassa ── */
.semaforo-wrap{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--magenta);}
.semaforo-title{font-size:var(--fs-sm);font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.semaforo-title svg{flex-shrink:0;}
.semaforo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.semaforo-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:4px 0;}
.semaforo-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--t-fast);}
.semaforo-check.checked{background:var(--green);border-color:var(--green-dk);}
.semaforo-check.checked svg{display:block;}
.semaforo-check svg{display:none;width:10px;height:10px;}
.semaforo-lbl{font-size:var(--fs-sm);color:var(--text-2);line-height:1.4;}
.semaforo-lbl.checked{color:var(--text-3);text-decoration:line-through;}
.semaforo-progress{height:4px;background:var(--border-lt);border-radius:99px;margin-bottom:12px;overflow:hidden;}
.semaforo-progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width var(--t-base);}
.semaforo-actions{display:flex;gap:8px;justify-content:flex-end;}
.semaforo-ok{background:var(--green-lt);border:var(--bw) solid var(--green-mid);color:var(--green-dk);font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.semaforo-lbl{font-size:var(--fs-sm);color:var(--text-2);line-height:1.4;}
.semaforo-lbl.checked{color:var(--text-3);text-decoration:line-through;}
.semaforo-progress{height:4px;background:var(--border-lt);border-radius:99px;margin-bottom:12px;overflow:hidden;}
.semaforo-progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width var(--t-base);}
.semaforo-actions{display:flex;gap:8px;justify-content:flex-end;}
.semaforo-ok{background:var(--green-lt);border:var(--bw) solid var(--green-mid);color:var(--green-dk);font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;}
.empty{text-align:center;padding:48px 24px;color:var(--text-3);}
.empty-icon{font-size:var(--fs-lg);margin-bottom:12px;}
.empty-title{font-size:var(--fs-md);font-weight:600;color:var(--text-2);margin-bottom:6px;}
.empty-sub{font-size:var(--fs-sm);}
.badge{font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-pill);}
.badge-pending{background:var(--magenta-lt);color:var(--magenta);}
.badge-approved{background:var(--green-lt);color:var(--green-dk);}
.badge-revision{background:#FFF3E0;color:#E65100;}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;color:var(--text-2);font-size:var(--fs-sm);cursor:pointer;transition:all var(--t-fast);}
.back-btn:hover{background:var(--surface-lt);color:var(--text);}
.loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--text-3);font-size:var(--fs-sm);}
.link-box{padding:5px 12px;border-radius:var(--r);background:var(--surface-lt);border:var(--bw) solid var(--border);font-size:var(--fs-xs);color:var(--text-3);font-family:monospace;}

::-webkit-scrollbar{width:5px;height:5px;}

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,useRef} = React;
const h = React.createElement;
const API_KEY = 'NASSA_SECRET_2026';

// ── Utils ──
function contrast(hex){
  if(!hex||hex.length<4) return '#fff';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255>0.55?'#111':'#fff';
}
function isPortal(){ return location.pathname.startsWith('/portal/'); }
function portalSlug(){ return location.pathname.replace('/portal/','').split('/')[0]; }
function toggleTheme(){
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;
  localStorage.setItem('nb_theme',t);
}
(()=>{const t=localStorage.getItem('nb_theme')||'light';document.documentElement.dataset.theme=t;})();

// ── API ──
async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json','x-nassa-key':API_KEY,...(opts.headers||{})},credentials:'include'});
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

// ── STATUS ──
// ── Semaforo CSS (già presente) ──

// ─── STATUS aggiornato con 'scheduled' ────────────────────────────────────────
// ── Semaforo Nassa — 8 punti pre-pubblicazione ──────────────────────────────
function Swatch({c, allColors, isAdmin, onUpdateUsage}){
  const [cp,   setCp]   = useState(false);
  const [open, setOpen] = useState(false);

  const copy = () => {
    try{ navigator.clipboard?.writeText(c.hex); }catch(e){}
    setCp(true); setTimeout(()=>setCp(false),1400);
  };

  return h('div',{className:'swatch',style:{cursor:'default'}},
    // Colore block — click to copy
    h('div',{className:'swatch-color',style:{background:c.hex,cursor:'pointer'},onClick:copy},
      cp&&h('span',{style:{fontSize:11,fontWeight:600,color:contrast(c.hex),
        background:'rgba(0,0,0,.25)',padding:'2px 6px',borderRadius:4}},'Copiato!')
    ),
    // Info base
    h('div',{className:'swatch-info'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}},
        h('div',{className:'swatch-name'},c.name),
        h('span',{style:{fontSize:10,padding:'1px 5px',borderRadius:99,
          background:'var(--surface-lt)',color:'var(--text-3)',border:'var(--bw) solid var(--border)'}},c.role)
      ),
      h('div',{className:'swatch-hex',style:{display:'flex',alignItems:'center',gap:4,cursor:'pointer'},onClick:copy},
        c.hex.toUpperCase(),
        h('span',{style:{fontSize:9,color:'var(--text-3)'}},'↗')
      ),
      // Regole uso
      c.usage && h('div',{style:{fontSize:10,color:'var(--text-3)',lineHeight:1.4,marginTop:4,
        fontStyle:'italic',borderTop:'var(--bw) solid var(--border-lt)',paddingTop:4}},c.usage),
      // Bottone espandi combinazioni (solo se ci sono altri colori)
      allColors && allColors.length > 1 && h('button',{
        onClick:()=>setOpen(p=>!p),
        style:{width:'100%',marginTop:6,padding:'3px 0',fontSize:10,fontWeight:600,
          border:'var(--bw) solid var(--border)',borderRadius:4,background:'transparent',
          color:'var(--text-3)',cursor:'pointer',transition:'all var(--t-fast)'}
      }, open?'▲ Chiudi combinazioni':'▼ Vedi combinazioni')
    ),
    // Pannello combinazioni colore
    open && allColors && h('div',{style:{borderTop:'var(--bw) solid var(--border)',padding:'8px 10px',
      background:'var(--surface-lt)'}},
      h('div',{style:{fontSize:10,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',
        letterSpacing:'.05em',marginBottom:6}},'Combinazioni su:'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
        allColors.filter(other=>other.id!==c.id).map(other=>{
          // Calcola contrasto WCAG tra i due colori
          const luminance = hex => {
            const rgb = [1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)/255)
              .map(v=>v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4);
            return 0.2126*rgb[0]+0.7152*rgb[1]+0.0722*rgb[2];
          };
          const L1 = luminance(c.hex), L2 = luminance(other.hex);
          const ratio = (Math.max(L1,L2)+0.05)/(Math.min(L1,L2)+0.05);
          const ok = ratio >= 3; // soglia UI (4.5 per testo, 3 per grafica)
          return h('div',{key:other.id,title:`${c.name} su ${other.name} — contrasto ${ratio.toFixed(1)}:1`,
            style:{display:'flex',alignItems:'center',gap:3,padding:'2px 6px',
              borderRadius:4,fontSize:10,fontWeight:600,
              background:other.hex,color:contrast(other.hex),
              border:`1.5px solid ${ok?'var(--green-mid)':'#fca5a5'}`,
              opacity:ok?1:.7}},
            ok?'✓':'✗',' ',other.name
          );
        })
      ),
      h('div',{style:{fontSize:9,color:'var(--text-3)',marginTop:6}},
        '✓ = contrasto ≥ 3:1 (uso grafico) · ✗ = contrasto insufficiente')
    )
  );
}

// ── Upload logo via Dropbox ──
async function uploadLogo(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('user', 'nassa_studio');
  const r = await fetch('/api/dropbox-upload',{
    method:'POST',
    headers:{'x-nassa-key':API_KEY},
    credentials:'include',
    body:fd
  });
  if(!r.ok) throw new Error('Upload fallito: '+r.status);
  const data = await r.json();
  return data.url || data.shared_link || '';
}

const ASSET_CATS = [
  {id:'company_profile',  lbl:'Company Profile',     icon:'📋', desc:'Brochure, presentazione aziendale, profilo istituzionale'},
  {id:'corporate_id',     lbl:'Corporate Identity',  icon:'🏢', desc:'Carta intestata, biglietti da visita, firma email, buste, cartelle'},

  {id:'fotografia',       lbl:'Fotografia',          icon:'📸', desc:'Foto prodotto, foto istituzionali, shooting reference'},

// ── BrandAssets ──
function BrandAssets({client, isAdmin, onAddLogo, onUpdateBrand}){
  const [uploading, setUploading] = useState(false);
  const [uploadErr, setUploadErr] = useState('');
  const [showColorModal, setShowColorModal] = useState(false);
  const [showFontModal,  setShowFontModal]  = useState(false);
  const [colorForm, setColorForm] = useState({name:'', hex:'#C25B2A', role:'Primario', usage:''});
  const [fontForm,  setFontForm]  = useState({name:'', role:'Display', weight:'700'});
  const fileRef = useRef(null);
  const b = client.brand || {colors:[],fonts:[],logos:[],templates:[]};
  const pc = b.colors[0]?.hex || client.color || '#1A8C3F';

  // ── Upload logo ──
  const [pendingLogo, setPendingLogo] = useState(null); // {url,name,format} dopo upload, prima di conferma
  const [logoDetail, setLogoDetail] = useState({variant:'colore',clearspace:'',minSize:'',note:''});
  const [editingLogo, setEditingLogo] = useState(null); // {idx, logo}
  // Asset grafici
  const [assetModal,    setAssetModal]    = useState(null);
  const [assetForm,     setAssetForm]     = useState({name:'',categoria:'company_profile',format:'PDF',note:'',data:''});
  const [assetUploading,setAssetUploading]= useState(false);
  const [assetUrl,      setAssetUrl]      = useState('');
  const assetFileRef = useRef(null);

  const [assetPreview, setAssetPreview] = useState(null); // asset in anteprima
  const PROOF_STATI = ['bozza','revisione','approvato','final'];
  const PROOF_CLR   = {bozza:'#6b7280',revisione:'#c2410c',approvato:'#1d4ed8',final:'#15803d'};

  const updateAssetField = (assetId, updates) => {
    const assets = (b.assets||[]).map(a => a.id===assetId ? {...a,...updates} : a);
    onUpdateBrand && onUpdateBrand(client.id, brd=>({...brd, assets}));
    // Aggiorna anche il preview aperto
    setAssetPreview(p => p && p.id===assetId ? {...p,...updates} : p);
  };

  const [assetVista, setAssetVista] = useState('masonry'); // 'griglia'|'masonry'|'lista'
  const openAssetModal = (catId) => {
    setAssetModal({categoria:catId||'company_profile'});
    setAssetForm({name:'',categoria:catId||'company_profile',format:'PDF',note:'',
      data:new Date().toLocaleDateString('it-IT',{month:'short',year:'numeric'})});
    setAssetUrl('');
  };

  const handleAssetFile = async(e) => {
    const file = e.target.files?.[0]; if(!file) return;
    setAssetUploading(true);
    try {
      const fd=new FormData(); fd.append('file',file); fd.append('user','nassa_studio');
      const r=await fetch('/api/dropbox-upload',{method:'POST',headers:{'x-nassa-key':API_KEY},credentials:'include',body:fd});
      if(!r.ok) throw new Error('Upload '+r.status);
      const d=await r.json();
      setAssetUrl(d.url||d.shared_link||'');
      const ext=file.name.split('.').pop().toUpperCase();
      const name=file.name.replace(/\.[^.]+$/,'').replace(/_+/g,' ').trim().slice(0,40);
      setAssetForm(p=>({...p,name:p.name||name,format:ext}));
    } catch(err){console.error('[asset upload]',err.message);}
    finally{setAssetUploading(false);if(assetFileRef.current)assetFileRef.current.value='';}
  };

  const confirmAsset = () => {
    if(!assetForm.name.trim()) return;
    const assets=[...(b.assets||[]),{
      id:'ast_'+Date.now(),name:assetForm.name.trim(),
      categoria:assetForm.categoria,format:assetForm.format,
      note:assetForm.note.trim(),data:assetForm.data,url:assetUrl,
    }];
    onUpdateBrand&&onUpdateBrand(client.id,brd=>({...brd,assets}));
    setAssetModal(null);
  };

  const handleFile = async(e) => {
    const file = e.target.files?.[0]; if(!file) return;
    setUploading(true); setUploadErr('');
    try {
      const url = await uploadLogo(file);
      const ext = file.name.split('.').pop().toUpperCase();
      const rawName = file.name.replace(/\.[^.]+$/, '');
      const cleanName = rawName
        .replace(/\s*copia\s*\d+\s*$/i,'').replace(/\s*copy\s*\d+\s*$/i,'')
        .replace(/_+/g,' ').replace(/\s{2,}/g,' ').trim().slice(0,40) || rawName.slice(0,40);
      // Apri modal dettagli logo invece di aggiungere direttamente
      setPendingLogo({url, name:cleanName, format:ext});
      setLogoDetail({variant:'colore',clearspace:'',minSize:'',note:''});
    } catch(err){ setUploadErr(err.message); }
    finally { setUploading(false); if(fileRef.current) fileRef.current.value=''; }
  };
  const go = () => !uploading && fileRef.current?.click();

  const confirmLogo = () => {
    if(!pendingLogo) return;
    onAddLogo && onAddLogo({
      id:'logo_'+Date.now(),
      name:pendingLogo.name,
      format:pendingLogo.format,
      url:pendingLogo.url,
      ...logoDetail
    });
    setPendingLogo(null);
  };

  const updateLogo = (idx, updates) => {
    const logos = b.logos.map((l,i) => i===idx ? {...l,...updates} : l);
    onUpdateBrand && onUpdateBrand(client.id, brd=>({...brd, logos}));
  };

  // ── Aggiungi colore ──
  const addColor = () => {
    if(!colorForm.name.trim()) return;
    const colors = [...(b.colors||[]), {
      id:'col_'+Date.now(), name:colorForm.name.trim(),
      hex:colorForm.hex, role:colorForm.role.trim(), usage:colorForm.usage.trim()
    }];
    onUpdateBrand && onUpdateBrand(client.id, brd=>({...brd, colors}));
    setColorForm({name:'', hex:'#C25B2A', role:'Primario', usage:''});
    setShowColorModal(false);
  };

  // ── Aggiungi font ──
  const addFont = () => {
    if(!fontForm.name.trim()) return;
    const fonts = [...(b.fonts||[]), {
      id:'font_'+Date.now(), name:fontForm.name.trim(),
      role:fontForm.role.trim(), weight:fontForm.weight
    }];
    onUpdateBrand && onUpdateBrand(client.id, brd=>({...brd, fonts}));
    setFontForm({name:'', role:'Display', weight:'700'});
    setShowFontModal(false);
  };

  // ── Preset colori rapidi ──
  const COLOR_PRESETS = ['#C25B2A','#F5EDD8','#1A8C3F','#185FA5','#C2185B',
    '#0F6E56','#534AB7','#2C1A0E','#E8DCC8','#6B1A2A','#111111','#ffffff'];

  // ── Modal colore ──
  const colorModal = showColorModal && h('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'},
    onClick:e=>{ if(e.target===e.currentTarget) setShowColorModal(false); }
  },
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r)',padding:24,width:380,boxShadow:'0 8px 32px rgba(0,0,0,.18)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('span',{style:{fontSize:16,fontWeight:700,color:'var(--text)'}},'Aggiungi colore'),
        h('button',{onClick:()=>setShowColorModal(false),style:{border:'none',background:'transparent',fontSize:18,cursor:'pointer',color:'var(--text-2)'}},'×')
      ),
      // Preview
      h('div',{style:{height:64,borderRadius:'var(--r)',background:colorForm.hex,marginBottom:16,
        display:'flex',alignItems:'center',justifyContent:'center'}},
        h('span',{style:{fontSize:12,fontWeight:600,color:contrast(colorForm.hex)}},colorForm.hex.toUpperCase())
      ),
      // Preset
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}},
        COLOR_PRESETS.map(c=>h('div',{key:c,onClick:()=>setColorForm(p=>({...p,hex:c})),
          style:{width:26,height:26,borderRadius:4,background:c,cursor:'pointer',
            border:colorForm.hex===c?'2px solid var(--text)':'2px solid transparent',transition:'border .1s'}}))
      ),
      // Hex input
      h('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:14}},
        h('input',{type:'color',value:colorForm.hex,onChange:e=>setColorForm(p=>({...p,hex:e.target.value})),
          style:{width:44,height:36,border:'var(--bw) solid var(--border)',borderRadius:'var(--r)',cursor:'pointer',padding:2}}),
        h('input',{type:'text',value:colorForm.hex,maxLength:7,
          onChange:e=>{ const v=e.target.value; if(/^#[0-9a-fA-F]{0,6}$/.test(v)) setColorForm(p=>({...p,hex:v})); },
          style:{flex:1,padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
            borderRadius:'var(--r)',fontFamily:'monospace',background:'var(--surface)',color:'var(--text)'}})
      ),
      // Nome + ruolo
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
        h('div',null,
          h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},'Nome colore *'),
          h('input',{type:'text',value:colorForm.name,autoFocus:true,
            onChange:e=>setColorForm(p=>({...p,name:e.target.value})),
            placeholder:'Es. Terracotta',
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
              borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)',boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},'Ruolo'),
          h('select',{value:colorForm.role,onChange:e=>setColorForm(p=>({...p,role:e.target.value})),
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
              borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)'}},
            ['Primario','Secondario','Accento','Neutro','Sfondo','Testo'].map(r=>h('option',{key:r,value:r},r))
          )
        )
      ),
      // Regole uso
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},'Regole d\'uso'),
        h('textarea',{rows:2,value:colorForm.usage,onChange:e=>setColorForm(p=>({...p,usage:e.target.value})),
          placeholder:'Es. Colore principale. Su sfondo bianco. Mai su verde.',
          style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
            borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)',
            resize:'vertical',fontFamily:'inherit',boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{onClick:()=>setShowColorModal(false),className:'btn btn-ghost'},'Annulla'),
        h('button',{onClick:addColor,className:'btn btn-primary',
          style:{opacity:colorForm.name.trim()?1:.45}},'Aggiungi colore')
      )
    )
  );

  // ── Modal font ──
  const fontModal = showFontModal && h('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'},
    onClick:e=>{ if(e.target===e.currentTarget) setShowFontModal(false); }
  },
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r)',padding:24,width:380,boxShadow:'0 8px 32px rgba(0,0,0,.18)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('span',{style:{fontSize:16,fontWeight:700,color:'var(--text)'}},'Aggiungi font'),
        h('button',{onClick:()=>setShowFontModal(false),style:{border:'none',background:'transparent',fontSize:18,cursor:'pointer',color:'var(--text-2)'}},'×')
      ),
      // Preview
      fontForm.name && h('div',{style:{padding:'12px 16px',background:'var(--surface-lt)',borderRadius:'var(--r)',marginBottom:14,
        fontFamily:fontForm.name+',sans-serif',fontSize:28,fontWeight:fontForm.weight,color:'var(--text)'}},
        'Aa Bb — ',fontForm.name
      ),
      h('div',{style:{marginBottom:12}},
        h('label',{style:{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}},'Nome font *'),
        h('input',{type:'text',value:fontForm.name,autoFocus:true,
          onChange:e=>setFontForm(p=>({...p,name:e.target.value})),
          placeholder:'Es. Playfair Display',

// Semaforo Nassa items
const SEMAFORO_ITEMS=[
  {id:'s1',lbl:'Il contenuto rispetta il ToV del brand'},
  {id:'s2',lbl:'Caption corretta: lunghezza, emoji, hashtag, CTA'},
  {id:'s3',lbl:'Visual coerente con palette e moodboard'},

function Semaforo({onConfirm,onCancel}){
  const [checked,setChecked]=useState({});
  const count=Object.values(checked).filter(Boolean).length;
  const allOk=count===SEMAFORO_ITEMS.length;
  return h('div',{className:'semaforo-wrap'},
    h('div',{className:'semaforo-title'},
      h('svg',{viewBox:'0 0 24 24',width:16,height:16,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
        h('circle',{cx:12,cy:12,r:10}),h('line',{x1:12,y1:8,x2:12,y2:12}),h('line',{x1:12,y1:16,x2:'12.01',y2:16})),
      'Semaforo Nassa',
      h('span',{style:{marginLeft:'auto',fontSize:11,color:allOk?'var(--green-dk)':'var(--text-3)',fontWeight:600}},count+'/'+SEMAFORO_ITEMS.length)
    ),
    h('div',{className:'semaforo-progress'},h('div',{className:'semaforo-progress-fill',style:{width:(count/SEMAFORO_ITEMS.length*100)+'%'}})),
    h('div',{className:'semaforo-list'},
      SEMAFORO_ITEMS.map(item=>h('div',{key:item.id,className:'semaforo-item',
        onClick:()=>setChecked(p=>({...p,[item.id]:!p[item.id]}))},
        h('div',{className:'semaforo-check'+(checked[item.id]?' checked':'')},
          h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'var(--green-text)',strokeWidth:3,strokeLinecap:'round',strokeLinejoin:'round'},
            h('polyline',{points:'20 6 9 17 4 12'}))),
        h('span',{className:'semaforo-lbl'+(checked[item.id]?' checked':'')},item.lbl)
      ))
    ),
    h('div',{className:'semaforo-actions'},
      h('button',{className:'btn btn-ghost',style:{fontSize:12},onClick:onCancel},'Annulla'),
      h('button',{className:'btn btn-approve',style:{opacity:allOk?1:.45,cursor:allOk?'pointer':'not-allowed'},
        onClick:allOk?onConfirm:null,title:allOk?'':'Completa tutti gli 8 punti'},
        '✓ Conferma approvazione')
    )
  );
}

function Approvals({client,isAdmin,onUpdateStatus,onAddApproval,onMoveToAssets}){
  const [vista,    setVista]    = useState('lista'); // 'lista' | 'kanban'
  const [filter,   setFilter]   = useState('all');
  const [showNew,  setShowNew]  = useState(false);
  const [semaforoFor, setSemaforoFor] = useState(null);
  const [form, setForm] = useState({titolo:'',tipo:'Post',formato:'Feed 1:1',note:'',preview:'#C25B2A',categoria:''});
  const approvals = client.approvals || [];

  const TIPI    = ['Post','Reel','Storia','Carosello','Video','Newsletter','ADV','Asset visivo','Colore','Testo/Copy','Altro'];
  const FORMATI = ['Feed 1:1','Feed 4:5','Feed 16:9','Storia 9:16','Reel 9:16','Carosello','Email','Banner','PNG','PDF','SVG','AI'];
  const PREVIEW_COLORS = ['#C25B2A','#F5EDD8','#1A8C3F','#185FA5','#C2185B','#0F6E56','#2C1A0E','#534AB7','#E8DCC8'];

  const proofUpdate = (aId, proofStato) => {
    onUpdateStatus(aId, approvals.find(a=>a.id===aId)?.stato||'pending', {proof_stato:proofStato});
  };

  const byStato = stato => approvals.filter(a=>(a.proof_stato||'bozza')===stato);
  const counts  = Object.fromEntries(APPROVAL_PROOF.map(s=>[s, byStato(s).length]));

  const submitNew = () => {
    if(!form.titolo.trim()) return;
    const today=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
    onAddApproval&&onAddApproval({
      id:'apr_'+Date.now(),titolo:form.titolo.trim(),tipo:form.tipo,formato:form.formato,
      note:form.note.trim(),preview:form.preview,stato:'pending',proof_stato:'bozza',
      data:today,semaforo_ok:false,categoria:form.categoria,
    });
    setForm({titolo:'',tipo:'Post',formato:'Feed 1:1',note:'',preview:'#C25B2A',categoria:''});
    setShowNew(false);
  };

  const filteredList = filter==='all' ? approvals : approvals.filter(a=>(a.proof_stato||'bozza')===filter);

  const cardProps = a => ({a, isAdmin, semaforoFor, setSemaforoFor,
    onProof: proofUpdate,
    onMoveToAssets,
  });

  // ── Modal nuovo contenuto ──
  const newModal = showNew && h('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'},
    onClick:e=>{if(e.target===e.currentTarget)setShowNew(false);}
  },
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r)',padding:24,width:420,
      maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,.2)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('span',{style:{fontSize:15,fontWeight:700,color:'var(--text)'}},'Nuovo contenuto'),
        h('button',{onClick:()=>setShowNew(false),style:{border:'none',background:'transparent',fontSize:17,cursor:'pointer',color:'var(--text-2)'}},'×')
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Titolo *'),
        h('input',{type:'text',value:form.titolo,autoFocus:true,onChange:e=>setForm(p=>({...p,titolo:e.target.value})),
          placeholder:'Es. Post lancio estate — carosello 5 slide',
          style:{width:'100%',padding:'8px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
            borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)',outline:'none',boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Tipo'),
          h('select',{value:form.tipo,onChange:e=>setForm(p=>({...p,tipo:e.target.value})),
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)'}},
            TIPI.map(t=>h('option',{key:t,value:t},t)))
        ),
        h('div',null,
          h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Formato'),
          h('select',{value:form.formato,onChange:e=>setForm(p=>({...p,formato:e.target.value})),
            style:{width:'100%',padding:'7px 10px',fontSize:13,border:'var(--bw) solid var(--border)',borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)'}},
            FORMATI.map(f=>h('option',{key:f,value:f},f)))
        )
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Note'),
        h('textarea',{rows:2,value:form.note,onChange:e=>setForm(p=>({...p,note:e.target.value})),
          placeholder:'Es. Carosello 5 slide. CTA: prenota ora.',
          style:{width:'100%',padding:'8px 10px',fontSize:13,border:'var(--bw) solid var(--border)',
            borderRadius:'var(--r)',background:'var(--surface)',color:'var(--text)',resize:'vertical',fontFamily:'inherit',boxSizing:'border-box'}})
      ),
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}},'Colore preview'),
        h('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:6}},
          PREVIEW_COLORS.map(c=>h('div',{key:c,onClick:()=>setForm(p=>({...p,preview:c})),
            style:{width:24,height:24,borderRadius:4,background:c,cursor:'pointer',
              border:form.preview===c?'2px solid var(--text)':'2px solid transparent'}})),
          h('input',{type:'color',value:form.preview,onChange:e=>setForm(p=>({...p,preview:e.target.value})),
            style:{width:32,height:24,border:'var(--bw) solid var(--border)',borderRadius:4,cursor:'pointer',padding:2}})
        ),
        h('div',{style:{height:24,borderRadius:'var(--r)',background:form.preview}})

      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{onClick:()=>setShowNew(false),className:'btn btn-ghost'},'Annulla'),

        'Tutti ',h('span',{className:'filter-count'},approvals.length)),
      APPROVAL_PROOF.map(s=>approvals.filter(a=>(a.proof_stato||'bozza')===s).length>0&&
        h('button',{key:s,
          className:'filter-btn'+(filter===s?' active':''),
          onClick:()=>setFilter(s),
          style:{borderColor:filter===s?APR_CLR[s]:'var(--border)',

  // ── Vista KANBAN ──
  const [dragging, setDragging] = useState(null);
  const onDragStart = (a) => setDragging(a);

    if(dragging && (dragging.proof_stato||'bozza')!==stato){
      if(stato==='final'){
        onMoveToAssets&&onMoveToAssets(dragging);
      } else {
        proofUpdate(dragging.id, stato);
      }
    }
    setDragging(null);
  };

  const kanbanView = h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,alignItems:'start'}},
    APPROVAL_PROOF.map(stato=>h('div',{key:stato,
      onDragOver:e=>{e.preventDefault();},
      onDrop:()=>onDrop(stato),
      style:{background:APR_BG[stato],borderRadius:'var(--r)',padding:10,minHeight:200,
        border:'var(--bw) solid '+APR_CLR[stato]+'33',transition:'background var(--t-fast)'}},

      h('div',{style:{fontSize:11,fontWeight:700,color:APR_CLR[stato],marginBottom:8,
        textTransform:'uppercase',letterSpacing:'.06em',display:'flex',justifyContent:'space-between'}},
        APR_LBL[stato],
        h('span',{style:{fontWeight:400,fontSize:10,color:APR_CLR[stato]+'cc'}},counts[stato]||0)
      ),
      // Cards
      byStato(stato).map(a=>h('div',{key:a.id,
        draggable:isAdmin,
        onDragStart:()=>onDragStart(a),
        style:{background:'var(--surface)',borderRadius:6,padding:'8px 10px',marginBottom:8,
          border:'var(--bw) solid var(--border)',cursor:isAdmin?'grab':'default',
          boxShadow:dragging?.id===a.id?'0 4px 12px rgba(0,0,0,.15)':'none',
          opacity:dragging?.id===a.id?.6:1}},
        // Preview mini
        h('div',{style:{height:40,borderRadius:4,marginBottom:6,overflow:'hidden',
          background:a.imageUrl?'#000':(a.preview||'#C25B2A'),display:'flex',alignItems:'center',justifyContent:'center'}},
          a.imageUrl&&h('img',{src:a.imageUrl,alt:a.titolo,
            style:{width:'100%',height:'100%',objectFit:'cover'}})),
        h('div',{style:{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:2,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a.titolo),
        h('div',{style:{fontSize:10,color:'var(--text-3)'}},a.tipo+(a.data?' · '+a.data:'')),
        // Move to final button
        isAdmin&&stato!=='final'&&h('button',{
          className:'btn btn-ghost',
          style:{width:'100%',fontSize:10,padding:'3px 0',marginTop:6},
          onClick:()=>stato==='approvato'?(onMoveToAssets&&onMoveToAssets(a)):proofUpdate(a.id,APPROVAL_PROOF[APPROVAL_PROOF.indexOf(stato)+1])
        },stato==='approvato'?'🏁 → Brand Assets':'→ '+APR_LBL[APPROVAL_PROOF[APPROVAL_PROOF.indexOf(stato)+1]])
      )),
      // Drop zone hint
      h('div',{style:{height:40,border:'1.5px dashed '+APR_CLR[stato]+'44',borderRadius:6,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:10,color:APR_CLR[stato]+'88'}},
        'Trascina qui')
    ))
  );

  return h('div',null,
    newModal,
    // Header
    isAdmin&&h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
      // Vista toggle
      h('div',{style:{display:'flex',gap:4,background:'var(--surface-lt)',padding:3,borderRadius:'var(--r)',border:'var(--bw) solid var(--border)'}},
        [['lista','☰ Lista'],['kanban','⊞ Kanban']].map(([id,lbl])=>
          h('button',{key:id,onClick:()=>setVista(id),
            style:{padding:'4px 12px',borderRadius:'calc(var(--r) - 2px)',fontSize:12,fontWeight:600,cursor:'pointer',
              border:'none',background:vista===id?'var(--surface)':'transparent',
              color:vista===id?'var(--text)':'var(--text-3)',
              boxShadow:vista===id?'0 1px 3px rgba(0,0,0,.08)':'none'}},lbl)
        )
      ),
      h('button',{className:'btn btn-primary',onClick:()=>setShowNew(true)},'+ Nuovo contenuto')
    ),
    vista==='lista' ? listaView : kanbanView
  );
}


function AdminPortaleView({client,onUpdateStatus,onAddLogo,onAddMoodItem,onUpdateBrand,onAddApproval,onSendToApprovals,onMoveToAssets,tab}){

  const pending=(client.approvals||[]).filter(a=>a.stato==='pending').length;
  const [linkCopied,setLinkCopied]=useState(false);
  const [reminderCopied,setReminderCopied]=useState(false);
  const portalUrl='https://nassa-ped-yp63.vercel.app/portal/'+client.slug;

  const copyLink=()=>{
    try{navigator.clipboard.writeText(portalUrl);}catch(e){}
    setLinkCopied(true); setTimeout(()=>setLinkCopied(false),2000);
  };

  const copyReminder=()=>{
    const msg=`Ciao! 👋\nHai ${pending} contenut${pending===1?'o':'i'} in attesa di approvazione sul portale Nassa Studio.\n\n🔗 ${portalUrl}\n\nAppena puoi dai un'occhiata — bastano pochi click! 🙏`;

    setReminderCopied(true); setTimeout(()=>setReminderCopied(false),2500);
  };

  return h('div',null,
    // Stats
    h('div',{className:'stats-strip'},
      (()=>{
        const assetN=(client.brand?.logos?.length||0)+(client.brand?.templates?.length||0)+(client.brand?.colors?.length||0);
        return [
          {lbl:'Asset',           val:assetN,                      icon:'🎨', cls:''},
          {lbl:'In approvazione', val:pending,                     icon:'⏳', cls:pending>0?' pending':''},
          {lbl:'Moodboard',       val:client.moodboard?.length||0, icon:'🎭', cls:''},

            h('div',{className:'stat-val'},s.val+''),

    pending>0&&h('div',{style:{
      display:'flex',alignItems:'center',gap:12,
      background:'var(--magenta-lt)',border:'var(--bw) solid var(--magenta)',
      borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,flexWrap:'wrap'
    }},
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:13,fontWeight:700,color:'var(--magenta)',marginBottom:2}},
          `⏳ ${pending} contenut${pending===1?'o':'i'} in attesa di approvazione`
        ),
        h('div',{style:{fontSize:12,color:'var(--text-2)'}},
          'Il cliente non ha ancora approvato. Invia un promemoria.'
        )
      ),
      h('button',{
        className:'btn',
        style:{fontSize:12,borderColor:'var(--magenta)',color:'var(--magenta)',flexShrink:0},
        onClick:copyReminder
      }, reminderCopied?'✓ Copiato!':'📋 Copia messaggio WhatsApp')
    ),

    // Link portale
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:24,flexWrap:'wrap'}},
      h('div',{className:'link-box',style:{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},portalUrl),
      h('button',{className:'btn btn-ghost',style:{gap:4,fontSize:12,flexShrink:0},onClick:copyLink},
        ICONS.copy, linkCopied?' Copiato!':(h('span',null,' Copia'))

      h('button',{className:'btn btn-ghost',style:{gap:4,fontSize:12,flexShrink:0},onClick:()=>window.open('/portal/'+client.slug,'_blank')},ICONS.ext,' Apri')

    tab==='assets'    &&h(BrandAssets,{client,isAdmin:true,onAddLogo,onUpdateBrand}),
    tab==='approvals' &&h(Approvals,{client,isAdmin:true,onUpdateStatus,onAddApproval,onMoveToAssets}),

// ── Root App ──
function NassaBrand(){
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [selected,setSelected]=useState(null);
  const [view,setView]=useState('list');
  const [tab,setTab]=useState('assets');
  const [sidebarExp,setSidebarExp]=useState(false);

  const pub=isPortal();
  const slug=portalSlug();

  useEffect(()=>{
    if(pub){
      api('/api/brand?public=1&slug='+slug)
        .then(d=>{setSelected(d.client);setLoading(false);})
        .catch(()=>{setError('Cliente non trovato');setLoading(false);});
    } else {
      api('/api/brand')
        .then(d=>{setClients(d.clients||[]);setLoading(false);})
        .catch(()=>{setError('Errore caricamento');setLoading(false);});
    }
  },[]);

  const updateStatus=useCallback(async(clientId,aId,st,meta={})=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const approvals=c.approvals.map(a=>a.id===aId?{...a,stato:st,...meta}:a);
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'approvals',data:approvals})}).catch(console.error);
      return {...c,approvals};
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,approvals:p.approvals.map(a=>a.id===aId?{...a,stato:st,...meta}:a)}));
  },[selected]);

  const updateBrand=useCallback((clientId,updater)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const updated={...c,brand:updater(c.brand||{colors:[],fonts:[],logos:[],templates:[]})};
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'brand',data:updated.brand})}).catch(console.error);
      return updated;
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,brand:updater(p.brand||{colors:[],fonts:[],logos:[],templates:[]})}));
  },[selected]);

  const addLogo=useCallback((clientId,logo)=>{
    updateBrand(clientId,b=>({...b,logos:[...(b.logos||[]),logo]}));
  },[updateBrand]);

  const addApproval=useCallback((clientId,approval)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==clientId)return c;
      const approvals=[...(c.approvals||[]), approval];
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId,field:'approvals',data:approvals})}).catch(console.error);
      return {...c,approvals};
    }));
    if(selected?.id===clientId)setSelected(p=>({...p,approvals:[...(p.approvals||[]),approval]}));
  },[selected]);

  const addMoodItem=useCallback((item, removeId, isUpdate=false)=>{
    setClients(prev=>prev.map(c=>{
      if(c.id!==selected?.id)return c;
      const moodboard = removeId
        ? (c.moodboard||[]).filter(m=>m.id!==removeId)
        : isUpdate
          ? (c.moodboard||[]).map(m=>m.id===item.id?item:m)
          : [...(c.moodboard||[]), item];
      api('/api/brand',{method:'POST',body:JSON.stringify({clientId:c.id,field:'moodboard',data:moodboard})}).catch(console.error);
      return {...c,moodboard};
    }));
    if(selected){
      setSelected(p=>{
        const moodboard = removeId
          ? (p.moodboard||[]).filter(m=>m.id!==removeId)
          : isUpdate
            ? (p.moodboard||[]).map(m=>m.id===item.id?item:m)
            : [...(p.moodboard||[]), item];
        return {...p,moodboard};
      });
    }
  },[selected]);

  // Invia elemento moodboard ad Approvazioni
  const sendToApprovals=useCallback((moodItem)=>{
    const approval={
      id:'apr_'+Date.now(),
      titolo:moodItem.titolo||moodItem.note?.slice(0,50)||'Elemento moodboard',
      tipo:moodItem.tipo==='image'?'Asset visivo':moodItem.tipo==='color'?'Colore':'Testo/Copy',
      formato:moodItem.tipo,
      note:moodItem.note||'',
      preview:moodItem.color||'#C25B2A',
      imageUrl:moodItem.imageUrl||null,
      stato:'pending',
      proof_stato:'bozza',
      data:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}),
      semaforo_ok:false,
      source:'moodboard',
      sourceId:moodItem.id,
    };
    addApproval(selected.id, approval);
  },[selected,addApproval]);

  const selectClient=(c,v='assets')=>{setSelected(c);setView('portal');setTab(v);setSidebarExp(true);};

  if(loading)return h('div',{className:'app'},h('div',{className:'loading'},'Caricamento NassaBrand…'));
  if(error)return h('div',{className:'app'},h('div',{className:'loading'},error));
  if(pub&&selected)return h(PortaleCliente,{client:selected,onUpdateStatus:(aId,st,meta)=>updateStatus(selected.id,aId,st,meta||{})});

  const pending=c=>((c.approvals||[]).filter(a=>a.stato==='pending').length);

  return h('div',{className:'app'},
    // Topbar
    h('div',{className:'topbar'},
      h('div',{className:'topbar-brand'+(view==='portal'&&sidebarExp?' expanded':''),onClick:()=>{if(view==='portal')setSidebarExp(p=>!p);}},
        h('div',{className:'brand-mark'},'N'),
        h('span',{className:'brand-name'},'Nassa Studio')
      ),
      // Client in topbar when selected
      selected&&view==='portal'?
        h('div',{className:'topbar-client'},
          h('div',{className:'client-avatar',style:{background:selected.color||selected.brand?.colors[0]?.hex||'#1A8C3F'}},
            h('span',{style:{color:contrast(selected.brand?.colors[0]?.hex||selected.color||'#1A8C3F'),fontSize:12,fontWeight:800}},selected.name?.charAt(0)||'N')
          ),
          h('div',null,
            h('div',{className:'client-name'},selected.name),
            h('div',{className:'client-sub'},pending(selected)>0?pending(selected)+' in attesa':'Portale attivo')
          )
        )
      :h('div',{className:'topbar-nav'},
        h('div',{className:'nav-tab active'},'Portali clienti')
      ),
      h('div',{className:'topbar-right'},
        selected&&view==='portal'&&h('button',{className:'btn btn-outline',style:{fontSize:11,padding:'4px 10px'},onClick:()=>window.open('/portal/'+selected.slug,'_blank')},'↗ Vista cliente'),
        selected&&view==='portal'&&h('button',{className:'back-btn',onClick:()=>{setView('list');setSelected(null);setSidebarExp(false);}},ICONS.chevL,' Clienti'),
        h('button',{className:'topbar-btn',onClick:toggleTheme},'🌙')
      )
    ),
    // Body
    h('div',{className:'body'},
      // Sidebar — only when client selected
      view==='portal'&&h(Sidebar,{expanded:sidebarExp,onToggle:()=>setSidebarExp(p=>!p),currentTab:tab,onTab:v=>{if(v==='list'){setView('list');setSelected(null);setSidebarExp(false);}else setTab(v);}}),
      // Main
      h('div',{className:'main'},
        view==='list'&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:800,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},'Portali clienti'),
                h('div',{className:'content-sub'},clients.length+' clienti attivi')
              )
            ),
            h('div',{className:'client-list'},
              clients.length===0&&h('div',{className:'empty'},h('div',{className:'empty-icon'},'👥'),h('div',{className:'empty-title'},'Nessun cliente'),h('div',{className:'empty-sub'},'Aggiungili prima in NassaPED')),
              clients.map(c=>{
                const pc=c.brand?.colors[0]?.hex||c.color||'#1A8C3F';
                const p=pending(c);
                return h('div',{key:c.id,className:'client-row',onClick:()=>selectClient(c)},
                  h('div',{className:'client-row-avatar',style:{background:pc}},
                    h('span',{style:{color:contrast(pc),fontSize:15,fontWeight:800}},c.name?.charAt(0)||'N')
                  ),
                  h('div',{className:'client-row-info'},
                    h('div',{className:'client-row-name'},
                      c.name,
                      h('span',{className:'badge-active'},'Attivo')
                    ),
                    h('div',{className:'client-row-meta'},
                      h('span',{className:'client-row-slug'},c.slug),
                      p>0&&h('span',{className:'client-row-dot'},'·'),
                      p>0&&h('span',{style:{fontSize:11,color:'var(--magenta)',fontWeight:600}},p+' in attesa')
                    )
                  ),
                  h('div',{className:'client-row-actions'},
                    h('button',{className:'btn btn-ghost',style:{fontSize:12,padding:'5px 10px'},onClick:e=>{e.stopPropagation();window.open('/portal/'+c.slug,'_blank')}},'↗ Portale'),
                    h('button',{className:'btn btn-primary',style:{fontSize:12,padding:'5px 12px'},onClick:e=>{e.stopPropagation();selectClient(c);}},'Gestisci')
                  )
                );
              })
            )
          )
        ),
        view==='portal'&&selected&&h('div',{className:'main-scroll'},
          h('div',{style:{maxWidth:900,margin:'0 auto'}},
            h('div',{className:'content-header',style:{padding:'0 0 20px'}},
              h('div',null,
                h('div',{className:'content-title'},tab==='assets'?'Brand Assets':tab==='approvals'?'Approvazioni':'Moodboard'),
                h('div',{className:'content-sub'},selected.name+(tab==='approvals'&&pending(selected)>0?' · '+pending(selected)+' in attesa':''))
              )
            ),
            h(AdminPortaleView,{client:selected,tab,
              onUpdateStatus:(aId,st,meta)=>updateStatus(selected.id,aId,st,meta||{}),
              onAddLogo:(logo)=>addLogo(selected.id,logo),
              onAddMoodItem:addMoodItem,
              onUpdateBrand:updateBrand,
              onAddApproval:(a)=>addApproval(selected.id,a),
              onSendToApprovals:sendToApprovals,
              onMoveToAssets:(approval)=>{
                // Sposta da Approvazioni a Brand Assets quando Final
                const categoria = approval.categoria||'comunicazione';
                const newAsset={
                  id:'ast_'+Date.now(),
                  name:approval.titolo,
                  categoria,
                  format:approval.formato||'PNG',
                  note:approval.note||'',
                  data:approval.data||'',
                  url:approval.imageUrl||approval.url||'',
                  proof_stato:'final',
                  commenti:approval.commenti||[],
                };
                updateBrand(selected.id,brd=>({...brd,assets:[...(brd.assets||[]),newAsset]}));
                updateStatus(selected.id,approval.id,'scheduled',{proof_stato:'final',moved_to_assets:true});
              }
            })
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(NassaBrand));
</script>
</body>
</html>
