/* ── Topbar NassaStrategy ── */
.ns-topbar{height:var(--topbar);flex-shrink:0;background:var(--surface);border-bottom:var(--bw) solid var(--border);display:flex;align-items:stretch;z-index:200;}
.ns-topbar-brand{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:var(--bw) solid var(--border);}
.ns-brand-mark{width:30px;height:30px;border-radius:var(--r);background:#185FA5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.ns-topbar-title{display:flex;align-items:center;gap:8px;padding:0 16px;border-right:var(--bw) solid var(--border);}
.ns-topbar-title span.name{font-size:var(--fs-base);font-weight:700;color:var(--text-primary);letter-spacing:var(--ls-tight);}
.ns-topbar-title span.sub{font-size:var(--fs-xs);color:var(--text-muted);padding-left:8px;border-left:var(--bw) solid var(--border);}
.ns-topbar-nav{display:flex;align-items:stretch;flex:1;padding:0 8px;gap:2px;}
.ns-nav-tab{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:var(--fs-sm);font-weight:400;color:var(--text-secondary);cursor:pointer;border-bottom:2.5px solid transparent;border:none;background:none;transition:all var(--t-fast);white-space:nowrap;}
.ns-nav-tab:hover{color:var(--text-primary);background:var(--surface-lt);}
.ns-nav-tab.active{color:var(--text-primary);font-weight:700;border-bottom:2.5px solid var(--green);}
.ns-nav-tab .tab-chip{margin-left:4px;font-size:10px;padding:1px 6px;border-radius:var(--r-pill);background:var(--green-lt);color:var(--green-dk);font-weight:600;border:var(--bw) solid var(--green-mid);}
.ns-topbar-client{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:var(--bw) solid var(--border);max-width:200px;}
.ns-client-dot{width:7px;height:7px;border-radius:50%;}
.ns-client-name{font-size:var(--fs-sm);font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ns-close-btn{font-size:var(--fs-xs);padding:3px 9px;border-radius:var(--r-pill);border:var(--bw) solid var(--border);background:transparent;color:var(--text-muted);display:flex;align-items:center;gap:4px;transition:all var(--t-fast);}
.ns-close-btn:hover{background:var(--surface-lt);color:var(--text-primary);}
.ns-topbar-right{display:flex;align-items:center;gap:8px;padding:0 14px;border-left:var(--bw) solid var(--border);}
.ns-icon-btn{width:30px;height:30px;border-radius:var(--r);border:var(--bw) solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--t-fast);}
.ns-icon-btn:hover{background:var(--surface-lt);color:var(--text-primary);}
.hub-link{display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);color:var(--text-muted);text-decoration:none;padding:3px 10px;border-radius:var(--r-pill);border:var(--bw) solid var(--border);transition:all var(--t-fast);white-space:nowrap;}
.hub-link:hover{background:var(--surface-lt);color:var(--text-primary);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-pill);}
@keyframes spin{to{transform:rotate(360deg);}}

.ns-swatch-hover{transition:transform .15s;cursor:pointer;}
.ns-swatch-hover:hover{transform:translateY(-2px);}
.ns-ov-card{background:var(--surface-lt);border-radius:8px;padding:.75rem;cursor:pointer;border:.5px solid transparent;transition:border-color .1s;}

function contrast(hex) {
  const r = parseInt(hex.slice(1, 3), 16),
    g = parseInt(hex.slice(3, 5), 16),
    b = parseInt(hex.slice(5, 7), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.55 ? "#1A1A1A" : "#FFFFFF";
}

// ─── PED — PIANO EDITORIALE ───────────────────────────────────────────────────
const PED_PILASTRI  = ['Brand','Prodotto','Territorio','Community','Educazione','Promo','Behind the scenes','Altro'];
const PED_FORMATI   = ['Post feed','Reel','Storia','Carosello','Video','Newsletter','ADV','Live'];
const PED_STATI     = ['bozza','approvazione','approvato','pubblicato'];
const PED_STATO_CLR = {bozza:'#9ca3af',approvazione:'#f59e0b',approvato:'#185FA5',pubblicato:'#1A8C3F'};
const PED_GIORNI    = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

function pedKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function PEDView({ client, onChange }) {
  const h = React.createElement;
  const now = new Date();
  const [year,  setYear]  = React.useState(now.getFullYear());
  const [month, setMonth] = React.useState(now.getMonth());
  const [editing,  setEditing]  = React.useState(null);
  const [adding,   setAdding]   = React.useState(null);
  const [newPost,  setNewPost]  = React.useState({pilastro:'Brand',formato:'Post feed',tema:'',caption:'',stato:'bozza'});
  const [savedMsg, setSavedMsg] = React.useState('');
  const [pedVista, setPedVista] = React.useState('mese'); // 'mese'|'settimana'|'lista'

  const ped = client.ped || {};
  const MESI_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  // Statistiche mese
  const allPostsMese = React.useMemo(() => {
    const posts = [];
    const days = new Date(year, month+1, 0).getDate();
    for(let d=1; d<=days; d++) {
      const k = pedKey(year, month, d);
      (ped[k]||[]).forEach((p,i) => posts.push({...p, dateKey:k, idx:i, day:d}));
    }
    return posts;
  }, [ped, year, month]);

  const statsByStato = PED_STATI.reduce((acc,s) => {
    acc[s] = allPostsMese.filter(p=>p.stato===s).length;
    return acc;
  }, {});

  const save = () => { setSavedMsg('Salvato ✓'); setTimeout(()=>setSavedMsg(''),2000); };

  const addPost = (dateKey) => {
    if(!newPost.tema.trim()) return;
    onChange('ped_field', dateKey, {...newPost, id:'p_'+Date.now()});
    setNewPost({pilastro:'Brand',formato:'Post feed',tema:'',caption:'',stato:'bozza'});
    setAdding(null);
    save();
  };

  const deletePost = (dateKey, idx) => {
    onChange('ped_delete', null, {dateKey, idx});
    setEditing(null);
    save();
  };

  const updatePost = (dateKey, idx, field, val) => {
    onChange('ped_update', null, {dateKey, idx, field, val});
  };

  // Genera il calendario del mese
  const firstDay = new Date(year, month, 1).getDay(); // 0=Dom
  const offset   = firstDay === 0 ? 6 : firstDay - 1; // Lun=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = now.getFullYear()===year && now.getMonth()===month ? now.getDate() : -1;

  // Form aggiunta post
  const addForm = (dateKey) => h('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'},
    onClick:e=>{ if(e.target===e.currentTarget){ setAdding(null); setEditing(null); }}
  },
    h('div',{style:{background:'var(--surface)',borderRadius:8,padding:22,width:400,
      maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,.18)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('span',{style:{fontSize:15,fontWeight:700,color:'var(--text-primary)'}},'+ Aggiungi post · ',
          dateKey.split('-').reverse().slice(0,2).join('/')),
        h('button',{onClick:()=>setAdding(null),style:{border:'none',background:'transparent',fontSize:17,cursor:'pointer',color:'var(--text-secondary)'}},'×')
      ),
      // Tema
      h('div',{style:{marginBottom:10}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text-primary)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Tema / titolo *'),
        h('input',{type:'text',autoFocus:true,value:newPost.tema,
          onChange:e=>setNewPost(p=>({...p,tema:e.target.value})),
          placeholder:'Es. "Territorio — il vigneto in agosto"',
          style:{width:'100%',padding:'7px 10px',fontSize:13,border:'0.5px solid var(--border)',
            borderRadius:6,background:'var(--surface)',color:'var(--text-primary)',boxSizing:'border-box'}})
      ),
      // Pilastro + Formato
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}},
        h('div',null,
          h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text-primary)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Pilastro'),
          h('select',{value:newPost.pilastro,onChange:e=>setNewPost(p=>({...p,pilastro:e.target.value})),
            style:{width:'100%',padding:'6px 8px',fontSize:12,border:'0.5px solid var(--border)',
              borderRadius:6,background:'var(--surface)',color:'var(--text-primary)'}},
            PED_PILASTRI.map(p=>h('option',{key:p,value:p},p)))
        ),
        h('div',null,
          h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text-primary)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Formato'),
          h('select',{value:newPost.formato,onChange:e=>setNewPost(p=>({...p,formato:e.target.value})),
            style:{width:'100%',padding:'6px 8px',fontSize:12,border:'0.5px solid var(--border)',
              borderRadius:6,background:'var(--surface)',color:'var(--text-primary)'}},
            PED_FORMATI.map(f=>h('option',{key:f,value:f},f)))
        )
      ),
      // Caption
      h('div',{style:{marginBottom:10}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text-primary)',marginBottom:3,textTransform:'uppercase',letterSpacing:'.05em'}},'Caption / note'),
        h('textarea',{rows:3,value:newPost.caption,
          onChange:e=>setNewPost(p=>({...p,caption:e.target.value})),
          placeholder:'Bozza caption o note per il copywriter…',
          style:{width:'100%',padding:'7px 10px',fontSize:12,border:'0.5px solid var(--border)',
            borderRadius:6,background:'var(--surface)',color:'var(--text-primary)',
            resize:'vertical',fontFamily:'inherit',boxSizing:'border-box'}})
      ),
      // Stato
      h('div',{style:{marginBottom:16}},
        h('label',{style:{display:'block',fontSize:11,fontWeight:600,color:'var(--text-primary)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}},'Stato'),
        h('div',{style:{display:'flex',gap:6}},
          PED_STATI.map(s=>h('button',{key:s,onClick:()=>setNewPost(p=>({...p,stato:s})),
            style:{padding:'4px 10px',borderRadius:99,fontSize:11,fontWeight:600,cursor:'pointer',
              border:'1.5px solid '+(newPost.stato===s?PED_STATO_CLR[s]:'var(--border)'),
              background:newPost.stato===s?PED_STATO_CLR[s]+'22':'transparent',
              color:newPost.stato===s?PED_STATO_CLR[s]:'var(--text-muted)'}},
            s))
        )
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{onClick:()=>setAdding(null),style:{padding:'6px 14px',borderRadius:6,border:'0.5px solid var(--border)',background:'transparent',color:'var(--text-secondary)',fontSize:12,cursor:'pointer'}},'Annulla'),
        h('button',{onClick:()=>addPost(dateKey),
          style:{padding:'6px 16px',borderRadius:6,border:'none',background:G,color:'#111',fontSize:12,cursor:'pointer',fontWeight:700,opacity:newPost.tema.trim()?1:.45}},
          'Aggiungi')
      )
    )
  );

  return h('div',{style:{maxWidth:1100}},
    // ── Extra-bold heading livello cliente ──
    h('div',{style:{marginBottom:20}},
      h('div',{style:{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',
        color:'var(--text-muted)',marginBottom:4}},'Piano Editoriale'),
      h('div',{style:{fontSize:32,fontWeight:700,lineHeight:1.1,color:'var(--text-primary)',letterSpacing:'-.02em'}},
        MESI_IT[month]),
      h('div',{style:{fontSize:15,color:'var(--text-secondary)',marginTop:2}},
        year+' · '+allPostsMese.length+' post pianificati')
    ),

    // ── Pill toggle Mese / Settimana / Lista (ispirato a Dashlab) ──
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',
      marginBottom:16,flexWrap:'wrap',gap:8}},
      h('div',{style:{display:'inline-flex',background:'var(--surface)',
        border:'0.5px solid var(--border)',borderRadius:99,padding:3,gap:2}},
        [['mese','Mese'],['settimana','Settimana'],['lista','Lista']].map(([id,lbl])=>
          h('button',{key:id,onClick:()=>setPedVista(id),
            style:{padding:'5px 14px',borderRadius:99,fontSize:12,fontWeight:600,
              cursor:'pointer',border:'none',transition:'all .15s',
              background:pedVista===id?G:'transparent',
              color:pedVista===id?'#111':'var(--text-muted)'}},lbl)
        )
      ),
      pedVista==='lista'&&h('div',{style:{marginLeft:'auto',fontSize:12,color:'var(--text-muted)'}},
        allPostsMese.length+' post nel mese')
    ),

    // ── Timeline orizzontale (ispirata a Do. dashboard) ──
    h('div',{style:{marginBottom:20,overflowX:'auto',paddingBottom:4}},
      h('div',{style:{position:'relative',minWidth:700}},
        // Riga mesi — scorri ±3 mesi dal corrente
        h('div',{style:{display:'flex',gap:0,borderBottom:'0.5px solid var(--border-strong)',
          paddingBottom:6,marginBottom:8}},
          (()=>{
            const months=[]; let y=year,m=month-2;
            while(m<0){m+=12;y--;}
            for(let i=0;i<7;i++){
              const cm=m%12, cy=y+Math.floor(m/12);
              const isCur=(cm===month&&cy===year);
              months.push(h('div',{key:i,
                onClick:()=>{setMonth(cm);setYear(cy);},
                style:{flex:cm===month?'0 0 auto':1,minWidth:cm===month?120:60,
                  textAlign:'center',cursor:'pointer',paddingBottom:4,
                  borderBottom:isCur?'2px solid var(--text-primary)':'2px solid transparent',
                  marginBottom:-1,fontSize:isCur?13:11,
                  fontWeight:isCur?700:400,
                  color:isCur?'var(--text-primary)':'var(--text-muted)',
                  transition:'color .15s'}},
                MESI_IT[cm].toLowerCase()+(cm===month?' '+cy:'')
              ));
              m++;
            }
            return months;
          })()
        ),
        // Riga giorni — mostra i 31 giorni del mese corrente
        h('div',{style:{display:'flex',gap:2,overflowX:'auto',paddingBottom:4}},
          Array.from({length:new Date(year,month+1,0).getDate()},(_,i)=>i+1).map(d=>{
            const isToday=d===now.getDate()&&month===now.getMonth()&&year===now.getFullYear();
            const dateKey=pedKey(year,month,d);
            const hasPost=(ped[dateKey]||[]).length>0;
            const nPosts=(ped[dateKey]||[]).length;
            const dow=['D','L','M','M','G','V','S'][new Date(year,month,d).getDay()];
            return h('div',{key:d,
              onClick:()=>setAdding(dateKey),
              title:dow+' '+d+(hasPost?' · '+nPosts+' post':''),
              style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3,
                cursor:'pointer',minWidth:28,flexShrink:0,padding:'0 2px'}},
              h('div',{style:{
                width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',
                justifyContent:'center',fontSize:11,fontWeight:isToday?700:400,
                background:isToday?'var(--text-primary)':'transparent',
                color:isToday?'var(--surface-2)':'var(--text-secondary)',
                border:hasPost&&!isToday?'1.5px solid var(--text-primary)':'none',
                transition:'background .12s'}},d),
              h('div',{style:{fontSize:9,color:'var(--text-muted)',letterSpacing:'.03em'}},dow),
              // Dot indicatore post
              h('div',{style:{
                width:4,height:4,borderRadius:'50%',
                background:hasPost?PED_STATO_CLR[(ped[dateKey]||[])[0]?.stato||'bozza']:'transparent'}})
            );
          })
        )
      )
    ),

// ── Supabase API helpers ──────────────────────────────────────────────────────
const STRATEGY_API  = '/api/project';
const STRATEGY_KEY  = 'NASSA_SECRET_2026';
const STRATEGY_USER = 'nassa_strategy'; // chiave separata da NassaPED

async function strategyLoad() {
  const r = await fetch(`${STRATEGY_API}?user=${STRATEGY_USER}`, {
    headers: { 'x-nassa-key': STRATEGY_KEY },
    credentials: 'include',
  });
  if (!r.ok) throw new Error('Load failed: ' + r.status);
  const { data } = await r.json();
  return data?.clients || null;
}

async function strategySave(clients) {
  const r = await fetch(STRATEGY_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-nassa-key': STRATEGY_KEY },
    credentials: 'include',
    body: JSON.stringify({ user: STRATEGY_USER, data: { clients } }),
  });
  if (!r.ok) throw new Error('Save failed: ' + r.status);
}

// ── NassaStrategyHub ──────────────────────────────────────────────────────────
function NassaStrategyHub(){
  const [view,          setView]          = useState("dashboard");
  const [selectedClient,setSelectedClient]= useState(null);
  const [clients,       setClients]       = useState([]);
  const [loadState,     setLoadState]     = useState("loading"); // loading | ok | error
  const [saveState,     setSaveState]     = useState("");        // "" | "saving" | "saved" | "error"
  const saveTimer = React.useRef(null);
  const [hubAiOpen, setHubAiOpen] = useState(false); // P07 — AI panel toggle
  const h = React.createElement;

  // ── Load da Supabase al mount ──
  React.useEffect(() => {
    strategyLoad()
      .then(loaded => {
        if (loaded && loaded.length > 0) {
          setClients(loaded);
        } else {
          // Primo accesso — usa i clienti demo
          setClients(INIT_CLIENTS);
        }
        setLoadState("ok");
      })
      .catch(err => {
        console.warn('[NassaStrategy] Load error, using demo data:', err.message);
        setClients(INIT_CLIENTS);
        setLoadState("ok"); // continua con dati locali
      });
  }, []);

  // ── Salvataggio debounced (1.5s dopo l'ultima modifica) ──
  const saveClients = React.useCallback((newClients) => {
    clearTimeout(saveTimer.current);
    setSaveState("saving");
    saveTimer.current = setTimeout(() => {
      strategySave(newClients)
        .then(() => {
          setSaveState("saved");
          setTimeout(() => setSaveState(""), 2000);
        })
        .catch(err => {
          console.error('[NassaStrategy] Save error:', err.message);
          setSaveState("error");
          setTimeout(() => setSaveState(""), 4000);
        });
    }, 1500);
  }, []);

  // Wrapper setClients che triggera anche il save
  const setClientsAndSave = React.useCallback((updater) => {
    setClients(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveClients(next);
      return next;
    });
  }, [saveClients]);

  const openClient = c => { setSelectedClient(c); setView("cliente"); };
  const goBack = () => { setSelectedClient(null); setView("dashboard"); };

  // Indicatore save nella topbar
  const saveIndicator = saveState === "saving"
    ? h("span", {style:{fontSize:11,color:"var(--text-muted)",display:"flex",alignItems:"center",gap:4}},
        h("span", {style:{display:"inline-block",animation:"spin 1s linear infinite"}}, "⟳"), " Salvataggio…")
    : saveState === "saved"
    ? h("span", {style:{fontSize:11,color:"var(--green-dk,#00cc00)",fontWeight:600}}, "✓ Salvato")
    : saveState === "error"
    ? h("span", {style:{fontSize:11,color:"#ef4444",fontWeight:600}}, "⚠ Errore salvataggio")
    : null;

  // Loading screen
  if (loadState === "loading") return h("div", {
    style:{display:"flex",alignItems:"center",justifyContent:"center",
           height:"100vh",flexDirection:"column",gap:12,background:"var(--surface-0)"}
  },
    h("div", {style:{fontSize:28,animation:"spin 1s linear infinite"}}, "⟳"),
    h("p", {style:{fontSize:14,color:"var(--text-muted)"}}, "Caricamento NassaStrategy…")
  );

  return h("div", {style:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"var(--surface-0)"}},
    // ── Topbar ──
    h("div", {className:"ns-topbar"},
      h("div", {className:"ns-topbar-brand"},
        h("div", {className:"ns-brand-mark"}, "NS")
      ),
      h("div", {className:"ns-topbar-title"},
        h("span", {className:"name"}, "NassaStrategy"),
        h("span", {className:"sub"}, "Staffetta Nassa v3")
      ),
      h("div", {className:"ns-topbar-nav"},
        h("button", {
          className:"ns-nav-tab"+(view==="dashboard"?" active":""),
          onClick:()=>setView("dashboard")
        }, SVG.users, h("span",{style:{marginLeft:6}}, "Clienti")),
        h("button", {
          className:"ns-nav-tab"+(view==="cliente"?" active":""),
          onClick:()=>{ if(selectedClient) setView("cliente"); },
          style:{opacity:selectedClient?1:0.4,cursor:selectedClient?"pointer":"default"}
        },
          SVG.folder,
          h("span",{style:{marginLeft:6}}, "Scheda"),
          selectedClient && h("span",{className:"tab-chip"}, selectedClient.name.split(" ")[0])
        )
      ),
      selectedClient && h("div", {className:"ns-topbar-client"},
        h("div", {className:"ns-client-dot", style:{background:selectedClient.color}}),
        h("span", {className:"ns-client-name"}, selectedClient.name),
        h("button", {className:"ns-close-btn", onClick:goBack}, SVG.chevLeft, " Chiudi")
      ),
      h("div", {className:"ns-topbar-right"},
        saveIndicator,
        // P07 — AI toggle button (visible solo in vista cliente)
        view==="cliente" && h("button", {
          onClick:()=>setHubAiOpen(o=>!o),
          className:"ns-icon-btn",
          title:"AI Suggerimenti",
          style:{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:99,
            border:"0.5px solid "+(hubAiOpen?"#534AB7":"var(--border)"),
            background:hubAiOpen?"#E8E8F4":"transparent",
            color:hubAiOpen?"#534AB7":"var(--text-muted)",cursor:"pointer",
            transition:"all .15s"}
        }, "✨ AI"),
        h("button", {className:"ns-icon-btn", onClick:toggleTheme, title:"Tema"}, SVG.moon),
        h("a", {href:"/", className:"hub-link"}, SVG.chevLeft, " Hub")
      )
    ),
    // ── Content ──
    h("div", {style:{flex:1,overflow:"hidden"}},
      view==="dashboard" && h("div", {style:{height:"100%",overflowY:"auto"}},
        h(Dashboard, {
          clients,
          onOpen: openClient,
          onAdd: c => setClientsAndSave(prev => [...prev, c])
        })
      ),
      view==="cliente" && selectedClient && h(ClienteScheda, {
        client: selectedClient,
        clients,
        setClients: setClientsAndSave,
        onBack: goBack,
        defaultAiOpen: hubAiOpen,
        onAiToggle: setHubAiOpen
      })
    )
  );
}
