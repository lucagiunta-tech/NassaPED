  /* CDS-compatible tokens used by the gestionale */
  --surface-0:#f5f5f7;
  --surface-1:#f0f0f2;
  --surface-2:#ffffff;
  --border-strong:#d1d5db;
  --text-primary:#1c1c1e;
  --text-secondary:#6b7280;
  --text-muted:#9ca3af;
  --text-accent:#185FA5;
  --bg-accent:#e8f0fb;
  --bg-warning:#fef9ee;
  --bg-danger:#fff5f5;
  --bg-success:#f0fdf4;
  --border-warning:#fde68a;
  --border-danger:#fca5a5;
  --border-success:#bbf7d0;
  --font-sans:'Inter',sans-serif;
}
[data-theme="dark"]{
  --bg:#0f0f11;--surface:#1a1a1e;--border:#2a2a30;
  --text:#f0f0f2;--text-2:#9ca3af;--text-3:#6b7280;
  --green-lt:#0d2b0c;--green-text:#0a1a00;
  --surface-0:#0f0f11;
  --surface-1:#1a1a1e;
  --surface-2:#222228;
  --border-strong:#374151;
  --text-primary:#f0f0f2;
  --text-secondary:#9ca3af;
  --text-muted:#6b7280;
  --text-accent:#60a5fa;
  --bg-accent:#0c1929;
  --bg-warning:#1a1400;
  --bg-danger:#1a0a0a;
  --bg-success:#0a1f0a;
  --border-warning:#3a2800;
  --border-danger:#5a1a1a;
  --border-success:#14532d;
}
html,body{height:100%;font-family:var(--font);background:var(--surface-0);color:var(--text-primary);overflow:hidden;}
button{font-family:var(--font);}
textarea,input,select{font-family:var(--font);}
/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
/* back-to-hub link in topbar */
.hub-link{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text-muted);

// ── Dark mode sync ──
function toggleTheme(){
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;
  localStorage.setItem('ns_theme',t);
}
(()=>{const t=localStorage.getItem('ns_theme')||'light';document.documentElement.dataset.theme=t;})();


// ─── COSTANTI ─────────────────────────────────────────────────────────────────
const G = "#1A8C3F";
const M = "#C2185B";
const B = "#185FA5";
const T = "#0F6E56";

function contrast(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.55 ? "#1A1A1A" : "#FFFFFF";
}

// ─── SHARED UI ────────────────────────────────────────────────────────────────
function Pill({children, color=G, bg}) {
  return <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:4,background:bg||color+"18",color,whiteSpace:"nowrap",display:"inline-block"}}>{children}</span>;
}
function Card({children, style={}}) {
  return <div style={{background:"var(--surface-2)",border:"0.5px solid var(--border)",borderRadius:12,padding:"1.25rem",...style}}>{children}</div>;
}
function ProgressBar({pct, color=G, height=4}) {
  return <div style={{height,background:"var(--surface-0)",borderRadius:2,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,Math.round(pct))}%`,background:color,borderRadius:2,transition:"width 0.4s"}}/>
  </div>;
}
function SectionTitle({title, sub}) {
  return <div style={{marginBottom:"1.25rem"}}>
    <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:500,color:"var(--text-primary)"}}>{title}</h2>
    {sub && <p style={{margin:0,fontSize:12,color:"var(--text-muted)"}}>{sub}</p>}
  </div>;
}
function ActionBar({title, sub, onSave, onNext, nextLabel, savedMsg}) {
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem",flexWrap:"wrap",gap:10}}>
    <div>
      <h2 style={{margin:"0 0 3px",fontSize:17,fontWeight:500,color:"var(--text-primary)"}}>{title}</h2>
      {sub && <p style={{margin:0,fontSize:12,color:"var(--text-muted)"}}>{sub}</p>}
    </div>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      {savedMsg && <span style={{fontSize:11,color:G,fontWeight:500}}>{savedMsg}</span>}
      {onSave && <button onClick={onSave} style={{padding:"5px 13px",borderRadius:6,border:"none",background:G,color:"#fff",fontSize:11,cursor:"pointer",fontWeight:500}}>Salva</button>}
      {onNext && <button onClick={onNext} style={{padding:"5px 13px",borderRadius:6,border:`1px solid ${M}`,background:"transparent",color:M,fontSize:11,cursor:"pointer",fontWeight:500}}>{nextLabel||"Avanti →"}</button>}
    </div>
  </div>;
}
function Alert({type="warning", children}) {
  const cfg = {
    warning:{bg:"var(--bg-warning)",border:"var(--border-warning)",icon:"⚠️"},
    danger: {bg:"var(--bg-danger)", border:"var(--border-danger)", icon:"🔒"},
    success:{bg:"var(--bg-success)",border:"var(--border-success)",icon:"✅"},
    info:   {bg:"var(--surface-1)", border:"var(--border)",        icon:"ℹ️"},
  }[type]||{};
  return <div style={{padding:"9px 13px",borderRadius:8,background:cfg.bg,border:`0.5px solid ${cfg.border}`,display:"flex",gap:8,alignItems:"flex-start",marginBottom:"1.25rem",fontSize:11,color:"var(--text-secondary)"}}>
    <span>{cfg.icon}</span><span>{children}</span>
  </div>;
}

// ─── LAYOUT SIDEBAR ───────────────────────────────────────────────────────────
function SidebarLayout({sidebar, children}) {
  return <div style={{display:"flex",height:"calc(100vh - 48px)",overflow:"hidden"}}>
    <div style={{width:210,flexShrink:0,background:"var(--surface-1)",borderRight:"0.5px solid var(--border)",display:"flex",flexDirection:"column",overflowY:"auto"}}>
      {sidebar}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"1.5rem"}}>
      {children}
    </div>
  </div>;
}

function NavBtn({active, onClick, children, color=G}) {
  return <button onClick={onClick} style={{
    width:"100%",textAlign:"left",padding:"8px 14px",border:"none",cursor:"pointer",
    fontSize:12,background:active?"var(--bg-accent)":"transparent",
    color:active?"var(--text-accent)":"var(--text-secondary)",

// ─── CAMPO TESTO GENERICO ─────────────────────────────────────────────────────
function Field({label, hint, value, onChange, rows=3, type="textarea", placeholder=""}) {
  const base = {width:"100%",padding:"8px 11px",fontSize:13,color:"var(--text-primary)",background:"var(--surface-1)",border:"0.5px solid var(--border-strong)",borderRadius:8,fontFamily:"var(--font-sans)",outline:"none",boxSizing:"border-box"};
  return <div style={{marginBottom:"1.25rem"}}>
    <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:3}}>{label}</label>
    {hint && <p style={{margin:"0 0 5px",fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>{hint}</p>}
    {type==="textarea"
      ? <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{...base,resize:"vertical"}}/>
      : <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base}/>
    }
  </div>;
}

function StrategyView({client, onChange, onPrev, onNext}) {
  const [step, setStep] = useState("mod4a");
  const [savedMsg, setSavedMsg] = useState("");

  const s = client.strategy;
  const c4 = Q4A.filter(q=>s.mod4a[q.key]?.trim()).length;
  const c5 = Q5.filter(q=>s.mod5[q.key]?.trim()).length;
  const pc = client.brand.colors[0]?.hex||G;

  const save = (mod) => {
    onChange("strategy",mod,s[mod]);
    setSavedMsg("Salvato ✓");
    setTimeout(()=>setSavedMsg(""),2000);
  };
  const complete = (mod, next) => {
    const updated = {...s[mod],done:true};
    onChange("strategy",mod,updated);
    setSavedMsg("Completato ✓");
    setStep(next);
    setTimeout(()=>setSavedMsg(""),2000);
  };
  const updateField = (mod,key,val) => onChange("strategy_field",mod,{key,val});

  const STEPS = [
    {id:"mod4a",lbl:"Mod.4a",sub:"Brainstorming Concept",done:s.mod4a.done,n:c4,tot:Q4A.length},
    {id:"mod5", lbl:"Mod.5", sub:"Copy Strategy",         done:s.mod5.done, n:c5,tot:Q5.length},
    {id:"output",lbl:"Output",sub:"Riepilogo finale",     done:s.mod4a.done&&s.mod5.done,n:null,tot:null},
  ];

  const sidebar = <>
    <div style={{padding:"1rem",borderBottom:"0.5px solid var(--border)"}}>
      <div style={{width:30,height:30,borderRadius:6,background:M,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
        <span style={{color:"#fff",fontSize:14}}>🧠</span>
      </div>
      <p style={{margin:"0 0 2px",fontSize:11,fontWeight:500,color:"var(--text-primary)"}}>Strategy Builder</p>
      <p style={{margin:0,fontSize:10,color:"var(--text-muted)"}}>{client.name}</p>
    </div>
    <nav style={{padding:"6px 0",flex:1}}>
      {STEPS.map(st=>(
        <button key={st.id} onClick={()=>setStep(st.id)} style={{
          width:"100%",textAlign:"left",padding:"9px 14px",border:"none",cursor:"pointer",
          background:step===st.id?"var(--bg-accent)":"transparent",
          borderLeft:`2px solid ${step===st.id?G:"transparent"}`,
        }}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:st.done?G:"var(--border-strong)",flexShrink:0,display:"inline-block"}}/>
            <span style={{fontSize:12,fontWeight:500,color:step===st.id?"var(--text-accent)":"var(--text-primary)"}}>{st.lbl}</span>
          </div>
          <p style={{margin:"0 0 0 12px",fontSize:10,color:"var(--text-muted)"}}>{st.sub}</p>
          {st.n!==null && <p style={{margin:"1px 0 0 12px",fontSize:10,color:"var(--text-muted)"}}>{st.n}/{st.tot} campi</p>}
        </button>

    </nav>
    <div style={{padding:"0.75rem",borderTop:"0.5px solid var(--border)",display:"flex",flexDirection:"column",gap:6}}>
      <button onClick={onPrev} style={{width:"100%",padding:"5px 10px",borderRadius:5,border:"0.5px solid var(--border-strong)",background:"transparent",color:"var(--text-secondary)",fontSize:11,cursor:"pointer"}}>
        ← Torna a Brand Portal
      </button>
      <button onClick={onNext} style={{width:"100%",padding:"5px 10px",borderRadius:5,border:`1px solid ${M}`,background:"transparent",color:M,fontSize:11,cursor:"pointer",fontWeight:500}}>
        Vai a Output →
      </button>
    </div>
  </>;

  const renderField = (q, mod) => {
    const val = s[mod][q.key]||"";
    const upd = v => updateField(mod,q.key,v);
    const base = {width:"100%",padding:"8px 11px",fontSize:13,color:"var(--text-primary)",background:"var(--surface-1)",border:"0.5px solid var(--border-strong)",borderRadius:8,fontFamily:"var(--font-sans)",outline:"none",boxSizing:"border-box"};
    return <div key={q.key} style={{marginBottom:"1.25rem"}}>
      <label style={{display:"block",fontSize:13,fontWeight:500,color:"var(--text-primary)",marginBottom:3}}>{q.label}</label>
      {q.hint && <p style={{margin:"0 0 5px",fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>{q.hint}</p>}
      {q.t==="sel"
        ? <select value={val} onChange={e=>upd(e.target.value)} style={base}>
            <option value="">Seleziona archetipo...</option>
            {q.opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        : q.t==="ta"
        ? <textarea rows={3} value={val} onChange={e=>upd(e.target.value)} placeholder={q.ph} style={{...base,resize:"vertical"}}/>
        : <input type="text" value={val} onChange={e=>upd(e.target.value)} placeholder={q.ph} style={base}/>
      }
    </div>;
  };

  return <SidebarLayout sidebar={sidebar}>
    {step==="mod4a" && <>
      <ActionBar title="Mod.4a — Brainstorming Concept"
        sub="Sessione 90 min · Luca + Alberto + Paolone"
        onSave={()=>save("mod4a")} savedMsg={savedMsg}
        onNext={()=>complete("mod4a","mod5")} nextLabel="Completa → Mod.5"/>
      <Alert type="warning">Regola §01 Codice — Divieto di briefing orale. Tutto trascritto qui. Max 90 min. Se non c'è accordo, decide Alberto.</Alert>
      {client.pdm.posizionamento && (
        <Card style={{marginBottom:"1.25rem",borderLeft:`3px solid ${B}`}}>
          <p style={{margin:"0 0 4px",fontSize:10,color:B,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:500}}>Posizionamento + USP dal PDM</p>
          <p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.6}}>{client.pdm.posizionamento.slice(0,200)}</p>
        </Card>
      )}
      {Q4A.map(q=>renderField(q,"mod4a"))}
    </>}

    {step==="mod5" && <>
      <ActionBar title="Mod.5 — Copy Strategy"
        sub="Insight · Promessa · ToV · Archetipo · Responsabile: Luca"
        onSave={()=>save("mod5")} savedMsg={savedMsg}
        onNext={()=>complete("mod5","output")} nextLabel="Completa → Output"/>
      {!s.mod4a.done && <Alert type="danger">Completa prima il Mod.4a — la Copy Strategy dipende dal Concept approvato.</Alert>}
      {s.mod4a.frase_guida && (
        <Card style={{marginBottom:"1.25rem",borderLeft:`3px solid ${pc}`}}>
          <p style={{margin:"0 0 4px",fontSize:10,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Frase guida dal Mod.4a</p>
          <p style={{margin:"0 0 4px",fontSize:13,fontStyle:"italic",fontWeight:500,color:"var(--text-primary)"}}>"{s.mod4a.frase_guida}"</p>
          {s.mod4a.differenziatore && <p style={{margin:0,fontSize:11,color:"var(--text-secondary)"}}>Differenziatore: {s.mod4a.differenziatore}</p>}
        </Card>
      )}
      {client.pdc.creative_territory && (
        <Card style={{marginBottom:"1.25rem",borderLeft:`3px solid ${T}`}}>
          <p style={{margin:"0 0 4px",fontSize:10,color:T,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:500}}>Creative Territory dal PDC</p>
          <p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.6}}>{client.pdc.creative_territory.slice(0,200)}</p>
        </Card>
      )}
      {Q5.map(q=>renderField(q,"mod5"))}
    </>}

    {step==="output" && <>
      <SectionTitle title="Output strategia" sub="Riepilogo Copy Strategy — pronto per Dropbox Paper"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:"1.25rem"}}>
        {[{lbl:"Mod.4a Brainstorming",done:s.mod4a.done,n:c4,tot:Q4A.length,id:"mod4a"},{lbl:"Mod.5 Copy Strategy",done:s.mod5.done,n:c5,tot:Q5.length,id:"mod5"}].map(m=>(
          <Card key={m.lbl} style={{cursor:"pointer"}} onClick={()=>setStep(m.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:500,color:"var(--text-primary)"}}>{m.lbl}</span>
              <Pill color={m.done?G:"var(--text-muted)"}>{m.done?"✓ Completato":"In corso"}</Pill>
            </div>
            <ProgressBar pct={(m.n/m.tot)*100} color={m.done?G:M}/>
            <p style={{margin:"5px 0 0",fontSize:10,color:"var(--text-muted)"}}>{m.n}/{m.tot} · clicca per modificare</p>
          </Card>
        ))}
      </div>
      {(s.mod5.claim||s.mod5.promessa)
        ? <Card style={{borderLeft:`3px solid ${M}`,marginBottom:"1.25rem"}}>
            <p style={{margin:"0 0 12px",fontSize:10,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Copy Strategy · {client.name}</p>
            {s.mod5.claim&&<div style={{marginBottom:10}}><p style={{margin:"0 0 2px",fontSize:10,color:"var(--text-muted)"}}>CLAIM</p><p style={{margin:0,fontSize:20,fontWeight:500,color:"var(--text-primary)"}}>{s.mod5.claim}</p></div>}
            {s.mod5.payoff&&<div style={{marginBottom:10}}><p style={{margin:"0 0 2px",fontSize:10,color:"var(--text-muted)"}}>PAYOFF</p><p style={{margin:0,fontSize:14,fontStyle:"italic",color:"var(--text-secondary)"}}>{s.mod5.payoff}</p></div>}
            {s.mod5.promessa&&<div style={{marginBottom:10}}><p style={{margin:"0 0 2px",fontSize:10,color:"var(--text-muted)"}}>PROMESSA</p><p style={{margin:0,fontSize:13,color:"var(--text-secondary)"}}>{s.mod5.promessa}</p></div>}
            {s.mod5.archetipo&&<div style={{marginBottom:10}}><p style={{margin:"0 0 4px",fontSize:10,color:"var(--text-muted)"}}>ARCHETIPO</p><Pill color={pc}>{s.mod5.archetipo}</Pill></div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12,paddingTop:12,borderTop:"0.5px solid var(--border)"}}>
              {s.mod5.tov_parole_si&&<div><p style={{margin:"0 0 4px",fontSize:10,color:G,fontWeight:500}}>✓ PAROLE SÌ</p><p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.6}}>{s.mod5.tov_parole_si}</p></div>}
              {s.mod5.tov_parole_no&&<div><p style={{margin:"0 0 4px",fontSize:10,color:M,fontWeight:500}}>✗ PAROLE NO</p><p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.6}}>{s.mod5.tov_parole_no}</p></div>}
            </div>
          </Card>
        : <div style={{padding:"2rem",textAlign:"center",borderRadius:12,border:"1.5px dashed var(--border-strong)",color:"var(--text-muted)",marginBottom:"1.25rem"}}>
            <p style={{margin:"0 0 10px",fontSize:13}}>Completa Mod.4a e Mod.5 per vedere l'output</p>
            <button onClick={()=>setStep("mod4a")} style={{padding:"5px 14px",borderRadius:5,border:`1px solid ${G}`,background:"transparent",color:G,fontSize:11,cursor:"pointer"}}>Inizia dal Mod.4a</button>
          </div>
      }
      <Alert type="info">Archivia su: Dropbox → DOCUMENT HUB · {client.name} → 04_STRATEGY/</Alert>
    </>}
  </SidebarLayout>;
}

const MOD_LIST = [
  {id:"overview", lbl:"Panoramica",           icon:"◈", phase:null},
  {id:"pdm",      lbl:"Piano di Marketing",   icon:"📊", phase:"Fase 1 — Analisi"},
  {id:"pdc",      lbl:"Piano di Comunicazione",icon:"📣",phase:null},
  {id:"brand",    lbl:"Brand Portal",         icon:"🎨", phase:"Fase 2 — Strategia"},
  {id:"strategy", lbl:"Strategy Builder",     icon:"🧠", phase:null},
  {id:"output",   lbl:"Output & Archivio",    icon:"📦", phase:"Output"},
];

function ClienteScheda({client, clients, setClients, onBack}) {
  const [mod, setMod] = useState("overview");

  const c = clients.find(x=>x.id===client.id);
  const pdmFilled = PDM_SEZIONI.filter(s=>c.pdm[s.id]?.trim()).length;
  const pdcFilled = PDC_SEZIONI.filter(s=>c.pdc[s.id]?.trim()).length;

  const updateClient = (type, key, value) => {
    setClients(prev => prev.map(cl => {
      if(cl.id !== c.id) return cl;
      if(type==="pdm") return {...cl, pdm:{...cl.pdm,[key]:value}};
      if(type==="pdc") return {...cl, pdc:{...cl.pdc,[key]:value}};
      if(type==="strategy") return {...cl, strategy:{...cl.strategy,[key]:value}};
      if(type==="strategy_field") {
        const {key:fkey, val} = value;
        return {...cl, strategy:{...cl.strategy,[key]:{...cl.strategy[key],[fkey]:val}}};
      }
      return cl;
    }));
  };

  const modStatus = (id) => {
    if(id==="pdm") return pdmFilled===0?"empty":pdmFilled===PDM_SEZIONI.length?"done":"partial";
    if(id==="pdc") return pdcFilled===0?"empty":pdcFilled===PDC_SEZIONI.length?"done":"partial";
    if(id==="brand") return c.brand.colors.length>0?"partial":"empty";
    if(id==="strategy") {
      const tot = (c.strategy.mod4a.done?1:0)+(c.strategy.mod5.done?1:0);
      return tot===0?"empty":tot===2?"done":"partial";
    }
    return "empty";
  };
  const STATUS_ICON = {done:"✓",partial:"◑",empty:"○"};
  const STATUS_COLOR = {done:G,partial:"#BA7517",empty:"var(--text-muted)"};

  const topSidebar = (
    <div style={{
      width:210,flexShrink:0,background:"var(--surface-1)",
      borderRight:"0.5px solid var(--border)",display:"flex",flexDirection:"column",
      height:"calc(100vh - 48px)",overflowY:"auto"
    }}>
      <div style={{padding:"1rem",borderBottom:"0.5px solid var(--border)"}}>
        <div style={{width:34,height:34,borderRadius:8,background:c.color,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
          <span style={{color:contrast(c.color),fontSize:15,fontWeight:700}}>{c.name.charAt(0)}</span>
        </div>
        <p style={{margin:"0 0 4px",fontSize:12,fontWeight:500,color:"var(--text-primary)",lineHeight:1.3}}>{c.name}</p>
        <Pill color={G}>{c.pkg}</Pill>
        <p style={{margin:"5px 0 0",fontSize:10,color:"var(--text-muted)"}}>{c.phase}</p>
      </div>
      <nav style={{flex:1,padding:"4px 0"}}>
        {MOD_LIST.map(m=>{
          const st = m.id==="overview"||m.id==="output" ? null : modStatus(m.id);
          const isActive = mod===m.id;
          return <div key={m.id}>
            {m.phase && (
              <div style={{padding:"6px 12px 2px",fontSize:9,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>{m.phase}</div>
            )}
            <button onClick={()=>setMod(m.id)} style={{
              width:"100%",textAlign:"left",padding:"8px 14px",border:"none",cursor:"pointer",
              fontSize:12,background:isActive?"var(--bg-accent)":"transparent",
              color:isActive?"var(--text-accent)":"var(--text-secondary)",
              borderLeft:`2px solid ${isActive?G:"transparent"}`,
              display:"flex",alignItems:"center",gap:8,
            }}>
              <span style={{fontSize:14}}>{m.icon}</span>
              <span style={{flex:1}}>{m.lbl}</span>
              {st && <span style={{fontSize:11,color:STATUS_COLOR[st]}}>{STATUS_ICON[st]}</span>}
            </button>
          </div>;
        })}
      </nav>
      <div style={{padding:"0.75rem",borderTop:"0.5px solid var(--border)"}}>
        <button onClick={onBack} style={{width:"100%",padding:"5px 10px",borderRadius:5,border:"0.5px solid var(--border-strong)",background:"transparent",color:"var(--text-secondary)",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          ← Lista clienti
        </button>
      </div>
    </div>
  );

  const mainContent = () => {
    if(mod==="overview") return <OverviewView client={c} onNavigate={setMod}/>;
    if(mod==="pdm")      return <PDMView client={c} onChange={updateClient} onNext={()=>setMod("pdc")}/>;
    if(mod==="pdc")      return <PDCView client={c} onChange={updateClient} onNext={()=>setMod("brand")} onPrev={()=>setMod("pdm")}/>;
    if(mod==="brand")    return <BrandPortalView client={c} onNext={()=>setMod("strategy")} onPrev={()=>setMod("pdc")}/>;
    if(mod==="strategy") return <StrategyView client={c} onChange={updateClient} onNext={()=>setMod("output")} onPrev={()=>setMod("brand")}/>;
    if(mod==="output")   return <div style={{padding:"1.5rem",overflowY:"auto",flex:1}}><OutputView client={c} onNavigate={setMod}/></div>;
  };

  if(mod==="pdm"||mod==="pdc"||mod==="brand"||mod==="strategy") {
    return <div style={{display:"flex",height:"calc(100vh - 48px)",overflow:"hidden"}}>
      {topSidebar}
      {mainContent()}
    </div>;
  }

  return <div style={{display:"flex",height:"calc(100vh - 48px)",overflow:"hidden"}}>
    {topSidebar}
    <div style={{flex:1,overflowY:"auto",padding:"1.5rem"}}>
      {mainContent()}
    </div>
  </div>;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({clients, onOpen}) {
  const [search, setSearch] = useState("");
  const list = clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));

  return <div style={{padding:"1.5rem",maxWidth:860,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem",flexWrap:"wrap",gap:10}}>
      <div>
        <h1 style={{margin:"0 0 2px",fontSize:18,fontWeight:500,color:"var(--text-primary)"}}>Clienti</h1>
        <p style={{margin:0,fontSize:12,color:"var(--text-muted)"}}>{clients.length} totali · ogni cliente ha PDM + PDC + Brand Portal + Strategy</p>
      </div>
      <div style={{display:"flex",gap:8}}>
        <input placeholder="Cerca..." value={search} onChange={e=>setSearch(e.target.value)}
          style={{fontSize:12,padding:"6px 12px",borderRadius:6,width:180}}/>
        <button style={{padding:"6px 14px",borderRadius:6,border:"none",background:G,color:"#fff",fontSize:12,cursor:"pointer",fontWeight:500}}>
          + Nuovo cliente
        </button>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:"1.5rem"}}>
      {[
        ["Clienti totali",clients.length],
        ["PDM avviati",clients.filter(c=>PDM_SEZIONI.some(s=>c.pdm[s.id]?.trim())).length],
        ["Strategy OK",clients.filter(c=>c.strategy.mod4a.done&&c.strategy.mod5.done).length],
        ["Output pronti",clients.filter(c=>c.strategy.mod5.claim?.trim()).length],
      ].map(([l,v])=>(
        <div key={l} style={{background:"var(--surface-1)",borderRadius:8,padding:"0.75rem"}}>
          <p style={{margin:"0 0 3px",fontSize:20,fontWeight:500,color:"var(--text-primary)"}}>{v}</p>
          <p style={{margin:0,fontSize:11,color:"var(--text-muted)"}}>{l}</p>
        </div>
      ))}
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {list.map(c=>{
        const pdmF = PDM_SEZIONI.filter(s=>c.pdm[s.id]?.trim()).length;
        const pdcF = PDC_SEZIONI.filter(s=>c.pdc[s.id]?.trim()).length;
        const stratOk = c.strategy.mod4a.done&&c.strategy.mod5.done;

        return <div key={c.id}
          style={{background:"var(--surface-2)",border:"0.5px solid var(--border)",borderRadius:12,padding:"1rem 1.25rem",
            display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,
            cursor:"pointer",transition:"border-color 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=G}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
          onClick={()=>onOpen(c)}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:8,background:c.color,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{color:contrast(c.color),fontSize:16,fontWeight:700}}>{c.name.charAt(0)}</span>
            </div>
            <div>
              <p style={{margin:"0 0 5px",fontSize:14,fontWeight:500,color:"var(--text-primary)"}}>{c.name}</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:5}}>
                <Pill color={G}>{c.pkg}</Pill>
                <Pill color={"var(--text-muted)"} bg="var(--surface-1)">{c.phase}</Pill>
                <span style={{fontSize:10,color:"var(--text-muted)"}}>Manager: {c.manager}</span>
              </div>
              <div style={{display:"flex",gap:12}}>
                {[
                  ["PDM",pdmF,PDM_SEZIONI.length,B],
                  ["PDC",pdcF,PDC_SEZIONI.length,T],
                  ["Strat.",stratOk?2:c.strategy.mod4a.done?1:0,2,M],
                ].map(([l,n,tot,col])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:10,color:"var(--text-muted)"}}>{l}</span>
                    <div style={{width:40,height:3,background:"var(--surface-0)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.round((n/tot)*100)}%`,background:n===tot?G:n>0?col:"var(--border-strong)",borderRadius:2}}/>
                    </div>
                    <span style={{fontSize:10,color:n===tot?G:n>0?"#BA7517":"var(--text-muted)"}}>{n}/{tot}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{fontSize:11,color:G,fontWeight:500}}>Apri scheda →</div>
        </div>;
      })}
    </div>
  </div>;
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function NassaGestionale({ hubLink }) {
  const [view, setView] = useState("dashboard");
  const [selectedClient, setSelectedClient] = useState(null);
  const [clients, setClients] = useState(INIT_CLIENTS);

  const openClient = (c) => { setSelectedClient(c); setView("cliente"); };
  const goBack = () => { setSelectedClient(null); setView("dashboard"); };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"var(--surface-0)"}}>
      {/* TOPBAR */}
      <div style={{display:"flex",alignItems:"center",height:48,background:"var(--surface-2)",borderBottom:"0.5px solid var(--border)",padding:"0 1.25rem",flexShrink:0,gap:4}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginRight:"1rem",flexShrink:0}}>
          <div style={{width:26,height:26,borderRadius:6,background:"#185FA5",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#fff",fontSize:12,fontWeight:700}}>NS</span>
          </div>
          <span style={{fontSize:13,fontWeight:500,color:"var(--text-primary)"}}>NassaStrategy</span>
          <span style={{fontSize:10,color:"var(--text-muted)",borderLeft:"0.5px solid var(--border)",paddingLeft:8}}>Staffetta Nassa v3</span>
        </div>

        {[{id:"dashboard",lbl:"👥 Clienti"},{id:"cliente",lbl:"📁 Scheda"}].map(t=>(
          <button key={t.id} onClick={()=>{ if(t.id==="cliente"&&!selectedClient) return; setView(t.id); }}
            style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:t.id==="cliente"&&!selectedClient?"not-allowed":"pointer",
              fontSize:12,background:view===t.id?"var(--bg-accent)":"transparent",
              color:view===t.id?"var(--text-accent)":"var(--text-secondary)",
              opacity:t.id==="cliente"&&!selectedClient?0.4:1,fontWeight:view===t.id?500:400}}>
            {t.lbl}
            {t.id==="cliente"&&selectedClient&&(
              <span style={{marginLeft:5,fontSize:10,padding:"1px 5px",borderRadius:8,background:G+"20",color:G}}>
                {selectedClient.name.split(" ")[0]}
              </span>
            )}
          </button>
        ))}

        {selectedClient && (
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,marginLeft:8}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:selectedClient.color}}/>
            <span style={{fontWeight:500,color:"var(--text-primary)"}}>{selectedClient.name}</span>
            <button onClick={goBack} style={{fontSize:11,padding:"2px 8px",borderRadius:4,border:"0.5px solid var(--border-strong)",background:"transparent",color:"var(--text-muted)",cursor:"pointer"}}>
              ✕ chiudi
            </button>
          </div>
        )}

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={toggleTheme} style={{width:28,height:28,borderRadius:6,border:"0.5px solid var(--border)",background:"transparent",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-secondary)"}}>🌙</button>
          {hubLink}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflow:"hidden"}}>
        {view==="dashboard" && <div style={{height:"100%",overflowY:"auto"}}><Dashboard clients={clients} onOpen={openClient}/></div>}
        {view==="cliente" && selectedClient && (
          <ClienteScheda client={selectedClient} clients={clients} setClients={setClients} onBack={goBack}/>
        )}
      </div>
    </div>
  );
}


// ── Mount with hub link injected into topbar ──
function NassaStrategyHub(){
  return <NassaGestionale hubLink={
    <a href="/" className="hub-link">← Hub</a>
  }/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<NassaStrategyHub/>);
</script>
